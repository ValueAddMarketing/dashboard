                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════
        // LEADS & ADS SECTION
        // ═══════════════════════════════════════════
        const LeadsSection = ({ metrics, ghlData }) => {
            if (!metrics) {
                return <div className="glass rounded-2xl p-12 text-center"><p className="text-slate-400">No ad data available yet.</p></div>;
            }

            return (
                <div className="space-y-6">
                    {/* Period Comparison */}
                    <div className="glass rounded-2xl p-6 fade-up">
                        <h3 className="text-white font-semibold mb-5">Performance Snapshot</h3>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            {[
                                { label: 'Last 3 Days', leads: metrics.last3DayLeads, spend: metrics.last3DaySpend },
                                { label: 'Last 7 Days', leads: metrics.last7DayLeads, spend: metrics.last7DaySpend },
                                { label: 'Lifetime', leads: metrics.totalLeads, spend: metrics.spend },
                                { label: 'Cost Per Lead', leads: null, spend: null, cpl: metrics.cpl },
                            ].map(p => (
                                <div key={p.label} className="bg-dark-800/50 rounded-xl p-4">
                                    <p className="text-xs text-slate-500 font-medium uppercase tracking-wider mb-3">{p.label}</p>
                                    {p.cpl !== undefined ? (
                                        <p className="text-2xl font-bold text-brand-green">{fmtD(p.cpl)}</p>
                                    ) : (
                                        <div>
                                            <p className="text-2xl font-bold text-white">{fmtN(p.leads)}</p>
                                            <p className="text-xs text-slate-500 mt-1">{fmt(p.spend)} spent</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Seller vs Buyer Breakdown */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        {/* Seller */}
                        <div className="glass rounded-2xl p-6 fade-up fade-up-1">
                            <div className="flex items-center gap-2 mb-5">
                                <div className="w-3 h-3 rounded-full bg-brand-cyan"></div>
                                <h3 className="text-white font-semibold">Seller Performance</h3>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {[
                                    { label: 'Leads', value: fmtN(metrics.sellerLeads) },
                                    { label: 'Ad Spend', value: fmt(metrics.sellerSpend) },
                                    { label: 'Cost Per Lead', value: fmtD(metrics.sellerCPL) },
                                    { label: 'Appointments', value: fmtN(metrics.sellerAppts) },
                                    { label: 'Avg Appts/Week', value: metrics.avgSellerApptsWeek.toFixed(1) },
                                    { label: 'Cost/Appt', value: metrics.costPerSellerAppt > 0 ? fmtD(metrics.costPerSellerAppt) : '—' },
                                ].map(s => (
                                    <div key={s.label} className="bg-dark-800/50 rounded-lg p-3">
                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider">{s.label}</p>
                                        <p className="text-lg font-semibold text-white mt-1">{s.value}</p>
                                    </div>
                                ))}
                            </div>
                            {metrics.sellerLeadToAppt !== '—' && (
                                <div className="mt-4 pt-3 border-t border-dark-700 flex items-center justify-between">
                                    <span className="text-xs text-slate-500">Lead to Appt Ratio</span>
                                    <span className="text-sm font-medium text-brand-cyan">{metrics.sellerLeadToAppt}</span>
                                </div>
                            )}
                        </div>

                        {/* Buyer */}
                        <div className="glass rounded-2xl p-6 fade-up fade-up-2">
                            <div className="flex items-center gap-2 mb-5">
                                <div className="w-3 h-3 rounded-full bg-brand-purple"></div>
                                <h3 className="text-white font-semibold">Buyer Performance</h3>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {[
                                    { label: 'Leads', value: fmtN(metrics.buyerLeads) },
                                    { label: 'Ad Spend', value: fmt(metrics.buyerSpend) },
                                    { label: 'Cost Per Lead', value: fmtD(metrics.buyerCPL) },
                                    { label: 'Appointments', value: fmtN(metrics.buyerAppts) },
                                    { label: 'Avg Appts/Week', value: metrics.avgBuyerApptsWeek.toFixed(1) },
                                    { label: 'Cost/Appt', value: metrics.costPerBuyerAppt > 0 ? fmtD(metrics.costPerBuyerAppt) : '—' },
                                ].map(s => (
                                    <div key={s.label} className="bg-dark-800/50 rounded-lg p-3">
                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider">{s.label}</p>
                                        <p className="text-lg font-semibold text-white mt-1">{s.value}</p>
                                    </div>
                                ))}
                            </div>
                            {metrics.buyerLeadToAppt !== '—' && (
                                <div className="mt-4 pt-3 border-t border-dark-700 flex items-center justify-between">
                                    <span className="text-xs text-slate-500">Lead to Appt Ratio</span>
                                    <span className="text-sm font-medium text-brand-purple">{metrics.buyerLeadToAppt}</span>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Recent Trend Callout */}
                    <div className="glass rounded-2xl p-6 fade-up fade-up-3">
                        <h3 className="text-white font-semibold mb-4">7-Day Trend</h3>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            {[
                                { label: '7-Day Seller CPL', value: fmtD(metrics.last7SellerCPL), compare: metrics.sellerCPL, better: 'lower' },
                                { label: '7-Day Buyer CPL', value: fmtD(metrics.last7BuyerCPL), compare: metrics.buyerCPL, better: 'lower' },
                                { label: '7-Day Leads', value: fmtN(metrics.last7DayLeads), sub: `of ${fmtN(metrics.totalLeads)} total` },
                                { label: '7-Day Spend', value: fmt(metrics.last7DaySpend), sub: `of ${fmt(metrics.spend)} total` },
                            ].map(t => {
                                let trendColor = 'text-slate-400';
                                let trendIcon = '';
                                if (t.compare) {
                                    const current = pn(t.value);
                                    if (t.better === 'lower') {
                                        trendColor = current <= t.compare ? 'text-emerald-400' : 'text-red-400';
                                        trendIcon = current <= t.compare ? '↓' : '↑';
                                    }
                                }
                                return (
                                    <div key={t.label} className="bg-dark-800/50 rounded-xl p-4">
                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider mb-2">{t.label}</p>
                                        <p className={`text-xl font-bold ${trendColor}`}>{trendIcon} {t.value}</p>
                                        {t.sub && <p className="text-[10px] text-slate-600 mt-1">{t.sub}</p>}
                                        {t.compare > 0 && <p className="text-[10px] text-slate-600 mt-1">vs {fmtD(t.compare)} lifetime</p>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Recent Leads from GHL */}
                    {ghlData?.leads?.length > 0 && (
                        <div className="glass rounded-2xl p-6 fade-up fade-up-4">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-white font-semibold">Recent Leads (Last 30 Days)</h3>
                                <span className="text-xs text-slate-500">{ghlData.leads.length} leads</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="text-left text-[10px] text-slate-500 uppercase tracking-wider">
                                            <th className="pb-3 pr-4">Name</th>
                                            <th className="pb-3 pr-4">Date</th>
                                            <th className="pb-3 pr-4">Source</th>
                                            <th className="pb-3 pr-4">Response Time</th>
                                            <th className="pb-3">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-dark-700/50">
                                        {ghlData.leads.slice(0, 20).map(lead => (
                                            <tr key={lead.id} className="hover:bg-dark-800/30">
                                                <td className="py-2.5 pr-4 text-white font-medium">{lead.name}</td>
                                                <td className="py-2.5 pr-4 text-slate-400">{lead.dateAdded ? new Date(lead.dateAdded).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—'}</td>
                                                <td className="py-2.5 pr-4 text-slate-400">{lead.source || '—'}</td>
                                                <td className="py-2.5 pr-4">
                                                    {lead.speedMinutes !== null ? (
                                                        <span className={`font-medium ${lead.speedMinutes <= 5 ? 'text-brand-green' : lead.speedMinutes <= 60 ? 'text-amber-400' : 'text-red-400'}`}>
                                                            {lead.speedMinutes < 60 ? `${lead.speedMinutes}m` : `${Math.round(lead.speedMinutes / 60)}h`}
                                                        </span>
                                                    ) : <span className="text-slate-500">—</span>}
                                                </td>
                                                <td className="py-2.5">
                                                    {lead.called ? (
                                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-emerald-500/20 text-emerald-400">Called</span>
                                                    ) : (
                                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-red-500/20 text-red-400">Not Called</span>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ═══════════════════════════════════════════
        // MEETINGS SECTION
        // ═══════════════════════════════════════════
        const MeetingsSection = ({ meetings }) => {
            const [expandedId, setExpandedId] = useState(null);

            if (meetings.length === 0) {
                return (
                    <div className="glass rounded-2xl p-12 text-center fade-up">
                        <span className="text-4xl mb-4 block">🎙️</span>
                        <p className="text-slate-400 text-lg">No meetings recorded yet.</p>
                        <p className="text-slate-500 text-sm mt-2">Your meeting summaries and action items will appear here.</p>
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="flex items-center justify-between">
                        <h2 className="text-lg font-semibold text-white">Your Meetings</h2>
                        <span className="text-xs text-slate-500">{meetings.length} meetings (last 90 days)</span>
                    </div>
                    {meetings.map((m, idx) => {
                        const isExpanded = expandedId === m.id;
                        return (
                            <div key={m.id} className={`glass rounded-2xl overflow-hidden transition-all fade-up`} style={{animationDelay: `${idx * 0.05}s`}}>
                                <button onClick={() => setExpandedId(isExpanded ? null : m.id)} className="w-full p-5 flex items-start gap-4 text-left hover:bg-dark-750/50 transition-colors">
                                    <div className="w-12 h-12 rounded-xl bg-dark-800 flex flex-col items-center justify-center shrink-0">
                                        <span className="text-xs font-bold text-brand-cyan">{new Date(m.meeting_date).toLocaleDateString('en-US', {month: 'short'})}</span>
                                        <span className="text-lg font-bold text-white leading-none">{new Date(m.meeting_date).getDate()}</span>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 flex-wrap">
                                            <h3 className="text-sm font-semibold text-white">{m.meeting_type || m.extra?.title || 'Meeting'}</h3>
                                            <SentimentBadge sentiment={m.sentiment} />
                                        </div>
                                        {m.summary && <p className="text-xs text-slate-400 mt-1.5 line-clamp-2">{m.summary}</p>}
                                    </div>
                                    <svg className={`w-5 h-5 text-slate-500 shrink-0 transition-transform ${isExpanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                                </button>

                                {isExpanded && (
                                    <div className="px-5 pb-5 space-y-4 border-t border-dark-700/50">
                                        {/* Summary */}
                                        {m.summary && (
                                            <div className="pt-4">
                                                <h4 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Summary</h4>
                                                <p className="text-sm text-slate-300 leading-relaxed">{m.summary}</p>
                                            </div>
                                        )}

                                        {/* Key Points */}
                                        {m.keyPoints.length > 0 && (
                                            <div>
                                                <h4 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Key Points</h4>
                                                <ul className="space-y-1.5">
                                                    {m.keyPoints.map((kp, i) => (
                                                        <li key={i} className="flex items-start gap-2 text-sm text-slate-300">
                                                            <span className="text-brand-cyan mt-0.5">•</span>
                                                            <span>{typeof kp === 'string' ? kp : kp.point || JSON.stringify(kp)}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        {/* Action Items */}
                                        {m.actionItems.length > 0 && (
                                            <div>
                                                <h4 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Action Items</h4>
                                                <div className="space-y-2">
                                                    {m.actionItems.map((ai, i) => (
                                                        <div key={i} className="flex items-start gap-2 p-2.5 rounded-lg bg-dark-800/50">
                                                            <span className="text-amber-400 mt-0.5">⚡</span>
                                                            <div className="flex-1">
                                                                <p className="text-sm text-white">{typeof ai === 'string' ? ai : ai.task || ai.description || JSON.stringify(ai)}</p>
                                                                {ai.owner && <p className="text-[10px] text-slate-500 mt-0.5">Owner: {ai.owner}</p>}
                                                            </div>
                                                            {ai.priority && (
                                                                <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded ${ai.priority === 'high' ? 'bg-red-500/20 text-red-400' : ai.priority === 'medium' ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-500/20 text-slate-400'}`}>
                                                                    {ai.priority}
                                                                </span>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Next Steps */}
                                        {m.nextSteps.length > 0 && (
                                            <div>
                                                <h4 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Next Steps</h4>
                                                <ul className="space-y-1.5">
                                                    {m.nextSteps.map((ns, i) => (
                                                        <li key={i} className="flex items-start gap-2 text-sm text-slate-300">
                                                            <span className="text-brand-green mt-0.5">→</span>
                                                            <span>{typeof ns === 'string' ? ns : JSON.stringify(ns)}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // ═══════════════════════════════════════════
        // RESOURCES SECTION
        // ═══════════════════════════════════════════
        const ResourcesSection = ({ setupInfo, clientName }) => {
            return (
                <div className="space-y-6">
                    {/* Communication */}
                    <div className="glass rounded-2xl p-6 fade-up border-l-4 border-brand-cyan">
                        <h3 className="text-white font-semibold text-lg mb-3">💬 Communication</h3>
                        <div className="space-y-4">
                            <div className="bg-dark-800/50 rounded-xl p-4">
                                <h4 className="text-sm font-medium text-white mb-1">Slack Channel</h4>
                                <p className="text-xs text-slate-400">Your Slack channel is the fastest way to communicate with your team. Check it regularly for updates, questions about leads, and strategy adjustments.</p>
                            </div>
                            <div className="bg-dark-800/50 rounded-xl p-4">
                                <h4 className="text-sm font-medium text-white mb-1">Response Time</h4>
                                <p className="text-xs text-slate-400">We aim to respond to all Slack messages within 24 hours during business days. For urgent items, tag your CSM directly.</p>
                            </div>
                        </div>
                    </div>

                    {/* Skool Coaching */}
                    <div className="glass rounded-2xl p-6 fade-up fade-up-1">
                        <h3 className="text-white font-semibold text-lg mb-3">🎓 Skool Community & Coaching</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div className="bg-dark-800/50 rounded-xl p-4">
                                <div className="text-2xl mb-2">📹</div>
                                <h4 className="text-sm font-medium text-white mb-1">Weekly Group Coaching</h4>
                                <p className="text-xs text-slate-400">Join our live coaching calls to learn strategies, ask questions, and connect with other agents.</p>
                            </div>
                            <div className="bg-dark-800/50 rounded-xl p-4">
                                <div className="text-2xl mb-2">📖</div>
                                <h4 className="text-sm font-medium text-white mb-1">Training Library</h4>
                                <p className="text-xs text-slate-400">Access our full library of training videos, scripts, and resources in the Skool classroom.</p>
                            </div>
                            <div className="bg-dark-800/50 rounded-xl p-4">
                                <div className="text-2xl mb-2">🤝</div>
                                <h4 className="text-sm font-medium text-white mb-1">Community</h4>
                                <p className="text-xs text-slate-400">Connect with hundreds of agents in our private community. Share wins, ask questions, and learn together.</p>
                            </div>
                            <div className="bg-dark-800/50 rounded-xl p-4">
                                <div className="text-2xl mb-2">🏆</div>
                                <h4 className="text-sm font-medium text-white mb-1">Success Stories</h4>
                                <p className="text-xs text-slate-400">See how other agents are converting leads and closing deals using the same system you have.</p>
                            </div>
                        </div>
                    </div>

                    {/* Tips for Success */}
                    <div className="glass rounded-2xl p-6 fade-up fade-up-2">
                        <h3 className="text-white font-semibold text-lg mb-3">🚀 Tips for Success</h3>
                        <div className="space-y-3">
                            {[
                                { icon: '📞', title: 'Speed to Lead', desc: 'Call new leads within 5 minutes. Response time is the #1 factor in lead conversion.' },
                                { icon: '🔄', title: 'Follow Up Consistently', desc: 'Most deals close after 5-12 touches. Set up your follow-up sequences and stick to them.' },
                                { icon: '📊', title: 'Track Your Numbers', desc: 'Check this dashboard weekly to understand your pipeline and identify opportunities.' },
                                { icon: '💬', title: 'Stay Active in Slack', desc: 'Your team posts lead updates, strategy tips, and answers to your questions.' },
                                { icon: '🎯', title: 'Use Your CRM', desc: 'Log every call, text, and interaction. Your CRM is your pipeline\'s best friend.' },
                            ].map(tip => (
                                <div key={tip.title} className="flex items-start gap-3 p-3 rounded-xl bg-dark-800/30 hover:bg-dark-800/50 transition-colors">
                                    <span className="text-xl shrink-0">{tip.icon}</span>
                                    <div>
                                        <h4 className="text-sm font-medium text-white">{tip.title}</h4>
                                        <p className="text-xs text-slate-400 mt-0.5">{tip.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Account Info */}
                    {setupInfo && (
                        <div className="glass rounded-2xl p-6 fade-up fade-up-3">
                            <h3 className="text-white font-semibold text-lg mb-4">📋 Your Account Info</h3>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                {[
                                    { label: 'CSM Rep', value: setupInfo.csmRep },
                                    { label: 'Status', value: setupInfo.status },
                                    { label: 'Campaign', value: setupInfo.campaign },
                                    { label: 'Platform', value: setupInfo.platform },
                                    { label: 'Ad Live Date', value: setupInfo.adLiveDate },
                                    { label: 'Timezone', value: setupInfo.timezone },
                                ].filter(i => i.value).map(i => (
                                    <div key={i.label} className="bg-dark-800/50 rounded-lg p-3">
                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider">{i.label}</p>
                                        <p className="text-sm font-medium text-white mt-1">{i.value}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ═══════════════════════════════════════════
        // APP ROOT
        // ═══════════════════════════════════════════
        const App = () => {
            const [clientName, setClientName] = useState(localStorage.getItem('cp_client_name') || '');
            const [accessCode, setAccessCode] = useState(localStorage.getItem('cp_access_code') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [checking, setChecking] = useState(true);

            // Check stored session on mount (also accept ?code= URL param)
            useEffect(() => {
                const verify = async () => {
                    const urlCode = new URLSearchParams(window.location.search).get('code');
                    const code = urlCode || localStorage.getItem('cp_access_code');
                    if (urlCode) {
                        // Clean URL without reloading
                        window.history.replaceState({}, '', window.location.pathname);
                    }
                    if (!code) { setChecking(false); return; }
                    try {
                        const resp = await fetch('/api/client-portal-data', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'verify', access_code: code })
                        });
                        if (resp.ok) {
                            const data = await resp.json();
                            setClientName(data.client_name);
                            setAccessCode(code);
                            setIsLoggedIn(true);
                        } else {
                            localStorage.removeItem('cp_access_code');
                            localStorage.removeItem('cp_client_name');
                        }
                    } catch {}
                    setChecking(false);
                };
                verify();
            }, []);

            const handleLogin = (name, code) => {
                setClientName(name);
                setAccessCode(code);
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                localStorage.removeItem('cp_access_code');
                localStorage.removeItem('cp_client_name');
                setIsLoggedIn(false);
                setClientName('');
                setAccessCode('');
            };

            if (checking) {
                return (
                    <div className="min-h-screen flex items-center justify-center login-bg">
                        <div className="animate-pulse text-slate-500">Loading...</div>
                    </div>
                );
            }

            if (!isLoggedIn) return <LoginScreen onLogin={handleLogin} />;
            return <Dashboard clientName={clientName} accessCode={accessCode} onLogout={handleLogout} />;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
