<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Dashboard | Value Add Marketing</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        dark: { 900: '#0a0a0f', 850: '#0f1019', 800: '#141420', 750: '#1a1a2e', 700: '#22223a', 600: '#2d2d4a' },
                        brand: { cyan: '#22d3ee', purple: '#a78bfa', blue: '#3b82f6', green: '#34d399', orange: '#fb923c', pink: '#f472b6' }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0a0a0f; }
        .glass { background: rgba(20, 20, 32, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        .glass-hover:hover { background: rgba(26, 26, 46, 0.8); border-color: rgba(255,255,255,0.1); }
        .glow-cyan { box-shadow: 0 0 20px rgba(34, 211, 238, 0.15); }
        .glow-purple { box-shadow: 0 0 20px rgba(167, 139, 250, 0.15); }
        .glow-green { box-shadow: 0 0 20px rgba(52, 211, 153, 0.15); }
        .gradient-border { background: linear-gradient(135deg, rgba(34,211,238,0.2), rgba(167,139,250,0.2)); padding: 1px; border-radius: 1rem; }
        .gradient-border > div { background: #141420; border-radius: calc(1rem - 1px); }
        .stat-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat-card:hover { transform: translateY(-2px); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
        .fade-up-1 { animation-delay: 0.05s; }
        .fade-up-2 { animation-delay: 0.1s; }
        .fade-up-3 { animation-delay: 0.15s; }
        .fade-up-4 { animation-delay: 0.2s; }
        .fade-up-5 { animation-delay: 0.25s; }
        .fade-up-6 { animation-delay: 0.3s; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        .scrollbar::-webkit-scrollbar { width: 4px; }
        .scrollbar::-webkit-scrollbar-track { background: transparent; }
        .scrollbar::-webkit-scrollbar-thumb { background: #404050; border-radius: 4px; }
        .progress-ring { transition: stroke-dashoffset 1s ease-out; }
        .login-bg { background: radial-gradient(ellipse at top, rgba(34,211,238,0.08) 0%, transparent 50%), radial-gradient(ellipse at bottom right, rgba(167,139,250,0.08) 0%, transparent 50%); }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const SUPABASE_URL = 'https://ecmhhonjazfbletyvncw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjbWhob25qYXpmYmxldHl2bmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NDMwMjYsImV4cCI6MjA4MTUxOTAyNn0.3LZ8dAOX_ZpoUNkgY_jSeC10SaCknfPfBaZsDRjFt7c';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=964722332&single=true&output=csv';
        const SETUP_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=646836237&single=true&output=csv';

        // ── Helpers ──
        const pn = v => parseFloat(String(v||'0').replace(/[$,%]/g,'').replace(/,/g,''))||0;
        const fmt = v => '$'+(pn(v)).toLocaleString('en-US',{maximumFractionDigits:0});
        const fmtD = v => '$'+(pn(v)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
        const fmtN = v => (pn(v)).toLocaleString('en-US',{maximumFractionDigits:0});

        const parseCSV = (text) => {
            return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        };

        const toArr = (v) => {
            if (v == null) return [];
            if (Array.isArray(v)) return v;
            if (typeof v === 'string') { try { const p = JSON.parse(v); return Array.isArray(p) ? p : []; } catch { return []; } }
            return [];
        };

        const getExtra = (m) => {
            if (!m.ad_performance_notes) return {};
            try { return typeof m.ad_performance_notes === 'string' ? JSON.parse(m.ad_performance_notes) : m.ad_performance_notes; } catch { return {}; }
        };

        // ── Animated Counter ──
        const AnimatedNumber = ({ value, prefix = '', suffix = '', duration = 1200 }) => {
            const [display, setDisplay] = useState(0);
            const numVal = typeof value === 'number' ? value : pn(value);
            useEffect(() => {
                if (numVal === 0) { setDisplay(0); return; }
                const start = Date.now();
                const tick = () => {
                    const elapsed = Date.now() - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setDisplay(Math.round(numVal * eased * 100) / 100);
                    if (progress < 1) requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
            }, [numVal]);
            const formatted = numVal >= 100 ? Math.round(display).toLocaleString() : display.toFixed(numVal % 1 !== 0 ? 2 : 0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return <span>{prefix}{formatted}{suffix}</span>;
        };

        // ── Donut Chart ──
        const DonutChart = ({ value, max, color, size = 80, strokeWidth = 6 }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;
            const pct = max > 0 ? Math.min(value / max, 1) : 0;
            const offset = circumference * (1 - pct);
            return (
                <svg width={size} height={size} className="transform -rotate-90">
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={strokeWidth} />
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth}
                        strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="progress-ring" />
                </svg>
            );
        };

        // ── Sparkline ──
        const Sparkline = ({ data, color = '#22d3ee', height = 40, width = 120 }) => {
            if (!data || data.length < 2) return null;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * (height - 4) - 2}`).join(' ');
            return (
                <svg width={width} height={height} className="opacity-60">
                    <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
                </svg>
            );
        };

        // ── Sentiment Badge ──
        const SentimentBadge = ({ sentiment }) => {
            const colors = {
                positive: 'bg-emerald-500/20 text-emerald-400',
                excited: 'bg-emerald-500/20 text-emerald-400',
                neutral: 'bg-slate-500/20 text-slate-400',
                negative: 'bg-red-500/20 text-red-400',
                frustrated: 'bg-red-500/20 text-red-400',
                concerned: 'bg-amber-500/20 text-amber-400',
            };
            const icons = { positive: '😊', excited: '🎉', neutral: '😐', negative: '😟', frustrated: '😤', concerned: '🤔' };
            const s = (sentiment || 'neutral').toLowerCase();
            return (
                <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${colors[s] || colors.neutral}`}>
                    {icons[s] || '😐'} {s.charAt(0).toUpperCase() + s.slice(1)}
                </span>
            );
        };

        // ═══════════════════════════════════════════
        // LOGIN SCREEN
        // ═══════════════════════════════════════════
        const LoginScreen = ({ onLogin }) => {
            const [code, setCode] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!code.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const resp = await fetch('/api/client-portal-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'verify', access_code: code.trim() })
                    });
                    const data = await resp.json();
                    if (!resp.ok) { setError(data.error || 'Invalid access code'); setLoading(false); return; }
                    localStorage.setItem('cp_access_code', code.trim());
                    localStorage.setItem('cp_client_name', data.client_name);
                    onLogin(data.client_name, code.trim());
                } catch (err) { setError('Connection error. Please try again.'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center login-bg p-4">
                    <div className="w-full max-w-md">
                        <div className="text-center mb-10 fade-up">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-cyan/20 to-brand-purple/20 mb-6">
                                <span className="text-3xl">📊</span>
                            </div>
                            <h1 className="text-3xl font-bold text-white mb-2">Client Dashboard</h1>
                            <p className="text-slate-400">Value Add Marketing</p>
                        </div>

                        <form onSubmit={handleLogin} className="glass rounded-2xl p-8 space-y-6 fade-up fade-up-2">
                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">Access Code</label>
                                <input
                                    type="text"
                                    value={code}
                                    onChange={e => setCode(e.target.value)}
                                    placeholder="Enter your access code"
                                    className="w-full px-4 py-3 bg-dark-900 border border-dark-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan/30 transition-all text-lg tracking-wider text-center"
                                    autoFocus
                                />
                            </div>

                            {error && (
                                <div className="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 rounded-lg px-4 py-2">
                                    <span>⚠️</span> {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading || !code.trim()}
                                className="w-full py-3 rounded-xl font-semibold text-dark-900 bg-gradient-to-r from-brand-cyan to-brand-blue hover:opacity-90 disabled:opacity-40 transition-all text-lg"
                            >
                                {loading ? (
                                    <span className="inline-flex items-center gap-2"><svg className="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Verifying...</span>
                                ) : 'Access Dashboard'}
                            </button>

                            <p className="text-slate-500 text-xs text-center">Your access code was provided by your account manager.<br/>Contact us if you need help logging in.</p>
                        </form>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════
        // MAIN DASHBOARD
        // ═══════════════════════════════════════════
        const Dashboard = ({ clientName, accessCode, onLogout }) => {
            const [clientData, setClientData] = useState(null);
            const [sheetData, setSheetData] = useState(null);
            const [setupData, setSetupData] = useState(null);
            const [ghlData, setGhlData] = useState(null);
            const [ghlLoaded, setGhlLoaded] = useState(false);
            const [ghlError, setGhlError] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeSection, setActiveSection] = useState('overview');
            const [lastUpdated, setLastUpdated] = useState(null);

            // Fetch all data
            useEffect(() => {
                const loadAll = async () => {
                    setLoading(true);
                    try {
                        // Fetch from API + Google Sheets in parallel
                        const [portalResp, sheetsResp, setupResp] = await Promise.all([
                            fetch('/api/client-portal-data', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'getData', access_code: accessCode, client_name: clientName })
                            }),
                            fetch(SHEETS_URL).then(r => r.text()),
                            fetch(SETUP_URL).then(r => r.text()),
                        ]);

                        const portal = await portalResp.json();
                        if (portalResp.ok) setClientData(portal);

                        // Parse sheets — Client Ads Performance has headers in row 2 (skip row 1)
                        const adsRaw = Papa.parse(sheetsResp, { header: false, skipEmptyLines: true });
                        const adsHeaders = adsRaw.data[1] || [];
                        const allClients = adsRaw.data.slice(2).map(row => {
                            const obj = {}; adsHeaders.forEach((h, i) => { obj[h] = row[i] || ''; }); return obj;
                        });
                        const clientLower = clientName.toLowerCase();
                        const clientParts = clientLower.split(/\s+/);
                        const findClient = (rows, nameKey) => {
                            // Exact match
                            let match = rows.find(r => (r[nameKey] || '').trim().toLowerCase() === clientLower);
                            if (match) return match;
                            // Includes match (sheet name contains client name or vice versa)
                            match = rows.find(r => {
                                const n = (r[nameKey] || '').trim().toLowerCase();
                                return n && (n.includes(clientLower) || clientLower.includes(n));
                            });
                            if (match) return match;
                            // Last name match (if client has 2+ words)
                            if (clientParts.length >= 2) {
                                match = rows.find(r => {
                                    const n = (r[nameKey] || '').trim().toLowerCase();
                                    return n && clientParts.some(p => p.length > 2 && n.includes(p));
                                });
                            }
                            return match || null;
                        };
                        const myData = findClient(allClients, 'Client') || findClient(allClients, 'VAM');
                        if (myData) setSheetData(myData);

                        // Setup Timing — headers in row 1, skip row 2 (summary row)
                        const setupRaw = Papa.parse(setupResp, { header: false, skipEmptyLines: true });
                        const setupHeaders = setupRaw.data[0] || [];
                        const allSetup = setupRaw.data.slice(2).map(row => {
                            const obj = {}; setupHeaders.forEach((h, i) => { obj[h] = row[i] || ''; }); return obj;
                        });
                        const mySetup = findClient(allSetup, 'VAM');
                        if (mySetup) setSetupData(mySetup);

                        // Fetch GHL speed-to-lead data (non-blocking)
                        try {
                            const ghlResp = await fetch('/api/ghl', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'getAllSpeedToLead', startDate: new Date(Date.now() - 30 * 86400000).toISOString(), endDate: new Date().toISOString() })
                            });
                            const ghlAll = await ghlResp.json();
                            console.log('GHL response:', ghlAll);
                            if (ghlResp.ok && ghlAll.results) {
                                const results = ghlAll.results;
                                const allKeys = Object.keys(results);
                                console.log('GHL clients available:', allKeys);
                                const ghlKey = allKeys.find(k => {
                                    const kl = k.toLowerCase();
                                    return kl === clientLower || kl.includes(clientLower) || clientLower.includes(kl) ||
                                        clientParts.some(p => p.length > 2 && kl.includes(p));
                                });
                                if (ghlKey) {
                                    console.log('GHL matched client:', ghlKey);
                                    setGhlData(results[ghlKey]);
                                } else {
                                    setGhlError('no_mapping');
                                }
                            } else {
                                setGhlError(ghlAll.error || 'api_error');
                            }
                        } catch (e) { console.error('GHL fetch error:', e); setGhlError(e.message); }
                        setGhlLoaded(true);

                        setLastUpdated(new Date());
                    } catch (err) { console.error('Load error:', err); }
                    setLoading(false);
                };
                loadAll();
            }, [clientName, accessCode]);

            // Parse sheet data into usable metrics
            const metrics = useMemo(() => {
                if (!sheetData) return null;
                const r = sheetData;
                const sellerLeads = pn(r['Lifetime Seller Leads']);
                const buyerLeads = pn(r['Lifetime Buyer Leads']);
                const listingLeads = pn(r['Listing Leads']);
                const totalLeads = sellerLeads + buyerLeads + listingLeads;
                const spend = pn(r['Total Ad Spend']) || pn(r['Lifetime Ad Spend']);
                const cpl = totalLeads > 0 ? spend / totalLeads : 0;

                return {
                    totalLeads,
                    sellerLeads,
                    buyerLeads,
                    listingLeads,
                    spend,
                    cpl,
                    sellerAppts: pn(r['Total Seller Appts']),
                    buyerAppts: pn(r['Total Buyer Appts']),
                    totalAppts: pn(r['Total Appts (Seller + Buyers)']),
                    deals: pn(r['Potential Deals']),
                    listings: pn(r['Listing']),
                    buyerSigned: pn(r['Buyer Signed']),
                    last3DayLeads: pn(r['Last 3 Day Seller Leads']) + pn(r['Last 3 Day Buyer Leads']),
                    last7DayLeads: pn(r['Last 7 Day Seller Leads']) + pn(r['Last 7 Day Buyer Leads']),
                    last3DaySpend: pn(r['Last 3 Days Seller Ad Spend']) + pn(r['Last 3 Days Buyer Ad Spend']),
                    last7DaySpend: pn(r['Last 7 Day Seller Spend']) + pn(r['Last 7 Day Buyer Spend']),
                    sellerCPL: pn(r['Lifetime Seller CPL']),
                    buyerCPL: pn(r['Lifetime Buyer CPL']),
                    last7SellerCPL: pn(r['Last 7 Days Seller CPL']),
                    last7BuyerCPL: pn(r['Last 7 Days Buyer CPL']),
                    sellerSpend: pn(r['Lifetime Seller Ad Spend']),
                    buyerSpend: pn(r['Lifetime Buyer Ad Spend']),
                    sellerLeadToAppt: r['Seller Lead To Appt Ratio'] || '—',
                    buyerLeadToAppt: r['Buyer Lead To Appt Ratio'] || '—',
                    costPerSellerAppt: pn(r['Total Ad Spend Cost Per Seller Appts']),
                    costPerBuyerAppt: pn(r['Ad Spend Cost Per Buyer Appts']),
                    avgSellerApptsWeek: pn(r['Avg Seller Appts per Week']),
                    avgBuyerApptsWeek: pn(r['Avg Buyer Appts per Week']),
                    leadsPerDeal: r['Leads/Potential Deal'] || '—',
                    leadsPerListing: r['Leads/Listing'] || '—',
                };
            }, [sheetData]);

            const setupInfo = useMemo(() => {
                if (!setupData) return null;
                return {
                    csmRep: setupData['CSM'] || '',
                    status: setupData['Status'] || '',
                    campaign: setupData['Campaign'] || '',
                    paidDate: setupData['Paid date'] || '',
                    adLiveDate: setupData[' Ad Live date'] || setupData['Ad Live date'] || '',
                    platform: setupData['Platform'] || '',
                    timezone: setupData['Timezone'] || '',
                    calling: setupData['Calling'] || '',
                    dialer: setupData['Dialer'] || '',
                };
            }, [setupData]);

            // Parse recent meetings
            const recentMeetings = useMemo(() => {
                if (!clientData?.meetings) return [];
                return clientData.meetings.map(m => {
                    const extra = getExtra(m);
                    return {
                        ...m,
                        extra,
                        sentiment: m.client_sentiment || extra.clientSentiment || 'neutral',
                        actionItems: toArr(m.action_items).length > 0 ? toArr(m.action_items) : toArr(extra.actionItems),
                        keyPoints: toArr(m.key_points).length > 0 ? toArr(m.key_points) : toArr(extra.keyPoints),
                        nextSteps: toArr(extra.nextSteps),
                    };
                });
            }, [clientData]);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center login-bg">
                        <div className="text-center fade-up">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-cyan/20 to-brand-purple/20 mb-6 animate-pulse">
                                <span className="text-3xl">📊</span>
                            </div>
                            <p className="text-slate-400 text-lg">Loading your dashboard...</p>
                            <div className="mt-4 w-48 h-1 bg-dark-700 rounded-full mx-auto overflow-hidden">
                                <div className="h-full bg-gradient-to-r from-brand-cyan to-brand-purple rounded-full" style={{width: '60%', animation: 'shimmer 1.5s infinite'}}></div>
                            </div>
                        </div>
                    </div>
                );
            }

            const firstName = clientName.split(' ')[0] || clientName;

            return (
                <div className="min-h-screen bg-dark-900">
                    {/* Header */}
                    <header className="sticky top-0 z-50 glass border-b border-dark-700">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-cyan to-brand-purple flex items-center justify-center text-white font-bold text-lg">
                                    {firstName[0]}
                                </div>
                                <div>
                                    <h1 className="text-lg font-semibold text-white">Welcome back, {firstName}</h1>
                                    <p className="text-xs text-slate-500">
                                        {lastUpdated ? `Updated ${lastUpdated.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}` : 'Loading...'}
                                        {setupInfo?.csmRep && <span className="ml-2">· CSM: {setupInfo.csmRep}</span>}
                                    </p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.reload()} className="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-dark-700 transition-colors" title="Refresh">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                </button>
                                <button onClick={onLogout} className="text-xs text-slate-500 hover:text-slate-300 transition-colors px-3 py-1.5 rounded-lg hover:bg-dark-700">
                                    Log out
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Nav Tabs */}
                    <nav className="border-b border-dark-800 bg-dark-900/80">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto scrollbar py-2">
                            {[
                                { id: 'overview', label: 'Overview', icon: '📊' },
                                { id: 'leads', label: 'Leads & Ads', icon: '🎯' },
                                { id: 'meetings', label: 'Meetings', icon: '🎙️' },
                                { id: 'resources', label: 'Resources', icon: '📚' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveSection(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${activeSection === tab.id ? 'bg-brand-cyan/15 text-brand-cyan' : 'text-slate-400 hover:text-slate-200 hover:bg-dark-800'}`}>
                                    <span className="text-base">{tab.icon}</span> {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">
                        {activeSection === 'overview' && <OverviewSection metrics={metrics} setupInfo={setupInfo} recentMeetings={recentMeetings} clientData={clientData} ghlData={ghlData} ghlLoaded={ghlLoaded} ghlError={ghlError} />}
                        {activeSection === 'leads' && <LeadsSection metrics={metrics} ghlData={ghlData} />}
                        {activeSection === 'meetings' && <MeetingsSection meetings={recentMeetings} />}
                        {activeSection === 'resources' && <ResourcesSection setupInfo={setupInfo} clientName={clientName} />}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-dark-800 mt-12 py-6">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between">
                            <p className="text-xs text-slate-600">Value Add Marketing · Client Dashboard</p>
                            <a href="https://slack.com/open" target="_blank" rel="noopener noreferrer" className="text-xs text-slate-600 hover:text-brand-cyan transition-colors">Need help? Message us on Slack →</a>
                        </div>
                    </footer>
                </div>
            );
        };

        // ═══════════════════════════════════════════
        // OVERVIEW SECTION
        // ═══════════════════════════════════════════
        const OverviewSection = ({ metrics, setupInfo, recentMeetings, clientData, ghlData, ghlLoaded, ghlError }) => {
            if (!metrics) {
                return (
                    <div className="glass rounded-2xl p-12 text-center">
                        <p className="text-slate-400 text-lg">We're setting up your data. Check back soon!</p>
                    </div>
                );
            }

            const totalDeals = metrics.deals + metrics.listings + metrics.buyerSigned;

            // Compute follow-up stats from GHL data
            const followUpStats = useMemo(() => {
                if (!ghlData?.leads?.length) return null;
                // Count leads with multiple touchpoints (called = at least 1 follow-up)
                const calledLeads = ghlData.leads.filter(l => l.called);
                // Estimate avg follow-ups: use notes/tasks count if available, otherwise estimate from call data
                // For now, called = 1 follow-up minimum; we track called vs uncalled ratio
                const totalFollowUps = calledLeads.length; // Each called lead = at least 1 follow-up
                const avgFollowUps = ghlData.leads.length > 0 ? (totalFollowUps / ghlData.leads.length).toFixed(1) : '0';
                return { avgFollowUps, totalFollowUps, totalLeads: ghlData.leads.length };
            }, [ghlData]);

            return (
                <div className="space-y-6">
                    {/* ═══ SPEED TO LEAD — TOP PRIORITY ═══ */}
                    {ghlData?.stats ? (
                        <div className="fade-up">
                            {/* Speed to Lead Grade Banner */}
                            {(() => {
                                const avg = ghlData.stats.avgSpeedMinutes;
                                const pct5 = ghlData.stats.pctWithin5Min;
                                const pctCalled = ghlData.stats.pctCalled;
                                let grade = 'A';
                                let gradeColor = 'from-emerald-500 to-emerald-600';
                                let gradeBg = 'bg-emerald-500/10 border-emerald-500/30';
                                let gradeText = 'Excellent! You\'re calling leads fast. Keep it up!';
                                if (pct5 < 80 || pctCalled < 90) { grade = 'B'; gradeColor = 'from-brand-cyan to-brand-blue'; gradeBg = 'bg-brand-cyan/10 border-brand-cyan/30'; gradeText = 'Good speed, but there\'s room to improve. Aim to call every lead within 5 minutes.'; }
                                if (pct5 < 50 || pctCalled < 70) { grade = 'C'; gradeColor = 'from-amber-400 to-amber-500'; gradeBg = 'bg-amber-500/10 border-amber-500/30'; gradeText = 'Your response time needs work. Leads go cold fast — try to call within 5 minutes of every new lead.'; }
                                if (pct5 < 25 || pctCalled < 50) { grade = 'D'; gradeColor = 'from-red-400 to-red-500'; gradeBg = 'bg-red-500/10 border-red-500/30'; gradeText = 'Your speed to lead is hurting your results. Every minute you wait, conversion drops 10%. Make calling new leads your #1 priority!'; }
                                if (avg === null || ghlData.stats.totalLeads === 0) { grade = '—'; gradeColor = 'from-slate-500 to-slate-600'; gradeBg = 'bg-slate-500/10 border-slate-500/30'; gradeText = 'No lead data yet for this period.'; }

                                return (
                                    <div className={`glass rounded-2xl p-6 border ${gradeBg}`}>
                                        <div className="flex items-start gap-5">
                                            <div className={`w-20 h-20 rounded-2xl bg-gradient-to-br ${gradeColor} flex items-center justify-center shrink-0`}>
                                                <span className="text-3xl font-black text-white">{grade}</span>
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="text-lg font-bold text-white mb-1">⚡ Speed to Lead Score</h3>
                                                <p className="text-sm text-slate-300 mb-4">{gradeText}</p>
                                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                                    <div className="bg-dark-900/50 rounded-xl p-3 text-center">
                                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Avg Response</p>
                                                        <p className={`text-2xl font-bold ${avg !== null && avg <= 5 ? 'text-brand-green' : avg !== null && avg <= 30 ? 'text-amber-400' : 'text-red-400'}`}>
                                                            {avg !== null ? (avg < 60 ? `${avg}m` : `${Math.round(avg / 60)}h`) : '—'}
                                                        </p>
                                                        <p className="text-[10px] text-slate-600 mt-0.5">Goal: {'<'} 5 min</p>
                                                    </div>
                                                    <div className="bg-dark-900/50 rounded-xl p-3 text-center">
                                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Called in 5 Min</p>
                                                        <p className={`text-2xl font-bold ${pct5 >= 50 ? 'text-brand-green' : pct5 >= 25 ? 'text-amber-400' : 'text-red-400'}`}>{pct5}%</p>
                                                        <p className="text-[10px] text-slate-600 mt-0.5">Goal: 80%+</p>
                                                    </div>
                                                    <div className="bg-dark-900/50 rounded-xl p-3 text-center">
                                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Leads Called</p>
                                                        <p className={`text-2xl font-bold ${pctCalled >= 80 ? 'text-brand-green' : pctCalled >= 50 ? 'text-amber-400' : 'text-red-400'}`}>{pctCalled}%</p>
                                                        <p className="text-[10px] text-slate-600 mt-0.5">Goal: 100%</p>
                                                    </div>
                                                    <div className="bg-dark-900/50 rounded-xl p-3 text-center">
                                                        <p className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Uncalled Leads</p>
                                                        <p className={`text-2xl font-bold ${ghlData.stats.totalUncalled === 0 ? 'text-brand-green' : 'text-red-400'}`}>{ghlData.stats.totalUncalled}</p>
                                                        <p className="text-[10px] text-slate-600 mt-0.5">Goal: 0</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    ) : (
                        <div className="glass rounded-2xl p-6 border border-dark-600 fade-up">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-2xl bg-dark-700 flex items-center justify-center shrink-0">
                                    <span className="text-2xl">⚡</span>
                                </div>
                                <div>
                                    <h3 className="text-white font-semibold text-lg">Speed to Lead</h3>
                                    {!ghlLoaded ? (
                                        <p className="text-slate-400 text-sm mt-1 flex items-center gap-2">
                                            <svg className="animate-spin h-4 w-4 text-brand-cyan" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                                            Loading your lead response data...
                                        </p>
                                    ) : (
                                        <div>
                                            <p className="text-slate-400 text-sm mt-1">Speed to lead data is being set up for your account. Your team is connecting your CRM so we can track how fast you're responding to leads.</p>
                                            <p className="text-xs text-slate-500 mt-2">💡 In the meantime, aim to call every new lead within 5 minutes!</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ═══ KEY ACCOUNTABILITY METRICS ═══ */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {/* Lead to Appt Ratio — Seller */}
                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-1" style={{boxShadow: '0 0 20px rgba(34,211,238,0.12)'}}>
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Lead to Appt (Seller)</p>
                            <p className="text-3xl font-bold text-brand-cyan">{metrics.sellerLeadToAppt || '—'}</p>
                            <div className="mt-3">
                                <p className="text-[10px] text-slate-500">{fmtN(metrics.sellerAppts)} appts from {fmtN(metrics.sellerLeads)} leads</p>
                            </div>
                        </div>

                        {/* Lead to Appt Ratio — Buyer */}
                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-2" style={{boxShadow: '0 0 20px rgba(167,139,250,0.12)'}}>
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Lead to Appt (Buyer)</p>
                            <p className="text-3xl font-bold text-brand-purple">{metrics.buyerLeadToAppt || '—'}</p>
                            <div className="mt-3">
                                <p className="text-[10px] text-slate-500">{fmtN(metrics.buyerAppts)} appts from {fmtN(metrics.buyerLeads)} leads</p>
                            </div>
                        </div>

                        {/* Avg Follow-Ups Per Lead */}
                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-3" style={{boxShadow: '0 0 20px rgba(251,146,60,0.12)'}}>
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Avg Follow-Ups / Lead</p>
                            <p className={`text-3xl font-bold ${followUpStats && parseFloat(followUpStats.avgFollowUps) >= 0.8 ? 'text-brand-green' : 'text-red-400'}`}>
                                {followUpStats ? followUpStats.avgFollowUps : '—'}
                            </p>
                            <div className="mt-3">
                                <p className="text-[10px] text-slate-500">{followUpStats ? `${followUpStats.totalFollowUps} of ${followUpStats.totalLeads} leads contacted` : 'Loading...'}</p>
                            </div>
                        </div>

                        {/* Total Appointments */}
                        <div className="stat-card glass rounded-2xl p-5 glow-green fade-up fade-up-4">
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Total Appointments</p>
                            <p className="text-3xl font-bold text-white"><AnimatedNumber value={metrics.totalAppts} /></p>
                            <div className="flex items-center gap-2 mt-3">
                                <span className="text-xs text-slate-500">{fmtN(metrics.sellerAppts)} seller</span>
                                <span className="text-slate-700">·</span>
                                <span className="text-xs text-slate-500">{fmtN(metrics.buyerAppts)} buyer</span>
                            </div>
                        </div>
                    </div>

                    {/* ═══ AD PERFORMANCE KPIs ═══ */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-1">
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Total Leads</p>
                            <p className="text-3xl font-bold text-white"><AnimatedNumber value={metrics.totalLeads} /></p>
                            <div className="flex items-center gap-2 mt-3">
                                <span className="text-brand-cyan text-xs font-medium">+{fmtN(metrics.last7DayLeads)}</span>
                                <span className="text-slate-600 text-xs">last 7 days</span>
                            </div>
                        </div>

                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-2">
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Ad Spend</p>
                            <p className="text-3xl font-bold text-white"><AnimatedNumber value={metrics.spend} prefix="$" /></p>
                            <div className="flex items-center gap-2 mt-3">
                                <span className="text-brand-purple text-xs font-medium">{fmt(metrics.last7DaySpend)}</span>
                                <span className="text-slate-600 text-xs">last 7 days</span>
                            </div>
                        </div>

                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-3">
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Cost Per Lead</p>
                            <p className="text-3xl font-bold text-white"><AnimatedNumber value={metrics.cpl} prefix="$" /></p>
                            <div className="flex items-center gap-2 mt-3">
                                <span className="text-xs text-slate-500">Seller: {fmtD(metrics.sellerCPL)}</span>
                                <span className="text-slate-700">·</span>
                                <span className="text-xs text-slate-500">Buyer: {fmtD(metrics.buyerCPL)}</span>
                            </div>
                        </div>

                        <div className="stat-card glass rounded-2xl p-5 fade-up fade-up-4">
                            <p className="text-slate-500 text-xs font-medium uppercase tracking-wider mb-3">Avg Appts / Week</p>
                            <p className="text-3xl font-bold text-white">{(metrics.avgSellerApptsWeek + metrics.avgBuyerApptsWeek).toFixed(1)}</p>
                            <div className="flex items-center gap-2 mt-3">
                                <span className="text-xs text-slate-500">{metrics.avgSellerApptsWeek.toFixed(1)} seller</span>
                                <span className="text-slate-700">·</span>
                                <span className="text-xs text-slate-500">{metrics.avgBuyerApptsWeek.toFixed(1)} buyer</span>
                            </div>
                        </div>
                    </div>

                    {/* Quick Action Banner */}
                    <div className="glass rounded-2xl p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4 border-l-4 border-brand-cyan fade-up">
                        <div className="flex-1">
                            <h3 className="text-white font-semibold text-sm">💬 Stay Connected</h3>
                            <p className="text-slate-400 text-sm mt-1">Check your Slack channel for the latest updates, questions, and communication from your team.</p>
                        </div>
                        <a href="https://slack.com/open" target="_blank" rel="noopener noreferrer" className="px-4 py-2 rounded-xl bg-brand-cyan/10 text-brand-cyan text-sm font-medium whitespace-nowrap hover:bg-brand-cyan/20 transition-colors cursor-pointer">
                            Open Slack →
                        </a>
                    </div>

                    {/* Lead Funnel + Deals */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        {/* Lead Breakdown */}
                        <div className="lg:col-span-2 glass rounded-2xl p-6 fade-up fade-up-3">
                            <h3 className="text-white font-semibold mb-5">Lead Breakdown</h3>
                            <div className="space-y-4">
                                {[
                                    { label: 'Seller Leads', value: metrics.sellerLeads, total: metrics.totalLeads, color: '#22d3ee', cpl: metrics.sellerCPL },
                                    { label: 'Buyer Leads', value: metrics.buyerLeads, total: metrics.totalLeads, color: '#a78bfa', cpl: metrics.buyerCPL },
                                    { label: 'Listing Leads', value: metrics.listingLeads, total: metrics.totalLeads, color: '#34d399', cpl: null },
                                ].filter(item => item.value > 0).map(item => (
                                    <div key={item.label}>
                                        <div className="flex items-center justify-between mb-1.5">
                                            <span className="text-sm text-slate-300">{item.label}</span>
                                            <div className="flex items-center gap-3">
                                                {item.cpl > 0 && <span className="text-xs text-slate-500">{fmtD(item.cpl)} CPL</span>}
                                                <span className="text-sm font-semibold text-white">{fmtN(item.value)}</span>
                                            </div>
                                        </div>
                                        <div className="h-2 bg-dark-800 rounded-full overflow-hidden">
                                            <div className="h-full rounded-full transition-all duration-1000" style={{width: `${item.total > 0 ? (item.value / item.total) * 100 : 0}%`, backgroundColor: item.color}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Deals & Conversions */}
                        <div className="glass rounded-2xl p-6 fade-up fade-up-4">
                            <h3 className="text-white font-semibold mb-5">Conversions</h3>
                            <div className="flex flex-col items-center">
                                <div className="relative">
                                    <DonutChart value={totalDeals} max={Math.max(totalDeals, 5)} color="#34d399" size={120} strokeWidth={8} />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="text-2xl font-bold text-white">{totalDeals}</span>
                                        <span className="text-[10px] text-slate-500 uppercase">Total</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-4 mt-5 w-full">
                                    {[
                                        { label: 'Deals', value: metrics.deals, color: 'text-brand-green' },
                                        { label: 'Listings', value: metrics.listings, color: 'text-brand-cyan' },
                                        { label: 'Signed', value: metrics.buyerSigned, color: 'text-brand-purple' },
                                    ].map(d => (
                                        <div key={d.label} className="text-center">
                                            <p className={`text-xl font-bold ${d.color}`}>{d.value}</p>
                                            <p className="text-[10px] text-slate-500 mt-0.5">{d.label}</p>
                                        </div>
                                    ))}
                                </div>
                                {metrics.leadsPerDeal !== '—' && (
                                    <div className="mt-4 pt-4 border-t border-dark-700 w-full text-center">
                                        <p className="text-xs text-slate-500">Leads per Deal: <span className="text-slate-300 font-medium">{metrics.leadsPerDeal}</span></p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Recent Meetings + Activity */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        {/* Recent Meetings */}
                        <div className="glass rounded-2xl p-6 fade-up fade-up-5">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-white font-semibold">Recent Meetings</h3>
                                <span className="text-xs text-slate-500">{recentMeetings.length} total</span>
                            </div>
                            {recentMeetings.length === 0 ? (
                                <p className="text-slate-500 text-sm py-4 text-center">No meetings recorded yet.</p>
                            ) : (
                                <div className="space-y-3 max-h-[320px] overflow-y-auto scrollbar pr-1">
                                    {recentMeetings.slice(0, 5).map(m => (
                                        <div key={m.id} className="p-3 rounded-xl bg-dark-800/50 hover:bg-dark-750 transition-colors">
                                            <div className="flex items-start justify-between gap-2">
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-sm font-medium text-white truncate">{m.meeting_type || m.extra?.title || 'Meeting'}</p>
                                                    <p className="text-xs text-slate-500 mt-0.5">{new Date(m.meeting_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
                                                </div>
                                                <SentimentBadge sentiment={m.sentiment} />
                                            </div>
                                            {m.summary && <p className="text-xs text-slate-400 mt-2 line-clamp-2">{m.summary}</p>}
                                            {m.actionItems.length > 0 && (
                                                <div className="mt-2 flex items-center gap-1.5">
                                                    <span className="text-amber-400 text-[10px]">⚡</span>
                                                    <span className="text-[10px] text-amber-400/80">{m.actionItems.length} action item{m.actionItems.length > 1 ? 's' : ''}</span>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Activity Feed */}
                        <div className="glass rounded-2xl p-6 fade-up fade-up-6">
                            <h3 className="text-white font-semibold mb-4">Recent Activity</h3>
                            {!clientData?.activity?.length ? (
                                <p className="text-slate-500 text-sm py-4 text-center">No recent activity.</p>
                            ) : (
                                <div className="space-y-3 max-h-[320px] overflow-y-auto scrollbar pr-1">
                                    {clientData.activity.slice(0, 10).map(a => (
                                        <div key={a.id} className="flex items-start gap-3">
                                            <div className="w-2 h-2 rounded-full bg-brand-cyan mt-1.5 shrink-0"></div>

                                                <p className="text-sm text-slate-300">{a.action}</p>
                                                {a.details && <p className="text-xs text-slate-500 mt-0.5 truncate">{a.details}</p>}
                                                <p className="text-[10px] text-slate-600 mt-1">{new Date(a.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
