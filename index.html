        // ========== SPEED TO LEAD TAB ==========
        const SpeedToLeadTab = ({ clients, setupData }) => {
            const [ghlData, setGhlData] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [dateRange, setDateRange] = useState('last_30d');
            const [selectedClient, setSelectedClient] = useState(null);
            const [searchFilter, setSearchFilter] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'avgSpeed', dir: 'desc' });
            const [ghlLocations, setGhlLocations] = useState([]);
            const [mappings, setMappings] = useState([]);
            const [showSetup, setShowSetup] = useState(false);
            const [setupLoading, setSetupLoading] = useState(false);
            const [mappingClient, setMappingClient] = useState('');
            const [mappingLocation, setMappingLocation] = useState('');

            const dateRangeOptions = [
                { value: 'last_7d', label: 'Last 7 Days', days: 7 },
                { value: 'last_14d', label: 'Last 14 Days', days: 14 },
                { value: 'last_30d', label: 'Last 30 Days', days: 30 },
                { value: 'last_60d', label: 'Last 60 Days', days: 60 },
                { value: 'last_90d', label: 'Last 90 Days', days: 90 },
            ];

            const getDateRange = () => {
                const opt = dateRangeOptions.find(o => o.value === dateRange);
                const days = opt ? opt.days : 30;
                const end = new Date();
                const start = new Date(Date.now() - days * 24 * 60 * 60 * 1000);
                return { startDate: start.toISOString(), endDate: end.toISOString() };
            };

            const loadMappings = async () => {
                try {
                    const { data, error } = await supabase.from('client_ghl_locations').select('*').order('client_name', { ascending: true });
                    if (error) throw error;
                    setMappings(data || []);
                    return data || [];
                } catch (err) {
                    console.error('Failed to load GHL mappings:', err);
                    setMappings([]);
                    return [];
                }
            };

            const loadLocations = async () => {
                try {
                    const resp = await fetch('/api/ghl', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'listLocations' })
                    });
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error);
                    setGhlLocations(data.locations || []);
                    return data.locations || [];
                } catch (err) {
                    console.error('Failed to load GHL locations:', err);
                    return [];
                }
            };

            const saveMapping = async (clientName, locationId, token) => {
                if (!locationId) {
                    await supabase.from('client_ghl_locations').delete().eq('client_name', clientName);
                } else {
                    const row = { client_name: clientName, ghl_location_id: locationId };
                    if (token) row.ghl_token = token;
                    await supabase.from('client_ghl_locations').upsert(row, { onConflict: 'client_name' });
                }
                await loadMappings();
            };

            const saveToken = async (clientName, token) => {
                await supabase.from('client_ghl_locations').update({ ghl_token: token }).eq('client_name', clientName);
                await loadMappings();
            };

            const [oauthStatus, setOauthStatus] = useState(null);
            const GHL_CLIENT_ID = '69ab33c7855dd90a8bd919cf-mmfc7ady';
            const OAUTH_REDIRECT = window.location.origin + '/api/oauth-callback';
            const OAUTH_SCOPES = 'contacts.readonly contacts.write conversations.readonly calendars/events.write locations.readonly oauth.write oauth.readonly';

            const getInstallUrl = () => {
                return `https://marketplace.leadconnectorhq.com/oauth/chooselocation?response_type=code&redirect_uri=${encodeURIComponent(OAUTH_REDIRECT)}&client_id=${GHL_CLIENT_ID}&scope=${encodeURIComponent(OAUTH_SCOPES)}`;
            };

            // Listen for when user returns from OAuth flow
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('ghl_token_saved') === 'true') {
                    // Token was saved — refresh mappings
                    loadMappings();
                    // Clean up URL
                    window.history.replaceState({}, '', window.location.pathname);
                }
            }, []);

            const fetchSpeedData = async () => {
                setLoading(true);
                setError(null);
                try {
                    // Check cache
                    const cacheKey = 'vam_speed_to_lead_' + dateRange;
                    const cacheTimeKey = 'vam_speed_to_lead_time_' + dateRange;
                    const cached = localStorage.getItem(cacheKey);
                    const cacheTime = localStorage.getItem(cacheTimeKey);
                    if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 600000) {
                        setGhlData(JSON.parse(cached));
                        setLoading(false);
                        return;
                    }

                    const { startDate, endDate } = getDateRange();
                    const resp = await fetch('/api/ghl', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'getAllSpeedToLead', startDate, endDate })
                    });
                    const data = await resp.json();
                    if (data.error && !data.results) throw new Error(data.error);

                    const results = data.results || {};
                    setGhlData(results);
                    localStorage.setItem(cacheKey, JSON.stringify(results));
                    localStorage.setItem(cacheTimeKey, Date.now().toString());
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            useEffect(() => {
                loadMappings().then((m) => {
                    if (m.length > 0) fetchSpeedData();
                    else { setLoading(false); setShowSetup(true); }
                });
            }, []);

            useEffect(() => {
                if (mappings.length > 0) fetchSpeedData();
            }, [dateRange]);

            const formatSpeed = (minutes) => {
                if (minutes === null || minutes === undefined) return '—';
                if (minutes < 1) return '< 1 min';
                if (minutes < 60) return minutes + ' min';
                if (minutes < 1440) return Math.round(minutes / 60) + ' hr ' + (minutes % 60) + ' min';
                return Math.round(minutes / 1440) + ' days';
            };

            const getSpeedColor = (minutes) => {
                if (minutes === null || minutes === undefined) return 'text-slate-500';
                if (minutes <= 1) return 'text-emerald-400';
                if (minutes <= 5) return 'text-green-400';
                if (minutes <= 30) return 'text-yellow-400';
                if (minutes <= 60) return 'text-orange-400';
                return 'text-red-400';
            };

            const getSpeedBadge = (minutes) => {
                if (minutes === null || minutes === undefined) return { label: 'No Data', color: 'bg-slate-700 text-slate-400' };
                if (minutes <= 1) return { label: 'Elite', color: 'bg-emerald-500/20 text-emerald-400' };
                if (minutes <= 5) return { label: 'Great', color: 'bg-green-500/20 text-green-400' };
                if (minutes <= 30) return { label: 'OK', color: 'bg-yellow-500/20 text-yellow-400' };
                if (minutes <= 60) return { label: 'Slow', color: 'bg-orange-500/20 text-orange-400' };
                return { label: 'Critical', color: 'bg-red-500/20 text-red-400' };
            };

            // Aggregate stats across all clients
            const allStats = useMemo(() => {
                const entries = Object.values(ghlData);
                if (entries.length === 0) return null;
                const totalLeads = entries.reduce((s, e) => s + (e.stats?.totalLeads || 0), 0);
                const totalCalled = entries.reduce((s, e) => s + (e.stats?.totalCalled || 0), 0);
                const totalUncalled = entries.reduce((s, e) => s + (e.stats?.totalUncalled || 0), 0);
                const allSpeeds = entries.flatMap(e => (e.leads || []).filter(l => l.called && l.speedMinutes != null).map(l => l.speedMinutes));
                const avgSpeed = allSpeeds.length > 0 ? Math.round(allSpeeds.reduce((a, b) => a + b, 0) / allSpeeds.length) : null;
                const within5 = allSpeeds.filter(s => s <= 5).length;
                return { totalLeads, totalCalled, totalUncalled, avgSpeed, pctWithin5Min: totalLeads > 0 ? Math.round((within5 / totalLeads) * 100) : 0, pctCalled: totalLeads > 0 ? Math.round((totalCalled / totalLeads) * 100) : 0 };
            }, [ghlData]);

            // Leaderboard data
            const leaderboard = useMemo(() => {
                return Object.entries(ghlData).map(([client, d]) => ({
                    client,
                    ...d.stats,
                    leads: d.leads || []
                })).filter(c => {
                    if (!searchFilter) return true;
                    return c.client.toLowerCase().includes(searchFilter.toLowerCase());
                }).sort((a, b) => {
                    const { key, dir } = sortConfig;
                    if (!key) return 0;
                    let aVal, bVal;
                    switch (key) {
                        case 'client': aVal = a.client; bVal = b.client; return dir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                        case 'avgSpeed': aVal = a.avgSpeedMinutes ?? 99999; bVal = b.avgSpeedMinutes ?? 99999; break;
                        case 'median': aVal = a.medianSpeedMinutes ?? 99999; bVal = b.medianSpeedMinutes ?? 99999; break;
                        case 'leads': aVal = a.totalLeads || 0; bVal = b.totalLeads || 0; break;
                        case 'called': aVal = a.pctCalled || 0; bVal = b.pctCalled || 0; break;
                        case 'within5': aVal = a.pctWithin5Min || 0; bVal = b.pctWithin5Min || 0; break;
                        case 'uncalled': aVal = a.totalUncalled || 0; bVal = b.totalUncalled || 0; break;
                        default: aVal = 0; bVal = 0;
                    }
                    return dir === 'asc' ? aVal - bVal : bVal - aVal;
                });
            }, [ghlData, searchFilter, sortConfig]);

            const handleSort = (key) => {
                setSortConfig(prev => prev.key === key ? { key, dir: prev.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: key === 'client' ? 'asc' : 'desc' });
            };

            const sortArrow = (key) => sortConfig.key === key ? (sortConfig.dir === 'asc' ? ' ↑' : ' ↓') : '';

            // Fuzzy name matching: returns a score 0-1 (1 = perfect match)
            const fuzzyMatch = (clientName, locationName) => {
                const normalize = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
                const a = normalize(clientName);
                const b = normalize(locationName);
                if (a === b) return 1;
                if (a.includes(b) || b.includes(a)) return 0.9;
                // Split into words and check overlap
                const aWords = a.split(/\s+/).filter(w => w.length > 1);
                const bWords = b.split(/\s+/).filter(w => w.length > 1);
                let matchCount = 0;
                for (const aw of aWords) {
                    for (const bw of bWords) {
                        if (aw === bw) { matchCount += 1; break; }
                        if (aw.length > 3 && bw.length > 3 && (aw.includes(bw) || bw.includes(aw))) { matchCount += 0.7; break; }
                        // Check first/last name partial
                        if (aw.length >= 3 && bw.startsWith(aw.substring(0, 3))) { matchCount += 0.3; break; }
                    }
                }
                const maxWords = Math.max(aWords.length, bWords.length);
                return maxWords > 0 ? matchCount / maxWords : 0;
            };

            const [autoMatches, setAutoMatches] = useState([]);
            const [autoMatchLoading, setAutoMatchLoading] = useState(false);

            const runAutoMatch = async () => {
                setAutoMatchLoading(true);
                let locs = ghlLocations;
                if (locs.length === 0) {
                    locs = await loadLocations();
                }
                if (locs.length === 0) {
                    setAutoMatchLoading(false);
                    return;
                }

                const unmappedClients = setupData.filter(s => !mappings.find(m => m.client_name === s.client));
                const usedLocationIds = new Set(mappings.map(m => m.ghl_location_id));
                const availableLocs = locs.filter(l => !usedLocationIds.has(l.id));

                const matches = [];
                const claimedLocIds = new Set();

                for (const client of unmappedClients) {
                    let bestMatch = null;
                    let bestScore = 0;
                    for (const loc of availableLocs) {
                        if (claimedLocIds.has(loc.id)) continue;
                        const score = fuzzyMatch(client.client, loc.name);
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = loc;
                        }
                    }
                    if (bestMatch && bestScore >= 0.3) {
                        matches.push({ clientName: client.client, location: bestMatch, score: bestScore, enabled: bestScore >= 0.5 });
                        claimedLocIds.add(bestMatch.id);
                    } else {
                        matches.push({ clientName: client.client, location: null, score: 0, enabled: false });
                    }
                }
                // Sort: best matches first
                matches.sort((a, b) => b.score - a.score);
                setAutoMatches(matches);
                setAutoMatchLoading(false);
            };

            const toggleAutoMatch = (idx) => {
                setAutoMatches(prev => prev.map((m, i) => i === idx ? { ...m, enabled: !m.enabled } : m));
            };

            const changeAutoMatchLocation = (idx, locationId) => {
                setAutoMatches(prev => prev.map((m, i) => {
                    if (i !== idx) return m;
                    const loc = ghlLocations.find(l => l.id === locationId);
                    return { ...m, location: loc || null, enabled: !!loc, score: loc ? 0.5 : 0 };
                }));
            };

            const saveAutoMatches = async () => {
                setSetupLoading(true);
                const toSave = autoMatches.filter(m => m.enabled && m.location);
                for (const m of toSave) {
                    await saveMapping(m.clientName, m.location.id);
                }
                setAutoMatches([]);
                setSetupLoading(false);
            };

            // Setup / Mapping Modal
            if (showSetup) {
                return (
                    <div className="space-y-6">
                        <div className="flex items-center justify-between">
                            <h2 className="text-2xl font-bold text-white">GHL Location Setup</h2>
                            {mappings.length > 0 && (
                                <button onClick={() => { setShowSetup(false); fetchSpeedData(); }} className="px-4 py-2 bg-brand-cyan text-white rounded-lg text-sm font-semibold">Done - View Data</button>
                            )}
                        </div>
                        <p className="text-slate-400 text-sm">Map your clients to their GoHighLevel sub-accounts (locations) to track speed-to-lead data.</p>

                        {/* Batch OAuth Install */}
                        <div className="card p-4">
                            <div className="flex items-center justify-between mb-2">
                                <h3 className="text-sm font-semibold text-white">Batch Install - Connect Sub-Accounts</h3>
                                <div className="flex gap-3 text-xs">
                                    <span className="text-emerald-400">{mappings.filter(m => m.ghl_token).length} connected</span>
                                    <span className="text-red-400">{mappings.filter(m => !m.ghl_token).length} need token</span>
                                </div>
                            </div>
                            <p className="text-xs text-slate-500 mb-3">Click the button below to install the GHL app on a sub-account. Each install connects one location. After authorizing, you'll be redirected back here with the token saved automatically.</p>

                            {mappings.length > 0 && mappings.some(m => !m.ghl_token) && (
                                <div className="space-y-3">
                                    <a href={getInstallUrl()} target="_blank" rel="noopener noreferrer" className="inline-block px-4 py-2 bg-gradient-to-r from-brand-cyan to-brand-purple text-white rounded-lg text-sm font-semibold hover:opacity-90 cursor-pointer">
                                        Install GHL App on Next Sub-Account
                                    </a>
                                    <p className="text-xs text-slate-600">Tip: After each install, come back here and click again for the next one. The token is saved automatically per location.</p>

                                    <div className="space-y-1 max-h-64 overflow-y-auto scrollbar mt-3">
                                        <p className="text-xs text-slate-400 font-semibold mb-1">Locations still needing tokens:</p>
                                        {mappings.filter(m => !m.ghl_token).map(m => {
                                            const locName = ghlLocations.find(l => l.id === m.ghl_location_id)?.name;
                                            return (
                                                <div key={m.client_name} className="flex items-center gap-2 bg-dark-800 rounded px-3 py-1.5">
                                                    <span className="w-2 h-2 rounded-full bg-red-500 flex-shrink-0"></span>
                                                    <span className="text-sm text-white">{m.client_name}</span>
                                                    <span className="text-xs text-slate-600">{locName || m.ghl_location_id}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {mappings.length > 0 && !mappings.some(m => !m.ghl_token) && (
                                <p className="text-xs text-emerald-400">All locations are connected! You're ready to view Speed to Lead data.</p>
                            )}
                        </div>

                        {/* Auto-Match Section */}
                        <div className="card p-4">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="text-sm font-semibold text-white">Auto-Match by Name</h3>
                                <div className="flex gap-2">
                                    <button onClick={runAutoMatch} disabled={autoMatchLoading} className="px-4 py-2 bg-gradient-to-r from-brand-cyan to-brand-purple text-white rounded-lg text-sm font-semibold disabled:opacity-40">
                                        {autoMatchLoading ? 'Matching...' : 'Auto-Match All Clients'}
                                    </button>
                                </div>
                            </div>
                            <p className="text-xs text-slate-500 mb-3">Fetches all GHL locations and matches them to clients by name. Review matches before saving.</p>

                            {autoMatches.length > 0 && (
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs text-slate-400">{autoMatches.filter(m => m.enabled && m.location).length} of {autoMatches.length} clients matched</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => setAutoMatches(prev => prev.map(m => ({ ...m, enabled: m.location ? true : false })))} className="text-xs text-brand-cyan hover:underline">Select All Matches</button>
                                            <button onClick={() => setAutoMatches(prev => prev.map(m => ({ ...m, enabled: false })))} className="text-xs text-slate-500 hover:underline">Deselect All</button>
                                        </div>
                                    </div>
                                    <div className="space-y-1 max-h-96 overflow-y-auto scrollbar">
                                        {autoMatches.map((match, idx) => {
                                            const confidence = match.score >= 0.9 ? { label: 'Exact', color: 'text-emerald-400' } : match.score >= 0.5 ? { label: 'Likely', color: 'text-yellow-400' } : match.score >= 0.3 ? { label: 'Possible', color: 'text-orange-400' } : { label: 'No Match', color: 'text-red-400' };
                                            return (
                                                <div key={match.clientName} className={`flex items-center gap-3 px-3 py-2 rounded-lg ${match.enabled ? 'bg-dark-700' : 'bg-dark-800/50'}`}>
                                                    <input type="checkbox" checked={match.enabled} onChange={() => toggleAutoMatch(idx)} className="rounded" disabled={!match.location} />
                                                    <div style={{ minWidth: '180px' }} className="flex-shrink-0">
                                                        <span className="text-sm text-white">{match.clientName}</span>
                                                    </div>
                                                    <span className="text-slate-600 text-xs">→</span>
                                                    <select value={match.location?.id || ''} onChange={e => changeAutoMatchLocation(idx, e.target.value)} className="flex-1 input-field border rounded-lg px-2 py-1 text-xs" style={{ minWidth: '200px' }}>
                                                        <option value="">No match found</option>
                                                        {ghlLocations.map(l => (
                                                            <option key={l.id} value={l.id}>{l.name} ({l.id.substring(0, 8)}...)</option>
                                                        ))}
                                                    </select>
                                                    <span className={`text-xs font-semibold ${confidence.color}`} style={{ minWidth: '60px' }}>{confidence.label}</span>
                                                    <span className="text-xs text-slate-600">{Math.round(match.score * 100)}%</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={saveAutoMatches} disabled={setupLoading || autoMatches.filter(m => m.enabled && m.location).length === 0} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-semibold disabled:opacity-40">
                                            {setupLoading ? 'Saving...' : `Save ${autoMatches.filter(m => m.enabled && m.location).length} Matches`}
                                        </button>
                                        <button onClick={() => setAutoMatches([])} className="px-4 py-2 bg-dark-700 text-slate-300 rounded-lg text-sm hover:bg-dark-600">Cancel</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Manual mapping form */}
                        <div className="card p-4">
                            <h3 className="text-sm font-semibold text-white mb-3">Manual Mapping</h3>
                            <div className="flex gap-3 items-end flex-wrap">
                                <div style={{ minWidth: '200px' }}>
                                    <label className="text-xs text-slate-400 block mb-1">Client</label>
                                    <select value={mappingClient} onChange={e => setMappingClient(e.target.value)} className="w-full input-field border rounded-lg px-3 py-2 text-sm">
                                        <option value="">Select client...</option>
                                        {setupData.filter(s => !mappings.find(m => m.client_name === s.client)).map(s => (
                                            <option key={s.client} value={s.client}>{s.client}</option>
                                        ))}
                                    </select>
                                </div>
                                <div style={{ minWidth: '200px' }}>
                                    <label className="text-xs text-slate-400 block mb-1">GHL Location</label>
                                    <select value={mappingLocation} onChange={e => setMappingLocation(e.target.value)} className="w-full input-field border rounded-lg px-3 py-2 text-sm">
                                        <option value="">Select location...</option>
                                        {ghlLocations.map(l => (
                                            <option key={l.id} value={l.id}>{l.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <button onClick={async () => {
                                    if (mappingClient && mappingLocation) {
                                        setSetupLoading(true);
                                        await saveMapping(mappingClient, mappingLocation);
                                        setMappingClient('');
                                        setMappingLocation('');
                                        setSetupLoading(false);
                                    }
                                }} disabled={!mappingClient || !mappingLocation || setupLoading} className="px-4 py-2 bg-brand-purple text-white rounded-lg text-sm font-semibold disabled:opacity-40">
                                    {setupLoading ? 'Saving...' : 'Add'}
                                </button>
                            </div>
                        </div>


                        {/* Current mappings with token status */}
                        {mappings.length > 0 && (
                            <div className="card p-4">
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="text-sm font-semibold text-white">Current Mappings ({mappings.length})</h3>
                                    <div className="flex gap-3 text-xs">
                                        <span className="text-emerald-400">{mappings.filter(m => m.ghl_token).length} with token</span>
                                        <span className="text-red-400">{mappings.filter(m => !m.ghl_token).length} missing token</span>
                                    </div>
                                </div>
                                <div className="space-y-1 max-h-96 overflow-y-auto scrollbar">
                                    {mappings.map(m => {
                                        const locName = ghlLocations.find(l => l.id === m.ghl_location_id)?.name;
                                        const hasToken = !!m.ghl_token;
                                        return (
                                            <div key={m.client_name} className="flex items-center justify-between bg-dark-800 rounded-lg px-3 py-2">
                                                <div className="flex items-center gap-2 flex-1 min-w-0">
                                                    <span className={`w-2 h-2 rounded-full flex-shrink-0 ${hasToken ? 'bg-emerald-500' : 'bg-red-500'}`}></span>
                                                    <span className="text-sm text-white truncate">{m.client_name}</span>
                                                    <span className="text-xs text-slate-600 truncate">{locName || m.ghl_location_id}</span>
                                                </div>
                                                <div className="flex items-center gap-2 flex-shrink-0">
                                                    {hasToken ? (
                                                        <span className="text-xs text-emerald-400">Token set</span>
                                                    ) : (
                                                        <span className="text-xs text-red-400">No token</span>
                                                    )}
                                                    <button onClick={async () => { await saveMapping(m.client_name, null); }} className="text-xs text-red-400 hover:text-red-300 ml-2">Remove</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="flex items-center justify-center py-20">
                        <div className="text-center">
                            <div className="text-4xl mb-4 animate-pulse">⚡</div>
                            <p className="text-slate-400">Loading speed-to-lead data from GHL...</p>
                            <p className="text-xs text-slate-600 mt-2">This may take a moment for the first load</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="space-y-4">
                        <div className="card p-6 text-center">
                            <p className="text-red-400 mb-2">Error loading GHL data</p>
                            <p className="text-xs text-slate-500 mb-4">{error}</p>
                            <div className="flex gap-2 justify-center">
                                <button onClick={fetchSpeedData} className="px-4 py-2 bg-brand-cyan text-white rounded-lg text-sm">Retry</button>
                                <button onClick={() => setShowSetup(true)} className="px-4 py-2 bg-dark-700 text-slate-300 rounded-lg text-sm">Setup Mappings</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Selected client drill-down
            if (selectedClient && ghlData[selectedClient]) {
                const clientData = ghlData[selectedClient];
                const stats = clientData.stats || {};
                const leads = (clientData.leads || []).sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
                const badge = getSpeedBadge(stats.avgSpeedMinutes);

                return (
                    <div className="space-y-6">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setSelectedClient(null)} className="text-brand-cyan hover:text-brand-cyan/80 text-sm">← Back to Leaderboard</button>
                            <h2 className="text-xl font-bold text-white">{selectedClient}</h2>
                            <span className={`px-2 py-1 rounded text-xs font-semibold ${badge.color}`}>{badge.label}</span>
                        </div>

                        {/* Client stats cards */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Avg Speed to Call</p>
                                <p className={`text-2xl font-bold ${getSpeedColor(stats.avgSpeedMinutes)}`}>{formatSpeed(stats.avgSpeedMinutes)}</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Median Speed</p>
                                <p className={`text-2xl font-bold ${getSpeedColor(stats.medianSpeedMinutes)}`}>{formatSpeed(stats.medianSpeedMinutes)}</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Total Leads</p>
                                <p className="text-2xl font-bold text-white">{stats.totalLeads || 0}</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Uncalled Leads</p>
                                <p className={`text-2xl font-bold ${stats.totalUncalled > 0 ? 'text-red-400' : 'text-emerald-400'}`}>{stats.totalUncalled || 0}</p>
                            </div>
                        </div>

                        {/* Speed distribution */}
                        <div className="card p-4">
                            <h3 className="text-sm font-semibold text-white mb-3">Response Time Distribution</h3>
                            <div className="grid grid-cols-4 gap-3">
                                {[
                                    { label: '< 1 min', count: stats.within1Min || 0, color: 'bg-emerald-500' },
                                    { label: '< 5 min', count: stats.within5Min || 0, color: 'bg-green-500' },
                                    { label: '< 1 hr', count: stats.within1Hr || 0, color: 'bg-yellow-500' },
                                    { label: '< 24 hr', count: stats.within24Hr || 0, color: 'bg-orange-500' },
                                ].map(b => (
                                    <div key={b.label} className="text-center">
                                        <div className={`${b.color} text-white rounded-lg py-3 text-lg font-bold`}>{b.count}</div>
                                        <p className="text-xs text-slate-400 mt-1">{b.label}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Individual leads table */}
                        <div className="card overflow-hidden">
                            <div className="p-4 border-b border-dark-700">
                                <h3 className="text-sm font-semibold text-white">All Leads ({leads.length})</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="text-xs text-slate-500 border-b border-dark-700">
                                            <th className="text-left px-4 py-3">Lead</th>
                                            <th className="text-left px-4 py-3">Source</th>
                                            <th className="text-left px-4 py-3">Date Added</th>
                                            <th className="text-left px-4 py-3">First Call</th>
                                            <th className="text-left px-4 py-3">Speed to Call</th>
                                            <th className="text-left px-4 py-3">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {leads.map(lead => {
                                            const speedBadge = lead.called ? getSpeedBadge(lead.speedMinutes) : { label: 'Not Called', color: 'bg-red-500/20 text-red-400' };
                                            return (
                                                <tr key={lead.id} className="border-b border-dark-800 hover:bg-dark-800/50">
                                                    <td className="px-4 py-3">
                                                        <div className="text-sm text-white">{lead.name}</div>
                                                        <div className="text-xs text-slate-500">{lead.email || lead.phone || '—'}</div>
                                                    </td>
                                                    <td className="px-4 py-3 text-xs text-slate-400">{lead.source || '—'}</td>
                                                    <td className="px-4 py-3 text-xs text-slate-400">{lead.dateAdded ? new Date(lead.dateAdded).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—'}</td>
                                                    <td className="px-4 py-3 text-xs text-slate-400">{lead.firstCallTime ? new Date(lead.firstCallTime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—'}</td>
                                                    <td className={`px-4 py-3 text-sm font-semibold ${getSpeedColor(lead.speedMinutes)}`}>{lead.called ? formatSpeed(lead.speedMinutes) : '—'}</td>
                                                    <td className="px-4 py-3"><span className={`px-2 py-1 rounded text-xs font-semibold ${speedBadge.color}`}>{speedBadge.label}</span></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            // Main view: overview + leaderboard
            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div className="flex items-center justify-between flex-wrap gap-3">
                        <h2 className="text-2xl font-bold text-white">Speed to Lead</h2>
                        <div className="flex gap-2 items-center">
                            <select value={dateRange} onChange={e => { setDateRange(e.target.value); }} className="input-field border rounded-lg px-3 py-2 text-sm">
                                {dateRangeOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                            </select>
                            <button onClick={() => { localStorage.removeItem('vam_speed_to_lead_' + dateRange); localStorage.removeItem('vam_speed_to_lead_time_' + dateRange); fetchSpeedData(); }} className="px-3 py-2 bg-dark-700 hover:bg-dark-600 text-slate-300 rounded-lg text-sm">Refresh</button>
                            <button onClick={() => setShowSetup(true)} className="px-3 py-2 bg-dark-700 hover:bg-dark-600 text-slate-300 rounded-lg text-sm">Setup</button>
                        </div>
                    </div>

                    {/* Agency Overview Cards */}
                    {allStats && (
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Agency Avg Speed</p>
                                <p className={`text-2xl font-bold ${getSpeedColor(allStats.avgSpeed)}`}>{formatSpeed(allStats.avgSpeed)}</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Total Leads</p>
                                <p className="text-2xl font-bold text-white">{allStats.totalLeads}</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Leads Called</p>
                                <p className="text-2xl font-bold text-emerald-400">{allStats.pctCalled}%</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Within 5 Min</p>
                                <p className={`text-2xl font-bold ${allStats.pctWithin5Min >= 80 ? 'text-emerald-400' : allStats.pctWithin5Min >= 50 ? 'text-yellow-400' : 'text-red-400'}`}>{allStats.pctWithin5Min}%</p>
                            </div>
                            <div className="card p-4 text-center">
                                <p className="text-xs text-slate-400 mb-1">Uncalled Leads</p>
                                <p className={`text-2xl font-bold ${allStats.totalUncalled > 0 ? 'text-red-400' : 'text-emerald-400'}`}>{allStats.totalUncalled}</p>
                            </div>
                        </div>
                    )}

                    {Object.keys(ghlData).length === 0 && !loading && (
                        <div className="card p-8 text-center">
                            <p className="text-slate-400 mb-2">No speed-to-lead data found</p>
                            <p className="text-xs text-slate-600 mb-4">Make sure your clients are mapped to GHL locations and have recent leads.</p>
                            <button onClick={() => setShowSetup(true)} className="px-4 py-2 bg-brand-purple text-white rounded-lg text-sm">Setup GHL Mappings</button>
                        </div>
                    )}

                    {/* Search */}
                    {Object.keys(ghlData).length > 0 && (
                        <div className="flex gap-3">
                            <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="input-field border rounded-lg px-4 py-2 text-sm flex-1" style={{ maxWidth: '300px' }} />
                        </div>
                    )}

                    {/* Leaderboard Table */}
                    {leaderboard.length > 0 && (
                        <div className="card overflow-hidden">
                            <div className="p-4 border-b border-dark-700">
                                <h3 className="text-sm font-semibold text-white">Client Leaderboard</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="text-xs text-slate-500 border-b border-dark-700">
                                            <th className="text-left px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('client')}>Client{sortArrow('client')}</th>
                                            <th className="text-left px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('avgSpeed')}>Avg Speed{sortArrow('avgSpeed')}</th>
                                            <th className="text-left px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('median')}>Median{sortArrow('median')}</th>
                                            <th className="text-center px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('leads')}>Leads{sortArrow('leads')}</th>
                                            <th className="text-center px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('called')}>% Called{sortArrow('called')}</th>
                                            <th className="text-center px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('within5')}>{"% < 5 min"}{sortArrow('within5')}</th>
                                            <th className="text-center px-4 py-3 cursor-pointer hover:text-white" onClick={() => handleSort('uncalled')}>Uncalled{sortArrow('uncalled')}</th>

        const UsersTab = () => {
            const [users, setUsers] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [search, setSearch] = React.useState('');
            const [sortKey, setSortKey] = React.useState('created_at');
            const [sortDir, setSortDir] = React.useState('desc');

            React.useEffect(() => {
                const load = async () => {
                    setLoading(true);
                    try {
                        const { data, error } = await supabase.rpc('list_auth_users');
                        if (error) { setError(error.message); }
                        else { setUsers(data || []); }
                    } catch (e) { setError(e.message); }
                    setLoading(false);
                };
                load();
            }, []);

            const toggleSort = (key) => {
                if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                else { setSortKey(key); setSortDir('desc'); }
            };

            const filtered = users.filter(u => {
                if (!search) return true;
                const q = search.toLowerCase();
                return (u.email || '').toLowerCase().includes(q) || (u.full_name || '').toLowerCase().includes(q);
            });

            const sorted = [...filtered].sort((a, b) => {
                let va = a[sortKey] || '';
                let vb = b[sortKey] || '';
                if (sortKey === 'created_at' || sortKey === 'last_sign_in_at') {
                    va = va ? new Date(va).getTime() : 0;
                    vb = vb ? new Date(vb).getTime() : 0;
                } else {
                    va = String(va).toLowerCase();
                    vb = String(vb).toLowerCase();
                }
                if (va < vb) return sortDir === 'asc' ? -1 : 1;
                if (va > vb) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
            const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) : 'Never';
            const timeAgo = (d) => {
                if (!d) return 'Never';
                const diff = Date.now() - new Date(d).getTime();
                const mins = Math.floor(diff / 60000);
                if (mins < 60) return mins + 'm ago';
                const hrs = Math.floor(mins / 60);
                if (hrs < 24) return hrs + 'h ago';
                const days = Math.floor(hrs / 24);
                if (days < 30) return days + 'd ago';
                return fmtDate(d);
            };

            const SortHeader = ({ label, k }) => (
                <th onClick={() => toggleSort(k)} className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:text-white select-none">
                    <span className="flex items-center gap-1">{label} {sortKey === k ? (sortDir === 'asc' ? '↑' : '↓') : ''}</span>
                </th>
            );

            if (loading) return React.createElement('div', { className: 'flex items-center justify-center py-20' },
                React.createElement('div', { className: 'text-slate-400' }, 'Loading users...')
            );

            if (error) return React.createElement('div', { className: 'card p-6' },
                React.createElement('p', { className: 'text-red-400' }, 'Error: ' + error)
            );

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-white">Registered Users</h2>
                            <p className="text-slate-400 text-sm mt-1">{users.length} total users registered for the dashboard</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <input
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                placeholder="Search by name or email..."
                                className="bg-dark-800 border border-dark-700 rounded-lg px-4 py-2 text-sm text-white placeholder-slate-500"
                                style={{width: '260px'}}
                            />
                        </div>
                    </div>

                    {/* Stats row */}
                    <div className="grid grid-cols-4 gap-4">
                        {[
                            { label: 'Total Users', value: users.length, color: 'text-brand-cyan' },
                            { label: 'Confirmed', value: users.filter(u => u.email_confirmed_at).length, color: 'text-emerald-400' },
                            { label: 'Active (7d)', value: users.filter(u => u.last_sign_in_at && (Date.now() - new Date(u.last_sign_in_at).getTime()) < 7 * 86400000).length, color: 'text-brand-purple' },
                            { label: 'Inactive (30d+)', value: users.filter(u => !u.last_sign_in_at || (Date.now() - new Date(u.last_sign_in_at).getTime()) > 30 * 86400000).length, color: 'text-amber-400' },
                        ].map((s, i) => (
                            <div key={i} className="card p-4">
                                <div className="text-xs text-slate-400 mb-1">{s.label}</div>
                                <div className={'text-2xl font-bold ' + s.color}>{s.value}</div>
                            </div>
                        ))}
                    </div>

                    {/* Table */}
                    <div className="card overflow-hidden">
                        <table className="w-full">
                            <thead className="border-b border-dark-700">
                                <tr>
                                    <th className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase w-8">#</th>
                                    <SortHeader label="Name" k="full_name" />
                                    <SortHeader label="Email" k="email" />
                                    <SortHeader label="Signed Up" k="created_at" />
                                    <SortHeader label="Last Sign In" k="last_sign_in_at" />
                                    <th className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-dark-700">
                                {sorted.map((u, i) => {
                                    const isActive = u.last_sign_in_at && (Date.now() - new Date(u.last_sign_in_at).getTime()) < 7 * 86400000;
                                    const isConfirmed = !!u.email_confirmed_at;
                                    return (
                                        <tr key={u.id} className="hover:bg-dark-800 transition-colors">
                                            <td className="px-4 py-3 text-xs text-slate-500">{i + 1}</td>
                                            <td className="px-4 py-3">
                                                <span className="text-sm text-white font-medium">{u.full_name || '—'}</span>
                                            </td>
                                            <td className="px-4 py-3">
                                                <span className="text-sm text-slate-300">{u.email}</span>
                                            </td>
                                            <td className="px-4 py-3">
                                                <span className="text-sm text-slate-400">{fmtDate(u.created_at)}</span>
                                            </td>
                                            <td className="px-4 py-3">
                                                <span className={'text-sm ' + (isActive ? 'text-emerald-400' : 'text-slate-500')}>{timeAgo(u.last_sign_in_at)}</span>
                                            </td>
                                            <td className="px-4 py-3">
                                                <div className="flex items-center gap-2">
                                                    {isConfirmed
                                                        ? <span className="px-2 py-0.5 rounded-full text-xs bg-emerald-500/10 text-emerald-400">Confirmed</span>
                                                        : <span className="px-2 py-0.5 rounded-full text-xs bg-amber-500/10 text-amber-400">Pending</span>
                                                    }
                                                    {isActive && <span className="px-2 py-0.5 rounded-full text-xs bg-brand-cyan/10 text-brand-cyan">Active</span>}
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                        {sorted.length === 0 && (
                            <div className="text-center py-8 text-slate-500 text-sm">
                                {search ? 'No users match your search' : 'No users found'}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ========== LTV & CHURN TAB ==========
        const LTVChurnTab = () => {
            const [subscriptions, setSubscriptions] = useState({ stripe: [], whop: [] });
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('overview');
            const [sortConfig, setSortConfig] = useState({ key: 'created', dir: 'asc' });
            const [searchFilter, setSearchFilter] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [datePreset, setDatePreset] = useState('all');
            const [customFrom, setCustomFrom] = useState('');
            const [customTo, setCustomTo] = useState('');

            const getDateRange = () => {
                if (datePreset === 'custom') {
                    return { from: customFrom ? new Date(customFrom) : null, to: customTo ? new Date(customTo + 'T23:59:59') : null };
                }
                if (datePreset === 'all') return { from: null, to: null };
                const now = new Date();
                const from = new Date(now);
                const months = { '1m': 1, '3m': 3, '6m': 6, '1y': 12, '2y': 24 }[datePreset] || 0;
                from.setMonth(from.getMonth() - months);
                return { from, to: now };
            };

            const dateRange = getDateRange();

            useEffect(() => {
                const cached = localStorage.getItem('vam_subscriptions');
                const cacheTime = localStorage.getItem('vam_subscriptions_cache_time');
                const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                if (cached && cacheAge < 30 * 60 * 1000) {
                    try { setSubscriptions(JSON.parse(cached)); setLoading(false); return; } catch(e) {}
                }
                fetch('/api/billing-subscriptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'fetchAll' })
                })
                .then(r => r.json())
                .then(data => {
                    const subs = { stripe: data.stripe || [], whop: data.whop || [], fanbasis: data.fanbasis || [], errors: data.errors || [] };
                    setSubscriptions(subs);
                    try {
                        localStorage.setItem('vam_subscriptions', JSON.stringify(subs));
                        localStorage.setItem('vam_subscriptions_cache_time', Date.now().toString());
                    } catch(e) {}
                })
                .catch(() => {})
                .finally(() => setLoading(false));
            }, []);

            const allSubs = useMemo(() => [...subscriptions.stripe, ...subscriptions.whop, ...(subscriptions.fanbasis || [])], [subscriptions]);

            const parseDate = (s) => { if (!s) return null; const d = new Date(s); return isNaN(d.getTime()) ? null : d; };
            const daysBetween = (a, b) => Math.round((b - a) / (1000 * 60 * 60 * 24));
            const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
            const fmtCurrency = (n) => n != null ? '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
            const monthKey = (d) => d ? d.toISOString().slice(0, 7) : null;

            // Normalize monthly amount
            const monthlyAmount = (sub) => {
                if (!sub.amount) return 0;
                if (sub.interval === 'year') return sub.amount / 12;
                if (sub.interval === 'week') return sub.amount * 4.33;
                return sub.amount; // default monthly
            };

            // Determine effective end date for churned clients
            const getEndDate = (sub) => {
                if (sub.endedAt) return parseDate(sub.endedAt);
                if (sub.canceledAt) return parseDate(sub.canceledAt);
                if (sub.cancelAt) return parseDate(sub.cancelAt);
                return null;
            };

            const isChurned = (sub) => {
                const status = (sub.status || '').toLowerCase();
                return ['canceled', 'cancelled', 'incomplete_expired', 'unpaid', 'expired', 'inactive'].includes(status);
            };

            const isActive = (sub) => {
                const status = (sub.status || '').toLowerCase();
                return ['active', 'trialing', 'past_due'].includes(status);
            };

            const isAtRisk = (sub) => {
                return sub.cancelAtPeriodEnd || (sub.status || '').toLowerCase() === 'past_due';
            };

            // Enriched subscription data
            const enrichedSubs = useMemo(() => {
                return allSubs.map(sub => {
                    const startDate = parseDate(sub.created);
                    const endDate = getEndDate(sub);
                    const churned = isChurned(sub);
                    const active = isActive(sub);
                    const atRisk = isAtRisk(sub);
                    const monthly = monthlyAmount(sub);

                    let lifetimeDays = 0;
                    let lifetimeMonths = 0;
                    if (startDate) {
                        const end = endDate || new Date();
                        lifetimeDays = Math.max(0, daysBetween(startDate, end));
                        lifetimeMonths = Math.max(1, Math.round(lifetimeDays / 30.44));
                    }
                    const totalRevenue = monthly * lifetimeMonths;

                    return {
                        ...sub,
                        startDate,
                        endDate,
                        churned,
                        active,
                        atRisk,
                        monthly,
                        lifetimeDays,
                        lifetimeMonths,
                        totalRevenue,
                        startMonth: monthKey(startDate),
                        endMonth: endDate ? monthKey(endDate) : null
                    };
                }).filter(s => s.startDate); // only include subs with valid start dates
            }, [allSubs]);

            // Filter enriched subs by date range
            const dateFilteredSubs = useMemo(() => {
                const { from, to } = dateRange;
                if (!from && !to) return enrichedSubs;
                return enrichedSubs.filter(s => {
                    if (!s.startDate) return false;
                    // Include if the subscription was active during the date range
                    // Started before or during the range AND (still active or ended during/after range start)
                    const startedBeforeEnd = !to || s.startDate <= to;
                    const endedAfterStart = !from || !s.endDate || s.endDate >= from;
                    return startedBeforeEnd && endedAfterStart;
                });
            }, [enrichedSubs, dateRange.from?.getTime(), dateRange.to?.getTime()]);

            // KPI calculations
            const metrics = useMemo(() => {
                const total = dateFilteredSubs.length;
                const activeSubs = dateFilteredSubs.filter(s => s.active);
                const churnedSubs = dateFilteredSubs.filter(s => s.churned);
                const atRiskSubs = enrichedSubs.filter(s => s.atRisk && s.active);

                const activeCount = activeSubs.length;
                const churnedCount = churnedSubs.length;
                const atRiskCount = atRiskSubs.length;

                const mrr = activeSubs.reduce((sum, s) => sum + s.monthly, 0);
                const atRiskMRR = atRiskSubs.reduce((sum, s) => sum + s.monthly, 0);

                const avgLifetimeAll = total > 0 ? dateFilteredSubs.reduce((sum, s) => sum + s.lifetimeMonths, 0) / total : 0;
                const avgLifetimeChurned = churnedCount > 0 ? churnedSubs.reduce((sum, s) => sum + s.lifetimeMonths, 0) / churnedCount : 0;

                const avgLTV = total > 0 ? dateFilteredSubs.reduce((sum, s) => sum + s.totalRevenue, 0) / total : 0;
                const avgActiveLTV = activeCount > 0 ? activeSubs.reduce((sum, s) => sum + s.totalRevenue, 0) / activeCount : 0;

                // Overall churn rate: churned / total
                const overallChurnRate = total > 0 ? (churnedCount / total) * 100 : 0;

                // Monthly churn data
                const monthlyData = {};
                for (const sub of dateFilteredSubs) {
                    const sm = sub.startMonth;
                    if (sm) {
                        if (!monthlyData[sm]) monthlyData[sm] = { started: 0, churned: 0, active: 0 };
                        monthlyData[sm].started++;
                    }
                    if (sub.endMonth && sub.churned) {
                        if (!monthlyData[sub.endMonth]) monthlyData[sub.endMonth] = { started: 0, churned: 0, active: 0 };
                        monthlyData[sub.endMonth].churned++;
                    }
                }

                // Calculate running active count per month
                const sortedMonths = Object.keys(monthlyData).sort();
                let running = 0;
                for (const m of sortedMonths) {
                    running += monthlyData[m].started - monthlyData[m].churned;
                    monthlyData[m].active = running;
                    monthlyData[m].churnRate = monthlyData[m].active + monthlyData[m].churned > 0
                        ? (monthlyData[m].churned / (monthlyData[m].active + monthlyData[m].churned) * 100)
                        : 0;
                }

                // Recent 3 month churn rate
                const recent3 = sortedMonths.slice(-3);
                const recent3Churned = recent3.reduce((sum, m) => sum + monthlyData[m].churned, 0);
                const recent3Start = recent3.length > 0 && monthlyData[recent3[0]] ? monthlyData[recent3[0]].active + monthlyData[recent3[0]].churned : 1;
                const recentChurnRate = recent3Start > 0 ? (recent3Churned / recent3Start * 100) : 0;

                return {
                    total, activeCount, churnedCount, atRiskCount,
                    mrr, atRiskMRR,
                    avgLifetimeAll, avgLifetimeChurned,
                    avgLTV, avgActiveLTV,
                    overallChurnRate, recentChurnRate,
                    monthlyData, sortedMonths
                };
            }, [dateFilteredSubs]);

            // Cohort retention
            const cohorts = useMemo(() => {
                const cohortMap = {};
                for (const sub of dateFilteredSubs) {
                    const cm = sub.startMonth;
                    if (!cm) continue;
                    if (!cohortMap[cm]) cohortMap[cm] = [];
                    cohortMap[cm].push(sub);
                }
                const cohortKeys = Object.keys(cohortMap).sort();
                const now = new Date();
                return cohortKeys.map(ck => {
                    const subs = cohortMap[ck];
                    const size = subs.length;
                    const cohortDate = new Date(ck + '-01');
                    const maxMonths = Math.min(12, Math.floor(daysBetween(cohortDate, now) / 30.44));
                    const retention = [];
                    for (let m = 0; m <= maxMonths; m++) {
                        const cutoff = new Date(cohortDate);
                        cutoff.setMonth(cutoff.getMonth() + m);
                        const retained = subs.filter(s => {
                            if (!s.endDate) return true;
                            return s.endDate >= cutoff;
                        }).length;
                        retention.push(Math.round((retained / size) * 100));
                    }
                    return { month: ck, size, retention };
                }).filter(c => c.size >= 2); // only show cohorts with 2+ clients
            }, [dateFilteredSubs]);

            // Sorting & filtering for table
            const filteredSubs = useMemo(() => {
                let subs = [...dateFilteredSubs];
                if (searchFilter) {
                    const q = searchFilter.toLowerCase();
                    subs = subs.filter(s => s.customerName.toLowerCase().includes(q) || s.customerEmail.toLowerCase().includes(q));
                }
                if (statusFilter === 'active') subs = subs.filter(s => s.active);
                else if (statusFilter === 'churned') subs = subs.filter(s => s.churned);
                else if (statusFilter === 'at-risk') subs = subs.filter(s => s.atRisk && s.active);

                const { key, dir } = sortConfig;
                if (key) {
                    subs.sort((a, b) => {
                        let av = a[key], bv = b[key];
                        if (av instanceof Date) av = av?.getTime() || 0;
                        if (bv instanceof Date) bv = bv?.getTime() || 0;
                        if (typeof av === 'string') av = av.toLowerCase();
                        if (typeof bv === 'string') bv = bv.toLowerCase();
                        if (av < bv) return dir === 'asc' ? -1 : 1;
                        if (av > bv) return dir === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return subs;
            }, [dateFilteredSubs, searchFilter, statusFilter, sortConfig]);

            const toggleSort = (key) => {
                if (sortConfig.key === key) setSortConfig({ key, dir: sortConfig.dir === 'asc' ? 'desc' : 'asc' });
                else setSortConfig({ key, dir: 'desc' });
            };

            const SortHeader = ({ label, sortKey }) => (
                <th className="text-left py-3 px-4 text-xs font-semibold text-secondary uppercase tracking-wide cursor-pointer hover:text-brand-cyan" onClick={() => toggleSort(sortKey)}>
                    {label} {sortConfig.key === sortKey ? (sortConfig.dir === 'asc' ? ' ↑' : ' ↓') : ''}
                </th>
            );

            const KPICard = ({ label, value, sub, color = 'text-white' }) => (
                <div className="card p-5">
                    <div className="text-xs text-secondary uppercase tracking-wide mb-1">{label}</div>
                    <div className={`text-2xl font-bold ${color}`}>{value}</div>
                    {sub && <div className="text-xs text-secondary mt-1">{sub}</div>}
                </div>
            );

            const StatusBadge = ({ sub }) => {
                if (sub.churned) return <span style={{background:'rgba(239,68,68,0.15)',color:'#f87171',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>Churned</span>;
                if (sub.atRisk) return <span style={{background:'rgba(251,191,36,0.15)',color:'#fbbf24',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>At Risk</span>;
                if (sub.active) return <span style={{background:'rgba(52,211,153,0.15)',color:'#34d399',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>Active</span>;
                return <span style={{background:'rgba(148,163,184,0.15)',color:'#94a3b8',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>{sub.status}</span>;
            };

            // Bar chart helper (text-based proportional bars)
            const maxChurned = metrics.sortedMonths.length > 0 ? Math.max(...metrics.sortedMonths.map(m => metrics.monthlyData[m].churned), 1) : 1;

            if (loading) return (
                <div className="flex items-center justify-center py-20">
                    <div style={{width:'200px',height:'4px',background:'#262626',borderRadius:'4px',overflow:'hidden'}}>
                        <div className="loading-bar" style={{height:'100%',background:'linear-gradient(90deg,#06b6d4,#8b5cf6)',borderRadius:'4px'}}></div>
                    </div>
                    <span className="ml-4 text-secondary text-sm">Loading subscription data...</span>
                </div>
            );

            return (
                <div className="p-6 space-y-6">
                    <div className="flex items-center justify-between mb-2">
                        <div>
                            <h2 className="text-2xl font-bold text-primary">LTV & Churn Analytics</h2>
                            <p className="text-sm text-secondary mt-1">Calculated from {allSubs.length} Stripe + Whop subscriptions</p>
                        </div>
                        <div className="flex gap-2">
                            {['overview', 'clients', 'cohorts'].map(v => (
                                <button key={v} onClick={() => setView(v)}
                                    className={'px-4 py-2 rounded-lg text-sm font-medium transition-all ' + (view === v ? 'bg-brand-cyan/20 text-brand-cyan' : 'text-secondary hover:text-white hover:bg-dark-700')}>
                                    {v === 'overview' ? 'Overview' : v === 'clients' ? 'Client Table' : 'Cohort Retention'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Date Range Filter */}
                    <div className="card p-4">
                        <div className="flex flex-wrap items-center gap-3">
                            <span className="text-xs font-semibold text-secondary uppercase tracking-wide">Time Range:</span>
                            {[
                                { id: 'all', label: 'All Time' },
                                { id: '1m', label: '1 Month' },
                                { id: '3m', label: '3 Months' },
                                { id: '6m', label: '6 Months' },
                                { id: '1y', label: '1 Year' },
                                { id: '2y', label: '2 Years' },
                                { id: 'custom', label: 'Custom' },
                            ].map(p => (
                                <button key={p.id} onClick={() => setDatePreset(p.id)}
                                    className={'px-3 py-1.5 rounded-lg text-xs font-medium transition-all ' + (datePreset === p.id ? 'bg-brand-cyan/20 text-brand-cyan border border-brand-cyan/30' : 'text-secondary hover:text-white hover:bg-dark-700 border border-transparent')}>
                                    {p.label}
                                </button>
                            ))}
                            {datePreset === 'custom' && (
                                <div className="flex items-center gap-2 ml-2">
                                    <input type="date" value={customFrom} onChange={e => setCustomFrom(e.target.value)} className="input-field border rounded-lg px-2 py-1.5 text-xs" />
                                    <span className="text-secondary text-xs">to</span>
                                    <input type="date" value={customTo} onChange={e => setCustomTo(e.target.value)} className="input-field border rounded-lg px-2 py-1.5 text-xs" />
                                </div>
                            )}
                            {datePreset !== 'all' && (
                                <span className="text-xs text-secondary ml-auto">
                                    Showing {dateFilteredSubs.length} of {enrichedSubs.length} subscriptions
                                </span>
                            )}
                        </div>
                    </div>

                    {/* KPI Cards - always visible */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <KPICard label="Total Clients" value={metrics.total} sub={`${metrics.activeCount} active`} color="text-brand-cyan" />
                        <KPICard label="Active" value={metrics.activeCount} sub={`${metrics.atRiskCount} at risk`} color="text-emerald-400" />
                        <KPICard label="Churned" value={metrics.churnedCount} sub={`${metrics.overallChurnRate.toFixed(1)}% all-time`} color="text-red-400" />
                        <KPICard label="Monthly MRR" value={fmtCurrency(metrics.mrr)} sub={`${fmtCurrency(metrics.atRiskMRR)} at risk`} color="text-brand-purple" />
