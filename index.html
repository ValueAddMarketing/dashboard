                    const { data: updated } = await getAdMappings();
                    setMappings(updated || []);
                    // Clear all meta ads caches
                    META_DATE_PRESETS.forEach(p => { localStorage.removeItem('vam_meta_ads_' + p.value); localStorage.removeItem('vam_meta_ads_time_' + p.value); });
                    const data = await fetchMetaAdData(datePreset);
                    setMetaData(data);
                    setStatusMessage({ type: 'success', text: `${clientName} ${adAccountId ? 'linked' : 'unlinked'} successfully` });
                } catch (err) {
                    setStatusMessage({ type: 'error', text: `Failed to save: ${err.message}` });
                } finally {
                    setSavingClient(null);
                }
            };

            const filteredClients = clients.filter(c => !searchFilter || c.client.toLowerCase().includes(searchFilter.toLowerCase()));
            const mappedCount = clients.filter(c => getMappingForClient(c.client)).length;
            const linkedClients = filteredClients.filter(c => metaData[c.client]);

            // Totals for linked clients
            const totals = Object.values(metaData).reduce((acc, d) => ({
                spend: acc.spend + parseFloat(d.spend || 0),
                leads: acc.leads + (d.leads || 0),
                impressions: acc.impressions + (d.impressions || 0),
                reach: acc.reach + (d.reach || 0),
                clicks: acc.clicks + (d.clicks || 0),
                linkClicks: acc.linkClicks + (d.linkClicks || 0),
            }), { spend: 0, leads: 0, impressions: 0, reach: 0, clicks: 0, linkClicks: 0 });
            const totalCPL = totals.leads > 0 ? totals.spend / totals.leads : 0;

            if (loading) return <div className="text-center py-12 text-secondary">Loading Meta ad accounts...</div>;

            return (
                <div className="space-y-6">
                    {/* Header with view toggle */}
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-primary">Meta Ads Dashboard</h2>
                            <p className="text-sm text-secondary mt-1">Real-time ad performance from Meta Marketing API</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex rounded-lg overflow-hidden border border-dark-700">
                                <button onClick={() => setViewMode('performance')} className={'px-4 py-2 text-sm font-medium ' + (viewMode === 'performance' ? 'bg-brand-cyan/20 text-brand-cyan' : 'text-secondary hover-bg')}>Performance</button>
                                <button onClick={() => setViewMode('mappings')} className={'px-4 py-2 text-sm font-medium ' + (viewMode === 'mappings' ? 'bg-brand-cyan/20 text-brand-cyan' : 'text-secondary hover-bg')}>Account Mappings</button>
                            </div>
                        </div>
                    </div>

                    {statusMessage && (
                        <div className={'p-3 rounded-lg text-sm ' + (statusMessage.type === 'success' ? 'bg-emerald-500/20 border border-emerald-500/30 text-emerald-400' : 'bg-red-500/20 border border-red-500/30 text-red-400')}>
                            {statusMessage.text}
                        </div>
                    )}

                    {/* Date Range Picker */}
                    <div className="card p-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="text-sm text-secondary font-medium">Date Range:</span>
                                <div className="flex flex-wrap gap-2">
                                    {META_DATE_PRESETS.map(p => (
                                        <button key={p.value} onClick={() => handleDateChange(p.value)} className={'px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ' + (datePreset === p.value ? 'bg-brand-cyan/20 text-brand-cyan border border-brand-cyan/30' : 'text-secondary hover-bg border border-transparent')}>
                                            {p.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {dataLoading && <span className="text-xs text-brand-cyan">Loading...</span>}
                        </div>
                    </div>

                    {viewMode === 'performance' ? (
                        <>
                            {/* Aggregate Stats */}
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                <div className="card p-4 text-center">
                                    <div className="text-2xl font-bold text-brand-cyan">{fmt(totals.spend)}</div>
                                    <div className="text-xs text-secondary">Total Spend</div>
                                </div>
                                <div className="card p-4 text-center">
                                    <div className="text-2xl font-bold text-brand-purple">{fmtN(totals.leads)}</div>
                                    <div className="text-xs text-secondary">Total Leads</div>
                                </div>
                                <div className="card p-4 text-center">
                                    <div className={'text-2xl font-bold ' + (totalCPL > 50 ? 'text-red-400' : totalCPL > 25 ? 'text-amber-400' : 'text-emerald-400')}>{fmtD(totalCPL)}</div>
                                    <div className="text-xs text-secondary">Avg CPL</div>
                                </div>
                                <div className="card p-4 text-center">
                                    <div className="text-2xl font-bold text-white">{fmtN(totals.impressions)}</div>
                                    <div className="text-xs text-secondary">Impressions</div>
                                </div>
                                <div className="card p-4 text-center">
                                    <div className="text-2xl font-bold text-white">{fmtN(totals.reach)}</div>
                                    <div className="text-xs text-secondary">Reach</div>
                                </div>
                                <div className="card p-4 text-center">
                                    <div className="text-2xl font-bold text-white">{fmtN(totals.clicks)}</div>
                                    <div className="text-xs text-secondary">Clicks</div>
                                </div>
                            </div>

                            {/* Per-Client Performance Table */}
                            <div className="card">
                                <div className="p-4 border-b divider flex items-center justify-between">
                                    <h3 className="text-lg font-semibold text-primary">Client Performance ({META_DATE_PRESETS.find(p => p.value === datePreset)?.label})</h3>
                                    <span className="text-xs text-secondary">{Object.keys(metaData).length} linked accounts</span>
                                </div>
                                {Object.keys(metaData).length === 0 ? (
                                    <div className="p-8 text-center text-secondary text-sm">No linked clients with data. Go to Account Mappings to link clients to their ad accounts.</div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="border-b divider">
                                                    <th className="px-4 py-3 text-left text-xs font-semibold text-secondary uppercase">Client</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">Spend</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">Leads</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">CPL</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">Impressions</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">Reach</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">Clicks</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">CTR</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">CPC</th>
                                                    <th className="px-4 py-3 text-right text-xs font-semibold text-secondary uppercase">Frequency</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divider">
                                                {Object.entries(metaData).sort((a, b) => parseFloat(b[1].spend) - parseFloat(a[1].spend)).map(([clientName, d]) => (
                                                    <tr key={clientName} className="hover-bg transition-colors">
                                                        <td className="px-4 py-3 font-medium text-primary">{clientName}</td>
                                                        <td className="px-4 py-3 text-right text-brand-cyan font-medium">{fmt(d.spend)}</td>
                                                        <td className="px-4 py-3 text-right text-brand-purple font-medium">{fmtN(d.leads)}</td>
                                                        <td className={'px-4 py-3 text-right font-bold ' + (parseFloat(d.cpl) > 50 ? 'text-red-400' : parseFloat(d.cpl) > 25 ? 'text-amber-400' : 'text-emerald-400')}>{d.cpl ? fmtD(d.cpl) : '—'}</td>
                                                        <td className="px-4 py-3 text-right text-secondary">{fmtN(d.impressions)}</td>
                                                        <td className="px-4 py-3 text-right text-secondary">{fmtN(d.reach)}</td>
                                                        <td className="px-4 py-3 text-right text-secondary">{fmtN(d.clicks)}</td>
                                                        <td className="px-4 py-3 text-right text-secondary">{d.ctr}%</td>
                                                        <td className="px-4 py-3 text-right text-secondary">{fmtD(d.cpc)}</td>
                                                        <td className="px-4 py-3 text-right text-secondary">{d.frequency}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </>
                    ) : (
                        <>
                            {/* Mapping Stats */}
                            <div className="grid grid-cols-3 gap-4">
                                <div className="card p-6 text-center">
                                    <div className="text-2xl font-bold text-brand-cyan">{adAccounts.length}</div>
                                    <div className="text-xs text-secondary">Ad Accounts Available</div>
                                </div>
                                <div className="card p-6 text-center">
                                    <div className="text-2xl font-bold text-emerald-400">{mappedCount}</div>
                                    <div className="text-xs text-secondary">Clients Linked</div>
                                </div>
                                <div className="card p-6 text-center">
                                    <div className="text-2xl font-bold text-amber-400">{clients.length - mappedCount}</div>
                                    <div className="text-xs text-secondary">Clients Unlinked</div>
                                </div>
                            </div>

                            {/* Search */}
                            <div className="card p-4">
                                <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="w-full input-field border rounded-lg px-3 py-2 text-sm" />
                            </div>

                            {/* Mapping Table */}
                            <div className="card">
                                <div className="p-4 border-b divider">
                                    <h3 className="text-lg font-semibold text-primary">Client Mappings</h3>
                                    {adAccounts.length === 0 && (
                                        <p className="text-sm text-amber-400 mt-2">No ad accounts found. Make sure your Meta access token is configured in Vercel environment variables and your System User has ad accounts assigned.</p>
                                    )}
                                </div>
                                <div className="divide-y divider">
                                    {filteredClients.length === 0 ? (
                                        <div className="p-6 text-center text-secondary text-sm">No clients found</div>
                                    ) : (
                                        filteredClients.map(client => {
                                            const currentMapping = getMappingForClient(client.client);
                                            const isSaving = savingClient === client.client;
                                            return (
                                                <div key={client.client} className="p-4 flex items-center justify-between hover-bg transition-colors">
                                                    <div className="flex items-center gap-3 flex-1">
                                                        <div className={'w-2.5 h-2.5 rounded-full flex-shrink-0 ' + (currentMapping ? 'bg-emerald-500' : 'bg-slate-600')} />
                                                        <div>
                                                            <div className="font-medium text-primary">{client.client}</div>
                                                            <div className="text-xs text-secondary">{client.adAccount || 'No ad account name'} · {client.state || 'No state'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        {currentMapping && <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-full">Live</span>}
                                                        <select value={currentMapping?.meta_ad_account_id || ''} onChange={e => handleMappingChange(client.client, e.target.value)} disabled={isSaving} className="input-field border rounded-lg px-3 py-2 text-sm min-w-[250px] disabled:opacity-50">
                                                            <option value="">Not linked</option>
                                                            {adAccounts.map(account => <option key={account.id} value={account.id.replace('act_', '')}>{account.name} ({account.id})</option>)}
                                                        </select>
                                                        {isSaving && <span className="text-xs text-brand-cyan">Saving...</span>}
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        // ========== FATHOM MEETINGS DASHBOARD TAB ==========
        const FathomMeetingsTab = ({ clients: clientsProp, user }) => {
            const [meetings, setMeetings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [expandedId, setExpandedId] = useState(null);
            const [activeTab, setActiveTab] = useState({});
            const [viewMode, setViewMode] = useState('timeline');
            const [searchQuery, setSearchQuery] = useState('');
            const [filterClient, setFilterClient] = useState('');

            // Sync state
            const [syncing, setSyncing] = useState(false);
            const [syncResult, setSyncResult] = useState(null);
            const [syncLog, setSyncLog] = useState([]);
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            const [syncLookback, setSyncLookback] = useState('30d');

            // Domain mapping state
            const [domainMappings, setDomainMappings] = useState([]);
            const [nameMappings, setNameMappings] = useState([]);
            const [showMappings, setShowMappings] = useState(false);
            const [newDomain, setNewDomain] = useState('');
            const [newClientName, setNewClientName] = useState('');

            // Client assignment state
            const [assigningId, setAssigningId] = useState(null);
            const [selectedClients, setSelectedClients] = useState({});
            const [customClientInput, setCustomClientInput] = useState({});
            const [dbClientNames, setDbClientNames] = useState([]);

            // Team member filter state
            const [teamMembers, setTeamMembers] = useState([]);
            const [selectedTeamMember, setSelectedTeamMember] = useState('');

            // Fetch client names and team members from database on mount
            useEffect(() => {
                const loadDbClients = async () => {
                    const { data } = await supabase.from('meeting_notes').select('client_name').not('client_name', 'is', null);
                    const names = [...new Set((data || []).map(d => d.client_name).filter(Boolean))];
                    setDbClientNames(names);
                };
                const loadTeamMembers = async () => {
                    const { data } = await supabase.from('meeting_notes').select('user_email').not('user_email', 'is', null);
                    const emails = [...new Set((data || []).map(d => d.user_email).filter(Boolean))];
                    setTeamMembers(emails.map(email => ({ email, name: getDisplayName(email) })));
                };
                loadDbClients();
                loadTeamMembers();
            }, []);

            const allClientNames = useMemo(() => {
                const fromProp = (clientsProp || []).map(c => c.client).filter(Boolean);
                return [...new Set([...fromProp, ...dbClientNames])].sort();
            }, [clientsProp, dbClientNames]);

            // Month selector state — default to previous month
            const now = new Date();
            const defaultMonth = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
            const defaultYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
            const [selMonth, setSelMonth] = useState(defaultMonth);
            const [selYear, setSelYear] = useState(defaultYear);

            const startDate = new Date(selYear, selMonth, 1).toISOString().split('T')[0];
            const endDate = new Date(selYear, selMonth + 1, 0).toISOString().split('T')[0];
            const monthLabel = new Date(selYear, selMonth, 1).toLocaleString('default', { month: 'long', year: 'numeric' });

            // Build month options (current + 6 previous)
            const monthOptions = useMemo(() => {
                const opts = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    opts.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleString('default', { month: 'long', year: 'numeric' }) });
                }
                return opts;
            }, []);

            // Load sync log + domain mappings on mount
            useEffect(() => {
                const loadSyncLog = async () => {
                    const { data } = await supabase.from('fathom_sync_log').select('*').order('synced_at', { ascending: false }).limit(100);
                    if (data) setSyncLog(data);
                };
                const loadMappings = async () => {
                    const { data } = await supabase.from('client_email_domains').select('*').order('client_name', { ascending: true });
                    if (data) setDomainMappings(data);
                };
                const loadNameMappings = async () => {
                    const { data } = await supabase.from('client_participant_names').select('*').order('client_name', { ascending: true });
                    if (data) setNameMappings(data);
                };
                loadSyncLog();
                loadMappings();
                loadNameMappings();
            }, []);

            // Helper: refresh meetings for current month (respects team member filter)
            const refreshMeetings = async () => {
                let query = supabase.from('meeting_notes').select('*').gte('meeting_date', startDate).lte('meeting_date', endDate);
                if (selectedTeamMember) query = query.eq('user_email', selectedTeamMember);
                const { data: mData } = await query.order('meeting_date', { ascending: false });
                if (mData) setMeetings(mData);
            };

            // Trigger Fathom sync
            const runSync = async () => {
                setSyncing(true);
                setSyncResult(null);
                const lookbackMs = { '1h': 3600000, '6h': 21600000, '24h': 86400000, '3d': 259200000, '7d': 604800000, '30d': 2592000000, '90d': 7776000000 };
                const createdAfter = new Date(Date.now() - (lookbackMs[syncLookback] || 2592000000)).toISOString();
                try {
                    const { data, error } = await supabase.functions.invoke('ingest-fathom', { body: { created_after: createdAfter, user_email: user?.email, user_id: user?.id } });
                    if (error) { setSyncResult({ error: error.message }); }
                    else { setSyncResult(data); }
                    // Reload sync log
                    const { data: logData } = await supabase.from('fathom_sync_log').select('*').order('synced_at', { ascending: false }).limit(100);
                    if (logData) setSyncLog(logData);
                    // Switch to month of most recent processed meeting so it's visible in timeline
                    const processed = (data?.results || []).filter(r => r.status === 'processed');
                    if (processed.length > 0) {
                        const { data: newest } = await supabase.from('meeting_notes').select('meeting_date').in('external_id', processed.map(r => r.recording_id)).order('meeting_date', { ascending: false }).limit(1);
                        if (newest?.[0]?.meeting_date) {
                            const md = new Date(newest[0].meeting_date);
                            const newMonth = md.getMonth();
                            const newYear = md.getFullYear();
                            if (newMonth !== selMonth || newYear !== selYear) {
                                // Different month — switch and useEffect will reload
                                setSelMonth(newMonth);
                                setSelYear(newYear);
                            } else {
                                // Same month — refresh current month to pick up new meetings
                                await refreshMeetings();
                            }
                        } else {
                            await refreshMeetings();
                        }
                    } else {
                        // No processed meetings — refresh current month
                        const { data: mData } = await supabase.from('meeting_notes').select('*').gte('meeting_date', startDate).lte('meeting_date', endDate).order('meeting_date', { ascending: false });
                        if (mData) setMeetings(mData);
                    }
                } catch (e) { setSyncResult({ error: e.message }); }
                setSyncing(false);
            };

            // Add domain mapping
            const addMapping = async () => {
                if (!newDomain.trim() || !newClientName.trim()) return;
                const { data, error } = await supabase.from('client_email_domains').insert({ domain: newDomain.trim().toLowerCase(), client_name: newClientName.trim() }).select().single();
                if (data) { setDomainMappings([...domainMappings, data]); setNewDomain(''); setNewClientName(''); }
                if (error) alert('Failed to add mapping: ' + error.message);
            };

            // Delete domain mapping
            const removeMapping = async (id) => {
                await supabase.from('client_email_domains').delete().eq('id', id);
                setDomainMappings(domainMappings.filter(m => m.id !== id));
            };

            // Delete name mapping
            const removeNameMapping = async (id) => {
                await supabase.from('client_participant_names').delete().eq('id', id);
                setNameMappings(nameMappings.filter(m => m.id !== id));
            };

            // Helper: parse participants from sync log error_message metadata
            const getLogParticipants = (entry) => {
                try { const meta = JSON.parse(entry?.error_message || '{}'); return (meta.participants || []).map(p => p.toLowerCase()); } catch { return []; }
            };

            // Assign client to unmatched recording (+ auto-assign similar meetings)
            const assignClient = async (recordingId, clientName) => {
                if (!recordingId || !clientName) return;
                setAssigningId(recordingId);
                try {
                    const { data, error } = await supabase.functions.invoke('ingest-fathom', {
                        body: { assign_client: { recording_id: recordingId, client_name: clientName }, user_email: user?.email, user_id: user?.id }
                    });
                    if (error) { alert('Assignment failed: ' + error.message); return setAssigningId(null); }
                    else if (data?.error) { alert('Assignment failed: ' + data.error); return setAssigningId(null); }

                    // --- Auto-assign other unmatched meetings with same participants ---
                    // IMPORTANT: Filter out ALL internal team emails/names, not just the current user
                    const INTERNAL_DOMAINS = ['valueaddmarketing.com'];
                    const isInternalParticipant = (p) => {
                        const lower = p.toLowerCase();
                        if (lower.includes('@')) {
                            const domain = lower.split('@')[1];
                            return INTERNAL_DOMAINS.some(d => domain === d);
                        }
                        return false;
                    };

                    const assignedEntry = syncLog.find(l => l.fathom_recording_id === recordingId);
                    const assignedParticipants = getLogParticipants(assignedEntry);
                    const userEmailLower = (user?.email || '').toLowerCase();
                    // Remove internal team + current user — only keep truly external participants
                    const externalParticipants = assignedParticipants.filter(p => p !== userEmailLower && !isInternalParticipant(p));

                    const autoAssignIds = [];
                    if (externalParticipants.length > 0) {
                        for (const entry of syncLog) {
                            if (entry.fathom_recording_id === recordingId) continue;
                            if (entry.status !== 'unmatched') continue;
                            const entryParticipants = getLogParticipants(entry).filter(p => p !== userEmailLower && !isInternalParticipant(p));
                            const hasOverlap = entryParticipants.some(p => externalParticipants.includes(p));
                            if (hasOverlap) autoAssignIds.push(entry.fathom_recording_id);
                        }
                    }

                    // Process auto-assignments in parallel
                    if (autoAssignIds.length > 0) {
                        await Promise.all(autoAssignIds.map(rid =>
                            supabase.functions.invoke('ingest-fathom', {
                                body: { assign_client: { recording_id: rid, client_name: clientName }, user_email: user?.email, user_id: user?.id }
                            })
                        ));
                    }

                    // Refresh sync log (picks up both manual + auto assignments)
                    const { data: logData } = await supabase.from('fathom_sync_log').select('*').order('synced_at', { ascending: false }).limit(100);
                    if (logData) setSyncLog(logData);

                    // Refresh name mappings (edge function saves new ones on assign)
                    const { data: nmData } = await supabase.from('client_participant_names').select('*').order('client_name', { ascending: true });
                    if (nmData) setNameMappings(nmData);

                    // Find the newly created meeting — try multiple strategies
                    let meetingDate = null;
                    const updatedEntry = logData?.find(l => l.fathom_recording_id === recordingId);
                    if (updatedEntry?.meeting_note_id) {
                        const { data: m } = await supabase.from('meeting_notes').select('meeting_date').eq('id', updatedEntry.meeting_note_id).maybeSingle();
                        if (m?.meeting_date) meetingDate = m.meeting_date;
                    }
                    if (!meetingDate) {
                        const { data: matches } = await supabase.from('meeting_notes').select('meeting_date').eq('external_id', recordingId).order('created_at', { ascending: false }).limit(1);
                        if (matches?.[0]?.meeting_date) meetingDate = matches[0].meeting_date;
                    }
                    if (!meetingDate) {
                        const { data: recent } = await supabase.from('meeting_notes').select('meeting_date').eq('client_name', clientName).order('created_at', { ascending: false }).limit(1);
                        if (recent?.[0]?.meeting_date) meetingDate = recent[0].meeting_date;
                    }
                    if (meetingDate) {
                        const md = new Date(meetingDate);
                        const meetMonth = md.getMonth();
                        const meetYear = md.getFullYear();
                        if (meetMonth !== selMonth || meetYear !== selYear) {
                            setSelMonth(meetMonth);
                            setSelYear(meetYear);
                        } else {
                            await refreshMeetings();
                        }
                    } else {
                        const { data: mData } = await supabase.from('meeting_notes').select('*').gte('meeting_date', startDate).lte('meeting_date', endDate).order('meeting_date', { ascending: false });
                        if (mData) setMeetings(mData);
                    }
                    // Update sync result entries in-place if present
                    const allAssignedIds = [recordingId, ...autoAssignIds];
                    if (syncResult?.results) {
                        setSyncResult(prev => ({
                            ...prev,
                            results: prev.results.map(r => allAssignedIds.includes(r.recording_id) ? { ...r, status: 'processed', client_name: clientName } : r)
                        }));
                    }
                    // Notify user of auto-assignments
                    if (autoAssignIds.length > 0) {
                        const autoNames = autoAssignIds.map(rid => { const e = syncLog.find(l => l.fathom_recording_id === rid); return e?.fathom_title || rid; });
                        alert(`Auto-assigned ${autoAssignIds.length} other meeting${autoAssignIds.length > 1 ? 's' : ''} with the same participants to ${clientName}:\n\n${autoNames.join('\n')}`);
                    }
                } catch (e) { alert('Assignment failed: ' + e.message); }
                setAssigningId(null);
            };

            // Undo a client assignment — revert sync log to unmatched, delete the meeting note
            const [undoingId, setUndoingId] = React.useState(null);
            const unassignClient = async (recordingId) => {
                if (!recordingId) return;
                if (!confirm('Undo this assignment? The meeting note will be deleted and the recording will go back to unmatched.')) return;
                setUndoingId(recordingId);
                try {
                    const entry = syncLog.find(l => l.fathom_recording_id === recordingId);
                    // Delete the meeting note if it exists
                    if (entry?.meeting_note_id) {
                        await supabase.from('meeting_notes').delete().eq('id', entry.meeting_note_id);
                    } else {
                        // Fallback: delete by external_id
                        await supabase.from('meeting_notes').delete().eq('external_id', recordingId);
                    }
                    // Delete any auto-created notes/activity for this meeting
                    if (entry?.client_name) {
                        const meetDate = entry.processed_at || entry.synced_at;
                        if (meetDate) {
                            await supabase.from('client_notes').delete().eq('client_name', entry.client_name).like('note_text', `%[Fathom%`).gte('created_at', new Date(new Date(meetDate).getTime() - 60000).toISOString()).lte('created_at', new Date(new Date(meetDate).getTime() + 60000).toISOString());
                            await supabase.from('activity_log').delete().eq('client_name', entry.client_name).eq('action', 'Fathom meeting auto-imported').gte('created_at', new Date(new Date(meetDate).getTime() - 60000).toISOString()).lte('created_at', new Date(new Date(meetDate).getTime() + 60000).toISOString());
                        }
                    }
                    // Reset sync log entry to unmatched — restore original metadata
                    const origMeta = { reason: 'Could not match to a client. Add email domain mapping in Fathom Settings.' };
                    try {
                        const meta = JSON.parse(entry?.error_message || '{}');
                        if (meta.meeting_date) origMeta.meeting_date = meta.meeting_date;
                        if (meta.participant_names) origMeta.participant_names = meta.participant_names;
                        if (meta.participants) origMeta.participants = meta.participants;
                    } catch {}
                    await supabase.from('fathom_sync_log').update({
                        status: 'unmatched',
                        client_name: null,
                        meeting_note_id: null,
                        processed_at: null,
                        error_message: JSON.stringify(origMeta),
                    }).eq('fathom_recording_id', recordingId);
                    // Refresh sync log + meetings
                    const { data: logData } = await supabase.from('fathom_sync_log').select('*').order('synced_at', { ascending: false }).limit(100);
                    if (logData) setSyncLog(logData);
                    await refreshMeetings();
                } catch (e) { alert('Undo failed: ' + e.message); }
                setUndoingId(null);
            };

            // Fetch meetings for selected month (filtered by team member if selected)
            useEffect(() => {
                const load = async () => {
                    setLoading(true);
                    let query = supabase
                        .from('meeting_notes')
                        .select('*')
                        .gte('meeting_date', startDate)
                        .lte('meeting_date', endDate);
                    if (selectedTeamMember) {
                        query = query.eq('user_email', selectedTeamMember);
                    }
                    const { data } = await query.order('meeting_date', { ascending: false });
                    setMeetings(data || []);
                    setLoading(false);
                };
                load();
            }, [startDate, endDate, selectedTeamMember]);

            // Helpers
            const getExtra = (m) => {
                if (!m.ad_performance_notes) return {};
                try { return typeof m.ad_performance_notes === 'string' ? JSON.parse(m.ad_performance_notes) : m.ad_performance_notes; } catch { return {}; }
            };
            const safe = (v) => { if (v == null) return ''; if (typeof v === 'string') return v; try { return JSON.stringify(v); } catch { return String(v); } };
            const toArr = (v) => { if (!v) return []; if (Array.isArray(v)) return v; try { const p = JSON.parse(v); return Array.isArray(p) ? p : []; } catch { return []; } };
            const pick = (...sources) => { for (const s of sources) { const a = toArr(s); if (a.length) return a; } return []; };
            const sentimentStyle = (s) => { if (['positive','excited'].includes(s)) return 'bg-emerald-500/20 text-emerald-400'; if (['negative','frustrated'].includes(s)) return 'bg-red-500/20 text-red-400'; if (s === 'concerned') return 'bg-amber-500/20 text-amber-400'; return 'bg-slate-500/20 text-slate-400'; };
            const riskBorder = (l) => { if (l === 'high') return 'border-l-4 border-red-500'; if (l === 'medium') return 'border-l-4 border-amber-500'; return 'border-l-4 border-emerald-500'; };
            const riskBadge = (l) => { if (l === 'high') return 'bg-red-500/20 text-red-400'; if (l === 'medium') return 'bg-amber-500/20 text-amber-400'; return 'bg-emerald-500/20 text-emerald-400'; };

            // Filter
            const filtered = meetings.filter(m => {
                const matchSearch = !searchQuery || [m.meeting_title, m.meeting_type, m.summary, m.client_name, m.transcript].some(f => f && f.toLowerCase().includes(searchQuery.toLowerCase()));
                const matchClient = !filterClient || m.client_name === filterClient;
                return matchSearch && matchClient;
            });

            // Group by client
            const byClient = filtered.reduce((acc, m) => { const c = m.client_name || 'Unknown'; if (!acc[c]) acc[c] = []; acc[c].push(m); return acc; }, {});
            const clientNames = [...new Set(meetings.map(m => m.client_name).filter(Boolean))].sort();

            // Stats
            const stats = {
                total: meetings.length,
                clients: new Set(meetings.map(m => m.client_name).filter(Boolean)).size,
                fathom: meetings.filter(m => m.source && m.source !== 'manual').length,
                manual: meetings.filter(m => !m.source || m.source === 'manual').length,
                withActions: meetings.filter(m => { const e = getExtra(m); return (toArr(m.action_items).length + toArr(e.actionItems).length) > 0; }).length,
            };

            // Aggregate all action items
            const allActionItems = useMemo(() => {
                const items = [];
                filtered.forEach(m => {
                    const e = getExtra(m);
                    const title = safe(m.meeting_title || e.title || m.meeting_type || 'Meeting');
                    const ais = pick(m.action_items, e.actionItems);
                    ais.forEach(ai => items.push({ meeting: title, client: m.client_name, date: m.meeting_date, ...(typeof ai === 'string' ? { task: ai } : ai) }));
                });
                const order = { high: 0, medium: 1, low: 2 };
                items.sort((a, b) => (order[a.priority] ?? 2) - (order[b.priority] ?? 2));
                return items;
            }, [filtered]);

            // Get active sub-tab for a meeting
            const getMeetingTab = (id) => activeTab[id] || 'summary';
            const setMeetingTab = (id, tab) => setActiveTab(prev => ({ ...prev, [id]: tab }));

            // ====== Render a single meeting card ======
            const renderMeeting = (m) => {
                const e = getExtra(m);
                const title = safe(m.meeting_title || e.title || m.meeting_type || 'Meeting');
                const summary = safe(m.summary || e.summary || 'No summary available');
                const risk = safe(m.risk_level || e.riskLevel || 'medium');
                const sentiment = safe(m.client_sentiment || e.clientSentiment || 'neutral');
                const actionItems = pick(m.action_items, e.actionItems);
                const participants = pick(m.participants, e.participants);
                const duration = m.duration || e.duration;
                const source = m.source || 'manual';
                const isOpen = expandedId === m.id;
                const subTab = getMeetingTab(m.id);

                return (
                    <div key={m.id} className={`bg-dark-800 rounded-xl overflow-hidden ${riskBorder(risk)} transition-all`}>
                        {/* Header */}
                        <div className="p-4 cursor-pointer hover:bg-dark-700/50 transition-colors" onClick={() => setExpandedId(isOpen ? null : m.id)}>
                            <div className="flex flex-wrap justify-between items-start gap-2">
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <span className="text-white font-semibold truncate">{title}</span>
                                        <span className="text-slate-500 text-sm">{new Date(m.meeting_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                                        {m.client_name && <span className="px-2 py-0.5 rounded bg-brand-purple/20 text-brand-purple text-xs">{m.client_name}</span>}
                                    </div>
                                    <p className="text-slate-400 text-sm mt-1" style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{summary}</p>
                                </div>
                                <div className="flex items-center gap-2 shrink-0">
                                    <span className={`px-2 py-1 rounded text-xs ${sentimentStyle(sentiment)}`}>{sentiment}</span>
                                    <span className={`px-2 py-1 rounded text-xs font-medium ${riskBadge(risk)}`}>{risk}</span>
                                    <span className={`text-slate-600 text-xs transition-transform ${isOpen ? 'rotate-180' : ''}`}>&#9660;</span>
                                </div>
                            </div>
                            <div className="flex flex-wrap items-center gap-4 mt-2 text-xs text-slate-500">
                                {!selectedTeamMember && m.user_email && <span className="text-slate-400">{getDisplayName(m.user_email)}</span>}
                                {source !== 'manual' && <span className="px-1.5 py-0.5 rounded bg-brand-cyan/20 text-brand-cyan text-[10px] font-medium">Fathom</span>}
                                {duration && <span>&#9201; {safe(duration)}</span>}
                                {participants.length > 0 && <span>&#128101; {participants.length} participants</span>}
                                {actionItems.length > 0 && <span>&#9989; {actionItems.length} action items</span>}
                            </div>
                        </div>

                        {/* Expanded Detail */}
                        {isOpen && (
                            <div className="border-t border-dark-700">
                                {/* Sub-tabs */}
                                <div className="flex border-b border-dark-700">
                                    {[
                                        { id: 'summary', label: 'AI Summary' },
                                        { id: 'actions', label: `Action Items${actionItems.length ? ` (${actionItems.length})` : ''}` },
                                        { id: 'transcript', label: 'Transcript' },
                                        { id: 'details', label: 'Details' },
                                    ].map(t => (
                                        <button key={t.id} onClick={(ev) => { ev.stopPropagation(); setMeetingTab(m.id, t.id); }}
                                            className={`px-4 py-2.5 text-xs font-medium transition-colors ${subTab === t.id ? 'text-brand-cyan border-b-2 border-brand-cyan' : 'text-slate-500 hover:text-slate-300'}`}>
                                            {t.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-4 space-y-4">
                                    {/* ---- AI SUMMARY ---- */}
                                    {subTab === 'summary' && (() => {
                                        const keyPoints = pick(m.key_points, e.keyPoints);
                                        const decisions = pick(m.decisions, e.decisions);
                                        const topics = pick(m.topics, e.topics);
                                        const concerns = pick(m.concerns, e.concerns);
                                        const riskFactors = pick(m.risk_factors, e.riskFactors);
                                        const warningSignals = pick(m.warning_signals, e.warningSignals);
                                        const positiveSignals = pick(m.positive_signals, e.positiveSignals);
                                        const sentExpl = m.sentiment_explanation || e.sentimentExplanation;
                                        return (
                                            <div className="space-y-4">
                                                <div>
                                                    <h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide mb-2">Summary</h4>
                                                    <p className="text-slate-300 text-sm leading-relaxed">{summary}</p>
                                                </div>
                                                {(participants.length > 0 || duration) && (
                                                    <div className="flex flex-wrap gap-4">
                                                        {participants.length > 0 && <div><span className="text-slate-500 text-xs">Participants</span><div className="flex flex-wrap gap-1 mt-1">{participants.map((p,i) => <span key={i} className="px-2 py-1 rounded text-xs bg-dark-700 text-slate-300">{safe(p)}</span>)}</div></div>}
                                                        {duration && <div><span className="text-slate-500 text-xs">Duration</span><div className="text-slate-300 text-sm mt-1">{safe(duration)}</div></div>}
                                                    </div>
                                                )}
                                                {topics.length > 0 && <div><span className="text-slate-500 text-xs">Topics Discussed</span><div className="flex flex-wrap gap-1 mt-1">{topics.map((t,i) => <span key={i} className="px-2 py-1 rounded text-xs bg-purple-500/20 text-purple-400">{safe(t)}</span>)}</div></div>}
                                                {keyPoints.length > 0 && <div><h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide mb-2">Key Points</h4><ul className="space-y-1.5">{keyPoints.map((kp,i) => <li key={i} className="flex gap-2 text-sm text-slate-300"><span className="text-brand-cyan mt-0.5 shrink-0">-</span><span>{safe(kp)}</span></li>)}</ul></div>}
                                                {decisions.length > 0 && <div><h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide mb-2">Decisions Made</h4><ul className="space-y-1.5">{decisions.map((d,i) => <li key={i} className="flex gap-2 text-sm text-slate-300"><span className="text-emerald-400 mt-0.5 shrink-0">&#10003;</span><span>{safe(d)}</span></li>)}</ul></div>}
                                                {sentExpl && <div className="p-3 bg-dark-700 rounded-lg"><span className="text-slate-500 text-xs">Client Sentiment</span><div className="flex items-center gap-2 mt-1"><span className={`px-2 py-0.5 rounded text-xs ${sentimentStyle(sentiment)}`}>{sentiment}</span><span className="text-slate-400 text-xs italic">{safe(sentExpl)}</span></div></div>}
                                                {positiveSignals.length > 0 && <div className="p-3 bg-emerald-500/10 rounded-lg"><span className="text-emerald-400 text-xs font-medium">Positive Signals</span><ul className="mt-1.5 space-y-1">{positiveSignals.map((p,i) => <li key={i} className="text-emerald-300 text-xs">+ {safe(p)}</li>)}</ul></div>}
                                                {(concerns.length > 0 || riskFactors.length > 0 || warningSignals.length > 0) && <div className="p-3 bg-red-500/10 rounded-lg"><span className="text-red-400 text-xs font-medium">Concerns & Risks</span><ul className="mt-1.5 space-y-1">{concerns.map((c,i) => <li key={`c${i}`} className="text-red-300 text-xs">- {safe(c)}</li>)}{riskFactors.map((r,i) => <li key={`r${i}`} className="text-amber-300 text-xs">- {safe(r)}</li>)}{warningSignals.map((w,i) => <li key={`w${i}`} className="text-amber-300 text-xs">- {safe(w)}</li>)}</ul></div>}
                                            </div>
                                        );
                                    })()}

                                    {/* ---- ACTION ITEMS ---- */}
                                    {subTab === 'actions' && (() => {
                                        const nextSteps = pick(m.next_steps, e.nextSteps);
                                        const followUpItems = pick(e.followUpItems);
                                        const clientRequests = pick(e.clientRequests);
                                        return (
                                            <div className="space-y-4">
                                                {actionItems.length === 0 ? <p className="text-slate-500 text-sm text-center py-6">No action items recorded.</p> : (
                                                    <div className="space-y-2">
                                                        <h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide">Action Items</h4>
                                                        {actionItems.map((ai, i) => {
                                                            const isStr = typeof ai === 'string';
                                                            const item = isStr ? { task: ai } : (ai || {});
                                                            return (
                                                                <div key={i} className={`p-3 rounded-lg ${item.priority === 'high' ? 'bg-red-500/10 border border-red-500/20' : item.priority === 'medium' ? 'bg-amber-500/10 border border-amber-500/20' : 'bg-dark-700'}`}>
                                                                    <div className="flex items-start gap-3">
                                                                        <div className="w-5 h-5 rounded border border-slate-600 shrink-0 mt-0.5"></div>
                                                                        <div className="flex-1">
                                                                            <div className="text-slate-300 text-sm">{safe(item.task || ai)}</div>
                                                                            <div className="flex items-center gap-3 mt-1.5">
                                                                                {item.owner && <span className="text-slate-500 text-xs">Owner: {safe(item.owner)}</span>}
                                                                                {item.deadline && <span className="text-slate-500 text-xs">Due: {safe(item.deadline)}</span>}
                                                                                {item.priority && <span className={`px-2 py-0.5 rounded text-[10px] font-medium ${riskBadge(item.priority)}`}>{item.priority}</span>}
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                                {nextSteps.length > 0 && <div><h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide mb-2">Next Steps</h4><ol className="space-y-1.5">{nextSteps.map((ns,i) => <li key={i} className="flex gap-2 text-sm text-slate-300"><span className="text-brand-purple font-medium shrink-0">{i+1}.</span><span>{safe(ns)}</span></li>)}</ol></div>}
                                                {followUpItems.length > 0 && <div><h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide mb-2">Follow-up Items</h4><ul className="space-y-1.5">{followUpItems.map((f,i) => <li key={i} className="flex gap-2 text-sm text-slate-300"><span className="text-amber-400 shrink-0">-</span><span>{safe(f)}</span></li>)}</ul></div>}
                                                {clientRequests.length > 0 && <div><h4 className="text-brand-cyan text-xs font-semibold uppercase tracking-wide mb-2">Client Requests</h4><ul className="space-y-1.5">{clientRequests.map((r,i) => <li key={i} className="flex gap-2 text-sm text-slate-300"><span className="text-brand-cyan shrink-0">-</span><span>{safe(r)}</span></li>)}</ul></div>}
                                            </div>
                                        );
                                    })()}

                                    {/* ---- TRANSCRIPT ---- */}
                                    {subTab === 'transcript' && (
                                        m.transcript
                                            ? <div className="bg-dark-700 rounded-lg p-4 max-h-[400px] overflow-y-auto scrollbar"><pre className="text-slate-400 text-sm whitespace-pre-wrap font-sans leading-relaxed">{m.transcript}</pre></div>
                                            : <p className="text-slate-500 text-sm text-center py-6">No transcript available.</p>
                                    )}

                                    {/* ---- DETAILS ---- */}
                                    {subTab === 'details' && (
                                        <div className="space-y-3">
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="bg-dark-700 rounded-lg p-3"><span className="text-slate-500 text-xs">Client</span><div className="text-white text-sm mt-0.5">{m.client_name || 'Unknown'}</div></div>
                                                <div className="bg-dark-700 rounded-lg p-3"><span className="text-slate-500 text-xs">Date</span><div className="text-white text-sm mt-0.5">{new Date(m.meeting_date).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })}</div></div>
                                                <div className="bg-dark-700 rounded-lg p-3"><span className="text-slate-500 text-xs">Source</span><div className="text-sm mt-0.5">{source !== 'manual' ? <span className="text-brand-cyan">{source === 'fathom_webhook' ? 'Fathom (Live)' : 'Fathom (Sync)'}</span> : <span className="text-slate-400">Manual Entry</span>}</div></div>
                                                <div className="bg-dark-700 rounded-lg p-3"><span className="text-slate-500 text-xs">Risk Level</span><div className="mt-0.5"><span className={`px-2 py-0.5 rounded text-xs font-medium ${riskBadge(risk)}`}>{risk}</span></div></div>
                                                {duration && <div className="bg-dark-700 rounded-lg p-3"><span className="text-slate-500 text-xs">Duration</span><div className="text-white text-sm mt-0.5">{safe(duration)}</div></div>}
                                                <div className="bg-dark-700 rounded-lg p-3"><span className="text-slate-500 text-xs">Sentiment</span><div className="mt-0.5"><span className={`px-2 py-0.5 rounded text-xs ${sentimentStyle(sentiment)}`}>{sentiment}</span></div></div>
                                            </div>
                                            {e.fathomUrl && <a href={e.fathomUrl} target="_blank" rel="noopener noreferrer" className="inline-block text-sm text-brand-cyan hover:text-brand-purple transition-colors">Open in Fathom &rarr;</a>}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            if (loading) return <div className="flex items-center justify-center py-20"><div className="text-center"><div className="text-4xl mb-4 animate-pulse">&#128260;</div><p className="text-slate-400 text-sm">Loading meetings...</p></div></div>;

            return (
                <div className="max-w-6xl mx-auto space-y-6">
                    {/* Header */}
                    <div className="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-white">🎙️ Fathom Meetings</h1>
                            <p className="text-slate-400 text-sm mt-1">{monthLabel}</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <select value={`${selYear}-${selMonth}`} onChange={e => { const [y,m] = e.target.value.split('-').map(Number); setSelYear(y); setSelMonth(m); }} className="bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-slate-300">
                                {monthOptions.map(o => <option key={o.label} value={`${o.year}-${o.month}`}>{o.label}</option>)}
                            </select>
                            <button onClick={async () => { setLoading(true); await refreshMeetings(); setLoading(false); }} className="px-3 py-2 bg-dark-800 hover:bg-dark-700 text-slate-300 rounded-lg text-sm transition-colors">Refresh</button>
                            <button onClick={() => setShowSyncPanel(!showSyncPanel)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${showSyncPanel ? 'bg-brand-cyan text-dark-900' : 'bg-brand-cyan/20 text-brand-cyan hover:bg-brand-cyan/30'}`}>Sync from Fathom</button>
                            <button onClick={() => setShowMappings(!showMappings)} className={`px-3 py-2 rounded-lg text-sm transition-colors ${showMappings ? 'bg-brand-purple text-white' : 'bg-dark-800 hover:bg-dark-700 text-slate-300'}`}>Settings</button>
                        </div>
                    </div>

                    {/* Sync Panel */}
                    {showSyncPanel && (
                        <div className="card p-6 space-y-4">
                            <div className="flex items-center justify-between">
                                <h3 className="text-lg font-semibold text-white">Sync Meetings from Fathom</h3>
                                <button onClick={() => setShowSyncPanel(false)} className="text-slate-500 hover:text-slate-300">✕</button>
                            </div>
                            <p className="text-slate-400 text-sm">Pull all meetings from your Fathom account. Meetings are matched to clients using your email domain mappings below. Already-synced meetings are skipped automatically.</p>
                            <div className="flex flex-wrap items-center gap-3">
                                <span className="text-slate-400 text-sm">Lookback period:</span>
                                <div className="flex rounded-lg overflow-hidden border border-dark-700">
                                    {[{ id: '1h', label: '1 Hour' }, { id: '24h', label: '24 Hours' }, { id: '7d', label: '7 Days' }, { id: '30d', label: '30 Days' }, { id: '90d', label: '90 Days' }].map(opt => (
                                        <button key={opt.id} onClick={() => setSyncLookback(opt.id)} className={`px-3 py-1.5 text-xs font-medium transition-colors ${syncLookback === opt.id ? 'bg-brand-cyan/20 text-brand-cyan' : 'bg-dark-800 text-slate-400 hover:text-slate-300'}`}>{opt.label}</button>
                                    ))}
                                </div>
                                <button onClick={runSync} disabled={syncing} className={`px-6 py-2 rounded-lg text-sm font-semibold transition-colors ${syncing ? 'bg-dark-700 text-slate-500 cursor-not-allowed' : 'bg-brand-cyan text-dark-900 hover:bg-brand-cyan/80'}`}>
                                    {syncing ? 'Syncing...' : 'Sync Now'}
                                </button>
                            </div>

                            {/* Sync Result */}
                            {syncResult && (
                                <div className={`p-4 rounded-lg ${syncResult.error ? 'bg-red-500/10 border border-red-500/20' : 'bg-emerald-500/10 border border-emerald-500/20'}`}>
                                    {syncResult.error ? (
                                        <div className="text-red-400 text-sm"><strong>Error:</strong> {syncResult.error}</div>
                                    ) : (
                                        <div>
                                            <div className="text-emerald-400 text-sm font-medium">{syncResult.message}</div>
                                            {syncResult.results && syncResult.results.length > 0 && (
                                                <div className="mt-2 space-y-1 max-h-[200px] overflow-y-auto scrollbar">
                                                    {syncResult.results.map((r, i) => (
                                                        <div key={i} className="flex items-center gap-2 text-xs">
                                                            <span className={`px-1.5 py-0.5 rounded shrink-0 ${r.status === 'processed' ? 'bg-emerald-500/20 text-emerald-400' : r.status === 'unmatched' ? 'bg-amber-500/20 text-amber-400' : r.status === 'skipped_duplicate' ? 'bg-slate-500/20 text-slate-400' : 'bg-red-500/20 text-red-400'}`}>{r.status}</span>
                                                            <span className="text-slate-300 truncate shrink-0" style={{maxWidth: '200px'}}>{r.title}</span>
                                                            {r.participants && r.participants.length > 0 && <span className="text-brand-cyan truncate" style={{maxWidth: '300px'}}>{r.participants.join(', ')}</span>}
                                                            {r.client_name && <span className="text-brand-purple shrink-0">→ {r.client_name}</span>}
                                                            {r.status === 'unmatched' && (
                                                                <div className="flex items-center gap-1 shrink-0 ml-auto">
                                                                    {allClientNames.length > 0 ? (
                                                                        <select value={selectedClients[r.recording_id] || ''} onChange={e => setSelectedClients(prev => ({ ...prev, [r.recording_id]: e.target.value }))} className="bg-dark-700 border border-dark-600 rounded px-1.5 py-0.5 text-xs text-slate-300 max-w-[140px]">
                                                                            <option value="">Select client...</option>
                                                                            {allClientNames.map(c => <option key={c} value={c}>{c}</option>)}
                                                                        </select>
                                                                    ) : (
                                                                        <input type="text" value={customClientInput[r.recording_id] || ''} onChange={e => { setCustomClientInput(prev => ({ ...prev, [r.recording_id]: e.target.value })); setSelectedClients(prev => ({ ...prev, [r.recording_id]: e.target.value })); }} placeholder="Client name..." className="bg-dark-700 border border-dark-600 rounded px-1.5 py-0.5 text-xs text-slate-300 w-[120px]" />
                                                                    )}
                                                                    <button onClick={() => assignClient(r.recording_id, selectedClients[r.recording_id])} disabled={!selectedClients[r.recording_id] || assigningId === r.recording_id} className={`px-2 py-0.5 rounded text-xs font-medium transition-colors ${assigningId === r.recording_id ? 'bg-dark-600 text-slate-500 cursor-not-allowed' : selectedClients[r.recording_id] ? 'bg-brand-purple/20 text-brand-purple hover:bg-brand-purple/30' : 'bg-dark-600 text-slate-500 cursor-not-allowed'}`}>
                                                                        {assigningId === r.recording_id ? 'Assigning...' : 'Assign'}
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Recent Sync Log */}
                            {syncLog.length > 0 && (
                                <div>
                                    <h4 className="text-sm font-medium text-slate-400 mb-2">Recent Sync History</h4>
                                    <div className="space-y-1 max-h-[200px] overflow-y-auto scrollbar">
                                        {syncLog.filter(l => !selectedTeamMember || l.user_email === selectedTeamMember).map(l => {
                                            let logParticipants = [];
                                            try { const meta = JSON.parse(l.error_message || '{}'); logParticipants = meta.participants || []; } catch {}
                                            return (
                                            <div key={l.id} className="flex items-center gap-2 text-xs py-1">
                                                <span className={`px-1.5 py-0.5 rounded shrink-0 ${l.status === 'processed' ? 'bg-emerald-500/20 text-emerald-400' : l.status === 'unmatched' ? 'bg-amber-500/20 text-amber-400' : l.status === 'pending' ? 'bg-blue-500/20 text-blue-400' : 'bg-red-500/20 text-red-400'}`}>{l.status}</span>
                                                <span className="text-slate-300 truncate shrink-0" style={{maxWidth: '200px'}}>{l.fathom_title || l.fathom_recording_id}</span>
                                                {logParticipants.length > 0 && <span className="text-brand-cyan truncate" style={{maxWidth: '300px'}}>{logParticipants.join(', ')}</span>}
                                                {l.client_name && <span className="text-brand-purple shrink-0">{l.client_name}</span>}
                                                {l.status === 'processed' && (
                                                    <button onClick={() => unassignClient(l.fathom_recording_id)} disabled={undoingId === l.fathom_recording_id} className={`px-1.5 py-0.5 rounded text-xs shrink-0 transition-colors ${undoingId === l.fathom_recording_id ? 'bg-dark-600 text-slate-500 cursor-not-allowed' : 'bg-red-500/10 text-red-400 hover:bg-red-500/20'}`}>
                                                        {undoingId === l.fathom_recording_id ? 'Undoing...' : 'Undo'}
                                                    </button>
                                                )}
                                                {l.status === 'unmatched' && (
                                                    <div className="flex items-center gap-1 shrink-0">
                                                        {allClientNames.length > 0 ? (
                                                            <select value={selectedClients[l.fathom_recording_id] || ''} onChange={e => setSelectedClients(prev => ({ ...prev, [l.fathom_recording_id]: e.target.value }))} className="bg-dark-700 border border-dark-600 rounded px-1.5 py-0.5 text-xs text-slate-300 max-w-[140px]">
                                                                <option value="">Select client...</option>
                                                                {allClientNames.map(c => <option key={c} value={c}>{c}</option>)}
                                                            </select>
                                                        ) : (
                                                            <input type="text" value={customClientInput[l.fathom_recording_id] || ''} onChange={e => { setCustomClientInput(prev => ({ ...prev, [l.fathom_recording_id]: e.target.value })); setSelectedClients(prev => ({ ...prev, [l.fathom_recording_id]: e.target.value })); }} placeholder="Client name..." className="bg-dark-700 border border-dark-600 rounded px-1.5 py-0.5 text-xs text-slate-300 w-[120px]" />
                                                        )}
                                                        <button onClick={() => assignClient(l.fathom_recording_id, selectedClients[l.fathom_recording_id])} disabled={!selectedClients[l.fathom_recording_id] || assigningId === l.fathom_recording_id} className={`px-2 py-0.5 rounded text-xs font-medium transition-colors ${assigningId === l.fathom_recording_id ? 'bg-dark-600 text-slate-500 cursor-not-allowed' : selectedClients[l.fathom_recording_id] ? 'bg-brand-purple/20 text-brand-purple hover:bg-brand-purple/30' : 'bg-dark-600 text-slate-500 cursor-not-allowed'}`}>
                                                            {assigningId === l.fathom_recording_id ? 'Assigning...' : 'Assign'}
                                                        </button>
                                                    </div>
                                                )}
                                                <span className="text-slate-600 shrink-0">{l.synced_at ? new Date(l.synced_at).toLocaleDateString() : ''}</span>
                                            </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Domain Mappings Panel */}
                    {showMappings && (
                        <div className="card p-6 space-y-4">
                            <div className="flex items-center justify-between">
                                <h3 className="text-lg font-semibold text-white">Email Domain → Client Mappings</h3>
                                <button onClick={() => setShowMappings(false)} className="text-slate-500 hover:text-slate-300">✕</button>
                            </div>
                            <p className="text-slate-400 text-sm">Map email domains (e.g. "acmecorp.com") or specific emails to client names. When Fathom syncs a meeting, it matches attendee emails against these mappings to assign the meeting to the correct client.</p>
                            <div className="flex flex-wrap gap-2">
                                <input value={newDomain} onChange={e => setNewDomain(e.target.value)} placeholder="Email or domain (e.g. acme.com)" className="flex-1 min-w-[180px] bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500" />
                                <input value={newClientName} onChange={e => setNewClientName(e.target.value)} placeholder="Client name" className="flex-1 min-w-[150px] bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500" />
                                <button onClick={addMapping} className="px-4 py-2 bg-brand-purple text-white rounded-lg text-sm font-medium hover:bg-brand-purple/80 transition-colors">Add Mapping</button>
                            </div>
                            {domainMappings.length === 0 ? (
                                <p className="text-slate-500 text-sm text-center py-4">No mappings configured yet. Add email domains above to auto-match Fathom meetings to clients.</p>
                            ) : (
                                <div className="space-y-1">
                                    {domainMappings.map(m => (
                                        <div key={m.id} className="flex items-center justify-between gap-2 py-2 px-3 bg-dark-800 rounded-lg">
                                            <div className="flex items-center gap-3 text-sm">
                                                <span className="text-brand-cyan font-mono">{m.domain}</span>
                                                <span className="text-slate-600">→</span>
                                                <span className="text-white">{m.client_name}</span>
                                            </div>
                                            <button onClick={() => removeMapping(m.id)} className="text-slate-500 hover:text-red-400 text-xs transition-colors">Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Learned Name Mappings (shown alongside domain mappings) */}
                    {showMappings && nameMappings.length > 0 && (
                        <div className="card p-6 space-y-4">
                            <h3 className="text-lg font-semibold text-white">Learned Name Mappings</h3>
                            <p className="text-slate-400 text-sm">These name-to-client mappings were automatically learned when you manually assigned meetings. Future meetings with these participants will be auto-matched.</p>
                            <div className="space-y-1">
                                {nameMappings.map(m => (
                                    <div key={m.id} className="flex items-center justify-between gap-2 py-2 px-3 bg-dark-800 rounded-lg">
                                        <div className="flex items-center gap-3 text-sm">
                                            <span className="text-brand-purple font-mono">{m.participant_name}</span>
                                            <span className="text-slate-600">&rarr;</span>
                                            <span className="text-white">{m.client_name}</span>
                                        </div>
                                        <button onClick={() => removeNameMapping(m.id)} className="text-slate-500 hover:text-red-400 text-xs transition-colors">Remove</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Stats */}
                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
                        {[
                            { label: 'Total Meetings', value: stats.total, color: 'text-white' },
                            { label: 'Clients', value: stats.clients, color: 'text-brand-cyan' },
                            { label: 'Fathom Synced', value: stats.fathom, color: 'text-brand-purple' },
                            { label: 'Manual', value: stats.manual, color: 'text-slate-400' },
                            { label: 'With Action Items', value: stats.withActions, color: 'text-amber-400' },
                        ].map(s => <div key={s.label} className="bg-dark-800 rounded-xl p-4 text-center"><div className={`text-2xl font-bold ${s.color}`}>{s.value}</div><div className="text-xs text-slate-500 mt-1">{s.label}</div></div>)}
                    </div>

                    {/* Controls */}
                    <div className="flex flex-wrap items-center gap-3">
                        <div className="flex rounded-lg overflow-hidden border border-dark-700">
                            {[{ id: 'timeline', label: 'Timeline' }, { id: 'by-client', label: 'By Client' }, { id: 'actions', label: 'Action Items' }].map(mode => (
                                <button key={mode.id} onClick={() => setViewMode(mode.id)} className={`px-4 py-2 text-xs font-medium transition-colors ${viewMode === mode.id ? 'bg-brand-cyan/20 text-brand-cyan' : 'bg-dark-800 text-slate-400 hover:text-slate-300'}`}>{mode.label}</button>
                            ))}
                        </div>
                        <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search meetings..." className="flex-1 min-w-[200px] bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500" />
                        <select value={filterClient} onChange={e => setFilterClient(e.target.value)} className="bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-slate-300">
                            <option value="">All Clients</option>
