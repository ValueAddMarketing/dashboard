        // ========== BILLING AI CHAT ==========
        const BillingAIChat = ({ data }) => {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const buildContext = () => {
                const rows = data.map(c => ({
                    client: c.client,
                    teamMember: c.teamMember || '—',
                    paidDate: c.paidDate ? c.paidDate.toISOString().split('T')[0] : null,
                    firstSpendDate: c.firstSpendDate ? c.firstSpendDate.toISOString().split('T')[0] : null,
                    adLiveDate: c.adLiveDate ? c.adLiveDate.toISOString().split('T')[0] : null,
                    setupDays: c.launchSetupDays,
                    activeDays: c.activeDays,
                    inactiveDays: c.inactiveDays,
                    recordedPauseDays: c.recordedOnPause,
                    discrepancy: c.discrepancy,
                    severity: c.severity,
                    billingCycle: c.billingCycle || '—',
                    correctedBillingStart: c.correctedBillingStart ? c.correctedBillingStart.toISOString().split('T')[0] : null,
                    hasMetaData: c.hasMetaData
                }));
                return JSON.stringify(rows, null, 2);
            };

            const handleSend = async () => {
                const q = input.trim();
                if (!q || loading) return;
                setInput('');
                const newMessages = [...messages, { role: 'user', content: q }];
                setMessages(newMessages);
                setLoading(true);

                try {
                    const systemPrompt = `You are a billing audit analyst for a marketing agency. You have access to the billing audit data for all clients. Answer questions about this data concisely and accurately. Use specific numbers and client names when relevant. Format responses with markdown when helpful.

Today's date: ${new Date().toISOString().split('T')[0]}

Here is the current billing audit data:
${buildContext()}

Column definitions:
- paidDate: Date the client paid (from Google Sheet)
- firstSpendDate: First date Meta Ads recorded actual spend > $0
- adLiveDate: Ad live date recorded in the Google Sheet
- setupDays: Days between paidDate and firstSpendDate (how long to launch)
- activeDays: Total days with Meta ad spend > $0 since first spend
- inactiveDays: Days since first spend with NO ad spend (paused/inactive)
- recordedPauseDays: Pause days recorded in the Google Sheet
- discrepancy: inactiveDays minus recordedPauseDays (unrecorded pause days)
- severity: High (7+ days off), Medium (3-6 days off), OK (0-2 days off)
- billingCycle: Billing cycle info from the Google Sheet
- correctedBillingStart: Adjusted billing start accounting for inactive days`;

                    const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));

                    const res = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: apiMessages, system: systemPrompt, max_tokens: 2000 })
                    });

                    const result = await res.json();
                    const reply = result.content?.[0]?.text || result.error || 'Sorry, I could not process that.';
                    setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: 'Error: ' + err.message }]);
                } finally {
                    setLoading(false);
                }
            };

            if (!open) {
                return (
                    <button
                        onClick={() => setOpen(true)}
                        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-brand-cyan text-dark-900 font-bold text-xl shadow-lg hover:scale-110 transition-transform z-50 flex items-center justify-center"
                        title="Ask AI about billing data"
                    >
                        AI
                    </button>
                );
            }

            return (
                <div className="fixed bottom-6 right-6 bg-dark-800 border border-dark-700 rounded-2xl shadow-2xl z-50 flex flex-col overflow-hidden" style={{width: '384px', height: '500px'}}>
                    <div className="flex items-center justify-between px-4 py-3 bg-dark-900 border-b border-dark-700">
                        <span className="text-sm font-semibold text-white">Billing AI Assistant</span>
                        <button onClick={() => setOpen(false)} className="text-slate-400 hover:text-white text-lg">&times;</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        {messages.length === 0 && (
                            <div className="text-center text-slate-500 text-sm mt-8 space-y-2">
                                <div className="text-2xl">🤖</div>
                                <div>Ask me anything about the billing data</div>
                                <div className="text-xs text-slate-600 space-y-1">
                                    <div>"Which clients have the most inactive days?"</div>
                                    <div>"Who took the longest to launch?"</div>
                                    <div>"Summarize discrepancies for Maria's clients"</div>
                                </div>
                            </div>
                        )}
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`rounded-xl px-3 py-2 text-sm whitespace-pre-wrap ${m.role === 'user' ? 'bg-brand-cyan/20 text-cyan-200' : 'bg-dark-700 text-slate-200'}`} style={{maxWidth: '85%'}}>
                                    {m.content}
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-dark-700 rounded-xl px-3 py-2 text-sm text-slate-400">Thinking...</div>
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </div>
                    <div className="p-3 border-t border-dark-700">
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSend()}
                                placeholder="Ask about billing data..."
                                className="flex-1 bg-dark-900 border border-dark-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-cyan"
                                disabled={loading}
                            />
                            <button
                                onClick={handleSend}
                                disabled={loading || !input.trim()}
                                className="px-3 py-2 bg-brand-cyan text-dark-900 rounded-lg text-sm font-semibold hover:bg-brand-cyan/80 disabled:opacity-40"
                            >
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ========== BILLING AUDIT TAB ==========
        const BillingAuditTab = ({ clients, setupData }) => {
            const [searchFilter, setSearchFilter] = useState('');
            const [filterSeverity, setFilterSeverity] = useState('');
            const [filterTeamMember, setFilterTeamMember] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: null, dir: 'desc' });
            const [dailySpend, setDailySpend] = useState({});
            const [subscriptions, setSubscriptions] = useState({ stripe: [], whop: [] });
            const [manualMappings, setManualMappings] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_billing_mappings') || '{}'); } catch { return {}; }
            });
            const [showMappingModal, setShowMappingModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [subsLoading, setSubsLoading] = useState(true);

            const getSetupInfo = (client) => {
                const name = client.client.toLowerCase().trim();
                return setupData.find(s => {
                    const sn = (s.client || '').toLowerCase().trim();
                    return sn === name || sn.includes(name) || name.includes(sn);
                });
            };

            const parseDate = (dateStr) => {
                if (!dateStr) return null;
                const d = new Date(dateStr.trim());
                return isNaN(d.getTime()) ? null : d;
            };

            const formatDateStr = (date) => {
                if (!date) return '—';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            };

            const toYMD = (date) => date ? date.toISOString().split('T')[0] : null;
            const daysBetween = (a, b) => (!a || !b) ? 0 : Math.round((b - a) / (1000 * 60 * 60 * 24));
            const addDays = (date, days) => { if (!date) return null; const r = new Date(date); r.setDate(r.getDate() + days); return r; };

            useEffect(() => {
                const clientDates = {};
                for (const s of setupData) {
                    if (!s.client) continue;
                    const adLive = s.adLiveDate || s[' Ad Live date'] || s['Ad Live date'] || '';
                    const d = parseDate(adLive);
                    const ymd = toYMD(d);
                    if (ymd) clientDates[s.client] = ymd;
                }
                if (Object.keys(clientDates).length > 0) {
                    // Check cache first (30 min)
                    const cached = localStorage.getItem('vam_daily_spend');
                    const cacheTime = localStorage.getItem('vam_daily_spend_cache_time');
                    const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                    if (cached && cacheAge < 30 * 60 * 1000) {
                        try { setDailySpend(JSON.parse(cached)); setLoading(false); return; } catch(e) {}
                    }
                    fetch('/api/meta-ads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'fetchDailySpend', clientDates })
                    })
                    .then(r => r.json())
                    .then(data => {
                        const results = data.results || {};
                        setDailySpend(results);
                        try {
                            localStorage.setItem('vam_daily_spend', JSON.stringify(results));
                            localStorage.setItem('vam_daily_spend_cache_time', Date.now().toString());
                        } catch(e) {}
                    })
                    .catch(() => {})
                    .finally(() => setLoading(false));
                } else {
                    setLoading(false);
                }
            }, [clients, setupData]);

            // Fetch Stripe + Whop subscriptions
            useEffect(() => {
                const cached = localStorage.getItem('vam_subscriptions');
                const cacheTime = localStorage.getItem('vam_subscriptions_cache_time');
                const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                if (cached && cacheAge < 30 * 60 * 1000) {
                    try { setSubscriptions(JSON.parse(cached)); setSubsLoading(false); return; } catch(e) {}
                }
                fetch('/api/billing-subscriptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'fetchAll' })
                })
                .then(r => r.json())
                .then(data => {
                    const subs = { stripe: data.stripe || [], whop: data.whop || [], fanbasis: data.fanbasis || [], errors: data.errors || [] };
                    setSubscriptions(subs);
                    try {
                        localStorage.setItem('vam_subscriptions', JSON.stringify(subs));
                        localStorage.setItem('vam_subscriptions_cache_time', Date.now().toString());
                    } catch(e) {}
                })
                .catch(() => {})
                .finally(() => setSubsLoading(false));
            }, []);

            // Match client to subscription
            const allSubs = useMemo(() => [...subscriptions.stripe, ...subscriptions.whop, ...(subscriptions.fanbasis || [])], [subscriptions]);

            const matchSubscription = (clientName) => {
                // Check manual mapping first
                if (manualMappings[clientName]) {
                    const mapped = allSubs.find(s => s.id === manualMappings[clientName]);
                    if (mapped) return mapped;
                }
                // Auto-match by name (fuzzy)
                const cn = clientName.toLowerCase().trim();
                // Exact match
                let match = allSubs.find(s => s.customerName.toLowerCase().trim() === cn);
                if (match) return match;
                // Partial match
                match = allSubs.find(s => {
                    const sn = s.customerName.toLowerCase().trim();
                    return sn && cn && (sn.includes(cn) || cn.includes(sn));
                });
                if (match) return match;
                // Match by first + last name parts
                const parts = cn.split(/\s+/);
                if (parts.length >= 2) {
                    match = allSubs.find(s => {
                        const sn = s.customerName.toLowerCase();
                        return parts.every(p => sn.includes(p));
                    });
                }
                return match || null;
            };

            const saveManualMapping = (clientName, subId) => {
                const updated = { ...manualMappings, [clientName]: subId };
                setManualMappings(updated);
                localStorage.setItem('vam_billing_mappings', JSON.stringify(updated));
                setShowMappingModal(null);
            };

            const fmtD = (date) => date ? date.toISOString().split('T')[0] : '';

            const exportCSV = (rows) => {
                const headers = ['Client','Team Member','Paid Date','First Spend Date (META)','Setup Days','Ad Live Date','Active Days (META)','Inactive Days (META)','Recorded Pause','Discrepancy','Severity','Corrected Billing Start','Sheet Billing Date','Next Billing Date (Stripe/Whop)','Billing Match','Billing Days Diff','Payment Source'];
                const csvRows = [headers.join(',')];
                for (const c of rows) {
                    const row = [
                        '"' + (c.client || '').replace(/"/g, '""') + '"',
                        '"' + (c.teamMember || '').replace(/"/g, '""') + '"',
                        fmtD(c.paidDate),
                        fmtD(c.firstSpendDate),
                        c.launchSetupDays != null ? c.launchSetupDays : '',
                        fmtD(c.adLiveDate),
                        c.hasMetaData ? c.activeDays : '',
                        c.hasMetaData ? c.inactiveDays : '',
                        c.recordedOnPause || 0,
                        c.hasMetaData ? c.discrepancy : '',
                        c.severity || '',
                        fmtD(c.correctedBillingStart),
                        fmtD(c.sheetBillingDate) || '"' + (c.billingCycle || '').replace(/"/g, '""') + '"',
                        fmtD(c.nextBillingDate),
                        c.billingMatch || '',
                        c.billingDaysDiff != null ? c.billingDaysDiff : '',
                        c.paymentSource || ''
                    ];
                    csvRows.push(row.join(','));
                }
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'billing_audit_' + new Date().toISOString().split('T')[0] + '.csv';
                a.click();
                URL.revokeObjectURL(url);
            };

            const enriched = useMemo(() => setupData.filter(s => s.client).map(s => {
                const clientName = s.client;
                const adLiveDate = parseDate(s.adLiveDate || s[' Ad Live date'] || s['Ad Live date'] || '');
                const paidDate = parseDate(s.paidDate || '');
                const billingCycle = s.billingCycle || '';
                const recordedOnPause = pn(s.adsOnPauseDays);
                let setupDaysVal = pn(s.setupDays || s['Setup Days'] || s['Setup days'] || '');
                if (!setupDaysVal && adLiveDate && paidDate) setupDaysVal = Math.max(0, daysBetween(paidDate, adLiveDate));
                const spendData = dailySpend[clientName] || [];
                const hasMetaData = spendData.length > 0;
                const firstSpendEntry = spendData.find(d => d.spend > 0);
                const firstSpendDate = firstSpendEntry ? parseDate(firstSpendEntry.date) : null;
                const launchSetupDays = (firstSpendDate && paidDate) ? Math.max(0, daysBetween(paidDate, firstSpendDate)) : null;
                const activeDays = spendData.filter(d => d.spend > 0).length;
                const totalDaysSinceFirstSpend = firstSpendDate ? daysBetween(firstSpendDate, new Date()) : 0;
                const inactiveDays = hasMetaData && firstSpendDate ? Math.max(0, totalDaysSinceFirstSpend - activeDays) : 0;
                const correctedBillingStart = firstSpendDate ? addDays(firstSpendDate, inactiveDays) : null;
                const discrepancy = hasMetaData ? inactiveDays - recordedOnPause : 0;
                const absDisc = Math.abs(discrepancy);
                const severity = absDisc >= 7 ? 'High' : absDisc >= 3 ? 'Medium' : 'OK';
                // Find matching client from ads performance sheet for extra data
                const adsClient = clients.find(c => c.client.toLowerCase().trim() === clientName.toLowerCase().trim());
                const sub = matchSubscription(clientName);
                const nextBillingDate = sub?.currentPeriodEnd ? parseDate(sub.currentPeriodEnd) : null;
                const sheetBillingDate = parseDate(s.nextBillingDateSheet) || parseDate(billingCycle) || parseDate(s.duePayment) || parseDate(s.contractEndDate);
                const billingDaysDiff = (nextBillingDate && sheetBillingDate) ? daysBetween(sheetBillingDate, nextBillingDate) : null;
                const billingMatch = billingDaysDiff !== null ? (Math.abs(billingDaysDiff) <= 1 ? 'Match' : billingDaysDiff > 0 ? `+${billingDaysDiff}d` : `${billingDaysDiff}d`) : null;
                return { client: clientName, setup: s, paidDate, adLiveDate, firstSpendDate, launchSetupDays, setupDaysVal, activeDays, inactiveDays, recordedOnPause, correctedBillingStart, billingCycle, sheetBillingDate, discrepancy, severity, hasMetaData, teamMember: adsClient?.teamMember || s.csmRep || '', subscription: sub, nextBillingDate, paymentSource: sub?.source || null, billingDaysDiff, billingMatch };
            }), [clients, setupData, dailySpend, allSubs, manualMappings]);

            const teamMembers = useMemo(() => [...new Set(enriched.map(c => c.teamMember).filter(Boolean))].sort(), [enriched]);
            const activeFilterCount = [filterSeverity, filterTeamMember].filter(Boolean).length;

            const filtered = enriched.filter(c => {
                const matchesSearch = !searchFilter || c.client.toLowerCase().includes(searchFilter.toLowerCase()) || c.teamMember.toLowerCase().includes(searchFilter.toLowerCase());
                const matchesSeverity = !filterSeverity || c.severity === filterSeverity;
                const matchesTeamMember = !filterTeamMember || c.teamMember === filterTeamMember;
                return matchesSearch && matchesSeverity && matchesTeamMember;
            });

            const handleSort = (key) => setSortConfig(prev => prev.key === key ? { key, dir: prev.dir === 'desc' ? 'asc' : 'desc' } : { key, dir: 'desc' });

            const sorted = useMemo(() => {
                if (!sortConfig.key) return filtered; // preserve sheet order
                const arr = [...filtered];
                arr.sort((a, b) => {
                    let valA, valB;
                    if (sortConfig.key === 'client') { valA = a.client; valB = b.client; }
                    else if (sortConfig.key === 'paidDate') { valA = a.paidDate?.getTime() || 0; valB = b.paidDate?.getTime() || 0; }
                    else if (sortConfig.key === 'adLiveDate') { valA = a.adLiveDate?.getTime() || 0; valB = b.adLiveDate?.getTime() || 0; }
                    else if (sortConfig.key === 'firstSpendDate') { valA = a.firstSpendDate?.getTime() || 0; valB = b.firstSpendDate?.getTime() || 0; }
                    else if (sortConfig.key === 'correctedBillingStart') { valA = a.correctedBillingStart?.getTime() || 0; valB = b.correctedBillingStart?.getTime() || 0; }
                    else if (sortConfig.key === 'nextBillingDate') { valA = a.nextBillingDate?.getTime() || 0; valB = b.nextBillingDate?.getTime() || 0; }
                    else if (sortConfig.key === 'sheetBillingDate') { valA = a.sheetBillingDate?.getTime() || 0; valB = b.sheetBillingDate?.getTime() || 0; }
                    else if (sortConfig.key === 'billingDaysDiff') { valA = Math.abs(a.billingDaysDiff ?? 0); valB = Math.abs(b.billingDaysDiff ?? 0); }
                    else { valA = a[sortConfig.key] ?? 0; valB = b[sortConfig.key] ?? 0; }
                    const cmp = typeof valA === 'string' ? valA.localeCompare(valB) : valA - valB;
                    if (cmp !== 0) return sortConfig.dir === 'asc' ? cmp : -cmp;
                    return Math.abs(b.discrepancy) - Math.abs(a.discrepancy);
                });
                return arr;
            }, [filtered, sortConfig]);

            const clientsAudited = filtered.filter(c => c.hasMetaData).length;
            const clientsWithDiscrepancies = filtered.filter(c => c.hasMetaData && Math.abs(c.discrepancy) >= 3).length;
            const totalUnrecordedPauseDays = filtered.reduce((sum, c) => sum + (c.hasMetaData && c.discrepancy > 0 ? c.discrepancy : 0), 0);
            const avgActiveDays = clientsAudited > 0 ? Math.round(filtered.filter(c => c.hasMetaData).reduce((sum, c) => sum + c.activeDays, 0) / clientsAudited) : 0;

            const DiscrepancyBadge = ({ days }) => {
                const abs = Math.abs(days);
                if (abs >= 7) return <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-red-500/20 text-red-400">{days}d off</span>;
                if (abs >= 3) return <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-amber-500/20 text-amber-400">{days}d off</span>;
                return <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-500/20 text-emerald-400">OK</span>;
            };

            const SortHeader = ({ label, sortKey, align = 'right', formula }) => {
                const active = sortConfig.key === sortKey;
                const [showFormula, setShowFormula] = useState(false);
                return (
                    <th className={`px-4 py-3 text-xs font-semibold text-slate-400 uppercase select-none ${align === 'left' ? 'text-left' : 'text-right'} relative`}>
                        <span className="inline-flex items-center gap-1 cursor-pointer hover:text-white" onClick={() => handleSort(sortKey)}>
                            {label}
                            {active && <span className="text-brand-cyan">{sortConfig.dir === 'asc' ? '▲' : '▼'}</span>}
                        </span>
                        {formula && (
                            <span className="relative inline-block ml-1">
                                <button onClick={(e) => { e.stopPropagation(); setShowFormula(!showFormula); }} className="text-slate-500 hover:text-brand-cyan text-xs align-middle">ⓘ</button>
                                {showFormula && (
                                    <div className="absolute z-50 top-full left-1/2 -translate-x-1/2 mt-1 w-64 bg-dark-900 border border-dark-600 rounded-lg shadow-xl p-3 text-left normal-case" onClick={(e) => e.stopPropagation()}>
                                        <div className="text-xs text-slate-300 font-normal whitespace-normal">{formula}</div>
                                        <button onClick={() => setShowFormula(false)} className="mt-2 text-xs text-slate-500 hover:text-white">Close</button>
                                    </div>
                                )}
                            </span>
                        )}
                    </th>
                );
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center py-24">
                        <div className="text-center space-y-4">
                            <div className="text-4xl animate-spin inline-block">⏳</div>
                            <div className="text-slate-400 text-sm">Fetching daily spend data from Meta Ads...</div>
                            <div className="text-slate-500 text-xs">This may take a moment as we process all client accounts</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-white">{clientsAudited}</div><div className="text-xs text-slate-400">Clients Audited</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className={`text-3xl font-bold ${clientsWithDiscrepancies > 0 ? 'text-red-400' : 'text-emerald-400'}`}>{clientsWithDiscrepancies}</div><div className="text-xs text-slate-400">With Discrepancies</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className={`text-3xl font-bold ${totalUnrecordedPauseDays > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{fmtN(totalUnrecordedPauseDays)}</div><div className="text-xs text-slate-400">Unrecorded Pause Days</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-blue-400">{fmtN(avgActiveDays)}</div><div className="text-xs text-slate-400">Avg Active Days</div></div>
                    </div>
                    <div className="card rounded-2xl p-4 space-y-3">
                        <div className="flex items-center gap-3">
                            <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="w-64 input-field border rounded-xl px-3 py-2 text-sm" />
                            {activeFilterCount > 0 && <button onClick={() => { setSearchFilter(''); setFilterSeverity(''); setFilterTeamMember(''); }} className="px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500/20">Clear Filters ({activeFilterCount})</button>}
                            {sortConfig.key && <button onClick={() => setSortConfig({ key: null, dir: 'desc' })} className="px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-medium hover:bg-blue-500/20">Reset to Sheet Order</button>}
                            {(activeFilterCount > 0 || searchFilter) && <span className="text-xs text-slate-500">Showing {filtered.length} of {enriched.length}</span>}
                            <button onClick={() => exportCSV(sorted)} className="px-3 py-2 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium hover:bg-emerald-500/20 ml-auto">Export CSV</button>
                            <button onClick={() => { ['vam_clients','vam_setup','vam_cache_time','vam_daily_spend','vam_daily_spend_cache_time','vam_subscriptions','vam_subscriptions_cache_time','vam_billing_mappings','vam_billing_invoices','vam_billing_invoices_cache_time'].forEach(k => localStorage.removeItem(k)); localStorage.setItem('vam_active_tab', 'billing-errors'); window.location.reload(); }} className="px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-medium hover:bg-blue-500/20">Clear Cache & Reload</button>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div><label className="block text-xs text-slate-500 mb-1">Discrepancy Severity</label><select value={filterSeverity} onChange={e => setFilterSeverity(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white"><option value="">All</option><option value="High">High</option><option value="Medium">Medium</option><option value="OK">OK</option></select></div>
                            <div><label className="block text-xs text-slate-500 mb-1">Team Member</label><select value={filterTeamMember} onChange={e => setFilterTeamMember(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white"><option value="">All</option>{teamMembers.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                        </div>
                    </div>
                    <div className="card rounded-2xl overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-dark-800">
                                    <tr>
                                        <SortHeader label="Client" sortKey="client" align="left" />
                                        <SortHeader label="Paid Date" sortKey="paidDate" align="left" />
                                        <SortHeader label="First Spend Date (META)" sortKey="firstSpendDate" align="left" />
                                        <SortHeader label="Setup Days" sortKey="launchSetupDays" formula="First Spend Date (META) − Paid Date = number of days from payment to first ad spend" />
                                        <SortHeader label="Ad Live Date" sortKey="adLiveDate" align="left" />
                                        <SortHeader label="Active Days (META)" sortKey="activeDays" formula="Total number of days with ad spend > $0, pulled from Meta Ads Manager daily data" />
                                        <SortHeader label="Inactive Days (META)" sortKey="inactiveDays" formula="(Days since First Spend Date) − Active Days (META) = days with no ad spend since launch" />
                                        <SortHeader label="Recorded Pause" sortKey="recordedOnPause" />
                                        <SortHeader label="Discrepancy" sortKey="discrepancy" formula="Inactive Days (META) − Recorded Pause Days = unrecorded pause days that may need billing adjustment" />
                                        <SortHeader label="Corrected Billing Start" sortKey="correctedBillingStart" align="left" formula="First Spend Date (META) + Inactive Days (META) = adjusted start date accounting for paused periods" />
                                        <SortHeader label="Sheet Billing Date" sortKey="sheetBillingDate" align="left" />
                                        <SortHeader label="Next Billing Date (Stripe/Whop)" sortKey="nextBillingDate" align="left" formula="Next payment date pulled from Stripe or Whop subscription data" />
                                        <SortHeader label="Billing Match" sortKey="billingDaysDiff" formula="Next Billing Date (Stripe/Whop) minus Sheet Billing Date. Shows if dates match and by how many days they differ." />
                                        <th className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Source</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-dark-700">
                                    {sorted.length === 0 ? (
                                        <tr><td colSpan={15} className="px-4 py-8 text-center text-slate-500 text-sm">No clients match current filters</td></tr>
                                    ) : sorted.map(c => (
                                        <tr key={c.client} className={`transition-colors ${c.hasMetaData ? 'hover:bg-dark-800' : 'bg-dark-900/50 opacity-60'}`}>
                                            <td className="px-4 py-3"><div className="font-medium text-white">{c.client}</div><div className="text-xs text-slate-500">{c.teamMember || '—'}</div></td>
                                            <td className="px-4 py-3 text-sm text-slate-300">{formatDateStr(c.paidDate)}</td>
                                            <td className="px-4 py-3 text-sm">{c.firstSpendDate ? <span className="text-emerald-400 font-medium">{formatDateStr(c.firstSpendDate)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-right">{c.launchSetupDays != null ? <span className={`font-medium ${c.launchSetupDays > 7 ? 'text-amber-400' : c.launchSetupDays > 3 ? 'text-yellow-400' : 'text-emerald-400'}`}>{c.launchSetupDays}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-sm text-slate-300">{formatDateStr(c.adLiveDate)}</td>
                                            <td className="px-4 py-3 text-right">{c.hasMetaData ? <span className="font-medium text-emerald-400">{fmtN(c.activeDays)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-right">{c.hasMetaData ? <span className={`font-medium ${c.inactiveDays > 0 ? 'text-amber-400' : 'text-slate-400'}`}>{fmtN(c.inactiveDays)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-right text-sm text-slate-300">{c.recordedOnPause || '0'}</td>
                                            <td className="px-4 py-3 text-right">{c.hasMetaData ? <DiscrepancyBadge days={c.discrepancy} /> : <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-slate-500/20 text-slate-500">No data</span>}</td>
                                            <td className="px-4 py-3 text-sm">{c.hasMetaData && c.correctedBillingStart ? <span className="text-cyan-400 font-medium">{formatDateStr(c.correctedBillingStart)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-sm text-slate-400">{c.sheetBillingDate ? formatDateStr(c.sheetBillingDate) : (c.billingCycle || '—')}</td>
                                            <td className="px-4 py-3 text-sm">
                                                {c.nextBillingDate ? (
                                                    <span className="text-blue-400 font-medium">{formatDateStr(c.nextBillingDate)}</span>
                                                ) : (
                                                    <button onClick={() => setShowMappingModal(c.client)} className="text-xs text-slate-500 hover:text-brand-cyan underline">Map</button>
                                                )}
                                            </td>
                                            <td className="px-4 py-3 text-right text-sm">
                                                {c.billingMatch === 'Match' ? (
                                                    <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-500/20 text-emerald-400">Match</span>
                                                ) : c.billingMatch ? (
                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${Math.abs(c.billingDaysDiff) >= 7 ? 'bg-red-500/20 text-red-400' : 'bg-amber-500/20 text-amber-400'}`}>{c.billingMatch}</span>
                                                ) : (
                                                    <span className="text-slate-500">—</span>
                                                )}
                                            </td>
                                            <td className="px-4 py-3 text-sm">
                                                {c.subscription ? (
