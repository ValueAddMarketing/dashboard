                            {clientNames.map(n => <option key={n} value={n}>{n}</option>)}
                        </select>
                        {teamMembers.length > 1 && (
                            <select value={selectedTeamMember} onChange={e => setSelectedTeamMember(e.target.value)} className="bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-slate-300">
                                <option value="">All Team</option>
                                {user?.email && <option value={user.email}>My Meetings</option>}
                                {teamMembers.filter(tm => tm.email !== user?.email).map(tm => <option key={tm.email} value={tm.email}>{tm.name}</option>)}
                            </select>
                        )}
                    </div>

                    {/* Timeline View */}
                    {viewMode === 'timeline' && (
                        <div className="space-y-3">
                            {filtered.length === 0 ? <div className="card p-8 text-center text-slate-500">No meetings found for {monthLabel}.</div> : filtered.map(renderMeeting)}
                        </div>
                    )}

                    {/* By Client View */}
                    {viewMode === 'by-client' && (
                        <div className="space-y-6">
                            {Object.keys(byClient).length === 0 ? <div className="card p-8 text-center text-slate-500">No meetings found for {monthLabel}.</div> : (
                                Object.entries(byClient).sort(([,a],[,b]) => b.length - a.length).map(([client, mts]) => (
                                    <div key={client}>
                                        <div className="flex items-center gap-3 mb-3">
                                            <h2 className="text-lg font-semibold text-white">{client}</h2>
                                            <span className="px-2 py-1 rounded text-xs bg-brand-cyan/20 text-brand-cyan">{mts.length} meetings</span>
                                        </div>
                                        <div className="space-y-3">{mts.map(renderMeeting)}</div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {/* Action Items View */}
                    {viewMode === 'actions' && (
                        <div className="card p-6">
                            <h3 className="text-lg font-semibold text-white mb-4">All Action Items <span className="text-slate-500 text-sm font-normal">({allActionItems.length})</span></h3>
                            {allActionItems.length === 0 ? <p className="text-slate-500 text-sm text-center py-6">No action items found for this period.</p> : (
                                <div className="space-y-2 max-h-[600px] overflow-y-auto scrollbar">
                                    {allActionItems.map((item, i) => (
                                        <div key={i} className={`p-3 rounded-lg ${item.priority === 'high' ? 'bg-red-500/10 border border-red-500/20' : item.priority === 'medium' ? 'bg-amber-500/10 border border-amber-500/20' : 'bg-dark-800'}`}>
                                            <div className="flex items-start justify-between gap-2">
                                                <div className="flex-1 min-w-0">
                                                    <div className="text-slate-300 text-sm">{safe(item.task || item)}</div>
                                                    <div className="flex items-center gap-3 mt-1.5 text-xs text-slate-500">
                                                        <span className="text-brand-purple">{item.client}</span>
                                                        <span>{item.meeting}</span>
                                                        {item.owner && <span>Owner: {safe(item.owner)}</span>}
                                                    </div>
                                                </div>
                                                {item.priority && <span className={`px-2 py-0.5 rounded text-[10px] font-medium shrink-0 ${riskBadge(item.priority)}`}>{item.priority}</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ========== DEAL PIPELINE TAB ==========
        const FUNNEL_STAGES = [
            { key: 'leads', label: 'Leads', color: 'bg-blue-500' },
            { key: 'appts', label: 'Appts', color: 'bg-cyan-500' },
            { key: 'deals', label: 'Deals', color: 'bg-purple-500' },
            { key: 'listings', label: 'Listings', color: 'bg-amber-500' },
            { key: 'buyerSigned', label: 'Buyer Signed', color: 'bg-orange-500' },
            { key: 'closings', label: 'Closings', color: 'bg-emerald-500' },
        ];

        const FunnelDots = ({ row }) => (
            <div className="flex items-center gap-1">
                {FUNNEL_STAGES.map(stage => {
                    const val = row[stage.key] || 0;
                    return <span key={stage.key} title={`${stage.label}: ${val}`} className={`w-2.5 h-2.5 rounded-full ${val > 0 ? stage.color : 'bg-dark-600'}`} />;
                })}
            </div>
        );

        const SortHeader = ({ label, sortKey, sortConfig, onSort, align = 'right' }) => {
            const active = sortConfig.key === sortKey;
            return (
                <th className={`px-4 py-3 text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:text-white select-none ${align === 'left' ? 'text-left' : 'text-right'}`} onClick={() => onSort(sortKey)}>
                    <span className="inline-flex items-center gap-1">{label}{active && <span className="text-brand-cyan">{sortConfig.dir === 'asc' ? '▲' : '▼'}</span>}</span>
                </th>
            );
        };

        const DealPipelineTab = ({ clients, setupData, onSelectClient }) => {
            const [searchFilter, setSearchFilter] = useState('');
            const [filterStatus, setFilterStatus] = useState('');
            const [filterTeamMember, setFilterTeamMember] = useState('');
            const [filterCampaign, setFilterCampaign] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'closings', dir: 'desc' });

            const getSetupInfo = (client) => {
                const name = client.client.toLowerCase().trim();
                return setupData.find(s => { const sn = (s.client || '').toLowerCase().trim(); return sn === name || sn.includes(name) || name.includes(sn); });
            };

            const enriched = useMemo(() => clients.map(c => {
                const setup = getSetupInfo(c);
                const effectiveLeads = c.adDataSource === 'meta' ? (c.weeklyLeads || 0) : c.leads;
                const effectiveSpend = c.adDataSource === 'meta' ? (c.weeklySpend || 0) : c.spend;
                const closings = setup ? pn(setup.closings) : 0;
                const leadsPerDeal = c.deals > 0 ? effectiveLeads / c.deals : 0;
                const spendPerDeal = c.deals > 0 ? effectiveSpend / c.deals : 0;
                const cpl = effectiveLeads > 0 ? effectiveSpend / effectiveLeads : 0;
                return { ...c, setup, effectiveLeads, effectiveSpend, closings, leadsPerDeal, spendPerDeal, effectiveCPL: cpl };
            }), [clients, setupData]);

            const uniqueVals = (key) => [...new Set(enriched.map(c => c[key]).filter(Boolean))].sort();
            const statuses = useMemo(() => uniqueVals('status'), [enriched]);
            const teamMembers = useMemo(() => uniqueVals('teamMember'), [enriched]);
            const campaigns = useMemo(() => uniqueVals('campaign'), [enriched]);

            const activeFilterCount = [filterStatus, filterTeamMember, filterCampaign].filter(Boolean).length;

            const filtered = enriched.filter(c => {
                const matchesSearch = !searchFilter || c.client.toLowerCase().includes(searchFilter.toLowerCase()) || (c.teamMember || '').toLowerCase().includes(searchFilter.toLowerCase());
                return matchesSearch && (!filterStatus || c.status === filterStatus) && (!filterTeamMember || c.teamMember === filterTeamMember) && (!filterCampaign || c.campaign === filterCampaign);
            });

            const pipelineClients = filtered.filter(c => c.effectiveLeads > 0 || c.appts > 0 || c.deals > 0 || c.listings > 0 || c.buyerSigned > 0 || c.closings > 0);

            const handleSort = (key) => setSortConfig(prev => prev.key === key ? { key, dir: prev.dir === 'desc' ? 'asc' : 'desc' } : { key, dir: 'desc' });

            const sorted = useMemo(() => {
                const arr = [...pipelineClients];
                arr.sort((a, b) => {
                    const valA = a[sortConfig.key] ?? 0;
                    const valB = b[sortConfig.key] ?? 0;
                    const cmp = typeof valA === 'string' ? valA.localeCompare(valB) : valA - valB;
                    if (cmp !== 0) return sortConfig.dir === 'asc' ? cmp : -cmp;
                    if (sortConfig.key !== 'deals') return b.deals - a.deals;
                    return 0;
                });
                return arr;
            }, [pipelineClients, sortConfig]);

            const totals = pipelineClients.reduce((acc, c) => ({ leads: acc.leads + c.effectiveLeads, appts: acc.appts + c.appts, deals: acc.deals + c.deals, closings: acc.closings + c.closings }), { leads: 0, appts: 0, deals: 0, closings: 0 });

            const clearAllFilters = () => { setSearchFilter(''); setFilterStatus(''); setFilterTeamMember(''); setFilterCampaign(''); };

            const FilterSelect = ({ label, value, onChange, options }) => (
                <div>
                    <label className="block text-xs text-slate-500 mb-1">{label}</label>
                    <select value={value} onChange={e => onChange(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white">
                        <option value="">All</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-white">{pipelineClients.length}</div><div className="text-xs text-slate-400">Active Pipeline Clients</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-blue-400">{fmtN(totals.leads)}</div><div className="text-xs text-slate-400">Total Leads</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-cyan-400">{fmtN(totals.appts)}</div><div className="text-xs text-slate-400">Total Appts</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-purple-400">{fmtN(totals.deals)}</div><div className="text-xs text-slate-400">Total Potential Deals</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-emerald-400">{fmtN(totals.closings)}</div><div className="text-xs text-slate-400">Total Closings</div></div>
                    </div>

                    <div className="card rounded-2xl p-6">
                        <div className="space-y-3">
                            <div className="flex items-center gap-3">
                                <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="w-64 input-field border rounded-xl px-3 py-2 text-sm" />
                                {activeFilterCount > 0 && <button onClick={clearAllFilters} className="px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500/20">Clear Filters ({activeFilterCount})</button>}
                                {(activeFilterCount > 0 || searchFilter) && <span className="text-xs text-slate-500">Showing {pipelineClients.length} of {enriched.filter(c => c.effectiveLeads > 0 || c.appts > 0 || c.deals > 0 || c.listings > 0 || c.buyerSigned > 0 || c.closings > 0).length}</span>}
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                <FilterSelect label="Status" value={filterStatus} onChange={setFilterStatus} options={statuses} />
                                <FilterSelect label="Team Member" value={filterTeamMember} onChange={setFilterTeamMember} options={teamMembers} />
                                <FilterSelect label="Campaign" value={filterCampaign} onChange={setFilterCampaign} options={campaigns} />
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center gap-4 px-1">
                        <span className="text-xs text-slate-500 font-medium">Funnel stages:</span>
                        {FUNNEL_STAGES.map(stage => <div key={stage.key} className="flex items-center gap-1.5"><span className={`w-2.5 h-2.5 rounded-full ${stage.color}`} /><span className="text-xs text-slate-400">{stage.label}</span></div>)}
                    </div>

                    <div className="card rounded-2xl p-0 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-dark-800">
                                    <tr>
                                        <SortHeader label="Client" sortKey="client" sortConfig={sortConfig} onSort={handleSort} align="left" />
                                        <th className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Funnel</th>
                                        <SortHeader label="Status" sortKey="status" sortConfig={sortConfig} onSort={handleSort} align="left" />
                                        <SortHeader label="Leads" sortKey="effectiveLeads" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Appts" sortKey="appts" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Deals" sortKey="deals" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Listings" sortKey="listings" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Buyer Signed" sortKey="buyerSigned" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Closings" sortKey="closings" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Leads/Deal" sortKey="leadsPerDeal" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="Spend/Deal" sortKey="spendPerDeal" sortConfig={sortConfig} onSort={handleSort} />
                                        <SortHeader label="CPL" sortKey="effectiveCPL" sortConfig={sortConfig} onSort={handleSort} />
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-dark-700">
                                    {sorted.length === 0 ? (
                                        <tr><td colSpan={12} className="px-4 py-8 text-center text-slate-500 text-sm">No clients with pipeline activity</td></tr>
                                    ) : sorted.map(c => (
                                        <tr key={c.client} className="hover:bg-dark-800 cursor-pointer transition-colors" onClick={() => onSelectClient(c)}>
                                            <td className="px-4 py-3">
                                                <div className="font-medium text-white">{c.client}</div>
                                                <div className="text-xs text-slate-500">{c.teamMember || '—'}{c.adDataSource === 'meta' && <span className="ml-1.5 px-1.5 py-0.5 rounded bg-blue-500/20 text-blue-400 text-[10px] font-medium">META</span>}</div>
                                            </td>
                                            <td className="px-4 py-3"><FunnelDots row={c} /></td>
                                            <td className="px-4 py-3">{c.status && <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${c.status.toLowerCase() === 'active' ? 'bg-emerald-500/20 text-emerald-400' : c.status.toLowerCase() === 'paused' ? 'bg-red-500/20 text-red-400' : 'bg-slate-500/20 text-slate-400'}`}>{c.status}</span>}</td>
                                            <td className="px-4 py-3 text-right text-blue-400 font-medium">{fmtN(c.effectiveLeads)}</td>
                                            <td className="px-4 py-3 text-right text-cyan-400">{fmtN(c.appts)}</td>
                                            <td className="px-4 py-3 text-right text-purple-400 font-bold">{fmtN(c.deals)}</td>
                                            <td className="px-4 py-3 text-right text-amber-400">{fmtN(c.listings)}</td>
                                            <td className="px-4 py-3 text-right text-orange-400">{fmtN(c.buyerSigned)}</td>
                                            <td className="px-4 py-3 text-right text-emerald-400 font-bold">{fmtN(c.closings)}</td>
                                            <td className="px-4 py-3 text-right text-slate-300">{c.deals > 0 ? fmtN(c.leadsPerDeal) : '—'}</td>
                                            <td className="px-4 py-3 text-right text-slate-300">{c.deals > 0 ? fmt(c.spendPerDeal) : '—'}</td>
                                            <td className="px-4 py-3 text-right"><span className={`font-medium ${c.effectiveCPL <= 25 ? 'text-emerald-400' : c.effectiveCPL <= 50 ? 'text-amber-400' : c.effectiveCPL > 0 ? 'text-red-400' : 'text-slate-500'}`}>{c.effectiveCPL > 0 ? fmtD(c.effectiveCPL) : '—'}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ========== MAP WHOP COMPONENTS ==========
        const MapWhopRow = ({ client, unmappedWhop, saveWhopMapping, fmtC }) => {
            const [open, setOpen] = useState(false);
            const [q, setQ] = useState('');
            const filtered = q.trim() ? unmappedWhop.filter(row => {
                const ql = q.toLowerCase();
                return (row['Name'] || '').toLowerCase().includes(ql) || (row['Email'] || '').toLowerCase().includes(ql) || (row['Username'] || '').toLowerCase().includes(ql);
            }) : unmappedWhop;
            return (
                <div className="rounded-xl" style={{background:'var(--bg-main, #0d1117)',border:'1px solid var(--border, #21262d)'}}>
                    <div className="flex items-center justify-between p-3 cursor-pointer" onClick={() => setOpen(!open)}>
                        <div>
                            <span className="text-sm font-medium text-white">{client.client}</span>
                            <span className="text-xs text-slate-500 ml-2">MRR: {client.mrrVal > 0 ? fmtC(client.mrrVal) : '-'}</span>
                            {client.setup.paidDate && <span className="text-xs text-slate-500 ml-2">Paid: {client.setup.paidDate}</span>}
                            <span className="text-xs text-slate-500 ml-2">{client.setup.platform || 'No platform'}</span>
                        </div>
                        <span className="text-xs text-slate-400">{open ? '▲' : '▼'}</span>
                    </div>
                    {open && (
                        <div className="px-3 pb-3">
                            <input type="text" value={q} onChange={e => setQ(e.target.value)} placeholder="Search Whop members by name, email, username..." className="w-full input-field border rounded-lg px-3 py-2 text-xs mb-2" autoFocus />
                            <div style={{maxHeight:'200px',overflow:'auto'}} className="space-y-1">
                                {filtered.slice(0, 30).map(row => {
                                    const memId = (row['Membership IDs'] || '').split(',')[0].trim();
                                    return (
                                        <div key={memId || row['Email']} onClick={() => { if (memId) { saveWhopMapping(client.client, memId); setOpen(false); }}} className="flex items-center justify-between p-2 rounded-lg hover:bg-dark-800 cursor-pointer text-xs">
                                            <div>
                                                <span className="text-white font-medium">{row['Name'] || row['Username'] || '(no name)'}</span>
                                                <span className="text-slate-500 ml-2">{row['Email'] || ''}</span>
                                            </div>
                                            <div className="flex gap-3 text-slate-500">
                                                {parseFloat(row['Platform spend (USD)'] || 0) > 0 && <span>${parseFloat(row['Platform spend (USD)']).toFixed(0)}</span>}
                                                {row['Joined date'] && <span>{row['Joined date'].split(' ')[0]}</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                                {filtered.length === 0 && <div className="text-xs text-slate-500 text-center py-4">No matches found</div>}
                                {filtered.length > 30 && <div className="text-xs text-slate-500 text-center py-2">Showing 30 of {filtered.length} — refine search</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const MapWhopView = ({ enriched, whopCsv, whopMappings, saveWhopMapping, fmtC }) => {
            const [filterQ, setFilterQ] = useState('');
            const unmappedClients = enriched.filter(c => {
                if (c.whopPayments.length > 0) return false;
                const plat = (c.setup.platform || '').toLowerCase();
                return plat.includes('whop') || (!plat.includes('stripe') && !plat.includes('fan') && c.mrrVal > 0 && c.stripePaidCount === 0);
            });
            const mappedMemIds = new Set(Object.values(whopMappings));
            for (const c of enriched) {
                for (const wp of c.whopPayments) { if (wp.id) mappedMemIds.add(wp.id); }
            }
            const unmappedWhop = whopCsv.filter(row => {
                const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                return !memIds.some(id => mappedMemIds.has(id));
            });
            const displayClients = filterQ.trim() ? unmappedClients.filter(c => c.client.toLowerCase().includes(filterQ.toLowerCase())) : unmappedClients;
            return (
                <div className="card rounded-2xl p-4">
                    <div className="flex items-center justify-between mb-4">
                        <div>
                            <h3 className="text-sm font-bold text-white">Unmapped Whop Clients ({unmappedClients.length})</h3>
                            <p className="text-xs text-slate-400 mt-0.5">{unmappedWhop.length} Whop members still unlinked. Click a client to expand and search for their Whop account.</p>
                        </div>
                        <input type="text" value={filterQ} onChange={e => setFilterQ(e.target.value)} placeholder="Filter clients..." className="input-field border rounded-lg px-3 py-2 text-xs" style={{width:'200px'}} />
                    </div>
                    <div className="space-y-2" style={{maxHeight:'70vh',overflow:'auto'}}>
                        {displayClients.map(c => <MapWhopRow key={c.client} client={c} unmappedWhop={unmappedWhop} saveWhopMapping={saveWhopMapping} fmtC={fmtC} />)}
                        {displayClients.length === 0 && <div className="text-center py-8 text-slate-500 text-sm">{unmappedClients.length === 0 ? 'All Whop clients are mapped!' : 'No clients match filter'}</div>}
                    </div>
                </div>
            );
        };

        // ========== BILLING ERRORS TAB ==========
        const BillingErrorsTab = ({ setupData }) => {
            const [invoiceData, setInvoiceData] = useState({ stripe: [], whop: [], stripeUpcoming: [], errors: [] });
            const [loadingInvoices, setLoadingInvoices] = useState(true);
            const [search, setSearch] = useState('');
            const [filterFlag, setFilterFlag] = useState('');
            const [filterPlatform, setFilterPlatform] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'revenueGap', dir: 'desc' });
            const [selectedClient, setSelectedClient] = useState(null);
            const [subTab, setSubTab] = useState('errors');
            const [aiOpen, setAiOpen] = useState(false);
            const [aiMessages, setAiMessages] = useState([]);
            const [aiInput, setAiInput] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const [whopSubs, setWhopSubs] = useState([]);
            const [whopMappings, setWhopMappings] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_whop_mappings') || '{}'); } catch(e) { return {}; }
            });
            const [linkWhopClient, setLinkWhopClient] = useState(null);
            const [linkWhopSearch, setLinkWhopSearch] = useState('');
            const [whopCsv, setWhopCsv] = useState([]);
            const [closingData, setClosingData] = useState([]);
            const [fanbasisData, setFanbasisData] = useState([]);
            const [aiNotes, setAiNotes] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_ai_billing_notes') || '{}'); } catch(e) { return {}; }
            });
            const [aiNotesLoading, setAiNotesLoading] = useState({});
            const [pendingApprovals, setPendingApprovals] = useState([]);
            const [dismissedApprovals, setDismissedApprovals] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_whop_dismissed') || '[]'); } catch(e) { return []; }
            });
            const aiEndRef = useRef(null);

            const saveWhopMapping = (clientName, whopMembershipId) => {
                const updated = { ...whopMappings, [clientName]: whopMembershipId };
                setWhopMappings(updated);
                try { localStorage.setItem('vam_whop_mappings', JSON.stringify(updated)); } catch(e) {}
            };
            const removeWhopMapping = (clientName) => {
                const updated = { ...whopMappings };
                delete updated[clientName];
                setWhopMappings(updated);
                try { localStorage.setItem('vam_whop_mappings', JSON.stringify(updated)); } catch(e) {}
            };
            const saveBulkMappings = (mappingsArray) => {
                const updated = { ...whopMappings };
                for (const { client, membershipId } of mappingsArray) updated[client] = membershipId;
                setWhopMappings(updated);
                try { localStorage.setItem('vam_whop_mappings', JSON.stringify(updated)); } catch(e) {}
            };
            const dismissApproval = (key) => {
                const updated = [...dismissedApprovals, key];
                setDismissedApprovals(updated);
                try { localStorage.setItem('vam_whop_dismissed', JSON.stringify(updated)); } catch(e) {}
            };

            useEffect(() => {
                const invoiceCached = localStorage.getItem('vam_billing_invoices');
                const invoiceCacheTime = localStorage.getItem('vam_billing_invoices_cache_time');
                const subsCached = localStorage.getItem('vam_subscriptions');
                const subsCacheTime = localStorage.getItem('vam_subscriptions_cache_time');
                const cacheValid = (key, time) => key && time && (Date.now() - parseInt(time)) < 30 * 60 * 1000;

                // Load from cache if valid
                if (cacheValid(invoiceCached, invoiceCacheTime)) {
                    setInvoiceData(JSON.parse(invoiceCached));
                }
                if (cacheValid(subsCached, subsCacheTime)) {
                    const parsed = JSON.parse(subsCached);
                    setWhopSubs((parsed.whop || []).filter(s => s.source === 'whop'));
                }

                // Fetch both in parallel if either is stale
                const needInvoices = !cacheValid(invoiceCached, invoiceCacheTime);
                const needSubs = !cacheValid(subsCached, subsCacheTime);

                if (!needInvoices && !needSubs) { setLoadingInvoices(false); return; }

                const fetches = [];
                if (needInvoices) {
                    fetches.push(
                        fetch('/api/billing-errors', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'fetchInvoices' }) })
                            .then(r => r.json())
                            .then(d => { setInvoiceData(d); try { localStorage.setItem('vam_billing_invoices', JSON.stringify(d)); localStorage.setItem('vam_billing_invoices_cache_time', Date.now().toString()); } catch(e) {} })
                            .catch(err => setInvoiceData(prev => ({ ...prev, errors: [{ source: 'fetch', message: err.message }] })))
                    );
                }
                if (needSubs) {
                    fetches.push(
                        fetch('/api/billing-subscriptions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'fetchAll' }) })
                            .then(r => r.json())
                            .then(d => {
                                const whop = (d.whop || []).filter(s => s.source === 'whop');
                                setWhopSubs(whop);
                                try { localStorage.setItem('vam_subscriptions', JSON.stringify(d)); localStorage.setItem('vam_subscriptions_cache_time', Date.now().toString()); } catch(e) {}
                            })
                            .catch(err => console.error('[BillingErrors] Whop fetch error:', err))
                    );
                }
                Promise.all(fetches).finally(() => setLoadingInvoices(false));
            }, []);

            // Enrich whopSubs with names/emails from CSV
            useEffect(() => {
                if (!whopCsv.length || !whopSubs.length) return;
                // Build membership ID → CSV row lookup
                const csvByMembership = {};
                const csvByUser = {};
                for (const row of whopCsv) {
                    const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim());
                    for (const mid of memIds) { if (mid) csvByMembership[mid] = row; }
                    const uid = (row['User ID'] || '').trim();
                    if (uid) csvByUser[uid] = row;
                }
                let changed = false;
                const enriched = whopSubs.map(sub => {
                    if (sub.customerName && sub.customerEmail) return sub; // already has data
                    const csvRow = csvByMembership[sub.id] || csvByUser[sub.userId];
                    if (!csvRow) return sub;
                    changed = true;
                    return { ...sub, customerName: csvRow['Name'] || csvRow['Username'] || sub.customerName, customerEmail: csvRow['Email'] || sub.customerEmail };
                });
                if (changed) setWhopSubs(enriched);
            }, [whopCsv, whopSubs.length]);

            // Load Whop CSV with PapaParse
            useEffect(() => {
                fetch('/whop-members.csv').then(r => r.text()).then(text => {
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                    const rows = (parsed.data || []).filter(r => r['Membership IDs']);
                    console.log('[WhopCSV] Loaded', rows.length, 'rows. Sample:', rows.slice(0, 2).map(r => r['Name'] + ' | ' + r['Email'] + ' | ' + r['Membership IDs']));
                    setWhopCsv(rows);
                }).catch(err => console.error('[WhopCSV] Failed to load:', err));

                // Load Closer Form from Google Sheet (has client emails + Whop emails + notes)
                fetch(URLS.closerForm).then(r => r.text()).then(text => {
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                    const rows = (parsed.data || []).filter(r => r['Client Full Name']);
                    console.log('[CloserForm] Loaded', rows.length, 'clients from Google Sheet');
                    setClosingData(rows);
                }).catch(err => console.error('[CloserForm] Failed to load:', err));

                // Load Fanbasis payments from Google Sheet
                fetch(URLS.fanbasis).then(r => r.text()).then(text => {
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                    const rows = (parsed.data || []).filter(r => r['Customer Name'] && r['Amount']);
                    console.log('[Fanbasis] Loaded', rows.length, 'payments from Google Sheet');
                    setFanbasisData(rows);
                }).catch(err => console.error('[Fanbasis] Failed to load:', err));
            }, []);

            // Build closing data lookup: client name → closing info (emails, notes, etc.)
            const closingLookup = useMemo(() => {
                const lookup = {};
                for (const row of closingData) {
                    const name = (row['Client Full Name'] || '').trim();
                    if (name) lookup[name.toLowerCase()] = row;
                }
                return lookup;
            }, [closingData]);

            // Build Whop email → membership lookup from Whop CSV
            const whopEmailToMembership = useMemo(() => {
                const lookup = {};
                for (const row of whopCsv) {
                    const email = (row['Email'] || '').toLowerCase().trim();
                    if (email) lookup[email] = row;
                    const name = (row['Name'] || '').toLowerCase().trim();
                    if (name) { if (!lookup['name:' + name]) lookup['name:' + name] = row; }
                }
                return lookup;
            }, [whopCsv]);

            // Build membership ID → Whop CSV row lookup
            const whopCsvByMemId = useMemo(() => {
                const lookup = {};
                for (const row of whopCsv) {
                    const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim());
                    for (const mid of memIds) { if (mid) lookup[mid] = row; }
                }
                return lookup;
            }, [whopCsv]);

            // Run auto-matching when CSVs + setupData are ready
            useEffect(() => {
                if (!whopCsv.length || !setupData.length) return;
                const existingMapped = new Set(Object.keys(whopMappings));
                const usedMembershipIds = new Set(Object.values(whopMappings));
                const suggestions = [];

                for (const s of setupData) {
                    if (!s.client || existingMapped.has(s.client)) continue;

                    // Skip if already matched via API
                    const matcher = makeNameMatcher(s.client, s.nameEmail, s.platform);
                    const apiMatch = whopSubs.find(m => {
                        const n = (m.customerName || '').toLowerCase(), e = (m.customerEmail || '').toLowerCase();
                        return matcher(n, e);
                    });
                    if (apiMatch) continue;

                    // Collect all known emails for this client
                    const clientEmails = new Set();
                    // From platform field (e.g. "Whop : email@example.com")
                    const platEmail = ((s.platform || '').match(/[\w.+-]+@[\w.-]+\.\w+/i) || [])[0];
                    if (platEmail) clientEmails.add(platEmail.toLowerCase());
                    // From nameEmail field
                    if (s.nameEmail) { const em = s.nameEmail.match(/[\w.+-]+@[\w.-]+\.\w+/i); if (em) clientEmails.add(em[0].toLowerCase()); }
                    // From closing data CSV
                    const closingRow = closingLookup[s.client.toLowerCase()];
                    if (closingRow) {
                        const ce = (closingRow['Client Email '] || closingRow['Client Email'] || '').trim();
                        if (ce) clientEmails.add(ce.toLowerCase());
                        const pe = (closingRow['Payment processor username or email'] || '').trim();
                        if (pe) {
                            // May contain email directly or "username"
                            const peEmail = pe.match(/[\w.+-]+@[\w.-]+\.\w+/i);
                            if (peEmail) clientEmails.add(peEmail[0].toLowerCase());
                            else if (pe.length > 2) clientEmails.add(pe.toLowerCase()); // might be a username
                        }
                    }

                    // Try to find Whop member by email match
                    let matched = false;
                    for (const email of clientEmails) {
                        const whopRow = whopEmailToMembership[email];
                        if (!whopRow) continue;
                        const memIds = (whopRow['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                        if (memIds.some(id => usedMembershipIds.has(id))) continue;
                        const memId = memIds[0];
                        if (memId) {
                            suggestions.push({
                                client: s.client, membershipId: memId,
                                matchType: 'email',
                                matchDetail: email,
                                whopName: whopRow['Name'] || whopRow['Username'] || '(no name)',
                                whopEmail: whopRow['Email'] || '',
                                whopJoined: whopRow['Joined date'] || '',
                                whopSpend: whopRow['Platform spend (USD)'] || '0',
                                paidDate: s.paidDate || '',
                                key: s.client + '|' + memId,
                            });
                            usedMembershipIds.add(memId);
                            matched = true;
                            break;
                        }
                    }
                    if (matched) continue;

                    // Try Whop CSV name match
                    for (const row of whopCsv) {
                        const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                        if (memIds.some(id => usedMembershipIds.has(id))) continue;
                        const csvName = (row['Name'] || '').toLowerCase().trim();
                        const csvEmail = (row['Email'] || '').toLowerCase().trim();
                        const csvUser = (row['Username'] || '').toLowerCase().trim();
                        if (matcher(csvName, csvEmail) || matcher(csvUser, csvEmail)) {
                            const memId = memIds[0];
                            if (memId) {
                                suggestions.push({
                                    client: s.client, membershipId: memId,
                                    matchType: 'name',
                                    whopName: row['Name'] || row['Username'] || '(no name)',
                                    whopEmail: row['Email'] || '',
                                    whopJoined: row['Joined date'] || '',
                                    whopSpend: row['Platform spend (USD)'] || '0',
                                    paidDate: s.paidDate || '',
                                    key: s.client + '|' + memId,
                                });
                                usedMembershipIds.add(memId);
                                matched = true;
                                break;
                            }
                        }
                    }
                }

                console.log('[WhopMatch] Suggestions:', suggestions.length, '(email:', suggestions.filter(s => s.matchType === 'email').length, ', name:', suggestions.filter(s => s.matchType === 'name').length, ')');
                const dismissedSet = new Set(dismissedApprovals);
                setPendingApprovals(suggestions.filter(a => !dismissedSet.has(a.key)));
            }, [whopCsv, closingData, setupData, whopSubs, whopEmailToMembership, closingLookup]);

            useEffect(() => { aiEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [aiMessages]);

            const fmtC = (n) => {
                if (n == null || isNaN(n)) return '-';
                return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const formatDateStr = (date) => {
                if (!date) return '\u2014';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            };

            const parseContractNotes = (notes) => {
                if (!notes) return { raw: '', loanOfficer: false, loanOfficerName: null, splitBilling: false, platforms: [] };
                const loanOfficer = /loan\s*officer|lo\s+pay|lo\s+split|lender|mortgage/i.test(notes);
                const loMatch = notes.match(/(?:loan\s*officer|lender|LO)[:\s-]*([A-Z][a-z]+ ?[A-Z]?[a-z]*)/i);
                const splitBilling = /split|half|shared|50.?50|partial/i.test(notes);
                const platforms = [];
                if (/stripe/i.test(notes)) platforms.push('Stripe');
                if (/whop/i.test(notes)) platforms.push('Whop');
                if (/paypal/i.test(notes)) platforms.push('PayPal');
                if (/venmo/i.test(notes)) platforms.push('Venmo');
                if (/zelle/i.test(notes)) platforms.push('Zelle');
                return { raw: notes, loanOfficer, loanOfficerName: loMatch ? loMatch[1].trim() : null, splitBilling, platforms };
            };

            const makeNameMatcher = (clientName, nameEmail, platform) => {
                const cn = (clientName || '').toLowerCase().trim();
                const ne = (nameEmail || '').toLowerCase().trim();
                // Extract email from platform field (e.g. "Whop : user@email.com")
                const platEmail = ((platform || '').match(/[\w.+-]+@[\w.-]+\.\w+/i) || [])[0]?.toLowerCase() || '';
                const emails = [ne, platEmail].filter(Boolean);

                return (n, e) => {

                    if (e && e.length >= 3 && parts.length >= 2 && parts.every(p => e.includes(p))) return true;
                    if (parts.length >= 2 && n && n.length >= 3 && parts.every(p => n.includes(p))) return true;

            };

            const mapWhopToPayment = (m) => ({
                id: m.id,
                customerName: m.customerName,
                customerEmail: m.customerEmail,

                amountPerPeriod: m.amount || 0,

            const matchPayments = (clientName, nameEmail, platform, invoices, whopMemberships, manualWhopId, extraEmails, csvByMemId, allWhopCsv) => {

                if (allWhopCsv) {

                        if (base !== em) baseEmails.add(base);

                        const csvEmail = (csvRow['Email'] || '').toLowerCase().trim();

                        const csvBase = csvEmail.replace(/\d+@/, '@');

                        const emailMatch = [...allKnownEmails].some(ex => csvEmail === ex || csvEmail.includes(ex) || ex.includes(csvEmail)) ||

                        if (!emailMatch) continue;

                                const perMem = memIds.length > 0 ? spend / memIds.length : spend;

                                    id: memId, customerName: csvRow['Name'] || csvRow['Username'] || '', customerEmail: csvRow['Email'] || '',
                                    amountPaid: perMem, amountPerPeriod: 0, paymentCount: perMem > 0 ? 1 : 0,

                    // Attach closing data notes (reuses closingRow from above)

                        potentialIssue: closingRow['one thing you foresee as a potential issue with this client'] || '',
                        clientEmail: (closingRow['Client Email '] || closingRow['Client Email'] || '').trim(),
                        paymentProcessorEmail: (closingRow['Payment processor username or email'] || '').trim(),

                    } : null;
                    if (fbPayments.length > 0) paymentSources.push('Fanbasis');
                    return { client: s.client, setup: s, contractInfo, closingNotes, stripeInvoices, whopPayments, fbPayments, fbTotalPaid, upcoming, crmFees, stripePaidCount, stripeTotalPaid, stripeUnpaidCount, stripeUnpaidTotal, whopTotalPaid, totalCollected, mrrVal, expectedRevenue, revenueGap, moPaymentsCollected, nextBillingDate: upcoming?.nextBillingDate || null, nextBillingAmount: upcoming?.amount || null, totalPayments: stripePaidCount + whopPayments.length + fbPaid.length, flags, paymentSources };
                });

            const SortTh = ({ label, sortKey, align = 'right' }) => {
                const active = sortConfig.key === sortKey;
                return <th className={`px-3 py-3 text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:text-white select-none ${align === 'left' ? 'text-left' : 'text-right'}`} onClick={() => handleSort(sortKey)}>{label} {active && <span className="text-brand-cyan">{sortConfig.dir === 'asc' ? '▲' : '▼'}</span>}</th>;
            };

            const flagColors = { 'Revenue Gap': 'bg-red-500/20 text-red-400', 'Unpaid Invoices': 'bg-amber-500/20 text-amber-400', 'Loan Officer': 'bg-purple-500/20 text-purple-400', 'No Payments Found': 'bg-red-500/20 text-red-300', 'Failed Charges': 'bg-red-500/20 text-red-400', 'Platform Mismatch': 'bg-orange-500/20 text-orange-400', 'Split Billing': 'bg-blue-500/20 text-blue-400', 'Churned - Underpaid': 'bg-red-500/20 text-red-400' };

            if (loadingInvoices) return (
                <div className="flex items-center justify-center py-24">
                    <div className="text-center space-y-4">
                        <div className="text-4xl animate-spin inline-block">⏳</div>
                        <div className="text-slate-400 text-sm">Fetching payment history from Stripe & Whop...</div>
                    </div>
                </div>
            );

            const displayRows = subTab === 'errors' ? sorted.filter(c => c.flags.length > 0) : subTab === 'upcoming' ? enriched.filter(c => c.nextBillingDate).sort((a, b) => new Date(a.nextBillingDate) - new Date(b.nextBillingDate)) : sorted;

            return (
                <div className="space-y-6">
                    {/* Pending Whop Approvals */}
                    {pendingApprovals.length > 0 && (
                        <div className="card rounded-2xl p-4 border-amber-500/30 bg-amber-500/5">
                            <div className="flex items-center justify-between mb-3">
                                <div>
                                    <h3 className="text-sm font-bold text-amber-400">Whop Matching — Needs Your Approval ({pendingApprovals.length})</h3>
                                    <p className="text-xs text-slate-400 mt-0.5">
                                        {pendingApprovals.filter(a => a.matchType === 'name').length > 0 && <span className="text-emerald-400 mr-3">Name/email matches: {pendingApprovals.filter(a => a.matchType === 'name').length}</span>}
                                        {pendingApprovals.filter(a => a.matchType === 'date').length > 0 && <span className="text-amber-400">Date-based matches: {pendingApprovals.filter(a => a.matchType === 'date').length}</span>}
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    {pendingApprovals.filter(a => a.matchType === 'name').length > 0 && (
                                        <button onClick={() => { const nameMatches = pendingApprovals.filter(a => a.matchType === 'name'); saveBulkMappings(nameMatches.map(a => ({ client: a.client, membershipId: a.membershipId }))); setPendingApprovals(prev => prev.filter(a => a.matchType !== 'name')); }} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/20" style={{cursor:'pointer'}}>Approve All Name Matches</button>
                                    )}
                                    <button onClick={() => { saveBulkMappings(pendingApprovals.map(a => ({ client: a.client, membershipId: a.membershipId }))); setPendingApprovals([]); }} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-blue-500/10 border border-blue-500/30 text-blue-400 hover:bg-blue-500/20" style={{cursor:'pointer'}}>Approve All</button>
                                </div>
                            </div>
                            <div className="space-y-2" style={{maxHeight:'400px',overflow:'auto'}}>
                                {pendingApprovals.map(a => (
                                    <div key={a.key} className="flex items-center gap-3 p-3 rounded-xl" style={{background:'var(--bg-main, #0d1117)'}}>
                                        <span className={`px-1.5 py-0.5 rounded text-xs font-medium shrink-0 ${a.matchType === 'name' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>{a.matchType === 'name' ? 'Name' : 'Date'}</span>
                                        <div style={{flex:1,minWidth:0}}>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="text-sm font-medium text-white">{a.client}</span>
                                                <span className="text-xs text-slate-500">→</span>
                                                <span className="text-sm text-blue-400">{a.whopName}</span>
                                                {a.whopEmail && <span className="text-xs text-slate-500">({a.whopEmail})</span>}
                                            </div>
                                            <div className="flex gap-4 mt-1 text-xs text-slate-500 flex-wrap">
                                                {a.paidDate && <span>Sheet paid: {a.paidDate}</span>}
                                                {a.whopJoined && <span>Whop joined: {a.whopJoined.split(' ')[0]}</span>}
                                                {a.diffDays != null && <span>{a.diffDays === 0 ? 'Same day' : a.diffDays + ' day' + (a.diffDays > 1 ? 's' : '') + ' apart'}</span>}
                                                {parseFloat(a.whopSpend) > 0 && <span>Whop spend: ${parseFloat(a.whopSpend).toFixed(0)}</span>}
                                            </div>
                                        </div>
                                        <div className="flex gap-1.5 shrink-0">
                                            <button onClick={() => { saveWhopMapping(a.client, a.membershipId); setPendingApprovals(prev => prev.filter(p => p.key !== a.key)); }} className="px-2.5 py-1 rounded-lg text-xs font-medium bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/20" style={{cursor:'pointer'}}>Approve</button>
                                            <button onClick={() => { dismissApproval(a.key); setPendingApprovals(prev => prev.filter(p => p.key !== a.key)); }} className="px-2.5 py-1 rounded-lg text-xs font-medium bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20" style={{cursor:'pointer'}}>Reject</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Unmatched Whop Clients — with date-based suggestions */}
                    {(() => {
                        const unmatchedWhop = enriched.filter(c =>
                            /whop/i.test(c.setup.platform) &&
                            c.whopPayments.length === 0 &&
                            !pendingApprovals.find(a => a.client === c.client)
                        );
                        if (unmatchedWhop.length === 0) return null;

                        // Build set of already-used membership IDs
                        const usedMemIds = new Set(Object.values(whopMappings));
                        // Also exclude IDs matched via auto-match or pending approval
                        for (const a of pendingApprovals) usedMemIds.add(a.membershipId);
                        for (const c of enriched) {
                            for (const w of c.whopPayments) usedMemIds.add(w.id);
                        }

                        // Available Whop CSV members (not yet linked)
                        const availableWhop = whopCsv.filter(row => {
                            const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                            return memIds.length > 0 && !memIds.every(id => usedMemIds.has(id));
                        });

                        const parseDate = (str) => {
                            if (!str) return null;
                            // Handle "MM/DD/YYYY" or "YYYY-MM-DD" or "YYYY-MM-DD HH:MM:SS ..."
                            const s = String(str).split(' ')[0];
                            const d = new Date(s.includes('/') ? s : s + 'T00:00:00');
                            return isNaN(d.getTime()) ? null : d;
                        };

                        return (
                            <div className="card rounded-2xl p-4 border-red-500/30 bg-red-500/5">
                                <div className="flex items-center justify-between mb-3">
                                    <div>
                                        <h3 className="text-sm font-bold text-red-400">Unmatched Whop Clients ({unmatchedWhop.length})</h3>
                                        <p className="text-xs text-slate-400 mt-0.5">Pick the best Whop member match for each client. Sorted by closest join date.</p>
                                    </div>
                                </div>
                                <div className="space-y-3" style={{maxHeight:'600px',overflow:'auto'}}>
                                    {unmatchedWhop.map(c => {
                                        const cr = closingLookup[c.client.toLowerCase()];
                                        const email = cr ? (cr['Client Email'] || cr['Client Email '] || '').trim() : '';
                                        const paidDate = parseDate(c.setup.paidDate);

                                        // Sort available Whop members by date proximity
                                        const suggestions = availableWhop.map(row => {
                                            const joinDate = parseDate(row['Joined date']);
                                            const diffDays = (paidDate && joinDate) ? Math.abs(Math.round((joinDate - paidDate) / 86400000)) : 9999;
                                            const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                                            return {
                                                row,
                                                memId: memIds[0],
                                                name: row['Name'] || row['Username'] || '(no name)',
                                                email: row['Email'] || '',
                                                username: row['Username'] || '',
                                                spend: parseFloat(row['Platform spend (USD)'] || '0') || 0,
                                                joinDate: (row['Joined date'] || '').split(' ')[0],
                                                diffDays,
                                            };
                                        }).sort((a, b) => a.diffDays - b.diffDays).slice(0, 5);

                                        return (
                                            <div key={c.client} className="p-3 rounded-xl" style={{background:'var(--bg-main, #0d1117)'}}>
                                                <div className="flex items-center gap-3 mb-2">
                                                    <span className="px-1.5 py-0.5 rounded text-xs font-medium shrink-0 bg-red-500/20 text-red-400">No Match</span>
                                                    <div style={{flex:1}}>
                                                        <span className="text-sm font-medium text-white">{c.client}</span>
                                                        <span className="text-xs text-slate-500 ml-3">
                                                            {email && <span className="mr-3">Email: {email}</span>}
                                                            {c.setup.paidDate && <span className="mr-3">Paid: {c.setup.paidDate}</span>}
                                                            <span>MRR: {c.setup.mrr || '?'}</span>
                                                        </span>
                                                    </div>
                                                    <button onClick={() => { setLinkWhopClient(c.client); setLinkWhopSearch(''); }} className="px-2 py-1 rounded text-xs bg-slate-500/10 border border-slate-500/30 text-slate-400 hover:bg-slate-500/20 shrink-0" style={{cursor:'pointer'}}>Search All</button>
                                                </div>
                                                <div className="space-y-1 ml-6">
                                                    {suggestions.map(s => (
                                                        <div key={s.memId} className="flex items-center gap-2 p-2 rounded-lg hover:bg-dark-800 transition" style={{cursor:'pointer'}} onClick={() => { saveWhopMapping(c.client, s.memId); }}>
                                                            <span className={`px-1.5 py-0.5 rounded text-xs font-medium shrink-0 ${s.diffDays <= 3 ? 'bg-emerald-500/20 text-emerald-400' : s.diffDays <= 7 ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-500/20 text-slate-400'}`}>
                                                                {s.diffDays <= 3 ? 'Close' : s.diffDays <= 7 ? 'Near' : s.diffDays === 9999 ? '?' : s.diffDays + 'd'}
                                                            </span>
                                                            <span className="text-sm text-blue-400 font-medium" style={{minWidth:'120px'}}>{s.name}</span>
                                                            <span className="text-xs text-slate-500">{s.username && s.username !== s.name ? '@' + s.username : ''}</span>
                                                            <span className="text-xs text-slate-500">{s.email}</span>
                                                            <span className="text-xs text-slate-400 ml-auto shrink-0">Joined: {s.joinDate}</span>
                                                            <span className="text-xs text-emerald-400 shrink-0">${s.spend.toFixed(0)}</span>
                                                            {s.diffDays !== 9999 && <span className="text-xs text-slate-600 shrink-0">({s.diffDays}d apart)</span>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })()}

                    {/* KPIs */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-red-400">{fmtC(totalRevenueGap)}</div><div className="text-xs text-slate-400 mt-1">Revenue Gap</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-emerald-400">{fmtC(totalCollectedAll)}</div><div className="text-xs text-slate-400 mt-1">Total Collected</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-amber-400">{fmtC(totalUnpaid)}</div><div className="text-xs text-slate-400 mt-1">Unpaid Invoices</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className={`text-2xl font-bold ${clientsWithFlags > 0 ? 'text-red-400' : 'text-emerald-400'}`}>{clientsWithFlags}</div><div className="text-xs text-slate-400 mt-1">Clients w/ Flags</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-purple-400">{loClients}</div><div className="text-xs text-slate-400 mt-1">Loan Officer Billing</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-amber-400">{noPayments}</div><div className="text-xs text-slate-400 mt-1">No Payments Found</div></div>
                    </div>

                    {invoiceData.errors?.length > 0 && (
                        <div className="card rounded-2xl p-3 border-red-500/30 bg-red-500/5">
                            {invoiceData.errors.map((e, i) => <div key={i} className="text-xs text-red-400">{e.source}: {e.message}</div>)}
                        </div>
                    )}

                    {/* Sub-tabs */}
                    <div className="flex items-center gap-3">
                        <div className="flex gap-1 bg-dark-800 p-1 rounded-lg">
                            {[{id:'errors',label:'Billing Errors'},{id:'all',label:'All Clients'},{id:'upcoming',label:'Upcoming Billing'},{id:'map-whop',label:'Map Whop'}].map(t => (
                                <button key={t.id} onClick={() => setSubTab(t.id)} className={`px-4 py-2 rounded-md text-xs font-medium transition ${subTab === t.id ? 'bg-brand-cyan/20 text-brand-cyan' : 'text-secondary hover:text-white'}`}>{t.label}</button>
                            ))}
                        </div>
                    </div>

                    {/* Map Whop Tab */}
                    {subTab === 'map-whop' && <MapWhopView enriched={enriched} whopCsv={whopCsv} whopMappings={whopMappings} saveWhopMapping={saveWhopMapping} fmtC={fmtC} />}

                    {/* Filters */}
                    {subTab !== 'map-whop' && <div className="card rounded-2xl p-4">
                        <div className="flex flex-wrap items-center gap-3">
                            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search clients..." className="w-64 input-field border rounded-xl px-3 py-2 text-sm" />
                            <select value={filterFlag} onChange={e => setFilterFlag(e.target.value)} className="input-field border rounded-xl px-3 py-2 text-sm">
                                <option value="">All Flags</option>
                                {flagOptions.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <select value={filterPlatform} onChange={e => setFilterPlatform(e.target.value)} className="input-field border rounded-xl px-3 py-2 text-sm">
                                <option value="">All Platforms</option>
                                <option value="stripe">Stripe Only</option>
                                <option value="whop">Whop Only</option>
                                <option value="fanbasis">Fanbasis Only</option>
                                <option value="none">No Processor Payments</option>
                                <option value="lo">Loan Officer</option>
                            </select>
                            {(search || filterFlag || filterPlatform) && <button onClick={() => { setSearch(''); setFilterFlag(''); setFilterPlatform(''); }} className="px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500/20">Clear</button>}
                            <span className="text-xs text-slate-500">Showing {displayRows.length} of {enriched.length}</span>
                            <button onClick={generateAllAiNotes} className="px-3 py-2 rounded-lg bg-purple-500/10 border border-purple-500/30 text-purple-400 text-xs font-medium hover:bg-purple-500/20 ml-auto" style={{cursor:'pointer'}}>Generate AI Notes</button>
                            <button onClick={exportCSV} className="px-3 py-2 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium hover:bg-emerald-500/20">Export CSV</button>
                            <button onClick={() => { ['vam_clients','vam_setup','vam_cache_time','vam_daily_spend','vam_daily_spend_cache_time','vam_subscriptions','vam_subscriptions_cache_time','vam_billing_mappings','vam_billing_invoices','vam_billing_invoices_cache_time'].forEach(k => localStorage.removeItem(k)); localStorage.setItem('vam_active_tab', 'billing-errors'); window.location.reload(); }} className="px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-medium hover:bg-blue-500/20">Clear Cache & Reload</button>
                        </div>
                    </div>}

                    {/* Table */}
                    {subTab !== 'map-whop' &&
                    <div className="card rounded-2xl overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-dark-800">
                                    <tr>
                                        <SortTh label="Client" sortKey="client" align="left" />
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Contract Notes</th>
                                        <SortTh label="MRR" sortKey="mrrVal" />
                                        <SortTh label="Stripe Paid" sortKey="stripePaidCount" />
                                        <SortTh label="Stripe Total" sortKey="stripeTotalPaid" />
                                        <SortTh label="Whop Paid" sortKey="whopTotalPaid" />
                                        <SortTh label="Fanbasis" sortKey="fbTotalPaid" />
                                        <SortTh label="Total Collected" sortKey="totalCollected" />
                                        <SortTh label="Expected" sortKey="expectedRevenue" />
                                        <SortTh label="Revenue Gap" sortKey="revenueGap" />
                                        <SortTh label="Unpaid" sortKey="stripeUnpaidTotal" />
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Next Billing</th>
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase" style={{minWidth:'200px'}}>AI Billing Notes</th>
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Flags</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-dark-700">
                                    {displayRows.length === 0 ? (
                                        <tr><td colSpan={14} className="px-4 py-12 text-center text-slate-500 text-sm">No clients match current filters</td></tr>
                                    ) : displayRows.map(c => (
                                        <tr key={c.client} className="hover:bg-dark-800 cursor-pointer transition" onClick={() => setSelectedClient(c.client)}>
                                            <td className="px-3 py-3"><div className="font-medium text-white text-sm">{c.client}</div><div className="text-xs text-slate-500">{c.setup.status} {c.setup.platform ? `| ${c.setup.platform}` : ''}</div></td>
                                            <td className="px-3 py-3" style={{maxWidth:'180px'}}>
                                                {c.setup.contractNotes ? <div className="text-xs text-slate-400 truncate" title={c.setup.contractNotes}>{c.setup.contractNotes.substring(0, 50)}{c.setup.contractNotes.length > 50 ? '...' : ''}</div> : <span className="text-slate-600 text-xs">-</span>}
                                                {c.contractInfo.loanOfficer && <div className="text-xs text-purple-400 mt-0.5">LO: {c.contractInfo.loanOfficerName || 'Yes'}</div>}
                                            </td>
                                            <td className="px-3 py-3 text-right text-sm text-white">{c.mrrVal > 0 ? fmtC(c.mrrVal) : '-'}</td>
                                            <td className="px-3 py-3 text-right"><span className="text-sm text-purple-400">{c.stripePaidCount}</span>{c.stripeUnpaidCount > 0 && <span className="text-xs text-red-400 ml-1">({c.stripeUnpaidCount} unpaid)</span>}</td>
                                            <td className="px-3 py-3 text-right text-sm text-emerald-400">{c.stripeTotalPaid > 0 ? fmtC(c.stripeTotalPaid) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm text-blue-400">{c.whopTotalPaid > 0 ? fmtC(c.whopTotalPaid) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm text-orange-400">{c.fbTotalPaid > 0 ? fmtC(c.fbTotalPaid) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm font-medium text-emerald-400">{c.totalCollected > 0 ? fmtC(c.totalCollected) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm text-slate-300">{c.expectedRevenue > 0 ? fmtC(c.expectedRevenue) : '-'}</td>
                                            <td className="px-3 py-3 text-right">{c.revenueGap > 0 ? <span className={`font-bold text-sm ${c.revenueGap > 500 ? 'text-red-400' : c.revenueGap > 100 ? 'text-amber-400' : 'text-slate-400'}`}>{fmtC(c.revenueGap)}</span> : <span className="text-emerald-400 text-xs">OK</span>}</td>
                                            <td className="px-3 py-3 text-right">{c.stripeUnpaidTotal > 0 ? <span className="text-red-400 text-sm font-medium">{fmtC(c.stripeUnpaidTotal)}</span> : <span className="text-slate-600 text-xs">-</span>}</td>
                                            <td className="px-3 py-3 text-sm">{c.nextBillingDate ? <div><div className="text-brand-cyan">{formatDateStr(new Date(c.nextBillingDate))}</div>{c.nextBillingAmount && <div className="text-xs text-slate-500">{fmtC(c.nextBillingAmount)}</div>}</div> : <span className="text-slate-600 text-xs">-</span>}</td>
                                            <td className="px-3 py-3" style={{maxWidth:'220px'}} onClick={e => e.stopPropagation()}>
                                                {aiNotesLoading[c.client] ? <span className="text-xs text-slate-500">Analyzing...</span> :
                                                aiNotes[c.client] ? <div className="text-xs text-slate-300 whitespace-pre-wrap" style={{lineHeight:'1.4'}}>{aiNotes[c.client].note}</div> :
                                                <button onClick={() => generateAiNote(c)} className="text-xs text-blue-400 hover:text-blue-300" style={{background:'none',border:'none',cursor:'pointer',padding:0}}>Generate</button>}
                                            </td>
                                            <td className="px-3 py-3"><div className="flex flex-wrap gap-1">{c.flags.map(f => <span key={f} className={`px-1.5 py-0.5 rounded text-xs font-medium ${flagColors[f] || 'bg-slate-500/20 text-slate-400'}`}>{f}</span>)}</div></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>}

                    {/* Payment Detail Drawer */}
                    {selectedClient && selectedData && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',justifyContent:'flex-end'}} onClick={() => setSelectedClient(null)}>
                            <div style={{width:'600px',maxWidth:'90vw',height:'100vh',background:'var(--bg-card, #161b22)',borderLeft:'1px solid var(--border, #21262d)',overflow:'auto'}} onClick={e => e.stopPropagation()}>
                                <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border, #21262d)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'var(--bg-card, #161b22)',zIndex:1}}>
                                    <div><h2 className="text-lg font-bold text-white">{selectedClient}</h2><p className="text-xs text-secondary mt-1">Payment History & Details</p></div>
                                    <button onClick={() => setSelectedClient(null)} className="text-secondary hover:text-white text-xl" style={{background:'none',border:'none',cursor:'pointer'}}>×</button>
                                </div>
                                <div style={{padding:'16px'}} className="space-y-4">
                                    <div className="card rounded-xl p-4">
                                        <h3 className="text-sm font-semibold text-brand-cyan mb-3">Contract Info</h3>
                                        <div className="grid grid-cols-2 gap-2 text-xs">
                                            <div><span className="text-secondary">MRR:</span> <span className="text-white ml-1">{selectedData.setup.mrr || '-'}</span></div>
                                            <div><span className="text-secondary">Contract Length:</span> <span className="text-white ml-1">{selectedData.setup.contractLength || '-'}</span></div>
                                            <div><span className="text-secondary">Revenue Contracted:</span> <span className="text-white ml-1">{selectedData.setup.revenueContracted || '-'}</span></div>
                                            <div><span className="text-secondary">Mo. Collected:</span> <span className="text-white ml-1">{selectedData.setup.moPaymentsCollected || '-'}</span></div>

                                    {(() => {

                                                            {m.totalPaid > 0 && <span>Paid: {fmtC(m.totalPaid)}</span>}
                                                            {m.paymentCount > 0 && <span>{m.paymentCount} payment{m.paymentCount !== 1 ? 's' : ''}</span>}

                                <button onClick={() => sendAi(aiInput)} disabled={aiLoading || !aiInput.trim()} className={`px-3 py-2 rounded-lg text-xs font-medium ${aiLoading || !aiInput.trim() ? 'bg-dark-700 text-slate-500' : 'bg-brand-cyan/20 text-brand-cyan'}`}>Send</button>

            );
