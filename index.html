        // ========== CASHFLOW SCHEDULE TAB (Auto from Stripe + Whop) ==========
        const CashflowTab = ({ setupData = [] }) => {
            const [cashflowData, setCashflowData] = useState([]);
            const [activeSubs, setActiveSubs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [loadingMsg, setLoadingMsg] = useState('Fetching payment data...');
            const [search, setSearch] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: null, dir: 'desc' });
            const [showProjections, setShowProjections] = useState(true);
            const [filterStatus, setFilterStatus] = useState('all');
            const [dataSource, setDataSource] = useState('stripe'); // 'stripe', 'whop', 'all'
            const [yearRange, setYearRange] = useState([2024, 2025, 2026]); // years to show
            const [collapsedYears, setCollapsedYears] = useState(new Set()); // collapsed year columns
            const toggleYear = (yr) => setCollapsedYears(prev => { const n = new Set(prev); n.has(yr) ? n.delete(yr) : n.add(yr); return n; });
            const [overrides, setOverrides] = useState({}); // { 'clientkey|2026|3': amount }
            const [editingCell, setEditingCell] = useState(null); // { clientKey, yr, mo }
            const [editValue, setEditValue] = useState('');
            const [savingCell, setSavingCell] = useState(null);
            const [planModal, setPlanModal] = useState(null); // { clientKey, name, email }
            const [planAmount, setPlanAmount] = useState('');
            const [planStartMonth, setPlanStartMonth] = useState('');
            const [planStartYear, setPlanStartYear] = useState('2026');
            const [planMonths, setPlanMonths] = useState('12');
            const [planNote, setPlanNote] = useState('');

            const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const NOW = new Date();
            const CURRENT_YEAR = NOW.getFullYear();
            const CURRENT_MONTH = NOW.getMonth(); // 0-indexed

            useEffect(() => {
                const fetchAll = async () => {
                    try {
                        const cacheKey = 'vam_auto_cashflow';
                        const cacheTimeKey = 'vam_auto_cashflow_time';
                        const cached = localStorage.getItem(cacheKey);
                        const cacheTime = localStorage.getItem(cacheTimeKey);
                        if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 600000) {
                            const parsed = JSON.parse(cached);
                            setCashflowData(parsed.clients);
                            setActiveSubs(parsed.subs);
                            setLoading(false);
                            return;
                        }

                        // Fetch Stripe invoices/charges and Whop payments in parallel
                        setLoadingMsg('Fetching Stripe invoices & charges...');
                        const [stripeRes, whopRes] = await Promise.all([
                            fetch('/api/billing-errors', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'fetchInvoices' })
                            }).then(r => r.json()).catch(() => ({ stripe: [], stripeUpcoming: [] })),
                            fetch('/api/billing-subscriptions', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'fetchAll' })
                            }).then(r => r.json()).catch(() => ({ stripe: [], whop: [] }))
                        ]);

                        setLoadingMsg('Processing payment history...');

                        // Build client map: email -> { name, months: { '2024-01': amount, ... }, source }
                        const clientMap = {};

                        const addPayment = (email, name, date, amount, source) => {
                            if (!date || !amount || amount <= 0) return;
                            const e = (email || '').toLowerCase().trim();
                            const n = (name || '').trim();
                            const key = e || n.toLowerCase();
                            if (!key) return;

                            const d = new Date(date);
                            const yr = d.getFullYear();
                            const mo = d.getMonth();
                            const monthKey = `${yr}-${String(mo).padStart(2, '0')}`;

                            if (!clientMap[key]) {
                                clientMap[key] = { email: e, name: n, months: {}, sources: new Set(), subAmount: 0, subInterval: null, subActive: false, cancelAtPeriodEnd: false };
                            }
                            if (n && !clientMap[key].name) clientMap[key].name = n;
                            if (e && !clientMap[key].email) clientMap[key].email = e;
                            clientMap[key].months[monthKey] = (clientMap[key].months[monthKey] || 0) + amount;
                            clientMap[key].sources.add(source);
                        };

                        // Process Stripe invoices and charges
                        const stripePayments = stripeRes.stripe || [];
                        for (const p of stripePayments) {
                            if (!p.paid && p.status !== 'paid') continue;
                            const amount = p.amountPaid || p.amountDue || 0;
                            if (amount <= 0) continue;
                            addPayment(p.customerEmail, p.customerName, p.created, amount, 'stripe');
                        }

                        // Process active Stripe subscriptions for projections
                        const stripeSubs = stripeRes.stripeUpcoming || [];
                        for (const sub of stripeSubs) {
                            if (sub.status !== 'active') continue;
                            const e = (sub.customerEmail || '').toLowerCase().trim();
                            const n = (sub.customerName || '').trim();
                            const key = e || n.toLowerCase();
                            if (!key) continue;
                            if (!clientMap[key]) {
                                clientMap[key] = { email: e, name: n, months: {}, sources: new Set(), subAmount: 0, subInterval: null, subActive: false, cancelAtPeriodEnd: false };
                            }
                            let monthly = sub.amount || 0;
                            if (sub.interval === 'year') monthly = monthly / 12;
                            else if (sub.interval === 'week') monthly = monthly * 4.33;
                            clientMap[key].subAmount = Math.max(clientMap[key].subAmount, monthly);
                            clientMap[key].subInterval = sub.interval;
                            clientMap[key].subActive = true;
                            clientMap[key].cancelAtPeriodEnd = sub.cancelAtPeriodEnd || false;
                            clientMap[key].sources.add('stripe');
                        }

                        // Process Whop memberships with payment history
                        const whopMembers = whopRes.whop || [];
                        for (const m of whopMembers) {
                            const payments = m.payments || [];
                            for (const p of payments) {
                                if (p.status !== 'paid' && p.status !== 'succeeded') continue;
                                addPayment(m.customerEmail, m.customerName, p.created, p.amount || 0, 'whop');
                            }
                            // Track active whop subs for projection
                            if (m.status === 'active') {
                                const e = (m.customerEmail || '').toLowerCase().trim();
                                const n = (m.customerName || '').trim();
                                const key = e || n.toLowerCase();
                                if (key && clientMap[key]) {
                                    let monthly = m.amount || 0;
                                    if (m.interval === 'year') monthly = monthly / 12;
                                    clientMap[key].subAmount = Math.max(clientMap[key].subAmount, monthly);
                                    clientMap[key].subActive = true;
                                    clientMap[key].cancelAtPeriodEnd = m.cancelAtPeriodEnd || false;
                                    clientMap[key].sources.add('whop');
                                }
                            }
                        }

                        // Convert to array and build year/month grids
                        const clients = Object.values(clientMap).map(c => {
                            // Build monthly arrays for each year
                            const yearData = {};
                            for (const yr of [2024, 2025, 2026]) {
                                yearData[yr] = new Array(12).fill(0);
                            }
                            for (const [monthKey, amount] of Object.entries(c.months)) {
                                const [yr, mo] = monthKey.split('-').map(Number);
                                if (yearData[yr]) yearData[yr][mo] = amount;
                            }

                            // Calculate totals per year
                            const yearTotals = {};
                            for (const yr of [2024, 2025, 2026]) {
                                yearTotals[yr] = yearData[yr].reduce((a, b) => a + b, 0);
                            }

                            // Determine status based on subscription + payment pattern
                            let status = 'inactive';
                            let projectedMonthly = 0;

                            if (c.subActive && !c.cancelAtPeriodEnd) {
                                status = 'active-sub';
                                projectedMonthly = c.subAmount;
                            } else if (c.subActive && c.cancelAtPeriodEnd) {
                                status = 'canceling';
                                projectedMonthly = 0;
                            } else {
                                // No active sub — check recent payment pattern
                                const recent2025 = yearData[2025].slice(Math.max(0, CURRENT_MONTH - 3));
                                const recent2026 = yearData[2026];
                                const hasRecent = [...recent2025, ...recent2026].some(v => v > 0);
                                const allPayments = [...yearData[2024], ...yearData[2025], ...yearData[2026]].filter(v => v > 0);

                                if (allPayments.length === 0) {
                                    status = 'no-payments';
                                } else if (hasRecent) {
                                    // Detect recurring from pattern
                                    const amounts = allPayments.filter(a => a > 5);
                                    if (amounts.length >= 2) {
                                        const rounded = amounts.map(a => Math.round(a / 50) * 50);
                                        const freq = {};
                                        rounded.forEach(a => { freq[a] = (freq[a] || 0) + 1; });
                                        const best = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];
                                        if (best[1] >= 2 && parseFloat(best[0]) >= 50) {
                                            status = 'recurring';
                                            projectedMonthly = parseFloat(best[0]);
                                        } else {
                                            status = 'active';
                                        }
                                    } else {
                                        status = 'one-time';
                                    }
                                } else {
                                    // Last payment was a while ago
                                    const lastMonth2025 = yearData[2025].reduce((last, v, i) => v > 0 ? i : last, -1);
                                    if (lastMonth2025 >= 0 && lastMonth2025 < CURRENT_MONTH - 3) {
                                        status = 'churned';
                                    } else if (yearTotals[2025] === 0 && yearTotals[2024] > 0) {
                                        status = 'churned';
                                    } else {
                                        status = 'inactive';
                                    }
                                }
                            }

                            // Build 2026 projections
                            const projected2026 = [...yearData[2026]]; // start with actual 2026 data
                            if (projectedMonthly > 0 && showProjections) {
                                for (let m = 0; m < 12; m++) {
                                    const monthDate = new Date(2026, m, 1);
                                    // Only project future months that don't have actuals
                                    if (monthDate > NOW && projected2026[m] === 0) {
                                        projected2026[m] = projectedMonthly;
                                    }
                                }
                            }
                            const projected2026Total = projected2026.reduce((a, b) => a + b, 0);

                            return {
                                email: c.email,
                                name: c.name,
                                sources: [...c.sources],
                                status,
                                subAmount: c.subAmount,
                                subActive: c.subActive,
                                cancelAtPeriodEnd: c.cancelAtPeriodEnd,
                                yearData,
                                yearTotals,
                                projected2026,
                                projected2026Total,
                                projectedMonthly,
                                grandTotal: yearTotals[2024] + yearTotals[2025] + projected2026Total
                            };
                        });

                        // Cache
                        localStorage.setItem(cacheKey, JSON.stringify({ clients, subs: stripeSubs }));
                        localStorage.setItem(cacheTimeKey, Date.now().toString());
                        setCashflowData(clients);

        // ========== MAIN APP ==========

            });

                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);

            };

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => { setUser(session?.user || null); setAuthLoading(false); });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => setUser(session?.user || null));
                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const params = new URLSearchParams(window.location.search);
                const clientParam = params.get('client');
                
                // Try to load from cache first for instant display
                const cachedClients = localStorage.getItem('vam_clients');
                const cachedSetup = localStorage.getItem('vam_setup');
                const cacheTime = localStorage.getItem('vam_cache_time');
                const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                
                // Use cache if less than 5 minutes old
                if (cachedClients && cachedSetup && cacheAge < 300000) {
                    const c = JSON.parse(cachedClients);
                    const s = JSON.parse(cachedSetup);
                    setClients(c);
                    setSetupData(s);
                    if (clientParam) { 
                        const found = c.find(x => x.client.toLowerCase() === decodeURIComponent(clientParam).toLowerCase()); 
                        if (found) setSelected(found); 
                    }
                    setLoading(false);
                    // Still fetch fresh data in background
                    fetchFreshData(clientParam, false);
                } else {
                    // No cache or expired, fetch fresh
                    fetchFreshData(clientParam, true);
                }
            }, [user]);

            const fetchFreshData = (clientParam, updateLoading) => {
                Promise.all([
                    // Client Ads Performance - headers in row 2, skip row 1
                    fetch(URLS.clientAdsPerformance).then(r => r.text()).then(csv => {
                        console.log('[CSH] Ads CSV length:', csv.length);
                        const raw = Papa.parse(csv, { header: false, skipEmptyLines: true });
                        const headers = raw.data[1] || [];
                        console.log('[CSH] Ads headers:', headers.slice(0, 5), 'Total rows:', raw.data.length);
                        const result = raw.data.slice(2).map(row => {
                            const obj = {}; headers.forEach((h, i) => { obj[h] = row[i] || ''; }); return obj;
                        }).map(mapClient).filter(r => r.client);
                        console.log('[CSH] Ads clients after filter:', result.length);
                        return result;
                    }).catch(err => { console.error('[CSH] Ads fetch error:', err); return []; }),
                    // Setup Timing - headers in row 1, skip row 2
                    fetch(URLS.setupTiming).then(r => r.text()).then(csv => {
                        console.log('[CSH] Setup CSV length:', csv.length);
                        const raw = Papa.parse(csv, { header: false, skipEmptyLines: true });
                        const headers = raw.data[0] || [];
                        const result = raw.data.slice(2).map(row => {
                            const obj = {}; headers.forEach((h, i) => { obj[h] = row[i] || ''; }); return obj;
                        }).map(mapSetupTiming).filter(r => r.client);
                        console.log('[CSH] Setup clients after filter:', result.length);
                        return result;
                    }).catch(err => { console.error('[CSH] Setup fetch error:', err); return []; }),
                    // Meta Ads - real-time data from Meta Marketing API
                    fetchMetaAdData()
                ]).then(([c, s, metaAds]) => {

                    const clientsWithMeta = c.map(client => {
                        const meta = metaAds[client.client];

                            return { ...client, weeklySpend: meta.spend != null ? parseFloat(meta.spend) : client.weeklySpend, weeklyLeads: meta.leads != null ? meta.leads : client.weeklyLeads, weeklyCPL: meta.cpl != null ? parseFloat(meta.cpl) : client.weeklyCPL, adDataSource: 'meta' };
                        }
                        return { ...client, adDataSource: 'sheets' };
                    });

                    // Save to cache
                    localStorage.setItem('vam_clients', JSON.stringify(clientsWithMeta));
                    localStorage.setItem('vam_setup', JSON.stringify(s));
                    localStorage.setItem('vam_cache_time', Date.now().toString());

                    setClients(clientsWithMeta);
                    setSetupData(s);
                    if (clientParam) {
                        const found = clientsWithMeta.find(x => x.client.toLowerCase() === decodeURIComponent(clientParam).toLowerCase());
                        if (found) setSelected(found);
                    }
                    if (updateLoading) setLoading(false);
                });
            };

            const getSetupInfo = (client) => {
                if (!client) return null;
                const name = client.client.toLowerCase().trim();
                return setupData.find(s => { const sn = (s.client || '').toLowerCase().trim(); return sn === name || sn.includes(name) || name.includes(sn) || name.split(' ').filter(p => p.length > 2).some(p => sn.includes(p)); });
            };

            // Show loading only while checking auth status
            if (authLoading) return <div className="min-h-screen flex items-center justify-center px-8"><div className="max-w-2xl text-center"><p className="text-2xl md:text-4xl font-bold text-white leading-relaxed">"The only work that matters is the work that no one sees. It shows who you really are rather than who you say you are."</p><p className="mt-6 text-lg font-semibold text-brand-purple">— Alex Hormozi</p><div className="mt-8 w-full h-1 bg-dark-700 rounded-full overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-brand-cyan to-brand-purple loading-bar"></div></div></div></div>;
            // Show login page if not authenticated
            if (!user) return <LoginPage onLogin={setUser} />;
            // Show loading while fetching data (only for authenticated users)
            if (loading) return <div className="min-h-screen flex items-center justify-center px-8"><div className="max-w-2xl text-center"><p className="text-2xl md:text-4xl font-bold text-white leading-relaxed">"The only work that matters is the work that no one sees. It shows who you really are rather than who you say you are."</p><p className="mt-6 text-lg font-semibold text-brand-purple">— Alex Hormozi</p><div className="mt-8 w-full h-1 bg-dark-700 rounded-full overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-brand-cyan to-brand-purple loading-bar"></div></div></div></div>;

            const s = getSetupInfo(selected);

            // Check if selected client exists in ads performance data
            const isMissingFromAdsSheet = selected ? false : false; // Will be set properly below

            const renderTab = () => {
                switch (tab) {
                    case 'overview': return <OverviewTab clients={clients} setupData={setupData} onSelectClient={(c) => { setSelected(c); setTab('health'); }} />;
                    case 'redflags': return <RedFlagsTab clients={clients} setupData={setupData} onSelectClient={(c) => { setSelected(c); setTab('health'); }} />;
                    case 'health': return <ClientHealthTab c={selected} s={s} isMissingFromAdsSheet={false} />;
                    case 'notes': return <NotesActivityTab c={selected} />;
                    case 'timeline': return <ClientTimelineTab clients={clients} setupData={setupData} />;
                    case 'datagaps': return <DataGapsTab clients={clients} setupData={setupData} />;
                    case 'meta-settings': return <MetaAdSettingsTab clients={clients} />;
                    case 'fathom-meetings': return <FathomMeetingsTab clients={clients} user={user} />;
                    case 'pipeline': return <DealPipelineTab clients={clients} setupData={setupData} onSelectClient={(c) => { setSelected(c); setTab('health'); }} />;
                    case 'billing-audit': return <BillingAuditTab clients={clients} setupData={setupData} />;
                    case 'billing-errors': return <BillingErrorsTab setupData={setupData} />;
                    case 'client-map': return <ClientMapTab clients={clients} setupData={setupData} onSelectClient={(c) => { setSelected(c); setTab('health'); }} />;
                    case 'speed-to-lead': return <SpeedToLeadTab clients={clients} setupData={setupData} />;
                    case 'users': return <UsersTab />;
                    case 'ltv-churn': return <LTVChurnTab />;
                    case 'cashflow': return <CashflowTab setupData={setupData} />;
                    case 'client-portals': return <ClientPortalsTab clients={clients} setupData={setupData} />;
                    default: return <OverviewTab clients={clients} setupData={setupData} onSelectClient={(c) => { setSelected(c); setTab('health'); }} />;
                }
            };

            return (
                <AuthContext.Provider value={{ user }}>
                    <ThemeContext.Provider value={{ theme, toggleTheme }}>
                        <div className="flex min-h-screen">
                            <aside className="w-72 sidebar border-r flex flex-col divider">
                                <div className="p-5 border-b divider">
                                    <h1 className="text-xl font-bold bg-gradient-to-r from-brand-cyan to-brand-purple bg-clip-text text-transparent">VAM Dashboard</h1>
                                    <div className="flex items-center gap-2 mt-2"><div className="w-2 h-2 bg-emerald-500 rounded-full"></div><span className="text-xs text-secondary">{getDisplayName(user.email, user)}</span></div>
                                </div>
                                <div className="px-4 pt-3 pb-1">
                                    <div className="flex rounded-lg overflow-hidden border divider">
                                        <span className="flex-1 text-center py-2 text-xs font-semibold bg-brand-cyan/20 text-brand-cyan border-r divider">Client Success Hub</span>
                                        <a href="dashboard.html" className="flex-1 text-center py-2 text-xs font-medium text-secondary hover-bg">Media Buyer</a>
                                    </div>
                                </div>
                                <div className="px-4 py-2">
                                    <select value={selected ? selected.client : ''} onChange={e => setSelected(clients.find(c => c.client === e.target.value))} className="w-full input-field border rounded-xl px-4 py-3 text-sm">
                                        <option value="">Select a client...</option>
                                        {clients.map(c => <option key={c.client} value={c.client}>{c.client}</option>)}
                                    </select>
                                </div>
                                <nav className="py-2 flex-1 min-h-0 overflow-y-auto scrollbar">
                                    {tabs.map(t => (
                                        <button key={t.id} onClick={() => setTab(t.id)} className={'w-full flex items-start gap-3 px-5 py-3 text-left ' + (tab === t.id ? 'tab-active text-primary' : 'text-secondary hover-bg')}>
                                            <span className="text-lg">{t.icon}</span>
                                            <div><div className="text-sm font-medium">{t.name}</div><div className="text-xs text-muted">{t.desc}</div></div>
                                        </button>
                                    ))}
                                </nav>

                            {/* Client Comparison Section */}
                            <div className="flex-1 min-h-0 overflow-y-auto border-t border-dark-700">
                                <div className="p-4">
                                    <h3 className="text-xs font-semibold text-slate-500 uppercase mb-3">All Clients</h3>
                                    <div className="space-y-1 max-h-[400px] overflow-y-auto scrollbar">
                                        {setupData.map(setup => {
                                            const inAdsPerf = clients.some(c => {
                                                const cn = c.client.toLowerCase().trim();
                                                const sn = setup.client.toLowerCase().trim();
                                                return cn === sn || cn.includes(sn) || sn.includes(cn);
                                            });
                                            const adsClient = clients.find(c => {
                                                const cn = c.client.toLowerCase().trim();
                                                const sn = setup.client.toLowerCase().trim();
                                                return cn === sn || cn.includes(sn) || sn.includes(cn);
                                            });
                                            return (
                                                <div 
                                                    key={setup.client}
                                                    onClick={() => { if (adsClient) setSelected(adsClient); }}
                                                    className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors ${
                                                        selected && adsClient && selected.client === adsClient.client 
                                                            ? 'bg-brand-cyan/20 text-white' 
                                                            : inAdsPerf 
                                                                ? 'hover:bg-dark-800 text-slate-300' 
                                                                : 'hover:bg-dark-800 text-slate-500'
                                                    }`}
                                                >
                                                    <span className={`w-2 h-2 rounded-full flex-shrink-0 ${inAdsPerf ? 'bg-emerald-500' : 'bg-red-500'}`}></span>
                                                    <span className="truncate flex-1">{setup.client}</span>
                                                    {!inAdsPerf && <span className="text-xs text-red-400">Missing</span>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="mt-3 pt-3 border-t border-dark-700 text-xs text-slate-500">
                                        <div className="flex items-center gap-2 mb-1"><span className="w-2 h-2 rounded-full bg-emerald-500"></span> In Ads Performance</div>
                                        <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-red-500"></span> Missing from Ads</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="p-4 border-t border-dark-700 space-y-2">
                                <a href="dashboard.html" className="block w-full text-center py-2 bg-dark-800 hover:bg-dark-700 text-slate-300 rounded-lg text-sm">→ Media Buyer Overview</a>
                                <button onClick={() => supabase.auth.signOut()} className="w-full py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-sm">Logout</button>
                            </div>
                        </aside>
                        <main className="flex-1 flex flex-col">
                            <header className="header-bar backdrop-blur border-b px-8 py-4 flex items-center justify-between divider">
                                <div>
                                    {selected ? (
                                        <div className="flex items-center gap-4">
                                            <h2 className="text-xl font-bold text-primary">{selected.client}</h2>
                                            <span className={'px-3 py-1 rounded-full text-sm ' + getHealthColor(getHealthScore(selected, s)).text + ' bg-dark-800'}>{getHealthColor(getHealthScore(selected, s)).label}</span>
                                            <span className="text-secondary">Day {selected.days}</span>
                                            {s && s.csmRep && <span className="text-brand-purple text-sm">CSM: {s.csmRep}</span>}
                                            {s && s.mrr && <span className="text-emerald-400 text-sm">MRR: {s.mrr}</span>}
                                        </div>
                                    ) : (
                                        <h2 className="text-xl text-secondary">{tab === 'overview' ? '📊 Overview' : tab === 'redflags' ? '🚩 Red Flags Dashboard' : tab === 'timeline' ? '📅 Renewals Timeline' : tab === 'meta-settings' ? '⚙️ Meta Ad Settings' : tab === 'pipeline' ? '🤝 Deal Pipeline' : tab === 'billing-audit' ? '💲 Billing Audit' : tab === 'client-map' ? '🗺️ Client Map' : tab === 'speed-to-lead' ? '⚡ Speed to Lead' : tab === 'users' ? '👥 Users' : tab === 'client-portals' ? '🔗 Client Portals' : 'Select a client to get started'}</h2>
                                    )}
                                </div>
                                <button 
                                    onClick={toggleTheme}
                                    className="flex items-center gap-2 px-4 py-2 rounded-lg bg-dark-800 hover:bg-dark-700 transition-colors text-sm"
                                >
                                    {theme === 'dark' ? '☀️ Light' : '🌙 Dark'}
                                </button>
                            </header>
                            <div className="flex-1 overflow-y-auto p-8 scrollbar">{renderTab()}</div>
                        </main>
                    </div>
                </ThemeContext.Provider>
                </AuthContext.Provider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
