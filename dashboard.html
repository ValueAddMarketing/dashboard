<body class="min-h-screen dark">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const SUPABASE_URL = 'https://ecmhhonjazfbletyvncw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjbWhob25qYXpmYmxldHl2bmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NDMwMjYsImV4cCI6MjA4MTUxOTAyNn0.3LZ8dAOX_ZpoUNkgY_jSeC10SaCknfPfBaZsDRjFt7c';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const META_ADS_API = '/api/meta-ads';

        const META_DATE_PRESETS = [
            { value: 'today', label: 'Today' },
            { value: 'yesterday', label: 'Yesterday' },
            { value: 'last_3d', label: 'Last 3 Days' },
            { value: 'last_7d', label: 'Last 7 Days' },
            { value: 'last_14d', label: 'Last 14 Days' },
            { value: 'last_30d', label: 'Last 30 Days' },
            { value: 'last_90d', label: 'Last 90 Days' },
            { value: 'this_month', label: 'This Month' },
            { value: 'last_month', label: 'Last Month' },
            { value: 'maximum', label: 'Lifetime' },
        ];

        const fetchMetaAdData = async (datePreset = 'last_7d') => {
            try {
                const cacheKey = 'vam_meta_ads_' + datePreset;
                const cacheTimeKey = 'vam_meta_ads_time_' + datePreset;
                const cached = localStorage.getItem(cacheKey);
                const cacheTime = localStorage.getItem(cacheTimeKey);
                if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 300000) {
                    return JSON.parse(cached);
                }
                const response = await fetch(META_ADS_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'fetchAll', datePreset })
                });
                if (!response.ok) return {};
                const data = await response.json();
                const results = data.results || {};
                localStorage.setItem(cacheKey, JSON.stringify(results));
                localStorage.setItem(cacheTimeKey, Date.now().toString());
                return results;
            } catch (err) { console.error('Meta ads fetch error:', err); return {}; }
        };

        const fetchAdAccountsList = async () => {
            try {
                const response = await fetch(META_ADS_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'listAdAccounts' })
                });
                if (!response.ok) return [];
                const data = await response.json();
                return data.accounts || [];
            } catch (err) { console.error('Ad accounts fetch error:', err); return []; }
        };

        const getAdMappings = async () => {
            const { data, error } = await supabase.from('client_ad_accounts').select('*').order('client_name', { ascending: true });
            return { data: data || [], error };
        };

        const saveAdMapping = async (clientName, adAccountId) => {
            if (!adAccountId) {
                const { error } = await supabase.from('client_ad_accounts').delete().eq('client_name', clientName);
                return { error };
            }
            const { data, error } = await supabase.from('client_ad_accounts').upsert({ client_name: clientName, meta_ad_account_id: adAccountId }, { onConflict: 'client_name' }).select().single();
            return { data, error };
        };

        const AuthContext = createContext(null);
        const ThemeContext = createContext(null);
        const useAuth = () => useContext(AuthContext);

        // Client Ads Performance sheet (gid=964722332) - headers in row 2
        // Setup Timing sheet (gid=646836237) - headers in row 1, data starts row 3
        const URLS = {
            clientAdsPerformance: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=964722332&single=true&output=csv',
            setupTiming: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=646836237&single=true&output=csv'
        };

        const pn = v => parseFloat(String(v||'0').replace(/[$,%]/g,'').replace(/,/g,''))||0;
        const fmt = v => '$'+(pn(v)).toLocaleString('en-US',{maximumFractionDigits:0});
        const fmtD = v => '$'+(pn(v)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
        const fmtN = v => (pn(v)).toLocaleString('en-US',{maximumFractionDigits:0});
        const fmtP = v => (pn(v)).toFixed(1)+'%';
        const getDisplayName = (email, user) => {
            if (user?.user_metadata?.full_name) return user.user_metadata.full_name;
            if (user?.user_metadata?.name) return user.user_metadata.name;
            return email ? email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : 'Unknown';
        };

        // Map Client Ads Performance sheet - headers in row 2 (A2:BA2)
        const mapClient = r => ({
            client: r['Client']||'',
            adAccount: r['Ad Account Name']||'',
            teamMember: r['Team Member']||'',
            status: r['Status']||'',
            dailySetAdSpend: pn(r['Daily Set Ad Spend']),
            state: r['State']||'',
            campaign: r['CAMPAIGN']||'',
            specificTarget: r['Specific Target']||'',
            overlap: r['Overlap']||'',
            overallStanding: r['Overall Standing']||'',
            callingStatus: r['Calling/Non-calling']||'',
            usingDqReasons: r['Using DQ Reasons']||'',
            callingUsingCrm: r['Calling using CRM']||'',
            mbNotes: r['MB Detailed Notes / Test Conducted']||'',
            currentTestings: r['Current Testings']||'',
            clientAvgHomeValue: r['Client Avg Home Value']||'',
            startDate: r['CORRECT SETUP TIMING START DATE']||r['OLD Start Date']||'',
            contract: r['Contract']||'',
            contractLengthMonths: r['Contract Length In Months']||'',
            remainingContractMonths: r['# Of Remaining Contract Months Left']||'',
            leadySync: r['Lead Sync']||r['Leady Sync']||'',
            months: pn(r['Months Running']),
            weeks: pn(r['Weeks Running']),
            days: pn(r['Days Running']),
            spend: pn(r['Total Ad Spend']),
            spendPerMonth: pn(r['Ad Spend Per Month']),
            spendPerDay: pn(r['Ad Spend Per Day']),
            // Last 3 Days - Seller
            last3DaySellerLeads: pn(r['Last 3 Day Seller Leads']),
            last3DaySellerSpend: pn(r['Last 3 Days Seller Ad Spend']),
            last3DaySellerCPL: pn(r['Last 3 Days Seller CPL']),
            // Last 7 Days - Seller
            last7DaySellerLeads: pn(r['Last 7 Day Seller Leads']),
            last7DaySellerSpend: pn(r['Last 7 Day Seller Spend']),
            last7DaySellerCPL: pn(r['Last 7 Days Seller CPL']),
            // Lifetime - Seller
            lifetimeSellerLeads: pn(r['Lifetime Seller Leads']),
            lifetimeSellerSpend: pn(r['Lifetime Seller Ad Spend']),
            lifetimeSellerCPL: pn(r['Lifetime Seller CPL']),
            // Last 3 Days - Buyer
            last3DayBuyerLeads: pn(r['Last 3 Day Buyer Leads']),
            last3DayBuyerSpend: pn(r['Last 3 Days Buyer Ad Spend']),
            last3DayBuyerCPL: pn(r['Last 3 Days Buyer CPL']),
            // Last 7 Days - Buyer
            last7DayBuyerLeads: pn(r['Last 7 Day Buyer Leads']),
            last7DayBuyerSpend: pn(r['Last 7 Day Buyer Spend']),
            last7DayBuyerCPL: pn(r['Last 7 Days Buyer CPL']),
            // Lifetime - Buyer
            lifetimeBuyerLeads: pn(r['Lifetime Buyer Leads']),
            lifetimeBuyerSpend: pn(r['Lifetime Buyer Ad Spend']),
            lifetimeBuyerCPL: pn(r['Lifetime Buyer CPL']),
            // Other lead types
            listingLeads: pn(r['Listing Leads']),
            // Mortgage
            last3DayMortgageLeads: pn(r['Last 3 Day Mortgage Leads']),
            last3DayMortgageSpend: pn(r['Last 3 Days Mortgage Ad Spend']),
            last3DayMortgageCPL: pn(r['Last 3 Days Mortgage CPL']),
            last7DayMortgageLeads: pn(r['Last 7 Day Mortgage Leads']),
            last7DayMortgageSpend: pn(r['Last 7 Day Mortgage Spend']),
            last7DayMortgageCPL: pn(r['Last 7 Days Mortgage CPL']),
            mortgageLeads: pn(r['Lifetime Mortgage Leads']),
            mortgageSpend: pn(r['Lifetime Mortgage Ad Spend']),
            mortgageCPL: pn(r['Lifetime Mortgage CPL']),
            mortgageAppts: pn(r['Total Appts Mortgage']),
            // Appointments
            appts: pn(r['Total Appts (Seller + Buyers)']),
            sellerAppts: pn(r['Total Seller Appts']),
            sellerAppts7: pn(r['Seller Appts in the Last 7 Days']),
            avgSellerApptsWeek: pn(r['Avg Seller Appts per Week']),
            sellerLeadToAppt: pn(r['Seller Lead To Appt Ratio']),
            costPerSellerAppt: pn(r['Total Ad Spend Cost Per Seller Appt']||r['Total Ad Spend Cost Per Seller Appts']),
            buyerAppts: pn(r['Total Buyer Appts']),
            buyerAppts7: pn(r['Buyer Appts in the Last 7 Days']),
            avgBuyerApptsWeek: pn(r['Avg Buyer Appts per Week']),
            buyerLeadToAppt: pn(r['Buyer Lead To Appt Ratio']),
            costPerBuyerAppt: pn(r['Total Ad Spend Cost Per Buyer Appts']||r['Ad Spend Cost Per Buyer Appts']),
            // Deals
            deals: pn(r['Potential Deals']),
            listings: pn(r['Listing']),
            buyerSigned: pn(r['Buyer Signed']),
            leadsPerListing: pn(r['Leads/Listing']),
            leadsPerDeal: pn(r['Leads/Potential Deal']),
            leadsPerSignedBuyer: pn(r['Leads/Signed Buyer']),
            adSpendPerDeal: pn(r['Ad Spend/Potential Deal']),
            adSpendPerListing: pn(r['Ad Spend/Listing']),
            adSpendPerBuyer: pn(r['Ad Spend/Buyer']),
        });

        // Computed properties helper
        const getClientMetrics = (c) => ({
            ...c,
            totalLeads: c.lifetimeSellerLeads + c.lifetimeBuyerLeads + c.listingLeads,
            last3DayLeads: c.last3DaySellerLeads + c.last3DayBuyerLeads,
            last7DayLeads: c.last7DaySellerLeads + c.last7DayBuyerLeads,
            appts7: c.sellerAppts7 + c.buyerAppts7,
            cpl: (c.lifetimeSellerLeads + c.lifetimeBuyerLeads + c.listingLeads) > 0 
                ? c.spend / (c.lifetimeSellerLeads + c.lifetimeBuyerLeads + c.listingLeads) 
                : 0
        });

        const mergeClientWithMeta = (client, recentData, lifetimeData) => {
            const recent = recentData ? recentData[client.client] : null;
            const lifetime = lifetimeData ? lifetimeData[client.client] : null;
            const hasMetaLink = !!(recent || lifetime);
            return {
                ...client,
                hasMetaLink,
                metaRecentSpend: recent ? parseFloat(recent.spend || 0) : null,
                metaRecentLeads: recent ? (recent.leads || 0) : null,
                metaRecentCPL: recent ? (recent.leads > 0 ? parseFloat(recent.spend || 0) / recent.leads : 0) : null,
                metaLifetimeSpend: lifetime ? parseFloat(lifetime.spend || 0) : null,
                metaLifetimeLeads: lifetime ? (lifetime.leads || 0) : null,
                metaLifetimeCPL: lifetime ? (lifetime.leads > 0 ? parseFloat(lifetime.spend || 0) / lifetime.leads : 0) : null,
            };
        };

        const mapSetupTiming = r => ({
            client: r['VAM'] || '', csmRep: r['CSM'] || '', status: r['Status'] || '',
            mrr: r['MRR'] || '', duePayment: r['Due Payment'] || '', redFlags: r['Red flags'] || '',
        });

        const getHealth = cpl => { if(!cpl) return 'gray'; if(cpl<=25) return 'green'; if(cpl<=50) return 'yellow'; return 'red'; };
        const healthColors = { green: 'bg-emerald-500', yellow: 'bg-amber-500', red: 'bg-red-500', gray: 'bg-slate-500' };

        // Color palettes for Team Member and Campaign badge pills
        const teamMemberColorMap = {};
        const teamMemberPalette = [
            'bg-violet-500/20 text-violet-400',
            'bg-sky-500/20 text-sky-400',
            'bg-pink-500/20 text-pink-400',
            'bg-teal-500/20 text-teal-400',
            'bg-orange-500/20 text-orange-400',
            'bg-indigo-500/20 text-indigo-400',
            'bg-rose-500/20 text-rose-400',
            'bg-cyan-500/20 text-cyan-400',
            'bg-lime-500/20 text-lime-400',
            'bg-fuchsia-500/20 text-fuchsia-400',
        ];
        let teamColorIndex = 0;
        const getTeamMemberColor = (name) => {
            if (!name || name.trim() === '' || name === '—') return 'bg-slate-500/20 text-slate-400';
            const key = name.trim().toLowerCase();
            if (!teamMemberColorMap[key]) {
                teamMemberColorMap[key] = teamMemberPalette[teamColorIndex % teamMemberPalette.length];
                teamColorIndex++;
            }
            return teamMemberColorMap[key];
        };

        const campaignColorMap = {};
        const campaignPalette = [
            'bg-blue-500/20 text-blue-400',
            'bg-amber-500/20 text-amber-400',
            'bg-emerald-500/20 text-emerald-400',
            'bg-purple-500/20 text-purple-400',
            'bg-red-500/20 text-red-400',
            'bg-cyan-500/20 text-cyan-400',
            'bg-yellow-500/20 text-yellow-400',
            'bg-indigo-500/20 text-indigo-400',
            'bg-pink-500/20 text-pink-400',
            'bg-teal-500/20 text-teal-400',
        ];
        let campaignColorIndex = 0;
        const getCampaignColor = (name) => {
            if (!name || name.trim() === '' || name === '—') return 'bg-slate-500/20 text-slate-400';
            const key = name.trim().toLowerCase();
            if (!campaignColorMap[key]) {
                campaignColorMap[key] = campaignPalette[campaignColorIndex % campaignPalette.length];
                campaignColorIndex++;
            }
            return campaignColorMap[key];
        };

        // ========== LOGIN ==========
        const LoginPage = ({ onLogin }) => {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [fullName, setFullName] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(''); setSuccess('');
                try {
                    if (isSignUp) {
                        const result = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName, name: fullName } } });
                        if (result.error) throw result.error;
                        if (result.data?.user?.identities?.length === 0) setError('This email is already registered.');
                        else { setSuccess('Account created! Check your email to confirm.'); setIsSignUp(false); }
                    } else {
                        const result = await supabase.auth.signInWithPassword({ email, password });
                        if (result.error) throw result.error;
                        onLogin(result.data.user);
                    }
                } catch (err) { setError(err.message); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="card p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-brand-cyan to-brand-purple bg-clip-text text-transparent">VAM Media Buyer Overview</h1>
                            <p className="text-slate-500 mt-2">{isSignUp ? 'Create your account' : 'Sign in to continue'}</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isSignUp && <input type="text" value={fullName} onChange={e => setFullName(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-xl px-4 py-3 text-white" placeholder="Full Name" required />}
                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-xl px-4 py-3 text-white" placeholder="Email" required />
                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-xl px-4 py-3 text-white" placeholder="Password" required minLength={6} />
                            {error && <div className="p-3 rounded-xl bg-red-500/10 text-red-400 text-sm">{error}</div>}
                            {success && <div className="p-3 rounded-xl bg-emerald-500/10 text-emerald-400 text-sm">{success}</div>}
                            <button type="submit" disabled={loading} className="w-full py-3 bg-gradient-to-r from-brand-cyan to-brand-purple text-white font-semibold rounded-xl">
                                {loading ? (isSignUp ? 'Creating...' : 'Signing in...') : (isSignUp ? 'Create Account' : 'Sign In')}
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <button onClick={() => { setIsSignUp(!isSignUp); setError(''); setSuccess(''); }} className="text-brand-cyan hover:text-brand-purple text-sm">
                                {isSignUp ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ========== ALL CLIENTS OVERVIEW ==========
        const AllClientsView = ({ clients, setupData, onClientClick, metaRecentData, metaLifetimeData, metaLoading, recentPeriod, onRecentPeriodChange, todaySpendData }) => {
            const [sortBy, setSortBy] = useState('client');
            const [sortDir, setSortDir] = useState('asc');
            const [filter, setFilter] = useState('');
            const [filterStatus, setFilterStatus] = useState('');
            const [filterTeamMember, setFilterTeamMember] = useState('');
            const [filterState, setFilterState] = useState('');
            const [filterCampaign, setFilterCampaign] = useState('');
            const [filterCallingStatus, setFilterCallingStatus] = useState('');
            const [filterOverallStanding, setFilterOverallStanding] = useState('');

            const periodLabels = { last_3d: '3d', last_7d: '7d', last_14d: '14d', last_30d: '30d', last_90d: '90d', this_month: 'MTD' };
            const periodLabel = periodLabels[recentPeriod] || '7d';
            const periodOptions = [
                { value: 'last_3d', label: '3d' },
                { value: 'last_7d', label: '7d' },
                { value: 'last_14d', label: '14d' },
                { value: 'last_30d', label: '30d' },
                { value: 'last_90d', label: '90d' },
                { value: 'this_month', label: 'This Month' },
            ];

            const getSetupInfo = (clientName) => {
                const name = clientName.toLowerCase().trim();
                return setupData.find(s => {
                    const sn = (s.client || '').toLowerCase().trim();
                    return sn === name || sn.includes(name) || name.includes(sn);
                });
            };

            const enrichedClients = clients.map(c => ({
                ...mergeClientWithMeta(c, metaRecentData, metaLifetimeData),
                todaySpend: todaySpendData && todaySpendData[c.client] !== undefined ? todaySpendData[c.client] : null
            }));

            const uniqueValues = (key) => [...new Set(enrichedClients.map(c => c[key]).filter(Boolean))].sort();
            const statuses = uniqueValues('status');
            const teamMembers = uniqueValues('teamMember');
            const states = uniqueValues('state');
            const campaigns = uniqueValues('campaign');
            const callingStatuses = uniqueValues('callingStatus');
            const overallStandings = uniqueValues('overallStanding');

            const activeFilterCount = [filterStatus, filterTeamMember, filterState, filterCampaign, filterCallingStatus, filterOverallStanding].filter(Boolean).length;

            // Alert data
            const atRiskClients = enrichedClients.filter(c => c.hasMetaLink && c.metaLifetimeCPL !== null && c.metaLifetimeCPL > 50);
            const noRecentLeadsClients = enrichedClients.filter(c => c.hasMetaLink && c.metaRecentLeads !== null && c.metaRecentLeads === 0);
            const clientNames = clients.map(c => c.client.toLowerCase().trim());
            const missingFromAdsPerformance = setupData.filter(s => {
                const sn = (s.client || '').toLowerCase().trim();
                return sn && !clientNames.some(cn => cn === sn || cn.includes(sn) || sn.includes(cn));
            });
            const notLinkedClients = enrichedClients.filter(c => (c.status || '').toLowerCase() === 'active' && !c.hasMetaLink);

            const filteredClients = enrichedClients.filter(c => {
                const matchesSearch = !filter || c.client.toLowerCase().includes(filter.toLowerCase()) || c.state.toLowerCase().includes(filter.toLowerCase());
                const matchesStatus = !filterStatus || c.status === filterStatus;
                const matchesTeamMember = !filterTeamMember || c.teamMember === filterTeamMember;
                const matchesState = !filterState || c.state === filterState;
                const matchesCampaign = !filterCampaign || c.campaign === filterCampaign;
                const matchesCalling = !filterCallingStatus || c.callingStatus === filterCallingStatus;
                const matchesStanding = !filterOverallStanding || c.overallStanding === filterOverallStanding;
                return matchesSearch && matchesStatus && matchesTeamMember && matchesState && matchesCampaign && matchesCalling && matchesStanding;
            });

            const sortedClients = [...filteredClients].sort((a, b) => {
                let aVal = a[sortBy], bVal = b[sortBy];
                if (aVal === null && bVal === null) return 0;
                if (aVal === null) return 1;
                if (bVal === null) return -1;
                if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                if (sortDir === 'asc') return aVal > bVal ? 1 : -1;
                return aVal < bVal ? 1 : -1;
            });

            const linkedCount = enrichedClients.filter(c => c.hasMetaLink).length;
            const todaySpendTotal = enrichedClients.reduce((s, c) => s + (c.todaySpend || 0), 0);
            const recentSpendTotal = enrichedClients.reduce((s, c) => s + (c.metaRecentSpend || 0), 0);
            const recentLeadsTotal = enrichedClients.reduce((s, c) => s + (c.metaRecentLeads || 0), 0);
            const avgCPL = recentLeadsTotal > 0 ? recentSpendTotal / recentLeadsTotal : 0;
            const totalAppts = enrichedClients.reduce((s, c) => s + c.appts, 0);
            const lifetimeSpendTotal = enrichedClients.reduce((s, c) => s + (c.metaLifetimeSpend || 0), 0);

            const handleSort = (col) => {
                if (sortBy === col) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
                else { setSortBy(col); setSortDir('asc'); }
            };

            const clearAllFilters = () => {
                setFilter(''); setFilterStatus(''); setFilterTeamMember(''); setFilterState('');
                setFilterCampaign(''); setFilterCallingStatus(''); setFilterOverallStanding('');
            };

            const FilterSelect = ({ label, value, onChange, options }) => (
                <div>
                    <label className="block text-xs text-slate-500 mb-1">{label}</label>
                    <select value={value} onChange={e => onChange(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white">
                        <option value="">All</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                </div>
            );

            const metaVal = (val, formatter) => val !== null && val !== undefined ? formatter(val) : '--';

            return (
                <div className="space-y-6">
                    {/* Alert Cards */}
                    <div className="grid lg:grid-cols-2 xl:grid-cols-4 gap-6">
                        {/* At-Risk (High Lifetime CPL) */}
                        <div className="card p-5 border-l-4 border-red-500">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="text-2xl">🚨</span>
                                <div>
                                    <h3 className="text-lg font-bold text-red-400">At-Risk Clients</h3>
                                    <p className="text-slate-500 text-xs">Lifetime CPL &gt;$50</p>
                                </div>
                                <span className="ml-auto bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-sm font-bold">{atRiskClients.length}</span>
                            </div>
                            {atRiskClients.length === 0 ? (
                                <div className="text-slate-500 text-sm text-center py-4">✅ No at-risk clients</div>
                            ) : (
                                <div className="space-y-2 max-h-[200px] overflow-y-auto scrollbar">
                                    {atRiskClients.map(c => (
                                        <div key={c.client} onClick={() => onClientClick(c.client)} className="flex items-center justify-between p-3 bg-red-500/10 rounded-lg cursor-pointer hover:bg-red-500/20">
                                            <div>
                                                <div className="font-medium text-white">{c.client}</div>
                                                <div className="text-xs text-slate-400">{c.state}{c.teamMember && ` • ${c.teamMember}`}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-red-400 font-bold">{fmtD(c.metaLifetimeCPL)}</div>
                                                <div className="text-xs text-slate-500">LT CPL</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* No Recent Leads */}
                        <div className="card p-5 border-l-4 border-amber-500">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="text-2xl">⚠️</span>
                                <div>
                                    <h3 className="text-lg font-bold text-amber-400">No Leads ({periodLabel})</h3>
                                    <p className="text-slate-500 text-xs">Zero leads in selected period</p>
                                </div>
                                <span className="ml-auto bg-amber-500/20 text-amber-400 px-3 py-1 rounded-full text-sm font-bold">{noRecentLeadsClients.length}</span>
                            </div>
                            {noRecentLeadsClients.length === 0 ? (
                                <div className="text-slate-500 text-sm text-center py-4">✅ All accounts active</div>
                            ) : (
                                <div className="space-y-2 max-h-[200px] overflow-y-auto scrollbar">
                                    {noRecentLeadsClients.map(c => (
                                        <div key={c.client} onClick={() => onClientClick(c.client)} className="flex items-center justify-between p-3 bg-amber-500/10 rounded-lg cursor-pointer hover:bg-amber-500/20">
                                            <div>
                                                <div className="font-medium text-white">{c.client}</div>
                                                <div className="text-xs text-slate-400">{c.state}{c.teamMember && ` • ${c.teamMember}`}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-amber-400 font-bold">0 leads</div>
                                                <div className="text-xs text-slate-500">{periodLabel}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Missing from Ads Performance Sheet */}
                        <div className="card p-5 border-l-4 border-purple-500">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="text-2xl">📋</span>
                                <div>
                                    <h3 className="text-lg font-bold text-purple-400">Missing from Sheet</h3>
                                    <p className="text-slate-500 text-xs">Not in Client Ads Performance</p>
                                </div>
                                <span className="ml-auto bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-sm font-bold">{missingFromAdsPerformance.length}</span>
                            </div>
                            {missingFromAdsPerformance.length === 0 ? (
                                <div className="text-slate-500 text-sm text-center py-4">✅ All clients tracked</div>
                            ) : (
                                <div className="space-y-2 max-h-[200px] overflow-y-auto scrollbar">
                                    {missingFromAdsPerformance.map(s => (
                                        <div key={s.client} className="flex items-center justify-between p-3 bg-purple-500/10 rounded-lg">
                                            <div>
                                                <div className="font-medium text-white">{s.client}</div>
                                                <div className="text-xs text-slate-400">{s.csmRep && `CSM: ${s.csmRep}`}</div>
                                            </div>
                                            <div className="text-purple-400 text-xs font-medium">ADD TO SHEET</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Not Linked to Meta */}
                        <div className="card p-5 border-l-4 border-sky-500">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="text-2xl">🔗</span>
                                <div>
                                    <h3 className="text-lg font-bold text-sky-400">Not Linked to Meta</h3>
                                    <p className="text-slate-500 text-xs">Active clients without ad data</p>
                                </div>
                                <span className="ml-auto bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full text-sm font-bold">{notLinkedClients.length}</span>
                            </div>
                            {notLinkedClients.length === 0 ? (
                                <div className="text-slate-500 text-sm text-center py-4">✅ All active clients linked</div>
                            ) : (
                                <div className="space-y-2 max-h-[200px] overflow-y-auto scrollbar">
                                    {notLinkedClients.map(c => (
                                        <div key={c.client} className="flex items-center justify-between p-3 bg-sky-500/10 rounded-lg">
                                            <div>
                                                <div className="font-medium text-white">{c.client}</div>
                                                <div className="text-xs text-slate-400">{c.state}{c.teamMember && ` • ${c.teamMember}`}</div>
                                            </div>
                                            <div className="text-sky-400 text-xs font-medium">LINK ACCOUNT</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Summary Cards */}
                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                        <div className="card p-4"><div className="text-slate-400 text-sm">Total Clients</div><div className="text-2xl font-bold text-white">{clients.length} <span className="text-sm text-slate-500">({linkedCount} linked)</span></div></div>
                        <div className="card p-4 border-l-4 border-emerald-500"><div className="text-slate-400 text-sm">Today's Spend</div><div className="text-2xl font-bold text-emerald-400">{todaySpendTotal > 0 ? fmtD(todaySpendTotal) : '--'}</div></div>
                        <div className="card p-4"><div className="text-slate-400 text-sm">{periodLabel} Spend</div><div className="text-2xl font-bold text-brand-cyan">{fmt(recentSpendTotal)}</div></div>
                        <div className="card p-4"><div className="text-slate-400 text-sm">{periodLabel} Leads</div><div className="text-2xl font-bold text-brand-purple">{fmtN(recentLeadsTotal)}</div></div>
                        <div className="card p-4"><div className="text-slate-400 text-sm">Avg CPL</div><div className={'text-2xl font-bold ' + (avgCPL > 50 ? 'text-red-400' : avgCPL > 25 ? 'text-amber-400' : 'text-emerald-400')}>{avgCPL > 0 ? fmtD(avgCPL) : '--'}</div></div>
                        <div className="card p-4"><div className="text-slate-400 text-sm">Total Appts</div><div className="text-2xl font-bold text-emerald-400">{fmtN(totalAppts)}</div></div>
                        <div className="card p-4"><div className="text-slate-400 text-sm">Lifetime Spend</div><div className="text-2xl font-bold text-brand-cyan">{fmt(lifetimeSpendTotal)}</div></div>
                    </div>

                    {/* Date Period Selector */}
                    <div className="card p-4">
                        <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-sm text-secondary font-medium">Period:</span>
                            {periodOptions.map(p => (
                                <button key={p.value} onClick={() => onRecentPeriodChange(p.value)} className={'px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ' + (recentPeriod === p.value ? 'bg-brand-cyan/20 text-brand-cyan border border-brand-cyan/30' : 'text-secondary hover-bg border border-transparent')}>
                                    {p.label}
                                </button>
                            ))}
                            {metaLoading && <span className="text-xs text-brand-cyan ml-2">Loading...</span>}
                        </div>
                    </div>

                    {/* Search & Filters */}
                    <div className="card p-4 space-y-3">
                        <div className="flex items-center gap-3">
                            <input type="text" value={filter} onChange={e => setFilter(e.target.value)} placeholder="Search clients..." className="w-64 bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white" />
                            {activeFilterCount > 0 && (
                                <button onClick={clearAllFilters} className="px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500/20">Clear Filters ({activeFilterCount})</button>
                            )}
                            {(activeFilterCount > 0 || filter) && (
                                <span className="text-xs text-slate-500">Showing {sortedClients.length} of {enrichedClients.length}</span>
                            )}
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                            <FilterSelect label="Status" value={filterStatus} onChange={setFilterStatus} options={statuses} />
                            <FilterSelect label="Team Member" value={filterTeamMember} onChange={setFilterTeamMember} options={teamMembers} />
                            <FilterSelect label="State" value={filterState} onChange={setFilterState} options={states} />
                            <FilterSelect label="Campaign" value={filterCampaign} onChange={setFilterCampaign} options={campaigns} />
                            <FilterSelect label="Calling Status" value={filterCallingStatus} onChange={setFilterCallingStatus} options={callingStatuses} />
                            <FilterSelect label="Overall Standing" value={filterOverallStanding} onChange={setFilterOverallStanding} options={overallStandings} />
                        </div>
                    </div>

                    {/* Client Table */}
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-dark-800">
                                    <tr>
                                        {[
                                            { key: 'status', label: 'Status' },
                                            { key: 'teamMember', label: 'Team Member' },
                                            { key: 'client', label: 'Client' },
                                            { key: 'state', label: 'State' },
                                            { key: 'campaign', label: 'Campaign' },
                                            { key: 'overallStanding', label: 'Standing' },
                                            { key: 'callingStatus', label: 'Calling' },
                                            { key: 'days', label: 'Days' },
                                            { key: 'todaySpend', label: 'Today Spend' },
                                            { key: 'dailySetAdSpend', label: 'Set Budget' },
                                            { key: 'metaRecentSpend', label: periodLabel + ' Spend' },
                                            { key: 'metaRecentLeads', label: periodLabel + ' Leads' },
                                            { key: 'metaRecentCPL', label: periodLabel + ' CPL' },
                                            { key: 'metaLifetimeSpend', label: 'LT Spend' },
                                            { key: 'metaLifetimeLeads', label: 'LT Leads' },
                                            { key: 'metaLifetimeCPL', label: 'LT CPL' },
                                            { key: 'appts', label: 'Appts' },
                                            { key: 'deals', label: 'Deals' },
                                        ].map(col => (
                                            <th key={col.key} onClick={() => handleSort(col.key)} className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:text-white whitespace-nowrap">
                                                {col.label} {sortBy === col.key && (sortDir === 'asc' ? '↑' : '↓')}
                                            </th>
                                        ))}
                                        <th className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Health</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-dark-700">
                                    {sortedClients.map(c => {
                                        const s = getSetupInfo(c.client);
                                        const health = c.hasMetaLink ? getHealth(c.metaLifetimeCPL) : 'gray';
                                        const standingBadge = (c.overallStanding || '').toLowerCase().includes('good') ? 'bg-emerald-500/20 text-emerald-400' :
                                            (c.overallStanding || '').toLowerCase().includes('bad') || (c.overallStanding || '').toLowerCase().includes('poor') ? 'bg-red-500/20 text-red-400' :
                                            (c.overallStanding || '').toLowerCase().includes('ok') || (c.overallStanding || '').toLowerCase().includes('average') ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-500/20 text-slate-400';
                                        const callingBadge = (c.callingStatus || '').toLowerCase().includes('calling') && !(c.callingStatus || '').toLowerCase().includes('non') ? 'bg-emerald-500/20 text-emerald-400' :
                                            (c.callingStatus || '').toLowerCase().includes('non') ? 'bg-red-500/20 text-red-400' : 'bg-slate-500/20 text-slate-400';
                                        const teamBadge = getTeamMemberColor(c.teamMember);
                                        const campaignBadge = getCampaignColor(c.campaign);
                                        return (
                                            <tr key={c.client} onClick={() => onClientClick(c.client)} className="hover:bg-dark-800 cursor-pointer transition-colors">
                                                <td className="px-4 py-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                        (c.status || '').toLowerCase() === 'active' ? 'bg-emerald-500/20 text-emerald-400' :
                                                        (c.status || '').toLowerCase() === 'paused' ? 'bg-red-500/20 text-red-400' :
                                                        (c.status || '').toLowerCase() === 'scheduled' ? 'bg-blue-500/20 text-blue-400' :
                                                        'bg-slate-500/20 text-slate-400'
                                                    }`}>{c.status || '—'}</span>
                                                </td>
                                                <td className="px-4 py-3 whitespace-nowrap">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${teamBadge}`}>{c.teamMember || '—'}</span>
                                                </td>
                                                <td className="px-4 py-3">
                                                    <div className="font-medium text-white">{c.client}</div>
                                                    {s?.csmRep && <div className="text-xs text-slate-500">CSM: {s.csmRep}</div>}
                                                </td>
                                                <td className="px-4 py-3 text-slate-300">{c.state || '—'}</td>
                                                <td className="px-4 py-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${campaignBadge}`}>{c.campaign || '—'}</span>
                                                </td>
                                                <td className="px-4 py-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${standingBadge}`}>{c.overallStanding || '—'}</span>
                                                </td>
                                                <td className="px-4 py-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${callingBadge}`}>{c.callingStatus || '—'}</span>
                                                </td>
                                                <td className="px-4 py-3 text-slate-300">{c.days}</td>
                                                <td className={'px-4 py-3 font-medium ' + (c.todaySpend !== null ? (c.todaySpend > 0 ? 'text-emerald-400' : 'text-red-400') : 'text-slate-500')}>{c.todaySpend !== null ? fmtD(c.todaySpend) : '--'}</td>
                                                <td className="px-4 py-3 text-slate-300">{c.dailySetAdSpend > 0 ? fmt(c.dailySetAdSpend) : '--'}</td>
                                                <td className="px-4 py-3 text-brand-cyan">{metaVal(c.metaRecentSpend, fmt)}</td>
                                                <td className={`px-4 py-3 font-medium ${c.hasMetaLink && c.metaRecentLeads === 0 ? 'text-red-400' : 'text-brand-cyan'}`}>{metaVal(c.metaRecentLeads, fmtN)}</td>
                                                <td className="px-4 py-3 text-white font-medium">{metaVal(c.metaRecentCPL, fmtD)}</td>
                                                <td className="px-4 py-3 text-brand-cyan">{metaVal(c.metaLifetimeSpend, fmt)}</td>
                                                <td className="px-4 py-3 text-brand-purple font-medium">{metaVal(c.metaLifetimeLeads, fmtN)}</td>
                                                <td className={'px-4 py-3 font-bold ' + (c.metaLifetimeCPL !== null ? (c.metaLifetimeCPL > 50 ? 'text-red-400' : c.metaLifetimeCPL > 25 ? 'text-amber-400' : 'text-emerald-400') : 'text-slate-500')}>{metaVal(c.metaLifetimeCPL, fmtD)}</td>
                                                <td className="px-4 py-3 text-brand-purple font-medium">{fmtN(c.appts)}</td>
                                                <td className="px-4 py-3 text-emerald-400 font-medium">{fmtN(c.deals)}</td>
                                                <td className="px-4 py-3"><span className={`w-3 h-3 rounded-full inline-block ${healthColors[health]}`}></span></td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <p className="text-center text-slate-500 text-sm">💡 Click any client to view details in Client Success Hub</p>
                </div>
            );
        };

        // ========== META AD SETTINGS TAB ==========
        const MetaAdSettingsTab = ({ clients }) => {
            const [adAccounts, setAdAccounts] = useState([]);
            const [mappings, setMappings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [savingClient, setSavingClient] = useState(null);
            const [searchFilter, setSearchFilter] = useState('');
            const [statusMessage, setStatusMessage] = useState(null);

            useEffect(() => {
                const load = async () => {
                    setLoading(true);
                    const [accounts, { data: maps }] = await Promise.all([fetchAdAccountsList(), getAdMappings()]);
                    setAdAccounts(accounts);
                    setMappings(maps || []);
                    setLoading(false);
                };
                load();
            }, []);

            const getMappingForClient = (clientName) => mappings.find(m => m.client_name === clientName);

            const handleMappingChange = async (clientName, adAccountId) => {
                setSavingClient(clientName);
                setStatusMessage(null);
                try {
                    const { error } = await saveAdMapping(clientName, adAccountId || null);
                    if (error) throw error;
                    const { data: updated } = await getAdMappings();
                    setMappings(updated || []);
                    META_DATE_PRESETS.forEach(p => { localStorage.removeItem('vam_meta_ads_' + p.value); localStorage.removeItem('vam_meta_ads_time_' + p.value); });
                    setStatusMessage({ type: 'success', text: `${clientName} ${adAccountId ? 'linked' : 'unlinked'} successfully` });
                } catch (err) {
                    setStatusMessage({ type: 'error', text: `Failed to save: ${err.message}` });
                } finally {
                    setSavingClient(null);
                }
            };

            const filteredClients = clients.filter(c => !searchFilter || c.client.toLowerCase().includes(searchFilter.toLowerCase()));
            const mappedCount = clients.filter(c => getMappingForClient(c.client)).length;

            if (loading) return <div className="text-center py-12 text-secondary">Loading Meta ad accounts...</div>;

            return (
                <div className="space-y-6">
                    {statusMessage && (
                        <div className={'p-3 rounded-lg text-sm ' + (statusMessage.type === 'success' ? 'bg-emerald-500/20 border border-emerald-500/30 text-emerald-400' : 'bg-red-500/20 border border-red-500/30 text-red-400')}>
                            {statusMessage.text}
                        </div>
                    )}

                    <div className="grid grid-cols-3 gap-4">
                                <div className="card p-6 text-center">
                                    <div className="text-2xl font-bold text-brand-cyan">{adAccounts.length}</div>
                                    <div className="text-xs text-secondary">Ad Accounts Available</div>
                                </div>
                                <div className="card p-6 text-center">
                                    <div className="text-2xl font-bold text-emerald-400">{mappedCount}</div>
                                    <div className="text-xs text-secondary">Clients Linked</div>
                                </div>
                                <div className="card p-6 text-center">
                                    <div className="text-2xl font-bold text-amber-400">{clients.length - mappedCount}</div>
                                    <div className="text-xs text-secondary">Clients Unlinked</div>
                                </div>
                            </div>

                            <div className="card p-4">
                                <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="w-full input-field border rounded-lg px-3 py-2 text-sm" />
                            </div>

                            <div className="card">
                                <div className="p-4 border-b divider">
                                    <h3 className="text-lg font-semibold text-primary">Client Mappings</h3>
                                    {adAccounts.length === 0 && (
                                        <p className="text-sm text-amber-400 mt-2">No ad accounts found. Make sure your Meta access token is configured in Vercel environment variables and your System User has ad accounts assigned.</p>
                                    )}
                                </div>
                                <div className="divide-y divider">
                                    {filteredClients.length === 0 ? (
                                        <div className="p-6 text-center text-secondary text-sm">No clients found</div>
                                    ) : (
                                        filteredClients.map(client => {
                                            const currentMapping = getMappingForClient(client.client);
                                            const isSaving = savingClient === client.client;
                                            return (
                                                <div key={client.client} className="p-4 flex items-center justify-between hover-bg transition-colors">
                                                    <div className="flex items-center gap-3 flex-1">
                                                        <div className={'w-2.5 h-2.5 rounded-full flex-shrink-0 ' + (currentMapping ? 'bg-emerald-500' : 'bg-slate-600')} />
                                                        <div>
                                                            <div className="font-medium text-primary">{client.client}</div>
                                                            <div className="text-xs text-secondary">{client.adAccount || 'No ad account name'} · {client.state || 'No state'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        {currentMapping && <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-full">Live</span>}
                                                        <select value={currentMapping?.meta_ad_account_id || ''} onChange={e => handleMappingChange(client.client, e.target.value)} disabled={isSaving} className="input-field border rounded-lg px-3 py-2 text-sm min-w-[250px] disabled:opacity-50">
                                                            <option value="">Not linked</option>
                                                            {adAccounts.map(account => <option key={account.id} value={account.id.replace('act_', '')}>{account.name} ({account.id})</option>)}
                                                        </select>
                                                        {isSaving && <span className="text-xs text-brand-cyan">Saving...</span>}
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                </div>
            );
        };

        // ========== ADS MANAGER TAB ==========
        const META_MANAGE_API = '/api/meta-ads';

        const AdsManagerTab = ({ clients }) => {
            const [structures, setStructures] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [expandedClients, setExpandedClients] = useState({});
            const [expandedCampaigns, setExpandedCampaigns] = useState({});
            const [expandedAdSets, setExpandedAdSets] = useState({});
            const [updatingStatus, setUpdatingStatus] = useState({});
            const [editingBudget, setEditingBudget] = useState(null);
            const [budgetValue, setBudgetValue] = useState('');
            const [savingBudget, setSavingBudget] = useState(false);
            const [statusMessage, setStatusMessage] = useState(null);
            const [searchFilter, setSearchFilter] = useState('');
            const [todaySpend, setTodaySpend] = useState({});

            useEffect(() => {
                loadStructures();
                loadTodaySpend();
            }, []);

            const loadStructures = async () => {
                setLoading(true);
                setError(null);
                try {
                    const resp = await fetch(META_MANAGE_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'fetchAllStructures' })
                    });
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error);
                    setStructures(data.results || {});
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            const loadTodaySpend = async () => {
                try {
                    const resp = await fetch(META_MANAGE_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'fetchTodaySpend' })
                    });
                    const data = await resp.json();
                    if (data.results) setTodaySpend(data.results);
                } catch (err) { console.error('Today spend error:', err); }
            };

            const toggleStatus = async (objectId, currentStatus, objectType) => {
                const newStatus = currentStatus === 'ACTIVE' ? 'PAUSED' : 'ACTIVE';
                setUpdatingStatus(prev => ({ ...prev, [objectId]: true }));
                setStatusMessage(null);
                try {
                    const resp = await fetch(META_MANAGE_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'updateStatus', objectId, newStatus })
                    });
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error);
                    // Update local state
                    setStructures(prev => {
                        const updated = JSON.parse(JSON.stringify(prev));
                        for (const clientName of Object.keys(updated)) {
                            for (const campaign of updated[clientName]) {
                                if (campaign.id === objectId) { campaign.status = newStatus; break; }
                                for (const adSet of campaign.adSets || []) {
                                    if (adSet.id === objectId) { adSet.status = newStatus; break; }
                                    for (const ad of adSet.ads || []) {
                                        if (ad.id === objectId) { ad.status = newStatus; break; }
                                    }
                                }
                            }
                        }
                        return updated;
                    });
                    setStatusMessage({ type: 'success', text: `${objectType} ${newStatus === 'ACTIVE' ? 'activated' : 'paused'} successfully` });
                } catch (err) {
                    setStatusMessage({ type: 'error', text: `Failed: ${err.message}` });
                }
                setUpdatingStatus(prev => ({ ...prev, [objectId]: false }));
            };

            const saveBudget = async () => {
                if (!editingBudget) return;
                const { objectId, budgetType } = editingBudget;
                const amount = parseFloat(budgetValue);
                if (isNaN(amount) || amount < 1) {
                    setStatusMessage({ type: 'error', text: 'Budget must be at least $1.00' });
                    return;
                }
                setSavingBudget(true);
                setStatusMessage(null);
                try {
                    const resp = await fetch(META_MANAGE_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'updateBudget', objectId, budgetType, amount })
                    });
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error);
                    // Update local state
                    setStructures(prev => {
                        const updated = JSON.parse(JSON.stringify(prev));
                        for (const clientName of Object.keys(updated)) {
                            for (const campaign of updated[clientName]) {
                                if (campaign.id === objectId) { campaign[budgetType === 'daily_budget' ? 'daily_budget' : 'lifetime_budget'] = data.amount; break; }
                                for (const adSet of campaign.adSets || []) {
                                    if (adSet.id === objectId) { adSet[budgetType === 'daily_budget' ? 'daily_budget' : 'lifetime_budget'] = data.amount; break; }
                                }
                            }
                        }
                        return updated;
                    });
                    setStatusMessage({ type: 'success', text: `Budget updated to $${data.amount}` });
                    setEditingBudget(null);
                    setBudgetValue('');
                } catch (err) {
                    setStatusMessage({ type: 'error', text: `Failed: ${err.message}` });
                }
                setSavingBudget(false);
            };

            const toggleClient = (name) => setExpandedClients(prev => ({ ...prev, [name]: !prev[name] }));
            const toggleCampaign = (id) => setExpandedCampaigns(prev => ({ ...prev, [id]: !prev[id] }));
            const toggleAdSet = (id) => setExpandedAdSets(prev => ({ ...prev, [id]: !prev[id] }));

            const StatusBadge = ({ status, objectId, objectType }) => {
                const isUpdating = updatingStatus[objectId];
                const isActive = status === 'ACTIVE';
                return (
                    <button
                        onClick={(e) => { e.stopPropagation(); toggleStatus(objectId, status, objectType); }}
                        disabled={isUpdating}
                        className={'px-3 py-1 rounded-full text-xs font-semibold transition-all cursor-pointer ' +
                            (isUpdating ? 'opacity-50 cursor-wait ' : 'hover:opacity-80 ') +
                            (isActive ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' :
                             status === 'PAUSED' ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' :
                             'bg-slate-500/20 text-slate-400 border border-slate-500/30')}
                        title={isActive ? 'Click to pause' : 'Click to activate'}
                    >
                        {isUpdating ? '...' : status}
                    </button>
                );
            };

            const BudgetDisplay = ({ objectId, dailyBudget, lifetimeBudget }) => {
                const budget = dailyBudget || lifetimeBudget;
                const budgetType = dailyBudget ? 'daily_budget' : 'lifetime_budget';
                const label = dailyBudget ? '/day' : 'lifetime';

                if (editingBudget && editingBudget.objectId === objectId) {
                    return (
                        <div className="flex items-center gap-1" onClick={e => e.stopPropagation()}>
                            <span className="text-xs text-slate-500">$</span>
                            <input
                                type="number"
                                value={budgetValue}
                                onChange={e => setBudgetValue(e.target.value)}
                                className="w-20 bg-dark-800 border border-brand-cyan/50 rounded px-2 py-1 text-xs text-white"
                                autoFocus
                                onKeyDown={e => { if (e.key === 'Enter') saveBudget(); if (e.key === 'Escape') { setEditingBudget(null); setBudgetValue(''); } }}
                            />
                            <button onClick={saveBudget} disabled={savingBudget} className="px-2 py-1 bg-brand-cyan/20 text-brand-cyan rounded text-xs hover:bg-brand-cyan/30">{savingBudget ? '...' : 'Save'}</button>
                            <button onClick={() => { setEditingBudget(null); setBudgetValue(''); }} className="px-2 py-1 bg-slate-700 text-slate-300 rounded text-xs hover:bg-slate-600">Cancel</button>
                        </div>
                    );
                }

                if (!budget) return <span className="text-xs text-slate-600">No budget set</span>;

                return (
                    <button
                        onClick={(e) => { e.stopPropagation(); setEditingBudget({ objectId, budgetType }); setBudgetValue(budget); }}
                        className="text-xs text-brand-cyan hover:text-brand-purple transition-colors cursor-pointer"
                        title="Click to edit budget"
                    >
                        ${budget} <span className="text-slate-500">{label}</span> <span className="text-slate-600 ml-1">✎</span>
                    </button>
                );
            };

            const filteredClientNames = Object.keys(structures)
                .filter(name => !searchFilter || name.toLowerCase().includes(searchFilter.toLowerCase()))
                .sort();

            const totalCampaigns = Object.values(structures).reduce((s, camps) => s + camps.length, 0);
            const activeCampaigns = Object.values(structures).reduce((s, camps) => s + camps.filter(c => c.status === 'ACTIVE').length, 0);
            const totalTodaySpend = Object.values(todaySpend).reduce((s, v) => s + v, 0);

            if (loading) return (
                <div className="text-center py-12">
                    <div className="text-4xl mb-4">⏳</div>
                    <div className="text-secondary">Loading campaign structures from Meta...</div>
                    <div className="text-xs text-slate-500 mt-2">This may take a moment for many accounts</div>
                </div>
            );

            if (error) return (
                <div className="text-center py-12">
                    <div className="text-4xl mb-4">⚠️</div>
                    <div className="text-red-400 font-medium">{error}</div>
                    <button onClick={loadStructures} className="mt-4 px-4 py-2 bg-brand-cyan/20 text-brand-cyan rounded-lg text-sm">Retry</button>
                </div>
            );

            return (
                <div className="space-y-6">
                    {statusMessage && (
                        <div className={'p-3 rounded-lg text-sm ' + (statusMessage.type === 'success' ? 'bg-emerald-500/20 border border-emerald-500/30 text-emerald-400' : 'bg-red-500/20 border border-red-500/30 text-red-400')}>
                            {statusMessage.text}
                        </div>
                    )}

                    {/* Summary Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="card p-4 text-center">
                            <div className="text-2xl font-bold text-white">{Object.keys(structures).length}</div>
                            <div className="text-xs text-secondary">Linked Clients</div>
                        </div>
                        <div className="card p-4 text-center">
                            <div className="text-2xl font-bold text-brand-cyan">{totalCampaigns}</div>
                            <div className="text-xs text-secondary">Total Campaigns</div>
                        </div>
                        <div className="card p-4 text-center">
                            <div className="text-2xl font-bold text-emerald-400">{activeCampaigns}</div>
                            <div className="text-xs text-secondary">Active Campaigns</div>
                        </div>
                        <div className="card p-4 text-center border-l-4 border-emerald-500">
                            <div className="text-2xl font-bold text-emerald-400">{totalTodaySpend > 0 ? fmtD(totalTodaySpend) : '--'}</div>
                            <div className="text-xs text-secondary">Today's Total Spend</div>
                        </div>
                    </div>

                    {/* Search */}
                    <div className="card p-4 flex items-center gap-3">
                        <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="w-64 bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white" />
                        <button onClick={loadStructures} className="px-4 py-2 bg-brand-cyan/10 text-brand-cyan rounded-lg text-sm hover:bg-brand-cyan/20 border border-brand-cyan/20">Refresh</button>
                        <span className="text-xs text-slate-500 ml-auto">Click status badges to toggle. Click budgets to edit.</span>
                    </div>

                    {/* Client Campaign Trees */}
                    {filteredClientNames.length === 0 ? (
                        <div className="card p-8 text-center text-secondary">No linked clients found. Go to Account Mappings to link clients.</div>
                    ) : (
                        <div className="space-y-3">
                            {filteredClientNames.map(clientName => {
                                const campaigns = structures[clientName] || [];
                                const isExpanded = expandedClients[clientName];
                                const clientTodaySpend = todaySpend[clientName];
                                const activeCount = campaigns.filter(c => c.status === 'ACTIVE').length;
                                return (
                                    <div key={clientName} className="card overflow-hidden">
                                        <div
                                            onClick={() => toggleClient(clientName)}
                                            className="p-4 flex items-center justify-between cursor-pointer hover-bg transition-colors"
                                        >
                                            <div className="flex items-center gap-3">
                                                <span className="text-slate-500">{isExpanded ? '▼' : '▶'}</span>
                                                <div>
                                                    <div className="font-semibold text-primary">{clientName}</div>
                                                    <div className="text-xs text-secondary">{campaigns.length} campaigns · {activeCount} active</div>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                {clientTodaySpend !== undefined && (
                                                    <div className="text-right">
                                                        <div className={'font-bold ' + (clientTodaySpend > 0 ? 'text-emerald-400' : 'text-slate-500')}>{fmtD(clientTodaySpend)}</div>
                                                        <div className="text-xs text-slate-500">today</div>
                                                    </div>
                                                )}
                                                <span className={'px-2 py-1 rounded-full text-xs font-medium ' + (activeCount > 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-500/20 text-slate-400')}>
                                                    {activeCount > 0 ? 'Running' : 'All Paused'}
                                                </span>
                                            </div>
                                        </div>

                                        {isExpanded && (
                                            <div className="border-t divider">
                                                {campaigns.length === 0 ? (
                                                    <div className="p-4 text-sm text-slate-500">No campaigns found</div>
                                                ) : (
                                                    campaigns.map(campaign => (
                                                        <div key={campaign.id}>
                                                            <div
                                                                onClick={() => toggleCampaign(campaign.id)}
                                                                className="px-6 py-3 flex items-center justify-between cursor-pointer hover-bg transition-colors border-b divider"
                                                            >
                                                                <div className="flex items-center gap-3">
                                                                    <span className="text-slate-600 text-xs">{expandedCampaigns[campaign.id] ? '▼' : '▶'}</span>
                                                                    <div>
                                                                        <div className="font-medium text-sm text-primary">{campaign.name}</div>
                                                                        <div className="text-xs text-slate-500">{campaign.objective} · {(campaign.adSets || []).length} ad sets</div>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center gap-3">
                                                                    <BudgetDisplay objectId={campaign.id} dailyBudget={campaign.daily_budget} lifetimeBudget={campaign.lifetime_budget} />
                                                                    <StatusBadge status={campaign.status} objectId={campaign.id} objectType="Campaign" />
                                                                </div>
                                                            </div>

                                                            {expandedCampaigns[campaign.id] && (campaign.adSets || []).map(adSet => (
                                                                <div key={adSet.id}>
                                                                    <div
                                                                        onClick={() => toggleAdSet(adSet.id)}
                                                                        className="px-10 py-2.5 flex items-center justify-between cursor-pointer hover-bg transition-colors border-b divider"
                                                                        style={{ background: 'rgba(255,255,255,0.02)' }}
                                                                    >
                                                                        <div className="flex items-center gap-3">
                                                                            <span className="text-slate-600 text-xs">{expandedAdSets[adSet.id] ? '▼' : '▶'}</span>
                                                                            <div>
                                                                                <div className="text-sm text-primary">{adSet.name}</div>
                                                                                <div className="text-xs text-slate-500">{(adSet.ads || []).length} ads</div>
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex items-center gap-3">
                                                                            <BudgetDisplay objectId={adSet.id} dailyBudget={adSet.daily_budget} lifetimeBudget={adSet.lifetime_budget} />
                                                                            <StatusBadge status={adSet.status} objectId={adSet.id} objectType="Ad Set" />
                                                                        </div>
                                                                    </div>

                                                                    {expandedAdSets[adSet.id] && (adSet.ads || []).map(ad => (
                                                                        <div key={ad.id} className="px-14 py-2 flex items-center justify-between border-b divider" style={{ background: 'rgba(255,255,255,0.04)' }}>
                                                                            <div className="flex items-center gap-3">
                                                                                <span className="text-slate-600 text-xs">●</span>
                                                                                <span className="text-sm text-secondary">{ad.name}</span>
                                                                            </div>
                                                                            <StatusBadge status={ad.status} objectId={ad.id} objectType="Ad" />
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ========== AI DAILY BRIEFING ==========
        const ANALYZE_API = '/api/analyze';

        const DailyBriefingView = ({ clients, setupData, metaData }) => {
            const [activeTab, setActiveTab] = useState('briefing');
            const [briefing, setBriefing] = useState('');
            const [briefingLoading, setBriefingLoading] = useState(false);
            const [briefingError, setBriefingError] = useState(null);
            const [question, setQuestion] = useState('');
            const [chatHistory, setChatHistory] = useState([]);
            const [askLoading, setAskLoading] = useState(false);

            // Build data context string for AI
            const buildDataContext = () => {
                const enriched = clients.map(getClientMetrics);
                const totalSpend = enriched.reduce((s, c) => s + c.spend, 0);
                const totalLeads = enriched.reduce((s, c) => s + c.totalLeads, 0);
                const totalAppts = enriched.reduce((s, c) => s + c.appts, 0);

                const atRisk = enriched.filter(c => getHealth(c.cpl) === 'red' && c.days > 7);
