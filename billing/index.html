        /* Light Mode */

        body.light .text-primary { color: #171717; }

<body class="min-h-screen dark">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

        const SUPABASE_URL = 'https://ecmhhonjazfbletyvncw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjbWhob25qYXpmYmxldHl2bmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NDMwMjYsImV4cCI6MjA4MTUxOTAyNn0.3LZ8dAOX_ZpoUNkgY_jSeC10SaCknfPfBaZsDRjFt7c';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const AuthContext = createContext(null);
        const ThemeContext = createContext(null);
        const BillingDataContext = createContext(null);
        const useAuth = () => useContext(AuthContext);
        const useBillingData = () => useContext(BillingDataContext);
        // Centralized billing data provider — fetches Stripe/Whop/Fanbasis once, shares across all tabs
        const BillingDataProvider = ({ children }) => {
            const [subscriptions, setSubscriptions] = useState({ stripe: [], whop: [], fanbasis: [], errors: [] });
            const [invoiceData, setInvoiceData] = useState({ stripe: [], stripeUpcoming: [], errors: [] });
            const [subsLoading, setSubsLoading] = useState(true);
            const [invoicesLoading, setInvoicesLoading] = useState(true);

            // Promise dedup refs to prevent concurrent fetches
            const subsPromiseRef = useRef(null);
            const invoicesPromiseRef = useRef(null);

            const fetchSubscriptions = useCallback((force = false) => {
                // Return existing in-flight promise if one exists
                if (subsPromiseRef.current && !force) return subsPromiseRef.current;

                const cached = localStorage.getItem('vam_subscriptions');
                const cacheTime = localStorage.getItem('vam_subscriptions_cache_time');
                const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                if (!force && cached && cacheAge < 30 * 60 * 1000) {
                    try {
                        const parsed = JSON.parse(cached);
                        setSubscriptions(parsed);
                        setSubsLoading(false);
                        return Promise.resolve(parsed);
                    } catch(e) {}
                }

                setSubsLoading(true);
                const p = fetch('/api/billing-subscriptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'fetchAll' })
                })
                .then(r => r.json())
                .then(data => {
                    const subs = { stripe: data.stripe || [], whop: data.whop || [], fanbasis: data.fanbasis || [], errors: data.errors || [] };
                    setSubscriptions(subs);
                    try {
                        localStorage.setItem('vam_subscriptions', JSON.stringify(subs));
                        localStorage.setItem('vam_subscriptions_cache_time', Date.now().toString());
                    } catch(e) {}
                    return subs;
                })
                .catch(err => { console.error('[BillingData] subs fetch error:', err); return subscriptions; })
                .finally(() => { setSubsLoading(false); subsPromiseRef.current = null; });

                subsPromiseRef.current = p;
                return p;
            }, []);

            const fetchInvoices = useCallback((force = false, monthsBack = 6) => {
                if (invoicesPromiseRef.current && !force) return invoicesPromiseRef.current;

                const cached = localStorage.getItem('vam_billing_invoices');
                const cacheTime = localStorage.getItem('vam_billing_invoices_cache_time');
                const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                if (!force && cached && cacheAge < 30 * 60 * 1000) {
                    try {
                        const parsed = JSON.parse(cached);
                        setInvoiceData(parsed);
                        setInvoicesLoading(false);
                        return Promise.resolve(parsed);
                    } catch(e) {}
                }

                setInvoicesLoading(true);
                const p = fetch('/api/billing-errors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'fetchInvoices', monthsBack })
                })
                .then(r => r.json())
                .then(data => {
                    setInvoiceData(data);
                    try {
                        localStorage.setItem('vam_billing_invoices', JSON.stringify(data));
                        localStorage.setItem('vam_billing_invoices_cache_time', Date.now().toString());
                    } catch(e) {}
                    return data;
                })
                .catch(err => { console.error('[BillingData] invoices fetch error:', err); return invoiceData; })
                .finally(() => { setInvoicesLoading(false); invoicesPromiseRef.current = null; });

                invoicesPromiseRef.current = p;
                return p;
            }, []);

            const refreshAll = useCallback(() => {
                localStorage.removeItem('vam_subscriptions');
                localStorage.removeItem('vam_subscriptions_cache_time');
                localStorage.removeItem('vam_billing_invoices');
                localStorage.removeItem('vam_billing_invoices_cache_time');
                return Promise.all([fetchSubscriptions(true), fetchInvoices(true)]);
            }, [fetchSubscriptions, fetchInvoices]);

            // Fetch on mount
            useEffect(() => {
                fetchSubscriptions();
                fetchInvoices();
            }, []);

            const value = useMemo(() => ({
                subscriptions, invoiceData,
                subsLoading, invoicesLoading,
                fetchSubscriptions, fetchInvoices, refreshAll
            }), [subscriptions, invoiceData, subsLoading, invoicesLoading, fetchSubscriptions, fetchInvoices, refreshAll]);

            return React.createElement(BillingDataContext.Provider, { value }, children);
        };
        const URLS = {
            clientAdsPerformance: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=964722332&single=true&output=csv',
            setupTiming: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=646836237&single=true&output=csv',
            closerForm: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=986050898&single=true&output=csv',
            fanbasis: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=102644999&single=true&output=csv',
            cashflow: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4LTw-15NE0j25eIOpY_bTPSAipW7-F2eXnL0xtdXMWCZtK9z3MYWxHr6ltnMChLk-YDLzwiXAfvwE/pub?gid=787866349&single=true&output=csv'
        };
        const pn = v => parseFloat(String(v||'0').replace(/[$,%]/g,'').replace(/,/g,''))||0;
        const fmt = v => '$'+(pn(v)).toLocaleString('en-US',{maximumFractionDigits:0});
        const fmtD = v => '$'+(pn(v)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
        const fmtN = v => (pn(v)).toLocaleString('en-US',{maximumFractionDigits:0});
        const fmtP = v => (pn(v)).toFixed(1)+'%';
        const clean = v => (v && v.toString().trim()) ? v.toString().trim() : '—';
        const getDisplayName = (email, user) => {
            // First try to get full_name from user metadata
            if (user?.user_metadata?.full_name) return user.user_metadata.full_name;
            if (user?.user_metadata?.name) return user.user_metadata.name;
            // Fall back to email parsing
            return email ? email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : 'Unknown';
        };
        // API Key Management - stored in browser localStorage for security
        const API_KEY_STORAGE_KEY = 'anthropic_api_key';
        const getAnthropicApiKey = () => localStorage.getItem(API_KEY_STORAGE_KEY);
        const setAnthropicApiKey = (key) => localStorage.setItem(API_KEY_STORAGE_KEY, key);
        const promptForApiKey = () => {
            const key = window.prompt('Enter your Anthropic API key:\n(Get one from https://console.anthropic.com/settings/keys)');
            if (key && key.trim().startsWith('sk-ant-')) {
                setAnthropicApiKey(key.trim());
                return key.trim();
            }
            return null;
        };

        // Map Client Ads Performance sheet - headers in row 2 (A2:BA2)
        const mapClient = r => {
            const sellerLeads = pn(r['Lifetime Seller Leads']);
            const buyerLeads = pn(r['Lifetime Buyer Leads']);
            const listingLeads = pn(r['Listing Leads']);
            const totalLeads = sellerLeads + buyerLeads + listingLeads;
            const spend = pn(r['Total Ad Spend']);
            const sellerAppts7 = pn(r['Seller Appts in the Last 7 Days']);
            const buyerAppts7 = pn(r['Buyer Appts in the Last 7 Days']);
            
            return {
                client: r['Client']||'', 
                adAccount: r['Ad Account Name']||'',
                dailySetAdSpend: pn(r['Daily Set Ad Spend']),
                state: r['State']||'', 
                campaign: r['CAMPAIGN']||'',
                callingStatus: r['Calling/Non-calling']||'',
                startDate: r['CORRECT SETUP TIMING START DATE']||r['OLD Start Date']||'',
                leadySync: r['Leady Sync']||'',
                months: pn(r['Months Running']),
                weeks: pn(r['Weeks Running']),
                days: pn(r['Days Running']),
                spend: spend, 
                spendPerMonth: pn(r['Ad Spend Per Month']),
                spendPerDay: pn(r['Ad Spend Per Day']),
                // Last 3 Days - Seller
                last3DaySellerLeads: pn(r['Last 3 Day Seller Leads']),
                last3DaySellerSpend: pn(r['Last 3 Days Seller Ad Spend']),
                last3DaySellerCPL: pn(r['Last 3 Days Seller CPL']),
                // Last 7 Days - Seller
                last7DaySellerLeads: pn(r['Last 7 Day Seller Leads']),
                last7DaySellerSpend: pn(r['Last 7 Day Seller Spend']),
                last7DaySellerCPL: pn(r['Last 7 Days Seller CPL']),
                // Lifetime - Seller
                sellerLeads: sellerLeads,
                sellerSpend: pn(r['Lifetime Seller Ad Spend']),
                sellerCPL: pn(r['Lifetime Seller CPL']),
                // Last 3 Days - Buyer
                last3DayBuyerLeads: pn(r['Last 3 Day Buyer Leads']),
                last3DayBuyerSpend: pn(r['Last 3 Days Buyer Ad Spend']),
                last3DayBuyerCPL: pn(r['Last 3 Days Buyer CPL']),
                // Last 7 Days - Buyer
                last7DayBuyerLeads: pn(r['Last 7 Day Buyer Leads']),
                last7DayBuyerSpend: pn(r['Last 7 Day Buyer Spend']),
                last7DayBuyerCPL: pn(r['Last 7 Days Buyer CPL']),
                // Lifetime - Buyer
                buyerLeads: buyerLeads,
                buyerSpend: pn(r['Lifetime Buyer Ad Spend']),
                buyerCPL: pn(r['Lifetime Buyer CPL']),
                // Other lead types
                listingLeads: listingLeads,
                mortgageLeads: pn(r['Mortgage Leads']),
                agentAttraction: pn(r['Agent Attraction']),
                // Appointments
                appts: pn(r['Total Appts (Seller + Buyers)']),
                sellerAppts: pn(r['Total Seller Appts']),
                sellerAppts7: sellerAppts7,
                avgSellerApptsWeek: pn(r['Avg Seller Appts per Week']),
                sellerLeadToAppt: pn(r['Seller Lead To Appt Ratio']),
                costPerSellerAppt: pn(r['Total Ad Spend Cost Per Seller Appts']),
                buyerAppts: pn(r['Total Buyer Appts']),
                buyerAppts7: buyerAppts7,
                avgBuyerApptsWeek: pn(r['Avg Buyer Appts per Week']),
                buyerLeadToAppt: pn(r['Buyer Lead To Appt Ratio']),
                costPerBuyerAppt: pn(r['Ad Spend Cost Per Buyer Appts']),
                // Deals
                deals: pn(r['Potential Deals']),
                listings: pn(r['Listing']),
                buyerSigned: pn(r['Buyer Signed']),
                leadsPerListing: pn(r['Leads/Listing']),
                leadsPerDeal: pn(r['Leads/Potential Deal']),
                leadsPerSignedBuyer: pn(r['Leads/Signed Buyer']),
                // Computed totals
                leads: totalLeads,
                cpl: totalLeads > 0 ? spend / totalLeads : 0,
                appts7: sellerAppts7 + buyerAppts7,
                last3DayLeads: pn(r['Last 3 Day Seller Leads']) + pn(r['Last 3 Day Buyer Leads']),
                last7DayLeads: pn(r['Last 7 Day Seller Leads']) + pn(r['Last 7 Day Buyer Leads'])
            };
        };

        // Full setup timing mapping
        const mapSetupTiming = r => ({
            client: r['VAM'] || '', csmRep: r['CSM'] || '', renewal: r['Renewal (NEED TO UPDATE)'] || '', lastForm: r['Last Form'] || '', lastFormDate: r['Date'] || '',
            status: r['Status'] || '', concern: r['Concern'] || '', referral: r['Referral'] || '', testimonial: r['Testmonial'] || '',
            lender: r['Status_1'] || '', state: r['State'] || '', campaign: r['Campaign'] || '', contractCategory: r['Contract Category'] || '',
            spanish: r['Spanish'] || '', mrr: r['MRR'] || '', fulfilled: r['Fullfilled'] || '', info: r['Info'] || '',
            daysLeft: r['Days left'] || '', duePayment: r['Due Payment'] || '', lastCsmNote: r['Last CSM Rep - Note - date'] || '',
            upcomingCsmDate: r['upcoming CSM rep - date'] || '', paidDate: r['Paid date'] || '', onboardedDate: r['Onboarded date'] || '',
            launchCallDate: r['Launch call date'] || '', adLiveDate: r[' Ad Live date'] || r['Ad Live date'] || '',
            billingCycle: r['Billing cycle'] || '', freeTrialDays: r['Free trial Days'] || '', adsOnPauseDays: r['ADs on pause total days'] || '',
            closings: r['Closings'] || '', signed: r['Signed'] || '', appts: r[' Appts '] || r['Appts'] || '',
            behindSchedule: r['Behind schedule'] || '', missing: r['Missing'] || '', shuPercent: r['SHU%'] || '',
            calling: r['Calling'] || '', dialer: r['Dialer'] || '', sLeads: r['S Leads'] || '', bLeads: r['B Leads'] || '',
            cpl: r['CPL'] || '', cpa: r['CPA'] || '', sAppts: r['(S)appts'] || '', bAppts: r['(B)appts'] || '',
            shu: r['SHU'] || '', ns: r['NS'] || '', stageOnCrm: r['Stage on CRM'] || '', timezone: r['Timezone'] || '',
            onboardingRep: r['Rep'] || '', redFlags: r['Red flags'] || '', crmFees: r['CRM Fees'] || '',
            adSpendFees: r['ad spend fees'] || '', responsiveness: r['Responsivness'] || '', leadGenExp: r['Lead gen exp'] || '',
            callingExpectations: r['Calling expectaions'] || '', fathom1: r['Fathom'] || '', adsOnPauseDaysDetail: r['ads on pause days'] || '',
            adAccountName: r['Ad Account name'] || '', adSpend: r['Ad Spend'] || '', radius: r['radius'] || '',
            city: r['City'] || '', target: r['Target'] || '', launch: r['Launch'] || '', adsRep: r['Rep'] || '',
            readiness: r['Readiness'] || '', personality: r['Personality'] || '', expectations: r['Expectations'] || '',
            unresolvedConcerns: r['Unresolved Concerns'] || '', firstCheckin: r['1st Check-in'] || '', firstCsm: r['1st CSM'] || '',
            revenueContracted: r['Revenue Contracted'] || '', contractLength: r['Contract length'] || '',
            moPaymentsCollected: r['mo payments collected'] || '', billingAdjust: r['Billing adjust'] || '',
            platform: r['Platform'] || '', nameEmail: r['Name/email'] || '', contractNotes: r['Contract notes'] || r['contract notes'] || '',
            paymentNotes: r['Payment / month'] || r['Payment notes'] || '', amountCollected: r['Amount collected'] || r['Amounts beside the Revenue contracted collected'] || '', b2b: r['B2B'] || '',
            closedOn: r['Closed on'] || '', commission: r['commision'] || '', setterCloser: r['Setter & Closer'] || '',
            contractEndDate: r['Contract End Date'] || '', daysLeftForEndOfContract: r['Days left for end of Contract'] || '',
            nextBillingDateSheet: r['Next Billing Date'] || '',
        });
        // ========== LOGIN ==========
        const LoginPage = ({ onLogin }) => {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [fullName, setFullName] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setSuccess('');
                
                try {
                    if (isSignUp) {
                        // Sign up new user
                        const result = await supabase.auth.signUp({ 
                            email, 
                            password,
                            options: {
                                data: {
                                    full_name: fullName,
                                    name: fullName
                                }
                            }
                        });
                        if (result.error) throw result.error;
                        
                        // Check if email confirmation is required
                        if (result.data?.user?.identities?.length === 0) {
                            setError('This email is already registered. Please sign in instead.');
                        } else {
                            setSuccess('Account created! Please check your email to confirm, then sign in.');
                            setIsSignUp(false);
                        }
                    } else {
                        // Sign in existing user
                        const result = await supabase.auth.signInWithPassword({ email, password });
                        if (result.error) throw result.error;
                        onLogin(result.data.user);
                    }
                } catch (err) { 
                    setError(err.message); 
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="card p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-brand-cyan to-brand-purple bg-clip-text text-transparent">VAM Client Success Hub</h1>
                            <p className="text-slate-500 mt-2">{isSignUp ? 'Create your account' : 'Sign in to continue'}</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isSignUp && (
                                <input 
                                    type="text" 
                                    value={fullName} 
                                    onChange={e => setFullName(e.target.value)} 
                                    className="w-full bg-dark-800 border border-dark-700 rounded-xl px-4 py-3 text-white" 
                                    placeholder="Full Name" 
                                    required 
                                />
                            )}
                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-xl px-4 py-3 text-white" placeholder="Email" required />
                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-xl px-4 py-3 text-white" placeholder="Password" required minLength={6} />
                            {error && <div className="p-3 rounded-xl bg-red-500/10 text-red-400 text-sm">{error}</div>}
                            {success && <div className="p-3 rounded-xl bg-emerald-500/10 text-emerald-400 text-sm">{success}</div>}
                            <button type="submit" disabled={loading} className="w-full py-3 bg-gradient-to-r from-brand-cyan to-brand-purple text-white font-semibold rounded-xl">
                                {loading ? (isSignUp ? 'Creating Account...' : 'Signing in...') : (isSignUp ? 'Create Account' : 'Sign In')}
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <button 
                                onClick={() => { setIsSignUp(!isSignUp); setError(''); setSuccess(''); }} 
                                className="text-brand-cyan hover:text-brand-purple text-sm transition-colors"
                            >
                                {isSignUp ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };
        // ========== MAP WHOP COMPONENTS ==========
        const MapWhopRow = ({ client, unmappedWhop, saveWhopMapping, fmtC }) => {
            const [open, setOpen] = useState(false);
            const [q, setQ] = useState('');
            const filtered = q.trim() ? unmappedWhop.filter(row => {
                const ql = q.toLowerCase();
                return (row['Name'] || '').toLowerCase().includes(ql) || (row['Email'] || '').toLowerCase().includes(ql) || (row['Username'] || '').toLowerCase().includes(ql);
            }) : unmappedWhop;
            return (
                <div className="rounded-xl" style={{background:'var(--bg-main, #0d1117)',border:'1px solid var(--border, #21262d)'}}>
                    <div className="flex items-center justify-between p-3 cursor-pointer" onClick={() => setOpen(!open)}>
                        <div>
                            <span className="text-sm font-medium text-white">{client.client}</span>
                            <span className="text-xs text-slate-500 ml-2">MRR: {client.mrrVal > 0 ? fmtC(client.mrrVal) : '-'}</span>
                            {client.setup.paidDate && <span className="text-xs text-slate-500 ml-2">Paid: {client.setup.paidDate}</span>}
                            <span className="text-xs text-slate-500 ml-2">{client.setup.platform || 'No platform'}</span>
                        </div>
                        <span className="text-xs text-slate-400">{open ? '▲' : '▼'}</span>
                    </div>
                    {open && (
                        <div className="px-3 pb-3">
                            <input type="text" value={q} onChange={e => setQ(e.target.value)} placeholder="Search Whop members by name, email, username..." className="w-full input-field border rounded-lg px-3 py-2 text-xs mb-2" autoFocus />
                            <div style={{maxHeight:'200px',overflow:'auto'}} className="space-y-1">
                                {filtered.slice(0, 30).map(row => {
                                    const memId = (row['Membership IDs'] || '').split(',')[0].trim();
                                    return (
                                        <div key={memId || row['Email']} onClick={() => { if (memId) { saveWhopMapping(client.client, memId); setOpen(false); }}} className="flex items-center justify-between p-2 rounded-lg hover:bg-dark-800 cursor-pointer text-xs">
                                            <div>
                                                <span className="text-white font-medium">{row['Name'] || row['Username'] || '(no name)'}</span>
                                                <span className="text-slate-500 ml-2">{row['Email'] || ''}</span>
                                            </div>
                                            <div className="flex gap-3 text-slate-500">
                                                {parseFloat(row['Platform spend (USD)'] || 0) > 0 && <span>${parseFloat(row['Platform spend (USD)']).toFixed(0)}</span>}
                                                {row['Joined date'] && <span>{row['Joined date'].split(' ')[0]}</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                                {filtered.length === 0 && <div className="text-xs text-slate-500 text-center py-4">No matches found</div>}
                                {filtered.length > 30 && <div className="text-xs text-slate-500 text-center py-2">Showing 30 of {filtered.length} — refine search</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const MapWhopView = ({ enriched, whopCsv, whopMappings, saveWhopMapping, fmtC }) => {
            const [filterQ, setFilterQ] = useState('');
            const unmappedClients = enriched.filter(c => {
                if (c.whopPayments.length > 0) return false;
                const plat = (c.setup.platform || '').toLowerCase();
                return plat.includes('whop') || (!plat.includes('stripe') && !plat.includes('fan') && c.mrrVal > 0 && c.stripePaidCount === 0);
            });
            const mappedMemIds = new Set(Object.values(whopMappings));
            for (const c of enriched) {
                for (const wp of c.whopPayments) { if (wp.id) mappedMemIds.add(wp.id); }
            }
            const unmappedWhop = whopCsv.filter(row => {
                const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                return !memIds.some(id => mappedMemIds.has(id));
            });
            const displayClients = filterQ.trim() ? unmappedClients.filter(c => c.client.toLowerCase().includes(filterQ.toLowerCase())) : unmappedClients;
            return (
                <div className="card rounded-2xl p-4">
                    <div className="flex items-center justify-between mb-4">
                        <div>
                            <h3 className="text-sm font-bold text-white">Unmapped Whop Clients ({unmappedClients.length})</h3>
                            <p className="text-xs text-slate-400 mt-0.5">{unmappedWhop.length} Whop members still unlinked. Click a client to expand and search for their Whop account.</p>
                        </div>
                        <input type="text" value={filterQ} onChange={e => setFilterQ(e.target.value)} placeholder="Filter clients..." className="input-field border rounded-lg px-3 py-2 text-xs" style={{width:'200px'}} />
                    </div>
                    <div className="space-y-2" style={{maxHeight:'70vh',overflow:'auto'}}>
                        {displayClients.map(c => <MapWhopRow key={c.client} client={c} unmappedWhop={unmappedWhop} saveWhopMapping={saveWhopMapping} fmtC={fmtC} />)}
                        {displayClients.length === 0 && <div className="text-center py-8 text-slate-500 text-sm">{unmappedClients.length === 0 ? 'All Whop clients are mapped!' : 'No clients match filter'}</div>}
                    </div>
                </div>
            );
        };
        // ========== BILLING ERRORS TAB ==========
        const BillingErrorsTab = ({ setupData }) => {
            const { invoiceData, subscriptions: sharedSubs, invoicesLoading, subsLoading } = useBillingData();
            const [loadingInvoices, setLoadingInvoices] = useState(true);
            const [search, setSearch] = useState('');
            const [filterFlag, setFilterFlag] = useState('');
            const [filterPlatform, setFilterPlatform] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'revenueGap', dir: 'desc' });
            const [selectedClient, setSelectedClient] = useState(null);
            const [subTab, setSubTab] = useState('errors');
            const [aiOpen, setAiOpen] = useState(false);
            const [aiMessages, setAiMessages] = useState([]);
            const [aiInput, setAiInput] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const [whopSubs, setWhopSubs] = useState([]);
            const [whopMappings, setWhopMappings] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_whop_mappings') || '{}'); } catch(e) { return {}; }
            });
            const [linkWhopClient, setLinkWhopClient] = useState(null);
            const [linkWhopSearch, setLinkWhopSearch] = useState('');
            const [whopCsv, setWhopCsv] = useState([]);
            const [closingData, setClosingData] = useState([]);
            const [fanbasisData, setFanbasisData] = useState([]);
            const [aiNotes, setAiNotes] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_ai_billing_notes') || '{}'); } catch(e) { return {}; }
            });
            const [aiNotesLoading, setAiNotesLoading] = useState({});
            const [pendingApprovals, setPendingApprovals] = useState([]);
            const [dismissedApprovals, setDismissedApprovals] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_whop_dismissed') || '[]'); } catch(e) { return []; }
            });
            const aiEndRef = useRef(null);

            const saveWhopMapping = (clientName, whopMembershipId) => {
                const updated = { ...whopMappings, [clientName]: whopMembershipId };
                setWhopMappings(updated);
                try { localStorage.setItem('vam_whop_mappings', JSON.stringify(updated)); } catch(e) {}
            };
            const removeWhopMapping = (clientName) => {
                const updated = { ...whopMappings };
                delete updated[clientName];
                setWhopMappings(updated);
                try { localStorage.setItem('vam_whop_mappings', JSON.stringify(updated)); } catch(e) {}
            };
            const saveBulkMappings = (mappingsArray) => {
                const updated = { ...whopMappings };
                for (const { client, membershipId } of mappingsArray) updated[client] = membershipId;
                setWhopMappings(updated);
                try { localStorage.setItem('vam_whop_mappings', JSON.stringify(updated)); } catch(e) {}
            };
            const dismissApproval = (key) => {
                const updated = [...dismissedApprovals, key];
                setDismissedApprovals(updated);
                try { localStorage.setItem('vam_whop_dismissed', JSON.stringify(updated)); } catch(e) {}
            };

            // Sync from shared BillingDataContext
            useEffect(() => {
                setWhopSubs((sharedSubs.whop || []).filter(s => s.source === 'whop'));
            }, [sharedSubs]);
            useEffect(() => {
                setLoadingInvoices(invoicesLoading || subsLoading);
            }, [invoicesLoading, subsLoading]);

            // Enrich whopSubs with names/emails from CSV
            useEffect(() => {
                if (!whopCsv.length || !whopSubs.length) return;
                // Build membership ID → CSV row lookup
                const csvByMembership = {};
                const csvByUser = {};
                for (const row of whopCsv) {
                    const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim());
                    for (const mid of memIds) { if (mid) csvByMembership[mid] = row; }
                    const uid = (row['User ID'] || '').trim();
                    if (uid) csvByUser[uid] = row;
                }
                let changed = false;
                const enriched = whopSubs.map(sub => {
                    if (sub.customerName && sub.customerEmail) return sub; // already has data
                    const csvRow = csvByMembership[sub.id] || csvByUser[sub.userId];
                    if (!csvRow) return sub;
                    changed = true;
                    return { ...sub, customerName: csvRow['Name'] || csvRow['Username'] || sub.customerName, customerEmail: csvRow['Email'] || sub.customerEmail };
                });
                if (changed) setWhopSubs(enriched);
            }, [whopCsv, whopSubs.length]);

            // Load Whop CSV with PapaParse
            useEffect(() => {
                fetch('/whop-members.csv').then(r => r.text()).then(text => {
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                    const rows = (parsed.data || []).filter(r => r['Membership IDs']);
                    console.log('[WhopCSV] Loaded', rows.length, 'rows. Sample:', rows.slice(0, 2).map(r => r['Name'] + ' | ' + r['Email'] + ' | ' + r['Membership IDs']));
                    setWhopCsv(rows);
                }).catch(err => console.error('[WhopCSV] Failed to load:', err));

                // Load Closer Form from Google Sheet (has client emails + Whop emails + notes)
                fetch(URLS.closerForm).then(r => r.text()).then(text => {
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                    const rows = (parsed.data || []).filter(r => r['Client Full Name']);
                    console.log('[CloserForm] Loaded', rows.length, 'clients from Google Sheet');
                    setClosingData(rows);
                }).catch(err => console.error('[CloserForm] Failed to load:', err));

                // Load Fanbasis payments from Google Sheet
                fetch(URLS.fanbasis).then(r => r.text()).then(text => {
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                    const rows = (parsed.data || []).filter(r => r['Customer Name'] && r['Amount']);
                    console.log('[Fanbasis] Loaded', rows.length, 'payments from Google Sheet');
                    setFanbasisData(rows);
                }).catch(err => console.error('[Fanbasis] Failed to load:', err));
            }, []);

            // Build closing data lookup: client name → closing info (emails, notes, etc.)
            const closingLookup = useMemo(() => {
                const lookup = {};
                for (const row of closingData) {
                    const name = (row['Client Full Name'] || '').trim();
                    if (name) lookup[name.toLowerCase()] = row;
                }
                return lookup;
            }, [closingData]);

            // Build Whop email → membership lookup from Whop CSV
            const whopEmailToMembership = useMemo(() => {
                const lookup = {};
                for (const row of whopCsv) {
                    const email = (row['Email'] || '').toLowerCase().trim();
                    if (email) lookup[email] = row;
                    const name = (row['Name'] || '').toLowerCase().trim();
                    if (name) { if (!lookup['name:' + name]) lookup['name:' + name] = row; }
                }
                return lookup;
            }, [whopCsv]);

            // Build membership ID → Whop CSV row lookup
            const whopCsvByMemId = useMemo(() => {
                const lookup = {};
                for (const row of whopCsv) {
                    const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim());
                    for (const mid of memIds) { if (mid) lookup[mid] = row; }
                }
                return lookup;
            }, [whopCsv]);

            // Run auto-matching when CSVs + setupData are ready
            useEffect(() => {
                if (!whopCsv.length || !setupData.length) return;
                const existingMapped = new Set(Object.keys(whopMappings));
                const usedMembershipIds = new Set(Object.values(whopMappings));
                const suggestions = [];

                for (const s of setupData) {
                    if (!s.client || existingMapped.has(s.client)) continue;

                    // Skip if already matched via API
                    const matcher = makeNameMatcher(s.client, s.nameEmail, s.platform);
                    const apiMatch = whopSubs.find(m => {
                        const n = (m.customerName || '').toLowerCase(), e = (m.customerEmail || '').toLowerCase();
                        return matcher(n, e);
                    });
                    if (apiMatch) continue;

                    // Collect all known emails for this client
                    const clientEmails = new Set();
                    // From platform field (e.g. "Whop : email@example.com")
                    const platEmail = ((s.platform || '').match(/[\w.+-]+@[\w.-]+\.\w+/i) || [])[0];
                    if (platEmail) clientEmails.add(platEmail.toLowerCase());
                    // From nameEmail field
                    if (s.nameEmail) { const em = s.nameEmail.match(/[\w.+-]+@[\w.-]+\.\w+/i); if (em) clientEmails.add(em[0].toLowerCase()); }
                    // From closing data CSV
                    const closingRow = closingLookup[s.client.toLowerCase()];
                    if (closingRow) {
                        const ce = (closingRow['Client Email '] || closingRow['Client Email'] || '').trim();
                        if (ce) clientEmails.add(ce.toLowerCase());
                        const pe = (closingRow['Payment processor username or email'] || '').trim();
                        if (pe) {
                            // May contain email directly or "username"
                            const peEmail = pe.match(/[\w.+-]+@[\w.-]+\.\w+/i);
                            if (peEmail) clientEmails.add(peEmail[0].toLowerCase());
                            else if (pe.length > 2) clientEmails.add(pe.toLowerCase()); // might be a username
                        }
                    }

                    // Try to find Whop member by email match
                    let matched = false;
                    for (const email of clientEmails) {
                        const whopRow = whopEmailToMembership[email];
                        if (!whopRow) continue;
                        const memIds = (whopRow['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                        if (memIds.some(id => usedMembershipIds.has(id))) continue;
                        const memId = memIds[0];
                        if (memId) {
                            suggestions.push({
                                client: s.client, membershipId: memId,
                                matchType: 'email',
                                matchDetail: email,
                                whopName: whopRow['Name'] || whopRow['Username'] || '(no name)',
                                whopEmail: whopRow['Email'] || '',
                                whopJoined: whopRow['Joined date'] || '',
                                whopSpend: whopRow['Platform spend (USD)'] || '0',
                                paidDate: s.paidDate || '',
                                key: s.client + '|' + memId,
                            });
                            usedMembershipIds.add(memId);
                            matched = true;
                            break;
                        }
                    }
                    if (matched) continue;

                    // Try Whop CSV name match
                    for (const row of whopCsv) {
                        const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                        if (memIds.some(id => usedMembershipIds.has(id))) continue;
                        const csvName = (row['Name'] || '').toLowerCase().trim();
                        const csvEmail = (row['Email'] || '').toLowerCase().trim();
                        const csvUser = (row['Username'] || '').toLowerCase().trim();
                        if (matcher(csvName, csvEmail) || matcher(csvUser, csvEmail)) {
                            const memId = memIds[0];
                            if (memId) {
                                suggestions.push({
                                    client: s.client, membershipId: memId,
                                    matchType: 'name',
                                    whopName: row['Name'] || row['Username'] || '(no name)',
                                    whopEmail: row['Email'] || '',
                                    whopJoined: row['Joined date'] || '',
                                    whopSpend: row['Platform spend (USD)'] || '0',
                                    paidDate: s.paidDate || '',
                                    key: s.client + '|' + memId,
                                });
                                usedMembershipIds.add(memId);
                                matched = true;
                                break;
                            }
                        }
                    }
                }

                console.log('[WhopMatch] Suggestions:', suggestions.length, '(email:', suggestions.filter(s => s.matchType === 'email').length, ', name:', suggestions.filter(s => s.matchType === 'name').length, ')');
                const dismissedSet = new Set(dismissedApprovals);
                setPendingApprovals(suggestions.filter(a => !dismissedSet.has(a.key)));
            }, [whopCsv, closingData, setupData, whopSubs, whopEmailToMembership, closingLookup]);

            useEffect(() => { aiEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [aiMessages]);

            const fmtC = (n) => {
                if (n == null || isNaN(n)) return '-';
                return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const formatDateStr = (date) => {
                if (!date) return '\u2014';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            };

            const parseContractNotes = (notes) => {
                if (!notes) return { raw: '', loanOfficer: false, loanOfficerName: null, splitBilling: false, platforms: [] };
                const loanOfficer = /loan\s*officer|lo\s+pay|lo\s+split|lender|mortgage/i.test(notes);
                const loMatch = notes.match(/(?:loan\s*officer|lender|LO)[:\s-]*([A-Z][a-z]+ ?[A-Z]?[a-z]*)/i);
                const splitBilling = /split|half|shared|50.?50|partial/i.test(notes);
                const platforms = [];
                if (/stripe/i.test(notes)) platforms.push('Stripe');
                if (/whop/i.test(notes)) platforms.push('Whop');
                if (/paypal/i.test(notes)) platforms.push('PayPal');
                if (/venmo/i.test(notes)) platforms.push('Venmo');
                if (/zelle/i.test(notes)) platforms.push('Zelle');
                return { raw: notes, loanOfficer, loanOfficerName: loMatch ? loMatch[1].trim() : null, splitBilling, platforms };
            };

            const makeNameMatcher = (clientName, nameEmail, platform) => {
                const cn = (clientName || '').toLowerCase().trim();
                const ne = (nameEmail || '').toLowerCase().trim();
                // Extract email from platform field (e.g. "Whop : user@email.com")
                const platEmail = ((platform || '').match(/[\w.+-]+@[\w.-]+\.\w+/i) || [])[0]?.toLowerCase() || '';
                const emails = [ne, platEmail].filter(Boolean);
                const parts = cn.split(/\s+/).filter(p => p.length >= 2);
                return (n, e) => {
                    if (!cn) return false;
                    if (!n && !e) return false;
                    if (n && n === cn) return true;
                    // Check all known emails against the candidate email
                    if (e && e.length >= 3) {
                        for (const em of emails) {
                            if (em.length >= 3 && (e === em || e.includes(em) || em.includes(e))) return true;
                        }
                    }
                    if (n && n.length >= 3 && cn.length >= 3 && (n.includes(cn) || cn.includes(n))) return true;
                    // Check if candidate email contains client name parts
                    if (e && e.length >= 3 && parts.length >= 2 && parts.every(p => e.includes(p))) return true;
                    if (parts.length >= 2 && n && n.length >= 3 && parts.every(p => n.includes(p))) return true;
                    return false;
                };
            };

            const mapWhopToPayment = (m) => ({
                id: m.id,
                customerName: m.customerName,
                customerEmail: m.customerEmail,
                amountPaid: m.totalPaid || 0,
                amountPerPeriod: m.amount || 0,
                paymentCount: m.paymentCount || 0,
                payments: m.payments || [],
                status: m.status,
                created: m.created,
                currentPeriodEnd: m.currentPeriodEnd,
                interval: m.interval,
                productName: m.productName
            });

            const matchPayments = (clientName, nameEmail, platform, invoices, whopMemberships, manualWhopId, extraEmails, csvByMemId, allWhopCsv) => {
                const cn = (clientName || '').toLowerCase().trim();
                if (!cn) return { stripeInvoices: [], whopPayments: [] };
                const matchName = makeNameMatcher(clientName, nameEmail, platform);
                // Build set of extra emails from closing data CSV
                const extras = (extraEmails || []).map(e => e.toLowerCase().trim()).filter(e => e.length >= 3);
                const matchFn = (n, e) => {
                    if (matchName(n, e)) return true;
                    // Also check closing data emails against candidate email
                    if (e && e.length >= 3) {
                        for (const ex of extras) {
                            if (e === ex || e.includes(ex) || ex.includes(e)) return true;
                        }
                    }
                    return false;
                };
                const sMatch = invoices.filter(inv => {
                    const n = (inv.customerName || '').toLowerCase(), e = (inv.customerEmail || '').toLowerCase();
                    return matchFn(n, e);
                });
                const wMatch = whopMemberships.filter(m => {
                    const n = (m.customerName || '').toLowerCase(), e = (m.customerEmail || '').toLowerCase();
                    return matchFn(n, e);
                }).map(mapWhopToPayment);
                // Add manual/auto mapping — include ALL sibling memberships from same Whop member
                if (manualWhopId) {
                    // Find all membership IDs for this member from CSV
                    const csvRow = csvByMemId ? csvByMemId[manualWhopId] : null;
                    const allMemIds = csvRow
                        ? (csvRow['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean)
                        : [manualWhopId];
                    for (const memId of allMemIds) {
                        if (wMatch.find(w => w.id === memId)) continue;
                        const apiMem = whopMemberships.find(m => m.id === memId);
                        if (apiMem) {
                            wMatch.push(mapWhopToPayment(apiMem));
                        } else if (csvRow) {
                            // Split total spend evenly across memberships as fallback
                            const totalSpend = parseFloat(csvRow['Platform spend (USD)'] || '0') || 0;
                            const perMem = allMemIds.length > 0 ? totalSpend / allMemIds.length : totalSpend;
                            wMatch.push({
                                id: memId,
                                customerName: csvRow['Name'] || csvRow['Username'] || '',
                                customerEmail: csvRow['Email'] || '',
                                amountPaid: perMem,
                                amountPerPeriod: 0,
                                paymentCount: perMem > 0 ? 1 : 0,
                                payments: perMem > 0 ? [{ id: 'csv_' + memId, amount: perMem, status: 'paid', created: (csvRow['Joined date'] || '').split(' ')[0] || null }] : [],
                                status: 'active',
                                created: (csvRow['Joined date'] || '').split(' ')[0] || null,
                                currentPeriodEnd: null,
                                interval: null,
                                productName: 'Whop (from CSV)'
                            });
                        }
                    }
                }
                // Also pull in any other Whop CSV rows matching known emails (handles multiple accounts for same person)
                if (allWhopCsv) {
                    const matchedIds = new Set(wMatch.map(w => w.id));
                    // Collect all known emails: extras + emails from already-matched Whop memberships
                    const allKnownEmails = new Set(extras);
                    for (const w of wMatch) {
                        if (w.customerEmail) allKnownEmails.add(w.customerEmail.toLowerCase().trim());
                    }
                    // Also add base email patterns (strip trailing digits before @) for fuzzy matching
                    const baseEmails = new Set();
                    for (const em of allKnownEmails) {
                        const base = em.replace(/\d+@/, '@');
                        if (base !== em) baseEmails.add(base);
                    }
                    if (allKnownEmails.size === 0 && baseEmails.size === 0) { /* skip */ }
                    else for (const csvRow of allWhopCsv) {
                        const csvEmail = (csvRow['Email'] || '').toLowerCase().trim();
                        if (!csvEmail) continue;
                        const csvBase = csvEmail.replace(/\d+@/, '@');
                        // Check exact match, substring match, or base email match
                        const emailMatch = [...allKnownEmails].some(ex => csvEmail === ex || csvEmail.includes(ex) || ex.includes(csvEmail)) ||
                            [...baseEmails].some(base => csvBase === base || csvEmail.replace(/\d*@/, '@') === base);
                        if (!emailMatch) continue;
                        const memIds = (csvRow['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                        for (const memId of memIds) {
                            if (matchedIds.has(memId)) continue;
                            matchedIds.add(memId);
                            const apiMem = whopMemberships.find(m => m.id === memId);
                            if (apiMem) {
                                wMatch.push(mapWhopToPayment(apiMem));
                            } else {
                                const spend = parseFloat(csvRow['Platform spend (USD)'] || '0') || 0;
                                const perMem = memIds.length > 0 ? spend / memIds.length : spend;
                                wMatch.push({
                                    id: memId, customerName: csvRow['Name'] || csvRow['Username'] || '', customerEmail: csvRow['Email'] || '',
                                    amountPaid: perMem, amountPerPeriod: 0, paymentCount: perMem > 0 ? 1 : 0,
                                    payments: perMem > 0 ? [{ id: 'csv_' + memId, amount: perMem, status: 'paid', created: (csvRow['Joined date'] || '').split(' ')[0] || null }] : [],

            const enriched = useMemo(() => {
                if (!setupData.length) return [];

                    const contractInfo = parseContractNotes(s.contractNotes);

                    const nameMatcher = makeNameMatcher(s.client, s.nameEmail, s.platform);
                    // Match Fanbasis payments by name/email
                    const matchFn = (n, e) => {

                    const fbPayments = fanbasisData.filter(fb => {

                        const n = (u.customerName || '').toLowerCase(), e = (u.customerEmail || '').toLowerCase();

                    return { client: s.client, setup: s, contractInfo, closingNotes, stripeInvoices, whopPayments, fbPayments, fbTotalPaid, upcoming, crmFees, stripePaidCount, stripeTotalPaid, stripeUnpaidCount, stripeUnpaidTotal, whopTotalPaid, totalCollected, mrrVal, expectedRevenue, revenueGap, moPaymentsCollected, nextBillingDate: upcoming?.nextBillingDate || null, nextBillingAmount: upcoming?.amount || null, totalPayments: stripePaidCount + whopPayments.length + fbPaid.length, flags, paymentSources };

            const sendAi = async (text) => {

                        clientData.closingNotes?.onboardingNotes ? `Onboarding Notes: ${clientData.closingNotes.onboardingNotes}` : '',

            };

            const renderMd = (t) => t.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#93c5fd">$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/^- (.*$)/gm, '<li>$1</li>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br/>');

                    {(() => {
