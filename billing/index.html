                            React.createElement('div', { className: 'card p-4 text-center' },
                                React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'MRR'),
                                React.createElement('p', { className: 'text-2xl font-bold text-white' }, c.mrr || '\u2014')
                            ),
                            React.createElement('div', { className: 'card p-4 text-center' },
                                React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'Billing Frequency'),
                                React.createElement('p', { className: 'text-lg font-bold text-white' }, c.billingFrequency || c.billingCycle || '\u2014')
                            )
                        ),

                        // Details grid
                        React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                            React.createElement('div', { className: 'card p-4' },
                                React.createElement('h3', { className: 'text-sm font-semibold text-white mb-3' }, 'Client Details'),
                                React.createElement('div', { className: 'space-y-2' },
                                    [
                                        ['CSM', c.csmRep], ['Status', c.status], ['Platform', c.platform],
                                        ['Contract Length', c.contractLength ? c.contractLength + ' months' : '\u2014'],
                                        ['Contract End', c.contractEndDate || '\u2014'], ['Paid Date', c.paidDate || '\u2014'],
                                        ['Due Payment', c.duePayment || '\u2014'], ['Name/Email', c.nameEmail || '\u2014']
                                    ].map(([label, val]) => React.createElement('div', { key: label, className: 'flex justify-between items-center' },
                                        React.createElement('span', { className: 'text-xs text-slate-400' }, label),
                                        React.createElement('span', { className: `text-sm ${label === 'Due Payment' && /overdue/i.test(val) ? 'text-red-400 font-semibold' : 'text-white'}` }, val || '\u2014')
                                    ))
                                )
                            ),
                            React.createElement('div', { className: 'card p-4' },
                                React.createElement('h3', { className: 'text-sm font-semibold text-white mb-3' }, 'Contract Notes'),
                                React.createElement('div', { className: 'space-y-3' },
                                    c.contractNotes
                                        ? React.createElement('p', { className: 'text-sm text-slate-300 whitespace-pre-wrap bg-dark-800 rounded-lg p-3' }, c.contractNotes)
                                        : React.createElement('p', { className: 'text-sm text-slate-600 italic' }, 'No contract notes'),
                                    c.paymentNotes && React.createElement('div', null,
                                        React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'Payment Notes'),
                                        React.createElement('p', { className: 'text-sm text-slate-300 whitespace-pre-wrap bg-dark-800 rounded-lg p-3' }, c.paymentNotes)
                                    )
                                )
                            )
                        ),

                        // Amount from notes
                        c.notesAmount && React.createElement('div', { className: 'card p-4' },
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('span', { className: 'text-xs text-slate-400' }, 'Amount referenced in notes:'),
                                React.createElement('span', { className: 'text-lg font-bold text-emerald-400' }, '$' + c.notesAmount.toLocaleString())
                            )
                        )
                    )
                );
            }

            // Main view
            return (
                React.createElement('div', { className: 'space-y-6' },
                    // Header
                    React.createElement('div', { className: 'flex items-center justify-between flex-wrap gap-3' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-white' }, 'Contract Billing'),
                        React.createElement('button', { onClick: exportCSV, className: 'px-3 py-2 bg-dark-700 hover:bg-dark-600 text-slate-300 rounded-lg text-sm' }, 'Export CSV')
                    ),

                    // Stats cards
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                        React.createElement('div', { className: 'card p-4 text-center cursor-pointer hover:opacity-80', onClick: () => setFilterType('overdue') },
                            React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'Past Due'),
                            React.createElement('p', { className: `text-2xl font-bold ${stats.overdue > 0 ? 'text-red-400' : 'text-emerald-400'}` }, stats.overdue)
                        ),
                        React.createElement('div', { className: 'card p-4 text-center cursor-pointer hover:opacity-80', onClick: () => setFilterType('upcoming-7') },
                            React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'Due Next 7 Days'),
                            React.createElement('p', { className: `text-2xl font-bold ${stats.next7 > 0 ? 'text-yellow-400' : 'text-emerald-400'}` }, stats.next7)
                        ),
                        React.createElement('div', { className: 'card p-4 text-center cursor-pointer hover:opacity-80', onClick: () => setFilterType('manual') },
                            React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'Manual Billing'),
                            React.createElement('p', { className: 'text-2xl font-bold text-brand-purple' }, stats.manual)
                        ),
                        React.createElement('div', { className: 'card p-4 text-center cursor-pointer hover:opacity-80', onClick: () => setFilterType('with-notes') },
                            React.createElement('p', { className: 'text-xs text-slate-400 mb-1' }, 'With Contract Notes'),
                            React.createElement('p', { className: 'text-2xl font-bold text-white' }, stats.withNotes + ' / ' + stats.total)
                        )
                    ),

                    // Filters
                    React.createElement('div', { className: 'flex gap-3 flex-wrap items-center' },
                        React.createElement('input', { type: 'text', value: search, onChange: (e) => setSearch(e.target.value), placeholder: 'Search clients...', className: 'input-field border rounded-lg px-4 py-2 text-sm', style: { maxWidth: '280px' } }),
                        React.createElement('select', { value: filterType, onChange: (e) => setFilterType(e.target.value), className: 'input-field border rounded-lg px-3 py-2 text-sm' },
                            React.createElement('option', { value: 'all' }, 'All Clients (' + allClients.length + ')'),
                            React.createElement('option', { value: 'with-notes' }, 'With Contract Notes (' + stats.withNotes + ')'),
                            React.createElement('option', { value: 'no-notes' }, 'No Contract Notes (' + (stats.total - stats.withNotes) + ')'),
                            React.createElement('option', { value: 'overdue' }, 'Past Due (' + stats.overdue + ')'),
                            React.createElement('option', { value: 'upcoming-7' }, 'Due in 7 Days (' + stats.next7 + ')'),
                            React.createElement('option', { value: 'upcoming-30' }, 'Due in 30 Days'),
                            React.createElement('option', { value: 'past-due' }, 'Past Due Date'),
                            React.createElement('option', { value: 'manual' }, 'Manual Billing (' + stats.manual + ')'),
                            React.createElement('option', { value: 'loan-officer' }, 'Loan Officer (' + stats.loClients + ')'),
                            React.createElement('option', { value: 'split' }, 'Split Billing')
                        ),
                        React.createElement('span', { className: 'text-xs text-slate-500 ml-auto' }, sorted.length + ' clients')
                    ),

                    // Table
                    sorted.length > 0 && React.createElement('div', { className: 'card overflow-hidden' },
                        React.createElement('div', { className: 'overflow-x-auto' },
                            React.createElement('table', { className: 'w-full' },
                                React.createElement('thead', null,
                                    React.createElement('tr', { className: 'text-xs text-slate-500 border-b border-dark-700' },
                                        React.createElement('th', { className: 'text-left px-4 py-3 cursor-pointer hover:text-white', onClick: () => handleSort('client') }, 'Client' + sortArrow('client')),
                                        React.createElement('th', { className: 'text-left px-4 py-3' }, 'Contract Notes'),
                                        React.createElement('th', { className: 'text-center px-4 py-3 cursor-pointer hover:text-white', onClick: () => handleSort('mrr') }, 'MRR' + sortArrow('mrr')),
                                        React.createElement('th', { className: 'text-center px-4 py-3' }, 'Frequency'),
                                        React.createElement('th', { className: 'text-center px-4 py-3 cursor-pointer hover:text-white', onClick: () => handleSort('nextRebillDate') }, 'Next Rebill' + sortArrow('nextRebillDate')),
                                        React.createElement('th', { className: 'text-center px-4 py-3 cursor-pointer hover:text-white', onClick: () => handleSort('daysUntilRebill') }, 'Days' + sortArrow('daysUntilRebill')),
                                        React.createElement('th', { className: 'text-left px-4 py-3' }, 'Source'),
                                        React.createElement('th', { className: 'text-left px-4 py-3 cursor-pointer hover:text-white', onClick: () => handleSort('flags') }, 'Flags' + sortArrow('flags'))
                                    )
                                ),
                                React.createElement('tbody', null,
                                    sorted.map(c => {
                                        const daysBadge = getDaysBadge(c.daysUntilRebill);
                                        return React.createElement('tr', { key: c.client, className: 'border-b border-dark-800 hover:bg-dark-800/50 cursor-pointer', onClick: () => setSelectedClient(c.client) },
                                            React.createElement('td', { className: 'px-4 py-3' },
                                                React.createElement('div', { className: 'text-sm text-white font-medium' }, c.client),
                                                React.createElement('div', { className: 'text-xs text-slate-500' }, c.csmRep || '')
                                            ),
                                            React.createElement('td', { className: 'px-4 py-3', style: { maxWidth: '300px' } },
                                                c.contractNotes
                                                    ? React.createElement('p', { className: 'text-xs text-slate-300 truncate', title: c.contractNotes }, c.contractNotes)
                                                    : React.createElement('span', { className: 'text-xs text-slate-600 italic' }, 'None')
                                            ),
                                            React.createElement('td', { className: 'px-4 py-3 text-sm text-center text-white font-medium' }, c.mrr || '\u2014'),
                                            React.createElement('td', { className: 'px-4 py-3 text-xs text-center text-slate-400' }, c.billingFrequency || c.billingCycle || '\u2014'),
                                            React.createElement('td', { className: 'px-4 py-3 text-sm text-center' },
                                                React.createElement('span', { className: getDaysColor(c.daysUntilRebill) },
                                                    c.nextRebillDate ? c.nextRebillDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '\u2014'
                                                )
                                            ),
                                            React.createElement('td', { className: 'px-4 py-3 text-center' },
                                                React.createElement('span', { className: `px-2 py-1 rounded text-xs font-semibold ${daysBadge.color}` }, daysBadge.label)
                                            ),
                                            React.createElement('td', { className: 'px-4 py-3 text-xs text-slate-500' }, getSourceLabel(c.nextRebillSource)),
                                            React.createElement('td', { className: 'px-4 py-3' },
                                                React.createElement('div', { className: 'flex flex-wrap gap-1' },
                                                    c.flags.map(f => React.createElement('span', { key: f, className: `px-1.5 py-0.5 rounded text-xs font-medium ${f === 'Overdue' ? 'bg-red-500/20 text-red-400' : f === 'Manual Billing' ? 'bg-brand-purple/20 text-brand-purple' : f === 'Loan Officer' ? 'bg-blue-500/20 text-blue-400' : f === 'Split Billing' ? 'bg-yellow-500/20 text-yellow-400' : f === 'Paused' ? 'bg-orange-500/20 text-orange-400' : f === 'Cancelled' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-400'}` }, f))
                                                )
                                            )
                                        );
                                    })
                                )
                            )
                        )
                    ),

                    // Empty state
                    sorted.length === 0 && React.createElement('div', { className: 'card p-8 text-center' },
                        React.createElement('p', { className: 'text-slate-400 mb-2' }, 'No clients match the current filters'),
                        React.createElement('button', { onClick: () => { setSearch(''); setFilterType('all'); }, className: 'px-4 py-2 bg-brand-cyan text-white rounded-lg text-sm mt-2' }, 'Clear Filters')
                    )
                )
            );
        };

        // ========== BILLING HUB APP ==========
        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [theme, setTheme] = useState(() => localStorage.getItem('vam_theme') || 'dark');
            const [tab, setTab] = useState(() => localStorage.getItem('vam_billing_tab') || 'billing-audit');
            const [clients, setClients] = useState([]);
            const [setupData, setSetupData] = useState([]);
            const [loading, setLoading] = useState(true);

            // Auth check
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user || null);
                    setAuthLoading(false);
                });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user || null);
                });
                return () => subscription.unsubscribe();
            }, []);

            // Theme
            useEffect(() => {
                document.body.className = document.body.className.replace(/dark|light/g, '').trim() + ' ' + theme;
                localStorage.setItem('vam_theme', theme);
            }, [theme]);

            // Save active tab
            useEffect(() => { localStorage.setItem('vam_billing_tab', tab); }, [tab]);

            // Data loading
            useEffect(() => {
                if (!user) return;

                // Check cache first
                const cached = localStorage.getItem('vam_clients');
                const cachedSetup = localStorage.getItem('vam_setup');
                const cacheTime = localStorage.getItem('vam_cache_time');
                const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;

                if (cached && cachedSetup && cacheAge < 30 * 60 * 1000) {
                    try {
                        setClients(JSON.parse(cached));
                        setSetupData(JSON.parse(cachedSetup));
                        setLoading(false);
                        return;
                    } catch(e) {}
                }

                // Fetch fresh data
                const fetchViaProxy = async () => {
                    const resp = await fetch('/api/meta-ads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'sheetsAll' })
                    });
                    if (!resp.ok) throw new Error('Proxy HTTP ' + resp.status);
                    return resp.json();
                };

                const fetchDirectSheets = () => Promise.all([
                    fetch(URLS.clientAdsPerformance).then(r => r.text()).then(csv => {
                        const raw = Papa.parse(csv, { header: false, skipEmptyLines: true });
                        const headers = raw.data[1] || [];
                        return { data: raw.data.slice(2).map(row => { const obj = {}; headers.forEach((h, i) => { obj[h] = row[i] || ''; }); return obj; }), warnings: [], errors: [] };
                    }),
                    fetch(URLS.setupTiming).then(r => r.text()).then(csv => {
                        const raw = Papa.parse(csv, { header: false, skipEmptyLines: true });
                        const headers = raw.data[0] || [];
                        return { data: raw.data.slice(2).map(row => { const obj = {}; headers.forEach((h, i) => { obj[h] = row[i] || ''; }); return obj; }), warnings: [], errors: [] };
                    })
                ]).then(([ads, setup]) => ({ clientAdsPerformance: ads, setupTiming: setup }));

                fetchViaProxy().catch(err => {
                    console.warn('[Billing] Proxy failed, falling back to direct sheets:', err.message);
                    return fetchDirectSheets();
                }).then(proxyResult => {
                    const adsResult = proxyResult.clientAdsPerformance || {};
                    const setupResult = proxyResult.setupTiming || {};

                    const c = (adsResult.data || []).map(mapClient).filter(r => r.client);
                    const s = (setupResult.data || []).map(mapSetupTiming).filter(r => r.client);

                    console.log('[Billing] Loaded', c.length, 'clients,', s.length, 'setup rows');

                    localStorage.setItem('vam_clients', JSON.stringify(c));
                    localStorage.setItem('vam_setup', JSON.stringify(s));
                    localStorage.setItem('vam_cache_time', Date.now().toString());

                    setClients(c);
                    setSetupData(s);
                    setLoading(false);
                }).catch(err => {
                    console.error('[Billing] Data fetch failed:', err);
                    setLoading(false);
                });
            }, [user]);

            const handleLogout = async () => {
                await supabase.auth.signOut();
                setUser(null);
            };

            const tabs = [
                { id: 'billing-audit', name: 'Billing Audit', icon: '💲' },
                { id: 'billing-errors', name: 'Billing Errors', icon: '🚨' },
                { id: 'cashflow', name: 'Cashflow Schedule', icon: '💰' },
                { id: 'contract-billing', name: 'Contract Billing', icon: '📋' },
                { id: 'ltv-churn', name: 'LTV & Churn', icon: '📉' },
            ];

            const renderTab = () => {
                if (loading) {
                    return (
                        <div className="flex items-center justify-center py-24">
                            <div className="text-center space-y-4">
                                <div className="text-4xl animate-spin inline-block">⏳</div>
                                <div className="text-slate-400 text-sm">Loading billing data...</div>
                            </div>
                        </div>
                    );
                }
                switch(tab) {
                    case 'billing-audit': return <BillingAuditTab clients={clients} setupData={setupData} />;
                    case 'billing-errors': return <BillingErrorsTab setupData={setupData} />;
                    case 'cashflow': return <CashflowTab setupData={setupData} />;
                    case 'contract-billing': return <ContractBillingTab setupData={setupData} />;
                    case 'ltv-churn': return <LTVChurnTab />;
                    default: return <BillingAuditTab clients={clients} setupData={setupData} />;
                }
            };

            if (authLoading) return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="text-slate-400">Loading...</div>
                </div>
            );

            if (!user) return <LoginPage onLogin={setUser} />;

            const displayName = getDisplayName(user.email, user);

            return (
                <BillingDataProvider>
                    <div className="flex min-h-screen">
                        {/* Sidebar */}
                        <div className="sidebar w-56 border-r flex flex-col" style={{position:'sticky',top:0,height:'100vh'}}>
                            <div className="p-4 border-b divider">
                                <h1 className="text-lg font-bold bg-gradient-to-r from-brand-cyan to-brand-purple bg-clip-text text-transparent">
                                    VAM Billing
                                </h1>
                                <p className="text-xs text-secondary mt-1">Client Billing Hub</p>
                            </div>

                            <nav className="flex-1 p-3 space-y-1 overflow-y-auto scrollbar">
                                <div className="section-title">Billing Tabs</div>
                                {tabs.map(t => (
                                    <button
                                        key={t.id}
                                        onClick={() => setTab(t.id)}
                                        className={`w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${
                                            tab === t.id ? 'tab-active text-white' : 'text-secondary hover-bg'
                                        }`}
                                    >
                                        <span>{t.icon}</span>
                                        <span className="truncate">{t.name}</span>
                                    </button>
                                ))}

                                <div className="section-title mt-6">Navigation</div>
                                <a href="/" className="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium text-secondary hover-bg transition-all">
                                    <span>🏠</span>
                                    <span>Client Success Hub</span>
                                </a>
                                <a href="/dashboard.html" className="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium text-secondary hover-bg transition-all">
                                    <span>📊</span>
                                    <span>Media Buyer</span>
                                </a>
                            </nav>

                            <div className="p-3 border-t divider space-y-2">
                                <button
                                    onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                    className="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-secondary hover-bg"
                                >
                                    {theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'}
                                </button>
                                <div className="flex items-center justify-between px-3">
                                    <span className="text-xs text-secondary truncate">{displayName}</span>
                                    <button onClick={handleLogout} className="text-xs text-red-400 hover:text-red-300">Logout</button>
                                </div>
                            </div>
                        </div>

                        {/* Main Content */}
                        <div className="flex-1 overflow-x-hidden">
                            <div className="p-6">
                                {renderTab()}
                            </div>
                        </div>
                    </div>
                </BillingDataProvider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
