                        const usedMemIds = new Set(Object.values(whopMappings));
                        // Also exclude IDs matched via auto-match or pending approval
                        for (const a of pendingApprovals) usedMemIds.add(a.membershipId);
                        for (const c of enriched) {
                            for (const w of c.whopPayments) usedMemIds.add(w.id);
                        }

                        // Available Whop CSV members (not yet linked)
                        const availableWhop = whopCsv.filter(row => {
                            const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                            return memIds.length > 0 && !memIds.every(id => usedMemIds.has(id));
                        });

                        const parseDate = (str) => {
                            if (!str) return null;
                            // Handle "MM/DD/YYYY" or "YYYY-MM-DD" or "YYYY-MM-DD HH:MM:SS ..."
                            const s = String(str).split(' ')[0];
                            const d = new Date(s.includes('/') ? s : s + 'T00:00:00');
                            return isNaN(d.getTime()) ? null : d;
                        };

                        return (
                            <div className="card rounded-2xl p-4 border-red-500/30 bg-red-500/5">
                                <div className="flex items-center justify-between mb-3">
                                    <div>
                                        <h3 className="text-sm font-bold text-red-400">Unmatched Whop Clients ({unmatchedWhop.length})</h3>
                                        <p className="text-xs text-slate-400 mt-0.5">Pick the best Whop member match for each client. Sorted by closest join date.</p>
                                    </div>
                                </div>
                                <div className="space-y-3" style={{maxHeight:'600px',overflow:'auto'}}>
                                    {unmatchedWhop.map(c => {
                                        const cr = closingLookup[c.client.toLowerCase()];
                                        const email = cr ? (cr['Client Email'] || cr['Client Email '] || '').trim() : '';
                                        const paidDate = parseDate(c.setup.paidDate);

                                        // Sort available Whop members by date proximity
                                        const suggestions = availableWhop.map(row => {
                                            const joinDate = parseDate(row['Joined date']);
                                            const diffDays = (paidDate && joinDate) ? Math.abs(Math.round((joinDate - paidDate) / 86400000)) : 9999;
                                            const memIds = (row['Membership IDs'] || '').split(',').map(s => s.trim()).filter(Boolean);
                                            return {
                                                row,
                                                memId: memIds[0],
                                                name: row['Name'] || row['Username'] || '(no name)',
                                                email: row['Email'] || '',
                                                username: row['Username'] || '',
                                                spend: parseFloat(row['Platform spend (USD)'] || '0') || 0,
                                                joinDate: (row['Joined date'] || '').split(' ')[0],
                                                diffDays,
                                            };
                                        }).sort((a, b) => a.diffDays - b.diffDays).slice(0, 5);

                                        return (
                                            <div key={c.client} className="p-3 rounded-xl" style={{background:'var(--bg-main, #0d1117)'}}>
                                                <div className="flex items-center gap-3 mb-2">
                                                    <span className="px-1.5 py-0.5 rounded text-xs font-medium shrink-0 bg-red-500/20 text-red-400">No Match</span>
                                                    <div style={{flex:1}}>
                                                        <span className="text-sm font-medium text-white">{c.client}</span>
                                                        <span className="text-xs text-slate-500 ml-3">
                                                            {email && <span className="mr-3">Email: {email}</span>}
                                                            {c.setup.paidDate && <span className="mr-3">Paid: {c.setup.paidDate}</span>}
                                                            <span>MRR: {c.setup.mrr || '?'}</span>
                                                        </span>
                                                    </div>
                                                    <button onClick={() => { setLinkWhopClient(c.client); setLinkWhopSearch(''); }} className="px-2 py-1 rounded text-xs bg-slate-500/10 border border-slate-500/30 text-slate-400 hover:bg-slate-500/20 shrink-0" style={{cursor:'pointer'}}>Search All</button>
                                                </div>
                                                <div className="space-y-1 ml-6">
                                                    {suggestions.map(s => (
                                                        <div key={s.memId} className="flex items-center gap-2 p-2 rounded-lg hover:bg-dark-800 transition" style={{cursor:'pointer'}} onClick={() => { saveWhopMapping(c.client, s.memId); }}>
                                                            <span className={`px-1.5 py-0.5 rounded text-xs font-medium shrink-0 ${s.diffDays <= 3 ? 'bg-emerald-500/20 text-emerald-400' : s.diffDays <= 7 ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-500/20 text-slate-400'}`}>
                                                                {s.diffDays <= 3 ? 'Close' : s.diffDays <= 7 ? 'Near' : s.diffDays === 9999 ? '?' : s.diffDays + 'd'}
                                                            </span>
                                                            <span className="text-sm text-blue-400 font-medium" style={{minWidth:'120px'}}>{s.name}</span>
                                                            <span className="text-xs text-slate-500">{s.username && s.username !== s.name ? '@' + s.username : ''}</span>
                                                            <span className="text-xs text-slate-500">{s.email}</span>
                                                            <span className="text-xs text-slate-400 ml-auto shrink-0">Joined: {s.joinDate}</span>
                                                            <span className="text-xs text-emerald-400 shrink-0">${s.spend.toFixed(0)}</span>
                                                            {s.diffDays !== 9999 && <span className="text-xs text-slate-600 shrink-0">({s.diffDays}d apart)</span>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })()}

                    {/* KPIs */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-red-400">{fmtC(totalRevenueGap)}</div><div className="text-xs text-slate-400 mt-1">Revenue Gap</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-emerald-400">{fmtC(totalCollectedAll)}</div><div className="text-xs text-slate-400 mt-1">Total Collected</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-amber-400">{fmtC(totalUnpaid)}</div><div className="text-xs text-slate-400 mt-1">Unpaid Invoices</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className={`text-2xl font-bold ${clientsWithFlags > 0 ? 'text-red-400' : 'text-emerald-400'}`}>{clientsWithFlags}</div><div className="text-xs text-slate-400 mt-1">Clients w/ Flags</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-purple-400">{loClients}</div><div className="text-xs text-slate-400 mt-1">Loan Officer Billing</div></div>
                        <div className="card rounded-2xl p-5 text-center"><div className="text-2xl font-bold text-amber-400">{noPayments}</div><div className="text-xs text-slate-400 mt-1">No Payments Found</div></div>
                    </div>

                    {invoiceData.errors?.length > 0 && (
                        <div className="card rounded-2xl p-3 border-red-500/30 bg-red-500/5">
                            {invoiceData.errors.map((e, i) => <div key={i} className="text-xs text-red-400">{e.source}: {e.message}</div>)}
                        </div>
                    )}

                    {/* Sub-tabs */}
                    <div className="flex items-center gap-3">
                        <div className="flex gap-1 bg-dark-800 p-1 rounded-lg">
                            {[{id:'errors',label:'Billing Errors'},{id:'all',label:'All Clients'},{id:'upcoming',label:'Upcoming Billing'},{id:'map-whop',label:'Map Whop'}].map(t => (
                                <button key={t.id} onClick={() => setSubTab(t.id)} className={`px-4 py-2 rounded-md text-xs font-medium transition ${subTab === t.id ? 'bg-brand-cyan/20 text-brand-cyan' : 'text-secondary hover:text-white'}`}>{t.label}</button>
                            ))}
                        </div>
                    </div>

                    {/* Map Whop Tab */}
                    {subTab === 'map-whop' && <MapWhopView enriched={enriched} whopCsv={whopCsv} whopMappings={whopMappings} saveWhopMapping={saveWhopMapping} fmtC={fmtC} />}

                    {/* Filters */}
                    {subTab !== 'map-whop' && <div className="card rounded-2xl p-4">
                        <div className="flex flex-wrap items-center gap-3">
                            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search clients..." className="w-64 input-field border rounded-xl px-3 py-2 text-sm" />
                            <select value={filterFlag} onChange={e => setFilterFlag(e.target.value)} className="input-field border rounded-xl px-3 py-2 text-sm">
                                <option value="">All Flags</option>
                                {flagOptions.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <select value={filterPlatform} onChange={e => setFilterPlatform(e.target.value)} className="input-field border rounded-xl px-3 py-2 text-sm">
                                <option value="">All Platforms</option>
                                <option value="stripe">Stripe Only</option>
                                <option value="whop">Whop Only</option>
                                <option value="fanbasis">Fanbasis Only</option>
                                <option value="none">No Processor Payments</option>
                                <option value="lo">Loan Officer</option>
                            </select>
                            {(search || filterFlag || filterPlatform) && <button onClick={() => { setSearch(''); setFilterFlag(''); setFilterPlatform(''); }} className="px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500/20">Clear</button>}
                            <span className="text-xs text-slate-500">Showing {displayRows.length} of {enriched.length}</span>
                            <button onClick={generateAllAiNotes} className="px-3 py-2 rounded-lg bg-purple-500/10 border border-purple-500/30 text-purple-400 text-xs font-medium hover:bg-purple-500/20 ml-auto" style={{cursor:'pointer'}}>Generate AI Notes</button>
                            <button onClick={exportCSV} className="px-3 py-2 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium hover:bg-emerald-500/20">Export CSV</button>
                            <button onClick={() => { ['vam_clients','vam_setup','vam_cache_time','vam_daily_spend','vam_daily_spend_cache_time','vam_subscriptions','vam_subscriptions_cache_time','vam_billing_mappings','vam_billing_invoices','vam_billing_invoices_cache_time'].forEach(k => localStorage.removeItem(k)); localStorage.setItem('vam_active_tab', 'billing-errors'); window.location.reload(); }} className="px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-medium hover:bg-blue-500/20">Clear Cache & Reload</button>
                        </div>
                    </div>}

                    {/* Table */}
                    {subTab !== 'map-whop' &&
                    <div className="card rounded-2xl overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-dark-800">
                                    <tr>
                                        <SortTh label="Client" sortKey="client" align="left" />
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Contract Notes</th>
                                        <SortTh label="MRR" sortKey="mrrVal" />
                                        <SortTh label="Stripe Paid" sortKey="stripePaidCount" />
                                        <SortTh label="Stripe Total" sortKey="stripeTotalPaid" />
                                        <SortTh label="Whop Paid" sortKey="whopTotalPaid" />
                                        <SortTh label="Fanbasis" sortKey="fbTotalPaid" />
                                        <SortTh label="Total Collected" sortKey="totalCollected" />
                                        <SortTh label="Expected" sortKey="expectedRevenue" />
                                        <SortTh label="Revenue Gap" sortKey="revenueGap" />
                                        <SortTh label="Unpaid" sortKey="stripeUnpaidTotal" />
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Next Billing</th>
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase" style={{minWidth:'200px'}}>AI Billing Notes</th>
                                        <th className="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Flags</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-dark-700">
                                    {displayRows.length === 0 ? (
                                        <tr><td colSpan={14} className="px-4 py-12 text-center text-slate-500 text-sm">No clients match current filters</td></tr>
                                    ) : displayRows.map(c => (
                                        <tr key={c.client} className="hover:bg-dark-800 cursor-pointer transition" onClick={() => setSelectedClient(c.client)}>
                                            <td className="px-3 py-3"><div className="font-medium text-white text-sm">{c.client}</div><div className="text-xs text-slate-500">{c.setup.status} {c.setup.platform ? `| ${c.setup.platform}` : ''}</div></td>
                                            <td className="px-3 py-3" style={{maxWidth:'180px'}}>
                                                {c.setup.contractNotes ? <div className="text-xs text-slate-400 truncate" title={c.setup.contractNotes}>{c.setup.contractNotes.substring(0, 50)}{c.setup.contractNotes.length > 50 ? '...' : ''}</div> : <span className="text-slate-600 text-xs">-</span>}
                                                {c.contractInfo.loanOfficer && <div className="text-xs text-purple-400 mt-0.5">LO: {c.contractInfo.loanOfficerName || 'Yes'}</div>}
                                            </td>
                                            <td className="px-3 py-3 text-right text-sm text-white">{c.mrrVal > 0 ? fmtC(c.mrrVal) : '-'}</td>
                                            <td className="px-3 py-3 text-right"><span className="text-sm text-purple-400">{c.stripePaidCount}</span>{c.stripeUnpaidCount > 0 && <span className="text-xs text-red-400 ml-1">({c.stripeUnpaidCount} unpaid)</span>}</td>
                                            <td className="px-3 py-3 text-right text-sm text-emerald-400">{c.stripeTotalPaid > 0 ? fmtC(c.stripeTotalPaid) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm text-blue-400">{c.whopTotalPaid > 0 ? fmtC(c.whopTotalPaid) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm text-orange-400">{c.fbTotalPaid > 0 ? fmtC(c.fbTotalPaid) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm font-medium text-emerald-400">{c.totalCollected > 0 ? fmtC(c.totalCollected) : '-'}</td>
                                            <td className="px-3 py-3 text-right text-sm text-slate-300">{c.expectedRevenue > 0 ? fmtC(c.expectedRevenue) : '-'}</td>
                                            <td className="px-3 py-3 text-right">{c.revenueGap > 0 ? <span className={`font-bold text-sm ${c.revenueGap > 500 ? 'text-red-400' : c.revenueGap > 100 ? 'text-amber-400' : 'text-slate-400'}`}>{fmtC(c.revenueGap)}</span> : <span className="text-emerald-400 text-xs">OK</span>}</td>
                                            <td className="px-3 py-3 text-right">{c.stripeUnpaidTotal > 0 ? <span className="text-red-400 text-sm font-medium">{fmtC(c.stripeUnpaidTotal)}</span> : <span className="text-slate-600 text-xs">-</span>}</td>
                                            <td className="px-3 py-3 text-sm">{c.nextBillingDate ? <div><div className="text-brand-cyan">{formatDateStr(new Date(c.nextBillingDate))}</div>{c.nextBillingAmount && <div className="text-xs text-slate-500">{fmtC(c.nextBillingAmount)}</div>}</div> : <span className="text-slate-600 text-xs">-</span>}</td>
                                            <td className="px-3 py-3" style={{maxWidth:'220px'}} onClick={e => e.stopPropagation()}>
                                                {aiNotesLoading[c.client] ? <span className="text-xs text-slate-500">Analyzing...</span> :
                                                aiNotes[c.client] ? <div className="text-xs text-slate-300 whitespace-pre-wrap" style={{lineHeight:'1.4'}}>{aiNotes[c.client].note}</div> :
                                                <button onClick={() => generateAiNote(c)} className="text-xs text-blue-400 hover:text-blue-300" style={{background:'none',border:'none',cursor:'pointer',padding:0}}>Generate</button>}
                                            </td>
                                            <td className="px-3 py-3"><div className="flex flex-wrap gap-1">{c.flags.map(f => <span key={f} className={`px-1.5 py-0.5 rounded text-xs font-medium ${flagColors[f] || 'bg-slate-500/20 text-slate-400'}`}>{f}</span>)}</div></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>}

                    {/* Payment Detail Drawer */}
                    {selectedClient && selectedData && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',justifyContent:'flex-end'}} onClick={() => setSelectedClient(null)}>
                            <div style={{width:'600px',maxWidth:'90vw',height:'100vh',background:'var(--bg-card, #161b22)',borderLeft:'1px solid var(--border, #21262d)',overflow:'auto'}} onClick={e => e.stopPropagation()}>
                                <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border, #21262d)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'var(--bg-card, #161b22)',zIndex:1}}>
                                    <div><h2 className="text-lg font-bold text-white">{selectedClient}</h2><p className="text-xs text-secondary mt-1">Payment History & Details</p></div>
                                    <button onClick={() => setSelectedClient(null)} className="text-secondary hover:text-white text-xl" style={{background:'none',border:'none',cursor:'pointer'}}>×</button>
                                </div>
                                <div style={{padding:'16px'}} className="space-y-4">
                                    <div className="card rounded-xl p-4">
                                        <h3 className="text-sm font-semibold text-brand-cyan mb-3">Contract Info</h3>
                                        <div className="grid grid-cols-2 gap-2 text-xs">
                                            <div><span className="text-secondary">MRR:</span> <span className="text-white ml-1">{selectedData.setup.mrr || '-'}</span></div>
                                            <div><span className="text-secondary">Contract Length:</span> <span className="text-white ml-1">{selectedData.setup.contractLength || '-'}</span></div>
                                            <div><span className="text-secondary">Revenue Contracted:</span> <span className="text-white ml-1">{selectedData.setup.revenueContracted || '-'}</span></div>
                                            <div><span className="text-secondary">Mo. Collected:</span> <span className="text-white ml-1">{selectedData.setup.moPaymentsCollected || '-'}</span></div>
                                            <div><span className="text-secondary">Platform:</span> <span className="text-white ml-1">{selectedData.setup.platform || '-'}</span></div>
                                            <div><span className="text-secondary">Billing Cycle:</span> <span className="text-white ml-1">{selectedData.setup.billingCycle || '-'}</span></div>
                                        </div>
                                        {selectedData.setup.contractNotes && <div className="mt-3 p-2 rounded text-xs" style={{background:'var(--bg-main, #0d1117)'}}><span className="text-secondary">Contract Notes:</span><div className="text-slate-300 mt-1 whitespace-pre-wrap">{selectedData.setup.contractNotes}</div></div>}
                                        {selectedData.setup.paymentNotes && <div className="mt-2 p-2 rounded text-xs" style={{background:'var(--bg-main, #0d1117)'}}><span className="text-secondary">Payment Notes:</span><div className="text-slate-300 mt-1 whitespace-pre-wrap">{selectedData.setup.paymentNotes}</div></div>}
                                        {selectedData.contractInfo.loanOfficer && <div className="mt-2 p-2 bg-purple-500/10 border border-purple-500/30 rounded text-xs"><span className="text-purple-400 font-medium">Loan Officer involved</span>{selectedData.contractInfo.loanOfficerName && <span className="text-slate-300 ml-1">({selectedData.contractInfo.loanOfficerName})</span>}</div>}
                                    </div>
                                    {selectedData.closingNotes && (selectedData.closingNotes.generalNotes || selectedData.closingNotes.onboardingNotes || selectedData.closingNotes.potentialIssue) && (
                                        <div className="card rounded-xl p-4">
                                            <h3 className="text-sm font-semibold text-amber-400 mb-3">Sales / Onboarding Notes</h3>
                                            {selectedData.closingNotes.clientEmail && <div className="text-xs mb-2"><span className="text-secondary">Client Email:</span> <span className="text-white ml-1">{selectedData.closingNotes.clientEmail}</span></div>}
                                            {selectedData.closingNotes.paymentProcessorEmail && <div className="text-xs mb-2"><span className="text-secondary">Payment Processor:</span> <span className="text-white ml-1">{selectedData.closingNotes.paymentProcessorEmail}</span></div>}
                                            {selectedData.closingNotes.closeDate && <div className="text-xs mb-2"><span className="text-secondary">Close Date:</span> <span className="text-white ml-1">{selectedData.closingNotes.closeDate}</span></div>}
                                            {selectedData.closingNotes.generalNotes && <div className="mt-2 p-2 rounded text-xs" style={{background:'var(--bg-main, #0d1117)'}}><span className="text-secondary">General Notes:</span><div className="text-slate-300 mt-1 whitespace-pre-wrap">{selectedData.closingNotes.generalNotes}</div></div>}
                                            {selectedData.closingNotes.onboardingNotes && <div className="mt-2 p-2 rounded text-xs" style={{background:'var(--bg-main, #0d1117)'}}><span className="text-secondary">Onboarding Notes:</span><div className="text-slate-300 mt-1 whitespace-pre-wrap">{selectedData.closingNotes.onboardingNotes}</div></div>}
                                            {selectedData.closingNotes.potentialIssue && <div className="mt-2 p-2 rounded text-xs bg-amber-500/10 border border-amber-500/30"><span className="text-amber-400 font-medium">Potential Issue:</span><div className="text-slate-300 mt-1 whitespace-pre-wrap">{selectedData.closingNotes.potentialIssue}</div></div>}
                                        </div>
                                    )}
                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="card rounded-xl p-3 text-center"><div className="text-lg font-bold text-emerald-400">{fmtC(selectedData.totalCollected)}</div><div className="text-xs text-slate-500">Total Collected</div></div>
                                        <div className="card rounded-xl p-3 text-center"><div className="text-lg font-bold text-red-400">{fmtC(selectedData.stripeUnpaidTotal)}</div><div className="text-xs text-slate-500">Unpaid/Failed</div></div>
                                        <div className="card rounded-xl p-3 text-center"><div className="text-lg font-bold text-white">{selectedData.totalPayments}</div><div className="text-xs text-slate-500">Total Payments</div></div>
                                    </div>
                                    {selectedData.upcoming && <div className="card rounded-xl p-4 border-brand-cyan/30"><h3 className="text-sm font-semibold text-brand-cyan mb-1">Next Billing</h3><div className="text-sm text-white">{formatDateStr(new Date(selectedData.upcoming.nextBillingDate))} - {fmtC(selectedData.upcoming.amount)}/{selectedData.upcoming.interval || 'mo'}</div></div>}
                                    {selectedData.crmFees?.length > 0 && <div className="card rounded-xl p-4 border-slate-600/30">{selectedData.crmFees.map((f, i) => <div key={i} className="flex justify-between text-xs"><span className="text-slate-400">CRM Fee</span><span className="text-slate-300">{fmtC(f.amount)}/{f.interval || 'mo'} — next: {f.nextBillingDate ? formatDateStr(new Date(f.nextBillingDate)) : '—'}</span></div>)}</div>}
                                    <div><h3 className="text-sm font-semibold text-purple-400 mb-2">Stripe Invoices ({selectedData.stripeInvoices.length})</h3>
                                        {selectedData.stripeInvoices.length === 0 ? <div className="text-xs text-slate-500 p-3 card rounded-xl">No Stripe invoices found</div> : (
                                            <div className="space-y-1">{selectedData.stripeInvoices.sort((a, b) => new Date(b.created) - new Date(a.created)).map(inv => (
                                                <div key={inv.id} className="card rounded-lg p-3 flex items-center justify-between">
                                                    <div><div className="text-sm text-white">{fmtC(inv.amountDue)}</div><div className="text-xs text-slate-500">{formatDateStr(new Date(inv.created))} {inv.description ? `- ${inv.description.substring(0, 50)}` : ''}</div></div>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${inv.paid ? 'bg-emerald-500/20 text-emerald-400' : inv.status === 'open' ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-500/20 text-slate-400'}`}>{inv.paid ? 'Paid' : inv.status}</span>
                                                        {inv.attemptCount > 1 && <span className="text-xs text-red-400">{inv.attemptCount} attempts</span>}
                                                    </div>
                                                </div>
                                            ))}</div>
                                        )}
                                    </div>
                                    <div><div className="flex items-center justify-between mb-2">
                                        <h3 className="text-sm font-semibold text-blue-400">Whop Memberships ({selectedData.whopPayments.length})</h3>

                    ) : (

                                <div ref={aiEndRef} />

                            <div className="p-3 border-t divider flex gap-2">
                                <input value={aiInput} onChange={e => setAiInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') sendAi(aiInput); }} placeholder="Ask about billing errors..." className="input-field border rounded-lg px-3 py-2 text-xs flex-1" />
                                <button onClick={() => sendAi(aiInput)} disabled={aiLoading || !aiInput.trim()} className={`px-3 py-2 rounded-lg text-xs font-medium ${aiLoading || !aiInput.trim() ? 'bg-dark-700 text-slate-500' : 'bg-brand-cyan/20 text-brand-cyan'}`}>Send</button>
                            </div>

                    )}
                </div>
            );
        };

        // ========== BILLING AI CHAT ==========
        const BillingAIChat = ({ data }) => {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const buildContext = () => {
                const rows = data.map(c => ({
                    client: c.client,
                    teamMember: c.teamMember || '—',
                    paidDate: c.paidDate ? c.paidDate.toISOString().split('T')[0] : null,
                    firstSpendDate: c.firstSpendDate ? c.firstSpendDate.toISOString().split('T')[0] : null,
                    adLiveDate: c.adLiveDate ? c.adLiveDate.toISOString().split('T')[0] : null,
                    setupDays: c.launchSetupDays,
                    activeDays: c.activeDays,
                    inactiveDays: c.inactiveDays,
                    recordedPauseDays: c.recordedOnPause,
                    discrepancy: c.discrepancy,
                    severity: c.severity,
                    billingCycle: c.billingCycle || '—',
                    correctedBillingStart: c.correctedBillingStart ? c.correctedBillingStart.toISOString().split('T')[0] : null,
                    hasMetaData: c.hasMetaData
                }));
                return JSON.stringify(rows, null, 2);
            };

            const handleSend = async () => {
                const q = input.trim();
                if (!q || loading) return;
                setInput('');
                const newMessages = [...messages, { role: 'user', content: q }];
                setMessages(newMessages);
                setLoading(true);

                try {
                    const systemPrompt = `You are a billing audit analyst for a marketing agency. You have access to the billing audit data for all clients. Answer questions about this data concisely and accurately. Use specific numbers and client names when relevant. Format responses with markdown when helpful.

Today's date: ${new Date().toISOString().split('T')[0]}

Here is the current billing audit data:
${buildContext()}

Column definitions:
- paidDate: Date the client paid (from Google Sheet)
- firstSpendDate: First date Meta Ads recorded actual spend > $0
- adLiveDate: Ad live date recorded in the Google Sheet
- setupDays: Days between paidDate and firstSpendDate (how long to launch)
- activeDays: Total days with Meta ad spend > $0 since first spend
- inactiveDays: Days since first spend with NO ad spend (paused/inactive)
- recordedPauseDays: Pause days recorded in the Google Sheet
- discrepancy: inactiveDays minus recordedPauseDays (unrecorded pause days)
- severity: High (7+ days off), Medium (3-6 days off), OK (0-2 days off)
- billingCycle: Billing cycle info from the Google Sheet
- correctedBillingStart: Adjusted billing start accounting for inactive days`;

                    const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));

                    const res = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: apiMessages, system: systemPrompt, max_tokens: 2000 })
                    });

                    const result = await res.json();
                    const reply = result.content?.[0]?.text || result.error || 'Sorry, I could not process that.';
                    setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: 'Error: ' + err.message }]);
                } finally {
                    setLoading(false);
                }
            };

            if (!open) {
                return (
                    <button
                        onClick={() => setOpen(true)}
                        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-brand-cyan text-dark-900 font-bold text-xl shadow-lg hover:scale-110 transition-transform z-50 flex items-center justify-center"
                        title="Ask AI about billing data"
                    >
                        AI
                    </button>
                );
            }

            return (
                <div className="fixed bottom-6 right-6 bg-dark-800 border border-dark-700 rounded-2xl shadow-2xl z-50 flex flex-col overflow-hidden" style={{width: '384px', height: '500px'}}>
                    <div className="flex items-center justify-between px-4 py-3 bg-dark-900 border-b border-dark-700">
                        <span className="text-sm font-semibold text-white">Billing AI Assistant</span>
                        <button onClick={() => setOpen(false)} className="text-slate-400 hover:text-white text-lg">&times;</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        {messages.length === 0 && (
                            <div className="text-center text-slate-500 text-sm mt-8 space-y-2">
                                <div className="text-2xl">🤖</div>
                                <div>Ask me anything about the billing data</div>
                                <div className="text-xs text-slate-600 space-y-1">
                                    <div>"Which clients have the most inactive days?"</div>
                                    <div>"Who took the longest to launch?"</div>
                                    <div>"Summarize discrepancies for Maria's clients"</div>
                                </div>
                            </div>
                        )}
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`rounded-xl px-3 py-2 text-sm whitespace-pre-wrap ${m.role === 'user' ? 'bg-brand-cyan/20 text-cyan-200' : 'bg-dark-700 text-slate-200'}`} style={{maxWidth: '85%'}}>
                                    {m.content}
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-dark-700 rounded-xl px-3 py-2 text-sm text-slate-400">Thinking...</div>
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </div>
                    <div className="p-3 border-t border-dark-700">
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSend()}
                                placeholder="Ask about billing data..."
                                className="flex-1 bg-dark-900 border border-dark-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-cyan"
                                disabled={loading}
                            />
                            <button
                                onClick={handleSend}
                                disabled={loading || !input.trim()}
                                className="px-3 py-2 bg-brand-cyan text-dark-900 rounded-lg text-sm font-semibold hover:bg-brand-cyan/80 disabled:opacity-40"
                            >
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ========== BILLING AUDIT TAB ==========
        const BillingAuditTab = ({ clients, setupData }) => {
            const { subscriptions, subsLoading } = useBillingData();
            const [searchFilter, setSearchFilter] = useState('');
            const [filterSeverity, setFilterSeverity] = useState('');
            const [filterTeamMember, setFilterTeamMember] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: null, dir: 'desc' });
            const [dailySpend, setDailySpend] = useState({});
            const [manualMappings, setManualMappings] = useState(() => {
                try { return JSON.parse(localStorage.getItem('vam_billing_mappings') || '{}'); } catch { return {}; }
            });
            const [showMappingModal, setShowMappingModal] = useState(null);
            const [loading, setLoading] = useState(true);

            const getSetupInfo = (client) => {
                const name = client.client.toLowerCase().trim();
                return setupData.find(s => {
                    const sn = (s.client || '').toLowerCase().trim();
                    return sn === name || sn.includes(name) || name.includes(sn);
                });
            };

            const parseDate = (dateStr) => {
                if (!dateStr) return null;
                const d = new Date(dateStr.trim());
                return isNaN(d.getTime()) ? null : d;
            };

            const formatDateStr = (date) => {
                if (!date) return '—';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            };

            const toYMD = (date) => date ? date.toISOString().split('T')[0] : null;
            const daysBetween = (a, b) => (!a || !b) ? 0 : Math.round((b - a) / (1000 * 60 * 60 * 24));
            const addDays = (date, days) => { if (!date) return null; const r = new Date(date); r.setDate(r.getDate() + days); return r; };

            useEffect(() => {
                const clientDates = {};
                for (const s of setupData) {
                    if (!s.client) continue;
                    const adLive = s.adLiveDate || s[' Ad Live date'] || s['Ad Live date'] || '';
                    const d = parseDate(adLive);
                    const ymd = toYMD(d);
                    if (ymd) clientDates[s.client] = ymd;
                }
                if (Object.keys(clientDates).length > 0) {
                    // Check cache first (30 min)
                    const cached = localStorage.getItem('vam_daily_spend');
                    const cacheTime = localStorage.getItem('vam_daily_spend_cache_time');
                    const cacheAge = cacheTime ? Date.now() - parseInt(cacheTime) : Infinity;
                    if (cached && cacheAge < 30 * 60 * 1000) {
                        try { setDailySpend(JSON.parse(cached)); setLoading(false); return; } catch(e) {}
                    }
                    fetch('/api/meta-ads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'fetchDailySpend', clientDates })
                    })
                    .then(r => r.json())
                    .then(data => {
                        const results = data.results || {};
                        setDailySpend(results);
                        try {
                            localStorage.setItem('vam_daily_spend', JSON.stringify(results));
                            localStorage.setItem('vam_daily_spend_cache_time', Date.now().toString());
                        } catch(e) {}
                    })
                    .catch(() => {})
                    .finally(() => setLoading(false));
                } else {
                    setLoading(false);
                }
            }, [clients, setupData]);

            // Match client to subscription
            const allSubs = useMemo(() => [...subscriptions.stripe, ...subscriptions.whop, ...(subscriptions.fanbasis || [])], [subscriptions]);

            const matchSubscription = (clientName) => {
                // Check manual mapping first
                if (manualMappings[clientName]) {
                    const mapped = allSubs.find(s => s.id === manualMappings[clientName]);
                    if (mapped) return mapped;
                }
                // Auto-match by name (fuzzy)
                const cn = clientName.toLowerCase().trim();
                // Exact match
                let match = allSubs.find(s => s.customerName.toLowerCase().trim() === cn);
                if (match) return match;
                // Partial match
                match = allSubs.find(s => {
                    const sn = s.customerName.toLowerCase().trim();
                    return sn && cn && (sn.includes(cn) || cn.includes(sn));
                });
                if (match) return match;
                // Match by first + last name parts
                const parts = cn.split(/\s+/);
                if (parts.length >= 2) {
                    match = allSubs.find(s => {
                        const sn = s.customerName.toLowerCase();
                        return parts.every(p => sn.includes(p));
                    });
                }
                return match || null;
            };

            const saveManualMapping = (clientName, subId) => {
                const updated = { ...manualMappings, [clientName]: subId };
                setManualMappings(updated);
                localStorage.setItem('vam_billing_mappings', JSON.stringify(updated));
                setShowMappingModal(null);
            };

            const fmtD = (date) => date ? date.toISOString().split('T')[0] : '';

            const exportCSV = (rows) => {
                const headers = ['Client','Team Member','Paid Date','First Spend Date (META)','Setup Days','Ad Live Date','Active Days (META)','Inactive Days (META)','Recorded Pause','Discrepancy','Severity','Corrected Billing Start','Sheet Billing Date','Next Billing Date (Stripe/Whop)','Billing Match','Billing Days Diff','Payment Source'];
                const csvRows = [headers.join(',')];
                for (const c of rows) {
                    const row = [
                        '"' + (c.client || '').replace(/"/g, '""') + '"',
                        '"' + (c.teamMember || '').replace(/"/g, '""') + '"',
                        fmtD(c.paidDate),
                        fmtD(c.firstSpendDate),
                        c.launchSetupDays != null ? c.launchSetupDays : '',
                        fmtD(c.adLiveDate),
                        c.hasMetaData ? c.activeDays : '',
                        c.hasMetaData ? c.inactiveDays : '',
                        c.recordedOnPause || 0,
                        c.hasMetaData ? c.discrepancy : '',
                        c.severity || '',
                        fmtD(c.correctedBillingStart),
                        fmtD(c.sheetBillingDate) || '"' + (c.billingCycle || '').replace(/"/g, '""') + '"',
                        fmtD(c.nextBillingDate),
                        c.billingMatch || '',
                        c.billingDaysDiff != null ? c.billingDaysDiff : '',
                        c.paymentSource || ''
                    ];
                    csvRows.push(row.join(','));
                }
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'billing_audit_' + new Date().toISOString().split('T')[0] + '.csv';
                a.click();
                URL.revokeObjectURL(url);
            };

            const enriched = useMemo(() => setupData.filter(s => s.client).map(s => {
                const clientName = s.client;
                const adLiveDate = parseDate(s.adLiveDate || s[' Ad Live date'] || s['Ad Live date'] || '');
                const paidDate = parseDate(s.paidDate || '');
                const billingCycle = s.billingCycle || '';
                const recordedOnPause = pn(s.adsOnPauseDays);
                let setupDaysVal = pn(s.setupDays || s['Setup Days'] || s['Setup days'] || '');
                if (!setupDaysVal && adLiveDate && paidDate) setupDaysVal = Math.max(0, daysBetween(paidDate, adLiveDate));
                const spendData = dailySpend[clientName] || [];
                const hasMetaData = spendData.length > 0;
                const firstSpendEntry = spendData.find(d => d.spend > 0);
                const firstSpendDate = firstSpendEntry ? parseDate(firstSpendEntry.date) : null;
                const launchSetupDays = (firstSpendDate && paidDate) ? Math.max(0, daysBetween(paidDate, firstSpendDate)) : null;
                const activeDays = spendData.filter(d => d.spend > 0).length;
                const totalDaysSinceFirstSpend = firstSpendDate ? daysBetween(firstSpendDate, new Date()) : 0;
                const inactiveDays = hasMetaData && firstSpendDate ? Math.max(0, totalDaysSinceFirstSpend - activeDays) : 0;
                const correctedBillingStart = firstSpendDate ? addDays(firstSpendDate, inactiveDays) : null;
                const discrepancy = hasMetaData ? inactiveDays - recordedOnPause : 0;
                const absDisc = Math.abs(discrepancy);
                const severity = absDisc >= 7 ? 'High' : absDisc >= 3 ? 'Medium' : 'OK';
                // Find matching client from ads performance sheet for extra data
                const adsClient = clients.find(c => c.client.toLowerCase().trim() === clientName.toLowerCase().trim());
                const sub = matchSubscription(clientName);
                const nextBillingDate = sub?.currentPeriodEnd ? parseDate(sub.currentPeriodEnd) : null;
                const sheetBillingDate = parseDate(s.nextBillingDateSheet) || parseDate(billingCycle) || parseDate(s.duePayment) || parseDate(s.contractEndDate);
                const billingDaysDiff = (nextBillingDate && sheetBillingDate) ? daysBetween(sheetBillingDate, nextBillingDate) : null;
                const billingMatch = billingDaysDiff !== null ? (Math.abs(billingDaysDiff) <= 1 ? 'Match' : billingDaysDiff > 0 ? `+${billingDaysDiff}d` : `${billingDaysDiff}d`) : null;
                return { client: clientName, setup: s, paidDate, adLiveDate, firstSpendDate, launchSetupDays, setupDaysVal, activeDays, inactiveDays, recordedOnPause, correctedBillingStart, billingCycle, sheetBillingDate, discrepancy, severity, hasMetaData, teamMember: adsClient?.teamMember || s.csmRep || '', subscription: sub, nextBillingDate, paymentSource: sub?.source || null, billingDaysDiff, billingMatch };
            }), [clients, setupData, dailySpend, allSubs, manualMappings]);

            const teamMembers = useMemo(() => [...new Set(enriched.map(c => c.teamMember).filter(Boolean))].sort(), [enriched]);
            const activeFilterCount = [filterSeverity, filterTeamMember].filter(Boolean).length;

            const filtered = enriched.filter(c => {
                const matchesSearch = !searchFilter || c.client.toLowerCase().includes(searchFilter.toLowerCase()) || c.teamMember.toLowerCase().includes(searchFilter.toLowerCase());
                const matchesSeverity = !filterSeverity || c.severity === filterSeverity;
                const matchesTeamMember = !filterTeamMember || c.teamMember === filterTeamMember;
                return matchesSearch && matchesSeverity && matchesTeamMember;
            });

            const handleSort = (key) => setSortConfig(prev => prev.key === key ? { key, dir: prev.dir === 'desc' ? 'asc' : 'desc' } : { key, dir: 'desc' });

            const sorted = useMemo(() => {
                if (!sortConfig.key) return filtered; // preserve sheet order
                const arr = [...filtered];
                arr.sort((a, b) => {
                    let valA, valB;
                    if (sortConfig.key === 'client') { valA = a.client; valB = b.client; }
                    else if (sortConfig.key === 'paidDate') { valA = a.paidDate?.getTime() || 0; valB = b.paidDate?.getTime() || 0; }
                    else if (sortConfig.key === 'adLiveDate') { valA = a.adLiveDate?.getTime() || 0; valB = b.adLiveDate?.getTime() || 0; }
                    else if (sortConfig.key === 'firstSpendDate') { valA = a.firstSpendDate?.getTime() || 0; valB = b.firstSpendDate?.getTime() || 0; }
                    else if (sortConfig.key === 'correctedBillingStart') { valA = a.correctedBillingStart?.getTime() || 0; valB = b.correctedBillingStart?.getTime() || 0; }
                    else if (sortConfig.key === 'nextBillingDate') { valA = a.nextBillingDate?.getTime() || 0; valB = b.nextBillingDate?.getTime() || 0; }
                    else if (sortConfig.key === 'sheetBillingDate') { valA = a.sheetBillingDate?.getTime() || 0; valB = b.sheetBillingDate?.getTime() || 0; }
                    else if (sortConfig.key === 'billingDaysDiff') { valA = Math.abs(a.billingDaysDiff ?? 0); valB = Math.abs(b.billingDaysDiff ?? 0); }
                    else { valA = a[sortConfig.key] ?? 0; valB = b[sortConfig.key] ?? 0; }
                    const cmp = typeof valA === 'string' ? valA.localeCompare(valB) : valA - valB;
                    if (cmp !== 0) return sortConfig.dir === 'asc' ? cmp : -cmp;
                    return Math.abs(b.discrepancy) - Math.abs(a.discrepancy);
                });
                return arr;
            }, [filtered, sortConfig]);

            const clientsAudited = filtered.filter(c => c.hasMetaData).length;
            const clientsWithDiscrepancies = filtered.filter(c => c.hasMetaData && Math.abs(c.discrepancy) >= 3).length;
            const totalUnrecordedPauseDays = filtered.reduce((sum, c) => sum + (c.hasMetaData && c.discrepancy > 0 ? c.discrepancy : 0), 0);
            const avgActiveDays = clientsAudited > 0 ? Math.round(filtered.filter(c => c.hasMetaData).reduce((sum, c) => sum + c.activeDays, 0) / clientsAudited) : 0;

            const DiscrepancyBadge = ({ days }) => {

                if (abs >= 3) return <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-amber-500/20 text-amber-400">{days}d off</span>;

            };

            const SortHeader = ({ label, sortKey, align = 'right', formula }) => {
                const active = sortConfig.key === sortKey;

                return (
                    <th className={`px-4 py-3 text-xs font-semibold text-slate-400 uppercase select-none ${align === 'left' ? 'text-left' : 'text-right'} relative`}>
                        <span className="inline-flex items-center gap-1 cursor-pointer hover:text-white" onClick={() => handleSort(sortKey)}>
                            {label}
                            {active && <span className="text-brand-cyan">{sortConfig.dir === 'asc' ? '▲' : '▼'}</span>}
                        </span>
                        {formula && (

                                <button onClick={(e) => { e.stopPropagation(); setShowFormula(!showFormula); }} className="text-slate-500 hover:text-brand-cyan text-xs align-middle">ⓘ</button>
                                {showFormula && (

            if (loading) {

            return (

                        <div className="card rounded-2xl p-6 text-center"><div className={`text-3xl font-bold ${totalUnrecordedPauseDays > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{fmtN(totalUnrecordedPauseDays)}</div><div className="text-xs text-slate-400">Unrecorded Pause Days</div></div>
                        <div className="card rounded-2xl p-6 text-center"><div className="text-3xl font-bold text-blue-400">{fmtN(avgActiveDays)}</div><div className="text-xs text-slate-400">Avg Active Days</div></div>
                    </div>
                    <div className="card rounded-2xl p-4 space-y-3">
                        <div className="flex items-center gap-3">
                            <input type="text" value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="w-64 input-field border rounded-xl px-3 py-2 text-sm" />
                            {activeFilterCount > 0 && <button onClick={() => { setSearchFilter(''); setFilterSeverity(''); setFilterTeamMember(''); }} className="px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500/20">Clear Filters ({activeFilterCount})</button>}
                            {sortConfig.key && <button onClick={() => setSortConfig({ key: null, dir: 'desc' })} className="px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-medium hover:bg-blue-500/20">Reset to Sheet Order</button>}
                            {(activeFilterCount > 0 || searchFilter) && <span className="text-xs text-slate-500">Showing {filtered.length} of {enriched.length}</span>}
                            <button onClick={() => exportCSV(sorted)} className="px-3 py-2 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium hover:bg-emerald-500/20 ml-auto">Export CSV</button>
                            <button onClick={() => { ['vam_clients','vam_setup','vam_cache_time','vam_daily_spend','vam_daily_spend_cache_time','vam_subscriptions','vam_subscriptions_cache_time','vam_billing_mappings','vam_billing_invoices','vam_billing_invoices_cache_time'].forEach(k => localStorage.removeItem(k)); localStorage.setItem('vam_active_tab', 'billing-errors'); window.location.reload(); }} className="px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-medium hover:bg-blue-500/20">Clear Cache & Reload</button>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div><label className="block text-xs text-slate-500 mb-1">Discrepancy Severity</label><select value={filterSeverity} onChange={e => setFilterSeverity(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white"><option value="">All</option><option value="High">High</option><option value="Medium">Medium</option><option value="OK">OK</option></select></div>
                            <div><label className="block text-xs text-slate-500 mb-1">Team Member</label><select value={filterTeamMember} onChange={e => setFilterTeamMember(e.target.value)} className="w-full bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-white"><option value="">All</option>{teamMembers.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                        </div>
                    </div>
                    <div className="card rounded-2xl overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-dark-800">
                                    <tr>
                                        <SortHeader label="Client" sortKey="client" align="left" />
                                        <SortHeader label="Paid Date" sortKey="paidDate" align="left" />

                                        <SortHeader label="Inactive Days (META)" sortKey="inactiveDays" formula="(Days since First Spend Date) − Active Days (META) = days with no ad spend since launch" />
                                        <SortHeader label="Recorded Pause" sortKey="recordedOnPause" />
                                        <SortHeader label="Discrepancy" sortKey="discrepancy" formula="Inactive Days (META) − Recorded Pause Days = unrecorded pause days that may need billing adjustment" />
                                        <SortHeader label="Corrected Billing Start" sortKey="correctedBillingStart" align="left" formula="First Spend Date (META) + Inactive Days (META) = adjusted start date accounting for paused periods" />
                                        <SortHeader label="Sheet Billing Date" sortKey="sheetBillingDate" align="left" />
                                        <SortHeader label="Next Billing Date (Stripe/Whop)" sortKey="nextBillingDate" align="left" formula="Next payment date pulled from Stripe or Whop subscription data" />
                                        <SortHeader label="Billing Match" sortKey="billingDaysDiff" formula="Next Billing Date (Stripe/Whop) minus Sheet Billing Date. Shows if dates match and by how many days they differ." />
                                        <th className="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Source</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-dark-700">
                                    {sorted.length === 0 ? (
                                        <tr><td colSpan={15} className="px-4 py-8 text-center text-slate-500 text-sm">No clients match current filters</td></tr>
                                    ) : sorted.map(c => (
                                        <tr key={c.client} className={`transition-colors ${c.hasMetaData ? 'hover:bg-dark-800' : 'bg-dark-900/50 opacity-60'}`}>
                                            <td className="px-4 py-3"><div className="font-medium text-white">{c.client}</div><div className="text-xs text-slate-500">{c.teamMember || '—'}</div></td>
                                            <td className="px-4 py-3 text-sm text-slate-300">{formatDateStr(c.paidDate)}</td>
                                            <td className="px-4 py-3 text-sm">{c.firstSpendDate ? <span className="text-emerald-400 font-medium">{formatDateStr(c.firstSpendDate)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-right">{c.launchSetupDays != null ? <span className={`font-medium ${c.launchSetupDays > 7 ? 'text-amber-400' : c.launchSetupDays > 3 ? 'text-yellow-400' : 'text-emerald-400'}`}>{c.launchSetupDays}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-sm text-slate-300">{formatDateStr(c.adLiveDate)}</td>
                                            <td className="px-4 py-3 text-right">{c.hasMetaData ? <span className="font-medium text-emerald-400">{fmtN(c.activeDays)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-right">{c.hasMetaData ? <span className={`font-medium ${c.inactiveDays > 0 ? 'text-amber-400' : 'text-slate-400'}`}>{fmtN(c.inactiveDays)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-right text-sm text-slate-300">{c.recordedOnPause || '0'}</td>
                                            <td className="px-4 py-3 text-right">{c.hasMetaData ? <DiscrepancyBadge days={c.discrepancy} /> : <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-slate-500/20 text-slate-500">No data</span>}</td>
                                            <td className="px-4 py-3 text-sm">{c.hasMetaData && c.correctedBillingStart ? <span className="text-cyan-400 font-medium">{formatDateStr(c.correctedBillingStart)}</span> : <span className="text-slate-500">—</span>}</td>
                                            <td className="px-4 py-3 text-sm text-slate-400">{c.sheetBillingDate ? formatDateStr(c.sheetBillingDate) : (c.billingCycle || '—')}</td>
                                            <td className="px-4 py-3 text-sm">
                                                {c.nextBillingDate ? (
                                                    <span className="text-blue-400 font-medium">{formatDateStr(c.nextBillingDate)}</span>
                                                ) : (
                                                    <button onClick={() => setShowMappingModal(c.client)} className="text-xs text-slate-500 hover:text-brand-cyan underline">Map</button>
                                                )}
                                            </td>
                                            <td className="px-4 py-3 text-right text-sm">
                                                {c.billingMatch === 'Match' ? (
                                                    <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-500/20 text-emerald-400">Match</span>
                                                ) : c.billingMatch ? (
                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${Math.abs(c.billingDaysDiff) >= 7 ? 'bg-red-500/20 text-red-400' : 'bg-amber-500/20 text-amber-400'}`}>{c.billingMatch}</span>
                                                ) : (
                                                    <span className="text-slate-500">—</span>
                                                )}
                                            </td>
                                            <td className="px-4 py-3 text-sm">
                                                {c.subscription ? (
                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${c.paymentSource === 'stripe' ? 'bg-purple-500/20 text-purple-400' : 'bg-blue-500/20 text-blue-400'}`}>
                                                        {c.paymentSource === 'stripe' ? 'Stripe' : 'Whop'}
                                                    </span>
                                                ) : (
                                                    <span className="text-slate-500">—</span>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <BillingAIChat data={enriched} />
                    {/* Manual Mapping Modal */}
                    {showMappingModal && (
                        <div style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setShowMappingModal(null)}>
                            <div style={{width:'500px',maxHeight:'80vh',background:'#1a1d23',border:'1px solid #2d3039',borderRadius:'16px',overflow:'hidden'}} onClick={e => e.stopPropagation()}>
                                <div style={{padding:'16px 20px',borderBottom:'1px solid #2d3039',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                    <div>
                                        <div style={{color:'#fff',fontWeight:600}}>Map Subscription</div>
                                        <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}}>Link <span style={{color:'#22d3ee'}}>{showMappingModal}</span> to a Stripe/Whop subscription</div>
                                    </div>
                                    <button onClick={() => setShowMappingModal(null)} style={{color:'#94a3b8',fontSize:'20px',cursor:'pointer',background:'none',border:'none'}}>×</button>
                                </div>
                                <div style={{overflowY:'auto',maxHeight:'60vh',padding:'16px'}}>
                                    {(subscriptions.errors || []).length > 0 && (
                                        <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-2">
                                            <div className="text-xs text-red-400 font-medium mb-1">API Errors:</div>
                                            {(subscriptions.errors || []).map((e, i) => (
