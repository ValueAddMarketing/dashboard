                                    <div className="text-xs text-slate-500 mb-2">Stripe: {subscriptions.stripe?.length || 0} subs | Whop: {subscriptions.whop?.length || 0} subs</div>
                                    {subsLoading ? (
                                        <div className="text-center text-slate-500 py-8 text-sm">Loading subscriptions...</div>
                                    ) : allSubs.length === 0 ? (
                                        <div className="text-center text-slate-500 py-8 text-sm">No subscriptions found. Check your Stripe/Whop API keys in Vercel and redeploy.</div>
                                    ) : (
                                        allSubs.map(sub => (
                                            <button
                                                key={sub.id}
                                                onClick={() => saveManualMapping(showMappingModal, sub.id)}
                                                className="w-full text-left px-4 py-3 rounded-lg bg-dark-900 hover:bg-dark-700 border border-dark-700 transition-colors"
                                            >
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <div className="text-sm text-white font-medium">{sub.customerName || 'Unknown'}</div>
                                                        <div className="text-xs text-slate-400">{sub.customerEmail}</div>
                                                    </div>
                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${sub.source === 'stripe' ? 'bg-purple-500/20 text-purple-400' : 'bg-blue-500/20 text-blue-400'}`}>
                                                        {sub.source === 'stripe' ? 'Stripe' : 'Whop'}
                                                    </span>
                                                </div>
                                                <div className="text-xs text-slate-500 mt-1">
                                                    {sub.amount ? `$${sub.amount}/${sub.interval || 'mo'}` : ''} — Next: {sub.currentPeriodEnd || '—'} — Status: {sub.status}
                                                </div>
                                            </button>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LTVChurnTab = () => {
            const { subscriptions, subsLoading } = useBillingData();
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('overview');
            const [sortConfig, setSortConfig] = useState({ key: 'created', dir: 'asc' });
            const [searchFilter, setSearchFilter] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [datePreset, setDatePreset] = useState('all');
            const [customFrom, setCustomFrom] = useState('');
            const [customTo, setCustomTo] = useState('');

            const getDateRange = () => {
                if (datePreset === 'custom') {
                    return { from: customFrom ? new Date(customFrom) : null, to: customTo ? new Date(customTo + 'T23:59:59') : null };
                }
                if (datePreset === 'all') return { from: null, to: null };
                const now = new Date();
                const from = new Date(now);
                const months = { '1m': 1, '3m': 3, '6m': 6, '1y': 12, '2y': 24 }[datePreset] || 0;
                from.setMonth(from.getMonth() - months);
                return { from, to: now };
            };

            const dateRange = getDateRange();

            useEffect(() => { setLoading(subsLoading); }, [subsLoading]);

            const allSubs = useMemo(() => [...subscriptions.stripe, ...subscriptions.whop, ...(subscriptions.fanbasis || [])], [subscriptions]);

            const parseDate = (s) => { if (!s) return null; const d = new Date(s); return isNaN(d.getTime()) ? null : d; };
            const daysBetween = (a, b) => Math.round((b - a) / (1000 * 60 * 60 * 24));
            const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
            const fmtCurrency = (n) => n != null ? '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
            const monthKey = (d) => d ? d.toISOString().slice(0, 7) : null;

            // Normalize monthly amount
            const monthlyAmount = (sub) => {
                if (!sub.amount) return 0;
                if (sub.interval === 'year') return sub.amount / 12;
                if (sub.interval === 'week') return sub.amount * 4.33;
                return sub.amount; // default monthly
            };

            // Determine effective end date for churned clients
            const getEndDate = (sub) => {
                if (sub.endedAt) return parseDate(sub.endedAt);
                if (sub.canceledAt) return parseDate(sub.canceledAt);
                if (sub.cancelAt) return parseDate(sub.cancelAt);
                return null;
            };

            const isChurned = (sub) => {
                const status = (sub.status || '').toLowerCase();
                return ['canceled', 'cancelled', 'incomplete_expired', 'unpaid', 'expired', 'inactive'].includes(status);
            };

            const isActive = (sub) => {
                const status = (sub.status || '').toLowerCase();
                return ['active', 'trialing', 'past_due'].includes(status);
            };

            const isAtRisk = (sub) => {
                return sub.cancelAtPeriodEnd || (sub.status || '').toLowerCase() === 'past_due';
            };

            // Enriched subscription data
            const enrichedSubs = useMemo(() => {
                return allSubs.map(sub => {
                    const startDate = parseDate(sub.created);
                    const endDate = getEndDate(sub);
                    const churned = isChurned(sub);
                    const active = isActive(sub);
                    const atRisk = isAtRisk(sub);
                    const monthly = monthlyAmount(sub);

                    let lifetimeDays = 0;
                    let lifetimeMonths = 0;
                    if (startDate) {
                        const end = endDate || new Date();
                        lifetimeDays = Math.max(0, daysBetween(startDate, end));
                        lifetimeMonths = Math.max(1, Math.round(lifetimeDays / 30.44));
                    }
                    const totalRevenue = monthly * lifetimeMonths;

                    return {
                        ...sub,
                        startDate,
                        endDate,
                        churned,
                        active,
                        atRisk,
                        monthly,
                        lifetimeDays,
                        lifetimeMonths,
                        totalRevenue,
                        startMonth: monthKey(startDate),
                        endMonth: endDate ? monthKey(endDate) : null
                    };
                }).filter(s => s.startDate); // only include subs with valid start dates
            }, [allSubs]);

            // Filter enriched subs by date range
            const dateFilteredSubs = useMemo(() => {
                const { from, to } = dateRange;
                if (!from && !to) return enrichedSubs;
                return enrichedSubs.filter(s => {
                    if (!s.startDate) return false;
                    // Include if the subscription was active during the date range
                    // Started before or during the range AND (still active or ended during/after range start)
                    const startedBeforeEnd = !to || s.startDate <= to;
                    const endedAfterStart = !from || !s.endDate || s.endDate >= from;
                    return startedBeforeEnd && endedAfterStart;
                });
            }, [enrichedSubs, dateRange.from?.getTime(), dateRange.to?.getTime()]);

            // KPI calculations
            const metrics = useMemo(() => {
                const total = dateFilteredSubs.length;
                const activeSubs = dateFilteredSubs.filter(s => s.active);
                const churnedSubs = dateFilteredSubs.filter(s => s.churned);
                const atRiskSubs = enrichedSubs.filter(s => s.atRisk && s.active);

                const activeCount = activeSubs.length;
                const churnedCount = churnedSubs.length;
                const atRiskCount = atRiskSubs.length;

                const mrr = activeSubs.reduce((sum, s) => sum + s.monthly, 0);
                const atRiskMRR = atRiskSubs.reduce((sum, s) => sum + s.monthly, 0);

                const avgLifetimeAll = total > 0 ? dateFilteredSubs.reduce((sum, s) => sum + s.lifetimeMonths, 0) / total : 0;
                const avgLifetimeChurned = churnedCount > 0 ? churnedSubs.reduce((sum, s) => sum + s.lifetimeMonths, 0) / churnedCount : 0;

                const avgLTV = total > 0 ? dateFilteredSubs.reduce((sum, s) => sum + s.totalRevenue, 0) / total : 0;
                const avgActiveLTV = activeCount > 0 ? activeSubs.reduce((sum, s) => sum + s.totalRevenue, 0) / activeCount : 0;

                // Overall churn rate: churned / total
                const overallChurnRate = total > 0 ? (churnedCount / total) * 100 : 0;

                // Monthly churn data
                const monthlyData = {};
                for (const sub of dateFilteredSubs) {
                    const sm = sub.startMonth;
                    if (sm) {
                        if (!monthlyData[sm]) monthlyData[sm] = { started: 0, churned: 0, active: 0 };
                        monthlyData[sm].started++;
                    }
                    if (sub.endMonth && sub.churned) {
                        if (!monthlyData[sub.endMonth]) monthlyData[sub.endMonth] = { started: 0, churned: 0, active: 0 };
                        monthlyData[sub.endMonth].churned++;
                    }
                }

                // Calculate running active count per month
                const sortedMonths = Object.keys(monthlyData).sort();
                let running = 0;
                for (const m of sortedMonths) {
                    running += monthlyData[m].started - monthlyData[m].churned;
                    monthlyData[m].active = running;
                    monthlyData[m].churnRate = monthlyData[m].active + monthlyData[m].churned > 0
                        ? (monthlyData[m].churned / (monthlyData[m].active + monthlyData[m].churned) * 100)
                        : 0;
                }

                // Recent 3 month churn rate
                const recent3 = sortedMonths.slice(-3);
                const recent3Churned = recent3.reduce((sum, m) => sum + monthlyData[m].churned, 0);
                const recent3Start = recent3.length > 0 && monthlyData[recent3[0]] ? monthlyData[recent3[0]].active + monthlyData[recent3[0]].churned : 1;
                const recentChurnRate = recent3Start > 0 ? (recent3Churned / recent3Start * 100) : 0;

                return {
                    total, activeCount, churnedCount, atRiskCount,
                    mrr, atRiskMRR,
                    avgLifetimeAll, avgLifetimeChurned,
                    avgLTV, avgActiveLTV,
                    overallChurnRate, recentChurnRate,
                    monthlyData, sortedMonths
                };
            }, [dateFilteredSubs]);

            // Cohort retention
            const cohorts = useMemo(() => {
                const cohortMap = {};
                for (const sub of dateFilteredSubs) {
                    const cm = sub.startMonth;
                    if (!cm) continue;
                    if (!cohortMap[cm]) cohortMap[cm] = [];
                    cohortMap[cm].push(sub);
                }
                const cohortKeys = Object.keys(cohortMap).sort();
                const now = new Date();
                return cohortKeys.map(ck => {
                    const subs = cohortMap[ck];
                    const size = subs.length;
                    const cohortDate = new Date(ck + '-01');
                    const maxMonths = Math.min(12, Math.floor(daysBetween(cohortDate, now) / 30.44));
                    const retention = [];
                    for (let m = 0; m <= maxMonths; m++) {
                        const cutoff = new Date(cohortDate);
                        cutoff.setMonth(cutoff.getMonth() + m);
                        const retained = subs.filter(s => {
                            if (!s.endDate) return true;
                            return s.endDate >= cutoff;
                        }).length;
                        retention.push(Math.round((retained / size) * 100));
                    }
                    return { month: ck, size, retention };
                }).filter(c => c.size >= 2); // only show cohorts with 2+ clients
            }, [dateFilteredSubs]);

            // Sorting & filtering for table
            const filteredSubs = useMemo(() => {
                let subs = [...dateFilteredSubs];
                if (searchFilter) {
                    const q = searchFilter.toLowerCase();
                    subs = subs.filter(s => s.customerName.toLowerCase().includes(q) || s.customerEmail.toLowerCase().includes(q));
                }
                if (statusFilter === 'active') subs = subs.filter(s => s.active);
                else if (statusFilter === 'churned') subs = subs.filter(s => s.churned);
                else if (statusFilter === 'at-risk') subs = subs.filter(s => s.atRisk && s.active);

                const { key, dir } = sortConfig;
                if (key) {
                    subs.sort((a, b) => {
                        let av = a[key], bv = b[key];
                        if (av instanceof Date) av = av?.getTime() || 0;
                        if (bv instanceof Date) bv = bv?.getTime() || 0;
                        if (typeof av === 'string') av = av.toLowerCase();
                        if (typeof bv === 'string') bv = bv.toLowerCase();
                        if (av < bv) return dir === 'asc' ? -1 : 1;
                        if (av > bv) return dir === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return subs;
            }, [dateFilteredSubs, searchFilter, statusFilter, sortConfig]);

            const toggleSort = (key) => {
                if (sortConfig.key === key) setSortConfig({ key, dir: sortConfig.dir === 'asc' ? 'desc' : 'asc' });
                else setSortConfig({ key, dir: 'desc' });
            };

            const SortHeader = ({ label, sortKey }) => (
                <th className="text-left py-3 px-4 text-xs font-semibold text-secondary uppercase tracking-wide cursor-pointer hover:text-brand-cyan" onClick={() => toggleSort(sortKey)}>
                    {label} {sortConfig.key === sortKey ? (sortConfig.dir === 'asc' ? ' ↑' : ' ↓') : ''}
                </th>
            );

            const KPICard = ({ label, value, sub, color = 'text-white' }) => (
                <div className="card p-5">
                    <div className="text-xs text-secondary uppercase tracking-wide mb-1">{label}</div>
                    <div className={`text-2xl font-bold ${color}`}>{value}</div>
                    {sub && <div className="text-xs text-secondary mt-1">{sub}</div>}
                </div>
            );

            const StatusBadge = ({ sub }) => {
                if (sub.churned) return <span style={{background:'rgba(239,68,68,0.15)',color:'#f87171',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>Churned</span>;
                if (sub.atRisk) return <span style={{background:'rgba(251,191,36,0.15)',color:'#fbbf24',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>At Risk</span>;
                if (sub.active) return <span style={{background:'rgba(52,211,153,0.15)',color:'#34d399',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>Active</span>;
                return <span style={{background:'rgba(148,163,184,0.15)',color:'#94a3b8',padding:'2px 10px',borderRadius:'9999px',fontSize:'12px'}}>{sub.status}</span>;
            };

            // Bar chart helper (text-based proportional bars)
            const maxChurned = metrics.sortedMonths.length > 0 ? Math.max(...metrics.sortedMonths.map(m => metrics.monthlyData[m].churned), 1) : 1;

            if (loading) return (
                <div className="flex items-center justify-center py-20">
                    <div style={{width:'200px',height:'4px',background:'#262626',borderRadius:'4px',overflow:'hidden'}}>
                        <div className="loading-bar" style={{height:'100%',background:'linear-gradient(90deg,#06b6d4,#8b5cf6)',borderRadius:'4px'}}></div>
                    </div>
                    <span className="ml-4 text-secondary text-sm">Loading subscription data...</span>
                </div>
            );

            return (
                <div className="p-6 space-y-6">
                    <div className="flex items-center justify-between mb-2">
                        <div>
                            <h2 className="text-2xl font-bold text-primary">LTV & Churn Analytics</h2>
                            <p className="text-sm text-secondary mt-1">Calculated from {allSubs.length} Stripe + Whop subscriptions</p>
                        </div>
                        <div className="flex gap-2">
                            {['overview', 'clients', 'cohorts'].map(v => (
                                <button key={v} onClick={() => setView(v)}
                                    className={'px-4 py-2 rounded-lg text-sm font-medium transition-all ' + (view === v ? 'bg-brand-cyan/20 text-brand-cyan' : 'text-secondary hover:text-white hover:bg-dark-700')}>
                                    {v === 'overview' ? 'Overview' : v === 'clients' ? 'Client Table' : 'Cohort Retention'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Date Range Filter */}
                    <div className="card p-4">
                        <div className="flex flex-wrap items-center gap-3">
                            <span className="text-xs font-semibold text-secondary uppercase tracking-wide">Time Range:</span>
                            {[
                                { id: 'all', label: 'All Time' },
                                { id: '1m', label: '1 Month' },
                                { id: '3m', label: '3 Months' },
                                { id: '6m', label: '6 Months' },
                                { id: '1y', label: '1 Year' },
                                { id: '2y', label: '2 Years' },
                                { id: 'custom', label: 'Custom' },
                            ].map(p => (
                                <button key={p.id} onClick={() => setDatePreset(p.id)}
                                    className={'px-3 py-1.5 rounded-lg text-xs font-medium transition-all ' + (datePreset === p.id ? 'bg-brand-cyan/20 text-brand-cyan border border-brand-cyan/30' : 'text-secondary hover:text-white hover:bg-dark-700 border border-transparent')}>
                                    {p.label}
                                </button>
                            ))}
                            {datePreset === 'custom' && (
                                <div className="flex items-center gap-2 ml-2">
                                    <input type="date" value={customFrom} onChange={e => setCustomFrom(e.target.value)} className="input-field border rounded-lg px-2 py-1.5 text-xs" />
                                    <span className="text-secondary text-xs">to</span>
                                    <input type="date" value={customTo} onChange={e => setCustomTo(e.target.value)} className="input-field border rounded-lg px-2 py-1.5 text-xs" />
                                </div>
                            )}
                            {datePreset !== 'all' && (
                                <span className="text-xs text-secondary ml-auto">
                                    Showing {dateFilteredSubs.length} of {enrichedSubs.length} subscriptions
                                </span>
                            )}
                        </div>
                    </div>

                    {/* KPI Cards - always visible */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <KPICard label="Total Clients" value={metrics.total} sub={`${metrics.activeCount} active`} color="text-brand-cyan" />
                        <KPICard label="Active" value={metrics.activeCount} sub={`${metrics.atRiskCount} at risk`} color="text-emerald-400" />
                        <KPICard label="Churned" value={metrics.churnedCount} sub={`${metrics.overallChurnRate.toFixed(1)}% all-time`} color="text-red-400" />
                        <KPICard label="Monthly MRR" value={fmtCurrency(metrics.mrr)} sub={`${fmtCurrency(metrics.atRiskMRR)} at risk`} color="text-brand-purple" />
                        <KPICard label="Avg LTV" value={fmtCurrency(metrics.avgLTV)} sub={`${metrics.avgLifetimeAll.toFixed(1)} mo avg life`} color="text-brand-cyan" />
                        <KPICard label="Recent Churn" value={`${metrics.recentChurnRate.toFixed(1)}%`} sub="Last 3 months" color={metrics.recentChurnRate > 10 ? 'text-red-400' : 'text-emerald-400'} />
                    </div>

                    {/* Overview View */}
                    {view === 'overview' && (
                        <div className="grid lg:grid-cols-2 gap-6">
                            {/* Monthly Churn Trend */}
                            <div className="card p-5">
                                <h3 className="text-sm font-semibold text-secondary uppercase tracking-wide mb-4">Monthly Churn Trend</h3>
                                <div className="space-y-2 max-h-96 overflow-y-auto scrollbar">
                                    {metrics.sortedMonths.slice(-18).map(m => {
                                        const d = metrics.monthlyData[m];
                                        const barWidth = Math.max(4, (d.churned / maxChurned) * 100);
                                        return (
                                            <div key={m} className="flex items-center gap-3 text-sm">
                                                <span className="text-secondary font-mono" style={{minWidth:'70px'}}>{m}</span>
                                                <div style={{flex:1,display:'flex',alignItems:'center',gap:'8px'}}>
                                                    <div style={{width:`${barWidth}%`,height:'20px',background:d.churned > 0 ? 'linear-gradient(90deg,rgba(239,68,68,0.6),rgba(239,68,68,0.3))' : 'rgba(52,211,153,0.2)',borderRadius:'4px',minWidth:'4px'}}></div>
                                                    <span className="text-xs text-secondary">{d.churned} left</span>
                                                </div>
                                                <span className="text-xs text-secondary" style={{minWidth:'50px'}}>+{d.started} new</span>
                                                <span className="text-xs font-medium" style={{minWidth:'45px',color: d.churnRate > 10 ? '#f87171' : '#34d399'}}>{d.churnRate.toFixed(1)}%</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Active vs Churned over time */}
                            <div className="card p-5">
                                <h3 className="text-sm font-semibold text-secondary uppercase tracking-wide mb-4">Active Client Growth</h3>
                                <div className="space-y-2 max-h-96 overflow-y-auto scrollbar">
                                    {(() => {
                                        const months = metrics.sortedMonths.slice(-18);
                                        const maxActive = Math.max(...months.map(m => metrics.monthlyData[m].active), 1);
                                        return months.map(m => {
                                            const d = metrics.monthlyData[m];
                                            const barWidth = Math.max(4, (d.active / maxActive) * 100);
                                            return (
                                                <div key={m} className="flex items-center gap-3 text-sm">
                                                    <span className="text-secondary font-mono" style={{minWidth:'70px'}}>{m}</span>
                                                    <div style={{flex:1}}>
                                                        <div style={{width:`${barWidth}%`,height:'20px',background:'linear-gradient(90deg,rgba(6,182,212,0.5),rgba(139,92,246,0.3))',borderRadius:'4px',minWidth:'4px'}}></div>
                                                    </div>
                                                    <span className="text-sm font-medium text-brand-cyan" style={{minWidth:'30px'}}>{d.active}</span>
                                                </div>
                                            );
                                        });
                                    })()}
                                </div>
                            </div>

                            {/* Revenue by Source */}
                            <div className="card p-5">
                                <h3 className="text-sm font-semibold text-secondary uppercase tracking-wide mb-4">Revenue by Source</h3>
                                {(() => {
                                    const stripeSubs = dateFilteredSubs.filter(s => s.source === 'stripe' && s.active);
                                    const whopSubs = dateFilteredSubs.filter(s => s.source === 'whop' && s.active);
                                    const fanbasisSubs = dateFilteredSubs.filter(s => s.source === 'fanbasis' && s.active);
                                    const stripeMRR = stripeSubs.reduce((sum, s) => sum + s.monthly, 0);
                                    const whopMRR = whopSubs.reduce((sum, s) => sum + s.monthly, 0);
                                    const fanbasisMRR = fanbasisSubs.reduce((sum, s) => sum + s.monthly, 0);
                                    const totalMRR = stripeMRR + whopMRR + fanbasisMRR;
                                    return (
                                        <div className="space-y-4">
                                            <div>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-secondary">Stripe ({stripeSubs.length} active)</span>
                                                    <span className="text-brand-cyan font-medium">{fmtCurrency(stripeMRR)}/mo</span>
                                                </div>
                                                <div style={{height:'12px',background:'#262626',borderRadius:'6px',overflow:'hidden'}}>
                                                    <div style={{width:`${totalMRR > 0 ? (stripeMRR/totalMRR)*100 : 0}%`,height:'100%',background:'linear-gradient(90deg,#06b6d4,#3b82f6)',borderRadius:'6px'}}></div>
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-secondary">Whop ({whopSubs.length} active)</span>
                                                    <span className="text-brand-purple font-medium">{fmtCurrency(whopMRR)}/mo</span>
                                                </div>
                                                <div style={{height:'12px',background:'#262626',borderRadius:'6px',overflow:'hidden'}}>
                                                    <div style={{width:`${totalMRR > 0 ? (whopMRR/totalMRR)*100 : 0}%`,height:'100%',background:'linear-gradient(90deg,#8b5cf6,#a855f7)',borderRadius:'6px'}}></div>
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-secondary">Fanbasis ({fanbasisSubs.length} active)</span>
                                                    <span style={{color:'#f472b6'}} className="font-medium">{fmtCurrency(fanbasisMRR)}/mo</span>
                                                </div>
                                                <div style={{height:'12px',background:'#262626',borderRadius:'6px',overflow:'hidden'}}>
                                                    <div style={{width:`${totalMRR > 0 ? (fanbasisMRR/totalMRR)*100 : 0}%`,height:'100%',background:'linear-gradient(90deg,#f472b6,#ec4899)',borderRadius:'6px'}}></div>
                                                </div>
                                            </div>
                                            <div className="pt-2 border-t border-dark-700 flex justify-between text-sm">
                                                <span className="text-secondary">Total MRR</span>
                                                <span className="text-white font-bold">{fmtCurrency(totalMRR)}/mo</span>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-secondary">Projected ARR</span>
                                                <span className="text-white font-bold">{fmtCurrency(totalMRR * 12)}/yr</span>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>

                            {/* Avg Lifetime by Status */}
                            <div className="card p-5">
                                <h3 className="text-sm font-semibold text-secondary uppercase tracking-wide mb-4">Lifetime Comparison</h3>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm text-secondary">Active Clients Avg Lifetime</span>
                                        <span className="text-lg font-bold text-emerald-400">{metrics.avgLifetimeAll.toFixed(1)} months</span>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm text-secondary">Churned Clients Avg Lifetime</span>
                                        <span className="text-lg font-bold text-red-400">{metrics.avgLifetimeChurned.toFixed(1)} months</span>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm text-secondary">Active Client Avg LTV</span>
                                        <span className="text-lg font-bold text-brand-cyan">{fmtCurrency(metrics.avgActiveLTV)}</span>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm text-secondary">Overall Avg LTV</span>
                                        <span className="text-lg font-bold text-brand-purple">{fmtCurrency(metrics.avgLTV)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Client Table View */}
                    {view === 'clients' && (
                        <div className="card p-5">
                            <div className="flex flex-wrap items-center gap-3 mb-4">
                                <input value={searchFilter} onChange={e => setSearchFilter(e.target.value)} placeholder="Search clients..." className="input-field border rounded-lg px-3 py-2 text-sm" style={{minWidth:'200px'}} />
                                <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="input-field border rounded-lg px-3 py-2 text-sm">
                                    <option value="all">All Statuses</option>
                                    <option value="active">Active</option>
                                    <option value="churned">Churned</option>
                                    <option value="at-risk">At Risk</option>
                                </select>
                                <span className="text-xs text-secondary ml-auto">{filteredSubs.length} clients</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-dark-700">
                                            <SortHeader label="Client" sortKey="customerName" />
                                            <SortHeader label="Source" sortKey="source" />
                                            <SortHeader label="Status" sortKey="status" />
                                            <SortHeader label="Plan" sortKey="productName" />
                                            <SortHeader label="Monthly" sortKey="monthly" />
                                            <SortHeader label="Start Date" sortKey="created" />
                                            <SortHeader label="End Date" sortKey="endedAt" />
                                            <SortHeader label="Lifetime" sortKey="lifetimeMonths" />
                                            <SortHeader label="Est. LTV" sortKey="totalRevenue" />
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredSubs.map(sub => (
                                            <tr key={sub.id} className="border-b border-dark-700/50 hover:bg-dark-800/50">
                                                <td className="py-3 px-4">
                                                    <div className="font-medium text-primary">{sub.customerName || '—'}</div>
                                                    {sub.customerEmail && <div className="text-xs text-secondary">{sub.customerEmail}</div>}
                                                </td>
                                                <td className="py-3 px-4">
                                                    <span style={{background: sub.source === 'stripe' ? 'rgba(99,102,241,0.15)' : sub.source === 'fanbasis' ? 'rgba(244,114,182,0.15)' : 'rgba(251,191,36,0.15)', color: sub.source === 'stripe' ? '#818cf8' : sub.source === 'fanbasis' ? '#f472b6' : '#fbbf24', padding:'2px 8px', borderRadius:'9999px', fontSize:'11px'}}>{sub.source}</span>
                                                </td>
                                                <td className="py-3 px-4"><StatusBadge sub={sub} /></td>
                                                <td className="py-3 px-4 text-secondary">{sub.productName || '—'}</td>
                                                <td className="py-3 px-4 text-primary font-medium">{fmtCurrency(sub.monthly)}</td>
                                                <td className="py-3 px-4 text-secondary">{fmtDate(sub.created)}</td>
                                                <td className="py-3 px-4 text-secondary">{sub.endDate ? fmtDate(sub.endDate) : (sub.cancelAtPeriodEnd ? <span className="text-amber-400">Pending</span> : '—')}</td>
                                                <td className="py-3 px-4 text-primary">{sub.lifetimeMonths} mo</td>
                                                <td className="py-3 px-4 font-medium text-brand-cyan">{fmtCurrency(sub.totalRevenue)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Cohort Retention View */}
                    {view === 'cohorts' && (
                        <div className="card p-5">
                            <h3 className="text-sm font-semibold text-secondary uppercase tracking-wide mb-4">Cohort Retention Analysis</h3>
                            <p className="text-xs text-secondary mb-4">Shows % of clients still active after N months since signup. Cohorts with fewer than 2 clients are hidden.</p>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-dark-700">
                                            <th className="text-left py-3 px-3 text-xs font-semibold text-secondary uppercase">Cohort</th>
                                            <th className="text-center py-3 px-2 text-xs font-semibold text-secondary">Size</th>
                                            {[...Array(13)].map((_, i) => (
                                                <th key={i} className="text-center py-3 px-2 text-xs font-semibold text-secondary">M{i}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {cohorts.map(c => (
                                            <tr key={c.month} className="border-b border-dark-700/50">
                                                <td className="py-2 px-3 font-mono text-secondary">{c.month}</td>
                                                <td className="py-2 px-2 text-center text-primary font-medium">{c.size}</td>
                                                {[...Array(13)].map((_, i) => {
                                                    const val = c.retention[i];
                                                    if (val === undefined) return <td key={i} className="py-2 px-2 text-center text-secondary">—</td>;
                                                    const bg = val >= 80 ? 'rgba(52,211,153,0.25)' : val >= 50 ? 'rgba(251,191,36,0.20)' : 'rgba(239,68,68,0.20)';
                                                    const color = val >= 80 ? '#34d399' : val >= 50 ? '#fbbf24' : '#f87171';
                                                    return <td key={i} className="py-2 px-2 text-center text-xs font-medium" style={{background: bg, color: color}}>{val}%</td>;
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {cohorts.length === 0 && <div className="text-center py-8 text-secondary">No cohort data available yet (need cohorts with 2+ clients)</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ========== CASHFLOW SCHEDULE TAB (Auto from Stripe + Whop) ==========
        const CashflowTab = ({ setupData = [] }) => {
            const { invoiceData: ctxInvoiceData, subscriptions: ctxSubs, invoicesLoading: ctxInvLoading, subsLoading: ctxSubsLoading, fetchInvoices: ctxFetchInvoices } = useBillingData();
            const [cashflowData, setCashflowData] = useState([]);
            const [activeSubs, setActiveSubs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [loadingMsg, setLoadingMsg] = useState('Fetching payment data...');
            const [search, setSearch] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: null, dir: 'desc' });
            const [showProjections, setShowProjections] = useState(true);
            const [filterStatus, setFilterStatus] = useState('all');
            const [dataSource, setDataSource] = useState('stripe'); // 'stripe', 'whop', 'all'
            const [yearRange, setYearRange] = useState([2024, 2025, 2026]); // years to show
            const [collapsedYears, setCollapsedYears] = useState(new Set()); // collapsed year columns
            const toggleYear = (yr) => setCollapsedYears(prev => { const n = new Set(prev); n.has(yr) ? n.delete(yr) : n.add(yr); return n; });
            const [overrides, setOverrides] = useState({}); // { 'clientkey|2026|3': amount }
            const [editingCell, setEditingCell] = useState(null); // { clientKey, yr, mo }
            const [editValue, setEditValue] = useState('');
            const [savingCell, setSavingCell] = useState(null);
            const [planModal, setPlanModal] = useState(null); // { clientKey, name, email }
            const [planAmount, setPlanAmount] = useState('');
            const [planStartMonth, setPlanStartMonth] = useState('');
            const [planStartYear, setPlanStartYear] = useState('2026');
            const [planMonths, setPlanMonths] = useState('12');
            const [planNote, setPlanNote] = useState('');
            const [hideInactive, setHideInactive] = useState(true);
            const [highlightSheetClients, setHighlightSheetClients] = useState(false);
            const [expandedNotes, setExpandedNotes] = useState(null); // clientKey of expanded contract notes row
            const [showContractCol, setShowContractCol] = useState(true);

            const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const NOW = new Date();
            const CURRENT_YEAR = NOW.getFullYear();
            const CURRENT_MONTH = NOW.getMonth(); // 0-indexed

            // Process cashflow when context data is ready
            useEffect(() => {
                if (ctxInvLoading || ctxSubsLoading) return;
                const processAll = async () => {
                    try {
                        const cacheKey = 'vam_auto_cashflow';
                        const cacheTimeKey = 'vam_auto_cashflow_time';
                        const cached = localStorage.getItem(cacheKey);
                        const cacheTime = localStorage.getItem(cacheTimeKey);
                        if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 600000) {
                            const parsed = JSON.parse(cached);
                            setCashflowData(parsed.clients);
                            setActiveSubs(parsed.subs);
                            setLoading(false);
                            return;
                        }

                        // Use data from shared BillingDataContext (already fetched once)
                        const stripeRes = ctxInvoiceData;
                        const whopRes = ctxSubs;

                        setLoadingMsg('Processing payment history...');

                        // Build client map: email -> { name, months: { '2024-01': amount, ... }, source }
                        const clientMap = {};

                        const addPayment = (email, name, date, amount, source) => {
                            if (!date || !amount || amount <= 0) return;
                            const e = (email || '').toLowerCase().trim();
                            const n = (name || '').trim();
                            const key = e || n.toLowerCase();
                            if (!key) return;

                            const d = new Date(date);
                            const yr = d.getFullYear();
                            const mo = d.getMonth();
                            const monthKey = `${yr}-${String(mo).padStart(2, '0')}`;

                            if (!clientMap[key]) {
                                clientMap[key] = { email: e, name: n, months: {}, sources: new Set(), subAmount: 0, subInterval: null, subActive: false, cancelAtPeriodEnd: false };
                            }
                            if (n && !clientMap[key].name) clientMap[key].name = n;
                            if (e && !clientMap[key].email) clientMap[key].email = e;
                            clientMap[key].months[monthKey] = (clientMap[key].months[monthKey] || 0) + amount;
                            clientMap[key].sources.add(source);
                        };

                        // Process Stripe invoices and charges
                        const stripePayments = stripeRes.stripe || [];
                        for (const p of stripePayments) {
                            if (!p.paid && p.status !== 'paid') continue;
                            const amount = p.amountPaid || p.amountDue || 0;
                            if (amount <= 0) continue;
                            addPayment(p.customerEmail, p.customerName, p.created, amount, 'stripe');
                        }

                        // Process active Stripe subscriptions for projections
                        const stripeSubs = stripeRes.stripeUpcoming || [];
                        for (const sub of stripeSubs) {
                            if (sub.status !== 'active') continue;
                            const e = (sub.customerEmail || '').toLowerCase().trim();
                            const n = (sub.customerName || '').trim();
                            const key = e || n.toLowerCase();
                            if (!key) continue;
                            if (!clientMap[key]) {
                                clientMap[key] = { email: e, name: n, months: {}, sources: new Set(), subAmount: 0, subInterval: null, subActive: false, cancelAtPeriodEnd: false };
                            }
                            let monthly = sub.amount || 0;
                            if (sub.interval === 'year') monthly = monthly / 12;
                            else if (sub.interval === 'week') monthly = monthly * 4.33;
                            clientMap[key].subAmount = Math.max(clientMap[key].subAmount, monthly);
                            clientMap[key].subInterval = sub.interval;
                            clientMap[key].subActive = true;
                            clientMap[key].cancelAtPeriodEnd = sub.cancelAtPeriodEnd || false;
                            clientMap[key].sources.add('stripe');
                        }

                        // Process Whop memberships with payment history
                        const whopMembers = whopRes.whop || [];
                        for (const m of whopMembers) {
                            const payments = m.payments || [];
                            for (const p of payments) {
                                if (p.status !== 'paid' && p.status !== 'succeeded') continue;
                                addPayment(m.customerEmail, m.customerName, p.created, p.amount || 0, 'whop');
                            }
                            // Track active whop subs for projection
                            if (m.status === 'active') {
                                const e = (m.customerEmail || '').toLowerCase().trim();
                                const n = (m.customerName || '').trim();
                                const key = e || n.toLowerCase();
                                if (key && clientMap[key]) {
                                    let monthly = m.amount || 0;
                                    if (m.interval === 'year') monthly = monthly / 12;
                                    clientMap[key].subAmount = Math.max(clientMap[key].subAmount, monthly);
                                    clientMap[key].subActive = true;
                                    clientMap[key].cancelAtPeriodEnd = m.cancelAtPeriodEnd || false;
                                    clientMap[key].sources.add('whop');
                                }
                            }
                        }

                        // Convert to array and build year/month grids
                        const clients = Object.values(clientMap).map(c => {
                            // Build monthly arrays for each year
                            const yearData = {};
                            for (const yr of [2024, 2025, 2026]) {
                                yearData[yr] = new Array(12).fill(0);
                            }
                            for (const [monthKey, amount] of Object.entries(c.months)) {
                                const [yr, mo] = monthKey.split('-').map(Number);
                                if (yearData[yr]) yearData[yr][mo] = amount;
                            }

                            // Calculate totals per year
                            const yearTotals = {};
                            for (const yr of [2024, 2025, 2026]) {
                                yearTotals[yr] = yearData[yr].reduce((a, b) => a + b, 0);
                            }

                            // Determine status based on subscription + payment pattern
                            let status = 'inactive';
                            let projectedMonthly = 0;

                            if (c.subActive && !c.cancelAtPeriodEnd) {
                                status = 'active-sub';
                                projectedMonthly = c.subAmount;
                            } else if (c.subActive && c.cancelAtPeriodEnd) {
                                status = 'canceling';
                                projectedMonthly = 0;
                            } else {
                                // No active sub — check recent payment pattern
                                const recent2025 = yearData[2025].slice(Math.max(0, CURRENT_MONTH - 3));
                                const recent2026 = yearData[2026];
                                const hasRecent = [...recent2025, ...recent2026].some(v => v > 0);
                                const allPayments = [...yearData[2024], ...yearData[2025], ...yearData[2026]].filter(v => v > 0);

                                if (allPayments.length === 0) {
                                    status = 'no-payments';
                                } else if (hasRecent) {
                                    // Detect recurring from pattern
                                    const amounts = allPayments.filter(a => a > 5);
                                    if (amounts.length >= 2) {
                                        const rounded = amounts.map(a => Math.round(a / 50) * 50);
                                        const freq = {};
                                        rounded.forEach(a => { freq[a] = (freq[a] || 0) + 1; });
                                        const best = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];
                                        if (best[1] >= 2 && parseFloat(best[0]) >= 50) {
                                            status = 'recurring';
                                            projectedMonthly = parseFloat(best[0]);
                                        } else {
                                            status = 'active';
                                        }
                                    } else {
                                        status = 'one-time';
                                    }
                                } else {
                                    // Last payment was a while ago
                                    const lastMonth2025 = yearData[2025].reduce((last, v, i) => v > 0 ? i : last, -1);
                                    if (lastMonth2025 >= 0 && lastMonth2025 < CURRENT_MONTH - 3) {
                                        status = 'churned';
                                    } else if (yearTotals[2025] === 0 && yearTotals[2024] > 0) {
                                        status = 'churned';
                                    } else {
                                        status = 'inactive';
                                    }
                                }
                            }

                            // Build 2026 projections
                            const projected2026 = [...yearData[2026]]; // start with actual 2026 data
                            if (projectedMonthly > 0 && showProjections) {
                                for (let m = 0; m < 12; m++) {
                                    const monthDate = new Date(2026, m, 1);
                                    // Only project future months that don't have actuals
                                    if (monthDate > NOW && projected2026[m] === 0) {
                                        projected2026[m] = projectedMonthly;
                                    }
                                }
                            }
                            const projected2026Total = projected2026.reduce((a, b) => a + b, 0);

                            return {
                                email: c.email,
                                name: c.name,
                                sources: [...c.sources],
                                status,
                                subAmount: c.subAmount,
                                subActive: c.subActive,
                                cancelAtPeriodEnd: c.cancelAtPeriodEnd,
                                yearData,
                                yearTotals,
                                projected2026,
                                projected2026Total,
                                projectedMonthly,
                                grandTotal: yearTotals[2024] + yearTotals[2025] + projected2026Total
                            };
                        });

                        // Cache
                        localStorage.setItem(cacheKey, JSON.stringify({ clients, subs: stripeSubs }));
                        localStorage.setItem(cacheTimeKey, Date.now().toString());
                        setCashflowData(clients);
                        setActiveSubs(stripeSubs);
                    } catch (err) {
                        console.error('Auto cashflow fetch error:', err);
                    }
                    setLoading(false);
                };
                processAll();
            }, [ctxInvLoading, ctxSubsLoading, ctxInvoiceData, ctxSubs]);

            // Fetch overrides from Supabase
            useEffect(() => {
                const fetchOverrides = async () => {
                    try {
                        const res = await fetch('/api/billing-subscriptions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'cashflow_fetchAll' })
                        });
                        const data = await res.json();
                        if (data.overrides) {
                            const map = {};
                            for (const o of data.overrides) {
                                map[`${o.client_key}|${o.year}|${o.month}`] = { amount: parseFloat(o.amount), notes: o.notes };
                            }
                            setOverrides(map);
                        }
                    } catch (err) { console.error('Override fetch error:', err); }
                };
                fetchOverrides();
            }, []);

            // Save a single cell override
            const saveOverride = async (clientKey, clientName, clientEmail, yr, mo, amount) => {
                const key = `${clientKey}|${yr}|${mo}`;
                setSavingCell(key);
                try {
                    if (amount === '' || amount === null || amount === undefined) {
                        // Delete override
                        await fetch('/api/billing-subscriptions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'cashflow_delete', client_key: clientKey, year: yr, month: mo })
                        });
                        setOverrides(prev => { const n = {...prev}; delete n[key]; return n; });
                    } else {
                        // Upsert
                        await fetch('/api/billing-subscriptions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'cashflow_upsert', client_key: clientKey, client_name: clientName, client_email: clientEmail, year: yr, month: mo, amount: parseFloat(amount) })
                        });
                        setOverrides(prev => ({...prev, [key]: { amount: parseFloat(amount), notes: null }}));
                    }
                } catch (err) { console.error('Save override error:', err); }
                setSavingCell(null);
                setEditingCell(null);
            };

            // Save a recurring plan (bulk)
            const savePlan = async () => {
                if (!planModal || !planAmount) return;
                const entries = [];
                const startYr = parseInt(planStartYear);
                const startMo = parseInt(planStartMonth);
                const count = parseInt(planMonths);
                const amt = parseFloat(planAmount);
                for (let i = 0; i < count; i++) {
                    let yr = startYr;
                    let mo = startMo + i;
                    while (mo >= 12) { mo -= 12; yr++; }
                    entries.push({
                        client_key: planModal.clientKey,
                        client_name: planModal.name,
                        client_email: planModal.email,
                        year: yr, month: mo, amount: amt,
                        notes: planNote || null
                    });
                }
                try {
                    await fetch('/api/billing-subscriptions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'cashflow_bulkUpsert', entries })
                    });
                    const newOverrides = {...overrides};
                    for (const e of entries) {
                        newOverrides[`${e.client_key}|${e.year}|${e.month}`] = { amount: e.amount, notes: e.notes };
                    }
                    setOverrides(newOverrides);
                } catch (err) { console.error('Save plan error:', err); }
                setPlanModal(null);
                setPlanAmount(''); setPlanNote('');
            };

            // Delete all overrides for a client
            const clearClientOverrides = async (clientKey) => {
                try {
                    await fetch('/api/billing-subscriptions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'cashflow_deleteClient', client_key: clientKey })
                    });
                    setOverrides(prev => {
                        const n = {...prev};
                        Object.keys(n).forEach(k => { if (k.startsWith(clientKey + '|')) delete n[k]; });
                        return n;
                    });
                } catch (err) { console.error('Clear overrides error:', err); }
            };

            // Get the effective value for a cell (override takes priority over API/projected data)
            const getCellValue = (clientKey, yr, mo, apiValue) => {
                const key = `${clientKey}|${yr}|${mo}`;
                if (overrides[key] !== undefined) return { value: overrides[key].amount, isOverride: true };
                return { value: apiValue, isOverride: false };
            };

            // Enrich cashflow data with setupData renewal tag
            const enrichedCashflow = useMemo(() => {
                if (!setupData.length) return cashflowData;
                return cashflowData.map(c => {
                    const cName = (c.name || '').toLowerCase().trim();
                    const cEmail = (c.email || '').toLowerCase().trim();
                    const match = setupData.find(s => {
                        const sName = (s.client || '').toLowerCase().trim();
                        if (!sName || !cName) return false;
                        if (sName === cName) return true;
                        // Fuzzy: check if significant name parts match
                        const sParts = sName.split(' ').filter(p => p.length > 2);
                        const cParts = cName.split(' ').filter(p => p.length > 2);
                        if (sParts.length >= 2 && cParts.length >= 2) {
                            return sParts.every(p => cName.includes(p)) || cParts.every(p => sName.includes(p));
                        }
                        // Check name/email field
                        const sNameEmail = (s.nameEmail || '').toLowerCase();
                        if (cEmail && sNameEmail.includes(cEmail)) return true;
                        return false;
                    });
                    // Calculate last payment month as a Date for filtering
                    let lastPaymentDate = null;
                    for (const yr of [2026, 2025, 2024]) {
                        if (c.yearData[yr]) {
                            for (let m = 11; m >= 0; m--) {
                                if (c.yearData[yr][m] > 0) {
                                    lastPaymentDate = new Date(yr, m, 1);
                                    break;
                                }
                            }
                        }
                        if (lastPaymentDate) break;
                    }
                    // Extract contract notes and rebilling info from setupData match
                    let contractInfo = null;
                    if (match) {
                        const notes = (match.contractNotes || '').trim();
                        const payNotes = (match.paymentNotes || '').trim();
                        const combined = notes + ' ' + payNotes;
                        let billingFreq = null;
                        if (/monthly|every\s*month|per\s*month|\/mo/i.test(combined)) billingFreq = 'Monthly';
                        else if (/bi.?weekly|every\s*2\s*weeks/i.test(combined)) billingFreq = 'Biweekly';
                        else if (/weekly|every\s*week/i.test(combined)) billingFreq = 'Weekly';
                        else if (/quarterly|every\s*3\s*months/i.test(combined)) billingFreq = 'Quarterly';
                        else if (/annually|yearly/i.test(combined)) billingFreq = 'Annually';
                        if (!billingFreq && match.billingCycle) {
                            if (/month/i.test(match.billingCycle)) billingFreq = 'Monthly';
                            else if (/bi.?week/i.test(match.billingCycle)) billingFreq = 'Biweekly';
                            else if (/quarter/i.test(match.billingCycle)) billingFreq = 'Quarterly';
                        }
                        // Parse next rebill date
                        let nextRebillDate = null;
                        let nextRebillSource = null;
                        if (match.nextBillingDateSheet) {
                            const parsed = new Date(match.nextBillingDateSheet);
                            if (!isNaN(parsed.getTime())) { nextRebillDate = parsed; nextRebillSource = 'sheet'; }
                        }
                        if (!nextRebillDate) {
                            const dateMatch = combined.match(/(?:rebill|bill|charge|next|due|pay)\s*(?:date)?[:\s-]*(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/i);
                            if (dateMatch) {
                                const mo = parseInt(dateMatch[1]), dy = parseInt(dateMatch[2]);
                                const yr = dateMatch[3] ? (dateMatch[3].length === 2 ? 2000 + parseInt(dateMatch[3]) : parseInt(dateMatch[3])) : NOW.getFullYear();
                                if (mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
                                    let d = new Date(yr, mo - 1, dy);
                                    if (d < NOW && !dateMatch[3]) { d = new Date(NOW.getFullYear(), mo - 1, dy); if (d < NOW) d.setFullYear(d.getFullYear() + 1); }
                                    nextRebillDate = d; nextRebillSource = 'notes';
                                }
                            }
                        }
                        let daysUntilRebill = nextRebillDate ? Math.ceil((nextRebillDate - NOW) / 86400000) : null;
                        const isManual = /manual|invoice|venmo|zelle|cash|check|wire|ach|paypal/i.test(combined);
                        const amtMatch = combined.match(/\$\s*([\d,]+(?:\.\d{2})?)/);
                        const notesAmount = amtMatch ? parseFloat(amtMatch[1].replace(/,/g, '')) : null;
                        contractInfo = {
                            contractNotes: notes, paymentNotes: payNotes, hasNotes: notes.length > 0 || payNotes.length > 0,
                            billingFreq, nextRebillDate, nextRebillSource, daysUntilRebill, isManual, notesAmount,
                            mrr: match.mrr || '', billingCycle: match.billingCycle || '', duePayment: match.duePayment || '',
                            contractLength: match.contractLength || '', contractEndDate: match.contractEndDate || '',
                            paidDate: match.paidDate || '', platform: match.platform || ''
                        };
                    }
                    return { ...c, renewal: match ? match.renewal : '', csmRep: match ? match.csmRep : '', setupMatch: !!match, lastPaymentDate, contractInfo };
                });
            }, [cashflowData, setupData]);

            // Filter and search
            const filteredData = useMemo(() => {
                let data = enrichedCashflow;
                // Hide clients with no payment in last 7 months
                if (hideInactive) {
                    const sevenMonthsAgo = new Date(CURRENT_YEAR, CURRENT_MONTH - 7, 1);
                    data = data.filter(c => {
                        if (c.subActive) return true; // always show active subscriptions
                        if (c.lastPaymentDate && c.lastPaymentDate >= sevenMonthsAgo) return true;
                        // Check if they have overrides in the future
                        const clientKey = c.email || c.name.toLowerCase();
                        const hasFutureOverride = Object.keys(overrides).some(k => k.startsWith(clientKey + '|'));
                        if (hasFutureOverride) return true;
                        return false;
                    });
                }
                // Source filter
                if (dataSource !== 'all') {
                    data = data.filter(c => c.sources.includes(dataSource));
                }
                if (search) {
                    const s = search.toLowerCase();
                    data = data.filter(c => c.name.toLowerCase().includes(s) || c.email.toLowerCase().includes(s));
                }
                if (filterStatus === 'sheet-active') {
                    data = data.filter(c => c.renewal && c.renewal.toLowerCase() === 'active');
                } else if (filterStatus === 'active') {
                    data = data.filter(c => ['active-sub', 'recurring', 'active'].includes(c.status));
                } else if (filterStatus === 'canceling') {
                    data = data.filter(c => c.status === 'canceling');
                } else if (filterStatus === 'churned') {
                    data = data.filter(c => c.status === 'churned' || c.status === 'inactive');
                } else if (filterStatus === 'one-time') {
                    data = data.filter(c => c.status === 'one-time' || c.status === 'no-payments');
                }
                // Sort
                if (sortConfig.key) {
                    data = [...data].sort((a, b) => {
                        let av, bv;
                        if (sortConfig.key === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
                        else if (sortConfig.key === 'grandTotal') { av = a.grandTotal; bv = b.grandTotal; }
                        else if (sortConfig.key === 'projected') { av = a.projected2026Total; bv = b.projected2026Total; }
                        else if (sortConfig.key === 'subAmount') { av = a.subAmount; bv = b.subAmount; }
                        else if (sortConfig.key.startsWith('year-')) { const yr = parseInt(sortConfig.key.split('-')[1]); av = a.yearTotals[yr] || 0; bv = b.yearTotals[yr] || 0; }
                        else { av = a[sortConfig.key] || 0; bv = b[sortConfig.key] || 0; }
                        if (av < bv) return sortConfig.dir === 'asc' ? -1 : 1;
                        if (av > bv) return sortConfig.dir === 'asc' ? 1 : -1;
                        return 0;
                    });
                } else {
                    data = [...data].sort((a, b) => b.grandTotal - a.grandTotal);
                }
                return data;
            }, [enrichedCashflow, search, filterStatus, sortConfig, dataSource, hideInactive, overrides]);

            const handleSort = (key) => {
                setSortConfig(prev => prev.key === key ? { key, dir: prev.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'desc' });
            };

            // Stats
            const stats = useMemo(() => {
                const active = enrichedCashflow.filter(c => ['active-sub', 'recurring', 'active'].includes(c.status));

        const ContractBillingTab = ({ setupData = [] }) => {

            // Parse contract notes to extract rebilling info
            const parseRebillingInfo = (s) => {
                const notes = (s.contractNotes || '').trim();
                const payNotes = (s.paymentNotes || '').trim();
                const combined = notes + ' ' + payNotes;
                const hasNotes = notes.length > 0;

                // Extract billing frequency from notes
                let billingFrequency = null;
                if (/monthly|every\s*month|per\s*month|\/mo/i.test(combined)) billingFrequency = 'monthly';
                else if (/bi.?weekly|every\s*2\s*weeks|biweekly/i.test(combined)) billingFrequency = 'biweekly';
                else if (/weekly|every\s*week/i.test(combined)) billingFrequency = 'weekly';
                else if (/quarterly|every\s*3\s*months|every\s*quarter/i.test(combined)) billingFrequency = 'quarterly';
                else if (/annually|yearly|every\s*year|per\s*year/i.test(combined)) billingFrequency = 'annually';

                // Try to get billing cycle from setup timing sheet
                const billingCycle = (s.billingCycle || '').trim();
                if (!billingFrequency && billingCycle) {
                    if (/month/i.test(billingCycle)) billingFrequency = 'monthly';
                    else if (/bi.?week/i.test(billingCycle)) billingFrequency = 'biweekly';
                    else if (/week/i.test(billingCycle)) billingFrequency = 'weekly';
                    else if (/quarter/i.test(billingCycle)) billingFrequency = 'quarterly';
                }

                // Extract specific dates from notes (e.g., "rebill on the 15th", "bills on 1st", "next payment 3/15")
                let rebillDayOfMonth = null;
                const dayMatch = combined.match(/(?:rebill|bill|charge|pay(?:ment)?|due)\s*(?:on\s*)?(?:the\s*)?(\d{1,2})(?:st|nd|rd|th)?(?:\s*of\s*(?:each|every)\s*month)?/i);
                if (dayMatch) rebillDayOfMonth = parseInt(dayMatch[1]);

                // Try date patterns like "3/15", "03/15/2026"
                const dateMatch = combined.match(/(?:rebill|bill|charge|next|due|pay)\s*(?:date)?[:\s-]*(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/i);
                let explicitNextDate = null;
                if (dateMatch) {
                    const month = parseInt(dateMatch[1]);
                    const day = parseInt(dateMatch[2]);
                    const year = dateMatch[3] ? (dateMatch[3].length === 2 ? 2000 + parseInt(dateMatch[3]) : parseInt(dateMatch[3])) : new Date().getFullYear();
                    if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                        explicitNextDate = new Date(year, month - 1, day);
                        if (explicitNextDate < new Date()) {
                            // If the date is in the past, move to next occurrence
                            if (!dateMatch[3]) {
                                explicitNextDate = new Date(new Date().getFullYear(), month - 1, day);
                                if (explicitNextDate < new Date()) explicitNextDate.setFullYear(explicitNextDate.getFullYear() + 1);
                            }
                        }
                    }
                }

                let nextRebillDate = null;
                let nextRebillSource = null;

                if (s.nextBillingDateSheet) {

                        nextRebillDate = parsed;
                        nextRebillSource = 'sheet';
                    }
                }

                // Priority 2: Explicit date found in contract notes
                if (!nextRebillDate && explicitNextDate) {
                    nextRebillDate = explicitNextDate;
                    nextRebillSource = 'contract_notes';
                }

                // Priority 3: Compute from paid date + billing frequency + day of month
                if (!nextRebillDate && s.paidDate) {
                    const paidDate = new Date(s.paidDate);
                    if (!isNaN(paidDate.getTime())) {
                        const freq = billingFrequency || 'monthly';
                        const today = new Date();
                        let next = new Date(paidDate);

                        if (rebillDayOfMonth) {
                            // Use the specific day of month
                            next = new Date(today.getFullYear(), today.getMonth(), rebillDayOfMonth);
                            if (next <= today) next.setMonth(next.getMonth() + 1);
                        } else {
                            // Advance from paid date by billing frequency until we're in the future
                            while (next <= today) {
                                if (freq === 'weekly') next.setDate(next.getDate() + 7);
                                else if (freq === 'biweekly') next.setDate(next.getDate() + 14);
                                else if (freq === 'quarterly') next.setMonth(next.getMonth() + 3);
                                else if (freq === 'annually') next.setFullYear(next.getFullYear() + 1);
                                else next.setMonth(next.getMonth() + 1); // default monthly
                            }
                        }
                        nextRebillDate = next;
                        nextRebillSource = 'computed';

                }

                    const dueParsed = new Date(s.duePayment);
                    if (!isNaN(dueParsed.getTime())) {
                        nextRebillDate = dueParsed;
                        nextRebillSource = 'due_payment';
                    }
                }

                // Days until next rebill
                let daysUntilRebill = null;
                if (nextRebillDate) {
                    daysUntilRebill = Math.ceil((nextRebillDate - new Date()) / (1000 * 60 * 60 * 24));
                }

                // Detect manual billing indicators
                const isManualBilling = /manual|invoice|venmo|zelle|cash|check|wire|ach|paypal/i.test(combined);

                if (/loan\s*officer|lo\s+pay|lender/i.test(combined)) flags.push('Loan Officer');
                if (/split|half|shared|50.?50/i.test(combined)) flags.push('Split Billing');
                if (/pause|hold|frozen/i.test(combined)) flags.push('Paused');
                if (/cancel|churn/i.test(combined)) flags.push('Cancelled');
                if (/discount|promo|special/i.test(combined)) flags.push('Discount');
                if (/free\s*trial|trial/i.test(combined)) flags.push('Trial');

                return {

                    contractNotes: notes,
